<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ-панель — Редактор карт</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0a0a1a;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    
    .sidebar {
      width: 320px;
      min-width: 320px;
      background: #111133;
      padding: 15px;
      overflow-y: auto;
      border-right: 2px solid #3333aa;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .sidebar h2 {
      color: #ffd700;
      text-align: center;
      font-size: 1.2rem;
      margin-bottom: 5px;
    }
    
    .section {
      background: #1a1a3a;
      border-radius: 10px;
      padding: 12px;
      border: 1px solid #333366;
    }
    
    .section h3 {
      color: #66ccff;
      font-size: 0.9rem;
      margin-bottom: 8px;
    }
    
    label {
      display: block;
      font-size: 0.8rem;
      color: #aaaacc;
      margin-bottom: 3px;
    }
    
    input, select, textarea {
      width: 100%;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #444488;
      background: #0a0a22;
      color: #fff;
      font-size: 0.85rem;
      margin-bottom: 8px;
    }
    
    input[type="range"] {
      padding: 0;
      height: 20px;
    }
    
    button {
      padding: 10px 15px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.85rem;
      transition: all 0.2s;
      width: 100%;
      margin-bottom: 5px;
    }
    
    button:hover {
      transform: translateY(-1px);
      opacity: 0.9;
    }
    
    .btn-primary {
      background: linear-gradient(180deg, #4488ff, #2266cc);
      color: #fff;
    }
    
    .btn-success {
      background: linear-gradient(180deg, #44cc44, #228822);
      color: #fff;
    }
    
    .btn-danger {
      background: linear-gradient(180deg, #ff4444, #cc2222);
      color: #fff;
    }
    
    .btn-warning {
      background: linear-gradient(180deg, #ffaa44, #cc7722);
      color: #fff;
    }
    
    .btn-info {
      background: linear-gradient(180deg, #aa44ff, #6622cc);
      color: #fff;
    }
    
    .btn-small {
      padding: 5px 10px;
      font-size: 0.7rem;
      width: auto;
    }
    
    .btn-group {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }
    
    .btn-group button {
      flex: 1;
      min-width: 70px;
    }
    
    .main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    
    .toolbar {
      background: #111133;
      padding: 10px 15px;
      border-bottom: 2px solid #3333aa;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    
    .toolbar button {
      width: auto;
      margin-bottom: 0;
    }
    
    .toolbar .info {
      font-size: 0.8rem;
      color: #aaaacc;
      margin-left: auto;
    }
    
    canvas {
      flex: 1;
      background: #000015;
      cursor: crosshair;
    }
    
    .tooltip {
      position: absolute;
      background: rgba(0,0,0,0.9);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 0.75rem;
      pointer-events: none;
      z-index: 100;
      border: 1px solid #6666aa;
      display: none;
    }
    
    .map-list {
      max-height: 200px;
      overflow-y: auto;
    }
    
    .map-item {
      background: #1a1a3a;
      padding: 8px;
      border-radius: 6px;
      margin-bottom: 5px;
      cursor: pointer;
      border: 2px solid transparent;
      font-size: 0.8rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .map-item:hover {
      border-color: #4488ff;
    }
    
    .map-item.active {
      border-color: #ffd700;
      background: #222244;
    }
    
    .map-item .delete-map {
      background: #ff4444;
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      font-size: 0.7rem;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .obstacle-palette {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 5px;
    }
    
    .obstacle-btn {
      padding: 8px;
      border-radius: 6px;
      border: 2px solid transparent;
      cursor: pointer;
      font-size: 0.7rem;
      text-align: center;
      transition: all 0.2s;
      background: #1a1a3a;
      color: #fff;
    }
    
    .obstacle-btn:hover {
      border-color: #ffd700;
    }
    
    .obstacle-btn.selected {
      border-color: #44ff44;
      background: #223322;
      box-shadow: 0 0 10px rgba(68,255,68,0.3);
    }
    
    .coords-display {
      font-family: monospace;
      font-size: 0.75rem;
      color: #88ff88;
    }
    
    .obstacle-list {
      max-height: 300px;
      overflow-y: auto;
    }
    
    .obstacle-item {
      background: #1a1a3a;
      padding: 6px 8px;
      border-radius: 4px;
      margin-bottom: 3px;
      font-size: 0.7rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid #333366;
    }
    
    .obstacle-item:hover {
      background: #222244;
    }
    
    .obstacle-item .remove-obs {
      background: #ff4444;
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      font-size: 0.6rem;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    
    .modal {
      background: #111133;
      padding: 20px;
      border-radius: 12px;
      border: 2px solid #4488ff;
      max-width: 500px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }
    
    .modal h3 {
      color: #ffd700;
      margin-bottom: 10px;
      text-align: center;
    }
    
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>

<!-- Боковая панель -->
<div class="sidebar" id="sidebar">
  <h2>🛠️ Админ-панель</h2>
  
  <!-- Список карт -->
  <div class="section">
    <h3>📁 Сохранённые карты</h3>
    <div class="map-list" id="mapList"></div>
    <div class="btn-group">
      <button class="btn-primary" onclick="newMap()">➕ Новая</button>
      <button class="btn-success" onclick="saveMap()">💾 Сохранить</button>
    </div>
  </div>
  
  <!-- Параметры карты -->
  <div class="section">
    <h3>⚙️ Параметры карты</h3>
    <label>Название:</label>
    <input type="text" id="mapName" value="Новая карта" placeholder="Название карты">
    
    <label>Длина трассы (пиксели):</label>
    <input type="number" id="trackLength" value="3500" min="1000" max="10000" step="100">
    <input type="range" id="trackLengthRange" value="3500" min="1000" max="10000" step="100" oninput="syncRange('trackLength', this.value)">
    
    <label>Количество шаров:</label>
    <select id="ballCount">
      <option value="4">4 шара</option>
      <option value="5">5 шаров</option>
      <option value="6" selected>6 шаров</option>
      <option value="8">8 шаров</option>
      <option value="10">10 шаров</option>
    </select>
    
    <label>Гравитация:</label>
    <input type="number" id="gravity" value="0.15" min="0.05" max="0.5" step="0.01">
    
    <label>Цвет фона:</label>
    <input type="color" id="bgColor" value="#000015">
    
    <label>Ширина трассы (пиксели):</label>
    <input type="number" id="trackWidth" value="440" min="300" max="600" step="10">
  </div>
  
  <!-- Палитра препятствий -->
  <div class="section">
    <h3>🎯 Инструменты</h3>
    <div class="obstacle-palette" id="obstaclePalette">
      <button class="obstacle-btn" data-type="pin" style="border-color:#f4d03f;">📌 Пин</button>
      <button class="obstacle-btn" data-type="bumper" style="border-color:#ff4466;">🔼 Батут</button>
      <button class="obstacle-btn" data-type="funnel" style="border-color:#8844ff;">🌀 Воронка</button>
      <button class="obstacle-btn selected" data-type="wall" style="border-color:#888888;">🧱 Стена</button>
      <button class="obstacle-btn" data-type="tunnel" style="border-color:#666666;">🕳️ Туннель</button>
      <button class="obstacle-btn" data-type="spinner" style="border-color:#ff8800;">⚙️ Спиннер</button>
    </div>
    <button class="btn-danger btn-small" onclick="setTool('delete')" id="deleteTool">🗑️ Удаление</button>
    <button class="btn-info btn-small" onclick="setTool('select')" id="selectTool">👆 Выбор</button>
  </div>
  
  <!-- Свойства выбранного препятствия -->
  <div class="section hidden" id="propsPanel">
    <h3>🔧 Свойства</h3>
    <div id="propsContent"></div>
  </div>
  
  <!-- Список препятствий -->
  <div class="section">
    <h3>📋 Препятствия (<span id="obsCount">0</span>)</h3>
    <div class="obstacle-list" id="obstacleList"></div>
    <button class="btn-danger btn-small" onclick="clearAll()">🗑️ Очистить всё</button>
  </div>
  
  <!-- Экспорт/Импорт -->
  <div class="section">
    <h3>📤 Экспорт / Импорт</h3>
    <button class="btn-info btn-small" onclick="exportJSON()">📋 Копировать JSON</button>
    <button class="btn-warning btn-small" onclick="importJSON()">📥 Импорт JSON</button>
    <button class="btn-success btn-small" onclick="testMap()">▶ Тестировать</button>
  </div>
</div>

<!-- Основная область -->
<div class="main-area">
  <div class="toolbar">
    <span style="color:#ffd700; font-weight:bold;">🗺️ Редактор карт</span>
    <button class="btn-primary btn-small" onclick="zoomIn()">🔍 +</button>
    <button class="btn-primary btn-small" onclick="zoomOut()">🔍 -</button>
    <button class="btn-primary btn-small" onclick="resetZoom()">↺ Сброс</button>
    <span class="info">Масштаб: <span id="zoomLevel">1.0</span>x</span>
    <span class="info coords-display" id="mouseCoords">X: 0, Y: 0</span>
    <span class="info" id="selectedInfo"></span>
  </div>
  <canvas id="editorCanvas"></canvas>
  <div class="tooltip" id="tooltip"></div>
</div>

<!-- Модальное окно импорта -->
<div class="modal-overlay hidden" id="importModal">
  <div class="modal">
    <h3>📥 Импорт JSON</h3>
    <textarea id="importJSONText" rows="10" placeholder="Вставьте JSON код карты..."></textarea>
    <div class="btn-group">
      <button class="btn-success" onclick="doImport()">✅ Импортировать</button>
      <button class="btn-danger" onclick="closeImport()">❌ Отмена</button>
    </div>
  </div>
</div>

<script>
  (function() {
    const canvas = document.getElementById('editorCanvas');
    const ctx = canvas.getContext('2d');
    
    // Состояние редактора
    let currentTool = 'wall';
    let selectedObstacle = null;
    let zoom = 1.0;
    let panX = 0;
    let panY = 0;
    let isDragging = false;
    let dragStartX = 0;
    let dragStartY = 0;
    let mouseX = 0;
    let mouseY = 0;
    
    // Данные карты
    let mapData = {
      name: 'Новая карта',
      trackLength: 3500,
      trackWidth: 440,
      ballCount: 6,
      gravity: 0.15,
      bgColor: '#000015',
      obstacles: [],
      id: Date.now().toString()
    };
    
    let savedMaps = [];
    
    // Загрузка сохранённых карт
    function loadSavedMaps() {
      const data = localStorage.getItem('admin_maps');
      savedMaps = data ? JSON.parse(data) : [];
      if (savedMaps.length === 0) {
        // Создаём демо-карту
        savedMaps = [{
          ...mapData,
          name: 'Демо карта',
          obstacles: generateDemoObstacles()
        }];
        saveAllMaps();
      }
      renderMapList();
      if (savedMaps.length > 0) {
        loadMap(savedMaps[0].id);
      }
    }
    
    function saveAllMaps() {
      localStorage.setItem('admin_maps', JSON.stringify(savedMaps));
    }
    
    function generateDemoObstacles() {
      const obs = [];
      const w = mapData.trackWidth;
      const len = mapData.trackLength;
      const cx = w / 2;
      
      for (let y = 100; y < len - 200; y += 60 + Math.random() * 80) {
        const type = ['pin', 'bumper', 'funnel', 'wall', 'spinner'][Math.floor(Math.random() * 5)];
        
        if (type === 'pin') {
          const count = 3 + Math.floor(Math.random() * 4);
          for (let i = 0; i < count; i++) {
            obs.push({ x: 30 + Math.random() * (w - 60), y: y + Math.random() * 20, radius: 4, type: 'pin', color: '#f4d03f' });
          }
        } else if (type === 'bumper') {
          obs.push({ x: cx + (Math.random() - 0.5) * w * 0.6, y: y, width: 50, height: 6, type: 'bumper', color: '#ff4466', force: 4 });
        } else if (type === 'funnel') {
          obs.push({ x: cx + (Math.random() - 0.5) * w * 0.4, y: y, radius: 25, type: 'funnel', color: '#8844ff' });
        } else if (type === 'wall') {
          const gapX = 40 + Math.random() * (w - 80);
          obs.push({ x: gapX, y: y, width: 50, type: 'wall_gap', color: '#888888' });
        } else if (type === 'spinner') {
          obs.push({ x: cx, y: y, radius: 20, type: 'spinner', color: '#ff8800', speed: 0.04 });
        }
      }
      return obs;
    }
    
    function renderMapList() {
      const list = document.getElementById('mapList');
      list.innerHTML = savedMaps.map(m => `
        <div class="map-item ${m.id === mapData.id ? 'active' : ''}" onclick="loadMap('${m.id}')">
          <span>${m.name} (${m.obstacles.length} об.)</span>
          <button class="delete-map" onclick="event.stopPropagation(); deleteMap('${m.id}')">×</button>
        </div>
      `).join('');
    }
    
    window.newMap = function() {
      mapData = {
        name: 'Новая карта',
        trackLength: 3500,
        trackWidth: 440,
        ballCount: 6,
        gravity: 0.15,
        bgColor: '#000015',
        obstacles: [],
        id: Date.now().toString()
      };
      selectedObstacle = null;
      updateUI();
      renderMapList();
    };
    
    window.saveMap = function() {
      mapData.name = document.getElementById('mapName').value;
      mapData.trackLength = parseInt(document.getElementById('trackLength').value);
      mapData.trackWidth = parseInt(document.getElementById('trackWidth').value);
      mapData.ballCount = parseInt(document.getElementById('ballCount').value);
      mapData.gravity = parseFloat(document.getElementById('gravity').value);
      mapData.bgColor = document.getElementById('bgColor').value;
      
      const idx = savedMaps.findIndex(m => m.id === mapData.id);
      if (idx >= 0) {
        savedMaps[idx] = { ...mapData };
      } else {
        savedMaps.push({ ...mapData });
      }
      saveAllMaps();
      renderMapList();
      alert('✅ Карта сохранена!');
    };
    
    window.loadMap = function(id) {
      const map = savedMaps.find(m => m.id === id);
      if (map) {
        mapData = { ...map, obstacles: map.obstacles.map(o => ({...o})) };
        selectedObstacle = null;
        updateUI();
        renderMapList();
      }
    };
    
    window.deleteMap = function(id) {
      if (confirm('Удалить карту?')) {
        savedMaps = savedMaps.filter(m => m.id !== id);
        saveAllMaps();
        if (mapData.id === id && savedMaps.length > 0) {
          loadMap(savedMaps[0].id);
        } else if (savedMaps.length === 0) {
          window.newMap();
        }
        renderMapList();
      }
    };
    
    function updateUI() {
      document.getElementById('mapName').value = mapData.name;
      document.getElementById('trackLength').value = mapData.trackLength;
      document.getElementById('trackLengthRange').value = mapData.trackLength;
      document.getElementById('trackWidth').value = mapData.trackWidth;
      document.getElementById('ballCount').value = mapData.ballCount;
      document.getElementById('gravity').value = mapData.gravity;
      document.getElementById('bgColor').value = mapData.bgColor;
      document.getElementById('obsCount').textContent = mapData.obstacles.length;
      renderObstacleList();
      updatePropsPanel();
      resizeCanvas();
      draw();
    }
    
    function renderObstacleList() {
      const list = document.getElementById('obstacleList');
      list.innerHTML = mapData.obstacles.map((o, i) => `
        <div class="obstacle-item" onclick="selectObstacle(${i})" style="${selectedObstacle === i ? 'border-color:#ffd700;' : ''}">
          <span>${getObsIcon(o.type)} ${o.type} (${Math.round(o.x)}, ${Math.round(o.y)})</span>
          <button class="remove-obs" onclick="event.stopPropagation(); removeObstacle(${i})">×</button>
        </div>
      `).join('');
    }
    
    function getObsIcon(type) {
      const icons = { pin: '📌', bumper: '🔼', funnel: '🌀', wall_gap: '🧱', wall_seg: '🧱', tunnel: '🕳️', spinner: '⚙️' };
      return icons[type] || '❓';
    }
    
    window.selectObstacle = function(index) {
      selectedObstacle = index;
      updatePropsPanel();
      renderObstacleList();
      draw();
    };
    
    window.removeObstacle = function(index) {
      mapData.obstacles.splice(index, 1);
      if (selectedObstacle === index) selectedObstacle = null;
      else if (selectedObstacle > index) selectedObstacle--;
      updateUI();
      draw();
    };
    
    window.clearAll = function() {
      if (confirm('Удалить все препятствия?')) {
        mapData.obstacles = [];
        selectedObstacle = null;
        updateUI();
        draw();
      }
    };
    
    function updatePropsPanel() {
      const panel = document.getElementById('propsPanel');
      const content = document.getElementById('propsContent');
      
      if (selectedObstacle !== null && mapData.obstacles[selectedObstacle]) {
        panel.classList.remove('hidden');
        const o = mapData.obstacles[selectedObstacle];
        content.innerHTML = `
          <label>Тип: <strong>${o.type}</strong></label>
          <label>X:</label>
          <input type="number" value="${Math.round(o.x)}" onchange="updateProp('x', parseInt(this.value))">
          <label>Y:</label>
          <input type="number" value="${Math.round(o.y)}" onchange="updateProp('y', parseInt(this.value))">
          ${o.radius !== undefined ? `<label>Радиус:</label><input type="number" value="${o.radius}" onchange="updateProp('radius', parseInt(this.value))">` : ''}
          ${o.width !== undefined ? `<label>Ширина:</label><input type="number" value="${o.width}" onchange="updateProp('width', parseInt(this.value))">` : ''}
          ${o.force !== undefined ? `<label>Сила:</label><input type="number" value="${o.force}" step="0.1" onchange="updateProp('force', parseFloat(this.value))">` : ''}
          ${o.speed !== undefined ? `<label>Скорость:</label><input type="number" value="${o.speed}" step="0.01" onchange="updateProp('speed', parseFloat(this.value))">` : ''}
          <label>Цвет:</label>
          <input type="color" value="${o.color || '#ffffff'}" onchange="updateProp('color', this.value)">
        `;
      } else {
        panel.classList.add('hidden');
        content.innerHTML = '';
      }
    }
    
    window.updateProp = function(prop, value) {
      if (selectedObstacle !== null && mapData.obstacles[selectedObstacle]) {
        mapData.obstacles[selectedObstacle][prop] = value;
        draw();
      }
    };
    
    window.syncRange = function(inputId, value) {
      document.getElementById(inputId).value = value;
      mapData.trackLength = parseInt(value);
      resizeCanvas();
      draw();
    };
    
    window.setTool = function(tool) {
      currentTool = tool;
      document.querySelectorAll('.obstacle-btn').forEach(b => b.classList.remove('selected'));
      document.getElementById('deleteTool').style.borderColor = tool === 'delete' ? '#ff4444' : '';
      document.getElementById('selectTool').style.borderColor = tool === 'select' ? '#44ff44' : '';
      
      if (tool !== 'delete' && tool !== 'select') {
        const btn = document.querySelector(`[data-type="${tool}"]`);
        if (btn) btn.classList.add('selected');
      }
    };
    
    // Инициализация палитры
    document.querySelectorAll('.obstacle-btn').forEach(btn => {
      btn.addEventListener('click', () => setTool(btn.dataset.type));
    });
    
    // Canvas размеры
    function resizeCanvas() {
      const rect = canvas.parentElement.getBoundingClientRect();
      canvas.width = rect.width;
      canvas.height = rect.height - 50;
    }
    
    // Преобразование координат
    function screenToWorld(sx, sy) {
      const cx = canvas.width / 2;
      const cy = 50;
      return {
        x: (sx - cx) / zoom + mapData.trackWidth / 2 - panX,
        y: (sy - cy) / zoom - panY
      };
    }
    
    function worldToScreen(wx, wy) {
      const cx = canvas.width / 2;
      const cy = 50;
      return {
        x: (wx - mapData.trackWidth / 2 + panX) * zoom + cx,
        y: (wy + panY) * zoom + cy
      };
    }
    
    // Отрисовка
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Фон
      ctx.fillStyle = mapData.bgColor;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // Трасса
      const topLeft = worldToScreen(0, 0);
      const bottomRight = worldToScreen(mapData.trackWidth, mapData.trackLength);
      
      ctx.fillStyle = '#111122';
      ctx.fillRect(topLeft.x, topLeft.y, bottomRight.x - topLeft.x, bottomRight.y - topLeft.y);
      
      // Стены
      ctx.strokeStyle = '#3333aa';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(topLeft.x, topLeft.y);
      ctx.lineTo(topLeft.x, bottomRight.y);
      ctx.moveTo(bottomRight.x, topLeft.y);
      ctx.lineTo(bottomRight.x, bottomRight.y);
      ctx.stroke();
      
      // Сетка
      ctx.strokeStyle = '#1a1a33';
      ctx.lineWidth = 1;
      for (let y = 0; y < mapData.trackLength; y += 100) {
        const sy = worldToScreen(0, y).y;
        ctx.beginPath();
        ctx.moveTo(topLeft.x, sy);
        ctx.lineTo(bottomRight.x, sy);
        ctx.stroke();
      }
      
      // Препятствия
      mapData.obstacles.forEach((o, i) => {
        const pos = worldToScreen(o.x, o.y);
        const isSelected = i === selectedObstacle;
        
        if (o.type === 'pin') {
          ctx.beginPath();
          ctx.arc(pos.x, pos.y, o.radius * zoom, 0, Math.PI * 2);
          ctx.fillStyle = o.color;
          ctx.fill();
          ctx.strokeStyle = isSelected ? '#ffd700' : '#fff';
          ctx.lineWidth = isSelected ? 3 : 1;
          ctx.stroke();
        } else if (o.type === 'bumper') {
          ctx.fillStyle = o.color;
          ctx.fillRect(pos.x - o.width/2 * zoom, pos.y - o.height/2 * zoom, o.width * zoom, o.height * zoom);
          ctx.strokeStyle = isSelected ? '#ffd700' : '#fff';
          ctx.lineWidth = isSelected ? 3 : 1;
          ctx.strokeRect(pos.x - o.width/2 * zoom, pos.y - o.height/2 * zoom, o.width * zoom, o.height * zoom);
        } else if (o.type === 'funnel') {
          ctx.beginPath();
          ctx.arc(pos.x, pos.y, o.radius * zoom, 0, Math.PI * 2);
          ctx.strokeStyle = isSelected ? '#ffd700' : o.color;
          ctx.lineWidth = isSelected ? 4 : 3;
          ctx.stroke();
        } else if (o.type === 'wall_gap') {
          ctx.fillStyle = o.color;
          const wy = pos.y;
          ctx.fillRect(topLeft.x, wy - 2 * zoom, (pos.x - o.width/2 * zoom) - topLeft.x, 4 * zoom);
          ctx.fillRect(pos.x + o.width/2 * zoom, wy - 2 * zoom, bottomRight.x - (pos.x + o.width/2 * zoom), 4 * zoom);
          ctx.strokeStyle = isSelected ? '#ffd700' : '#fff';
          ctx.lineWidth = isSelected ? 3 : 1;
          ctx.strokeRect(pos.x - o.width/2 * zoom, wy - 4 * zoom, o.width * zoom, 8 * zoom);
        } else if (o.type === 'wall_seg') {
          ctx.fillStyle = o.color;
          ctx.fillRect(pos.x - o.width/2 * zoom, pos.y - o.height/2 * zoom, o.width * zoom, o.height * zoom);
        } else if (o.type === 'spinner') {
          ctx.save();
          ctx.translate(pos.x, pos.y);
          ctx.fillStyle = o.color;
          ctx.fillRect(-o.radius * zoom, -2 * zoom, o.radius * 2 * zoom, 4 * zoom);
          ctx.fillRect(-2 * zoom, -o.radius * zoom, 4 * zoom, o.radius * 2 * zoom);
          ctx.strokeStyle = isSelected ? '#ffd700' : '#fff';
          ctx.strokeRect(-o.radius * zoom, -2 * zoom, o.radius * 2 * zoom, 4 * zoom);
          ctx.restore();
        }
        
        // Номер
        ctx.fillStyle = '#fff';
        ctx.font = `${10 * zoom}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.fillText(i, pos.x, pos.y - 12 * zoom);
      });
      
      // Финиш
      const finishPos = worldToScreen(0, mapData.trackLength);
      ctx.strokeStyle = '#ffd700';
      ctx.lineWidth = 3;
      ctx.setLineDash([10, 5]);
      ctx.beginPath();
      ctx.moveTo(topLeft.x, finishPos.y);
      ctx.lineTo(bottomRight.x, finishPos.y);
      ctx.stroke();
      ctx.setLineDash([]);
    }
    
    // Обработчики мыши
    canvas.addEventListener('mousedown', (e) => {
      const rect = canvas.getBoundingClientRect();
      const sx = e.clientX - rect.left;
      const sy = e.clientY - rect.top;
      const world = screenToWorld(sx, sy);
      
      if (e.button === 1 || (e.button === 0 && e.shiftKey)) {
        // Средняя кнопка или Shift+ЛКМ — панорамирование
        isDragging = true;
        dragStartX = e.clientX;
        dragStartY = e.clientY;
        return;
      }
      
      if (currentTool === 'delete') {
        // Удаление ближайшего препятствия
        let closest = null;
        let minDist = 20 / zoom;
        mapData.obstacles.forEach((o, i) => {
          const dist = Math.sqrt((o.x - world.x) ** 2 + (o.y - world.y) ** 2);
          if (dist < minDist) {
            minDist = dist;
            closest = i;
          }
        });
        if (closest !== null) {
          removeObstacle(closest);
        }
      } else if (currentTool === 'select') {
        let closest = null;
        let minDist = 30 / zoom;
        mapData.obstacles.forEach((o, i) => {
          const dist = Math.sqrt((o.x - world.x) ** 2 + (o.y - world.y) ** 2);
          if (dist < minDist) {
            minDist = dist;
            closest = i;
          }
        });
        selectedObstacle = closest;
        updateUI();
        draw();
      } else {
        // Добавление препятствия
        const newObs = createObstacle(currentTool, world.x, world.y);
        mapData.obstacles.push(newObs);
        selectedObstacle = mapData.obstacles.length - 1;
        updateUI();
        draw();
      }
    });
    
    canvas.addEventListener('mousemove', (e) => {
      const rect = canvas.getBoundingClientRect();
      const sx = e.clientX - rect.left;
      const sy = e.clientY - rect.top;
      const world = screenToWorld(sx, sy);
      
      mouseX = world.x;
      mouseY = world.y;
      
      document.getElementById('mouseCoords').textContent = `X: ${Math.round(world.x)}, Y: ${Math.round(world.y)}`;
      
      if (isDragging) {
        panX += (e.clientX - dragStartX) / zoom;
        panY += (e.clientY - dragStartY) / zoom;
        dragStartX = e.clientX;
        dragStartY = e.clientY;
        draw();
      }
    });
    
    canvas.addEventListener('mouseup', () => {
      isDragging = false;
    });
    
    canvas.addEventListener('wheel', (e) => {
      e.preventDefault();
      const zoomFactor = e.deltaY > 0 ? 0.9 : 1.1;
      zoom = Math.max(0.2, Math.min(3, zoom * zoomFactor));
      document.getElementById('zoomLevel').textContent = zoom.toFixed(1);
      draw();
    });
    
    canvas.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const world = screenToWorld(e.clientX - rect.left, e.clientY - rect.top);
      
      let closest = null;
      let minDist = 30 / zoom;
      mapData.obstacles.forEach((o, i) => {
        const dist = Math.sqrt((o.x - world.x) ** 2 + (o.y - world.y) ** 2);
        if (dist < minDist) {
          minDist = dist;
          closest = i;
        }
      });
      if (closest !== null) {
        removeObstacle(closest);
      }
    });
    
    function createObstacle(type, x, y) {
      const base = { x, y };
      switch (type) {
        case 'pin': return { ...base, type: 'pin', radius: 4, color: '#f4d03f' };
        case 'bumper': return { ...base, type: 'bumper', width: 50, height: 6, color: '#ff4466', force: 4 };
        case 'funnel': return { ...base, type: 'funnel', radius: 25, color: '#8844ff' };
        case 'wall': return { ...base, type: 'wall_gap', width: 50, color: '#888888' };
        case 'tunnel': return { ...base, type: 'wall_seg', width: 8, height: 14, color: '#666666' };
        case 'spinner': return { ...base, type: 'spinner', radius: 20, color: '#ff8800', speed: 0.04 };
        default: return { ...base, type: 'pin', radius: 4, color: '#f4d03f' };
      }
    }
    
    window.zoomIn = function() { zoom = Math.min(3, zoom * 1.2); document.getElementById('zoomLevel').textContent = zoom.toFixed(1); draw(); };
    window.zoomOut = function() { zoom = Math.max(0.2, zoom * 0.8); document.getElementById('zoomLevel').textContent = zoom.toFixed(1); draw(); };
    window.resetZoom = function() { zoom = 1; panX = 0; panY = 0; document.getElementById('zoomLevel').textContent = '1.0'; draw(); };
    
    window.exportJSON = function() {
      mapData.name = document.getElementById('mapName').value;
      mapData.trackLength = parseInt(document.getElementById('trackLength').value);
      mapData.trackWidth = parseInt(document.getElementById('trackWidth').value);
      
      const json = JSON.stringify(mapData, null, 2);
      navigator.clipboard.writeText(json).then(() => {
        alert('✅ JSON скопирован в буфер обмена!');
      }).catch(() => {
        // Fallback
        const ta = document.createElement('textarea');
        ta.value = json;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        alert('✅ JSON скопирован в буфер обмена!');
      });
    };
    
    window.importJSON = function() {
      document.getElementById('importModal').classList.remove('hidden');
    };
    
    window.doImport = function() {
      try {
        const json = JSON.parse(document.getElementById('importJSONText').value);
        if (json.obstacles && Array.isArray(json.obstacles)) {
          mapData = { ...json, id: Date.now().toString() };
          selectedObstacle = null;
          updateUI();
          renderMapList();
          document.getElementById('importModal').classList.add('hidden');
          alert('✅ Карта импортирована!');
        } else {
          alert('❌ Неверный формат JSON!');
        }
      } catch (e) {
        alert('❌ Ошибка парсинга JSON!');
      }
    };
    
    window.closeImport = function() {
      document.getElementById('importModal').classList.add('hidden');
    };
    
    window.testMap = function() {
      mapData.name = document.getElementById('mapName').value;
      mapData.trackLength = parseInt(document.getElementById('trackLength').value);
      
      const json = JSON.stringify(mapData);
      localStorage.setItem('test_map', json);
      
      const url = window.location.href.replace(/\/[^\/]*$/, '/') + '?test=true';
      window.open(url, '_blank');
    };
    
    // Горячие клавиши
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Delete' && selectedObstacle !== null) {
        removeObstacle(selectedObstacle);
      }
      if (e.ctrlKey && e.key === 's') {
        e.preventDefault();
        window.saveMap();
      }
      if (e.ctrlKey && e.key === 'z') {
        e.preventDefault();
        if (mapData.obstacles.length > 0) {
          mapData.obstacles.pop();
          if (selectedObstacle >= mapData.obstacles.length) selectedObstacle = null;
          updateUI();
          draw();
        }
      }
      // Переключение инструментов цифрами
      const tools = ['pin', 'bumper', 'funnel', 'wall', 'tunnel', 'spinner'];
      if (e.key >= '1' && e.key <= '6') {
        setTool(tools[parseInt(e.key) - 1]);
      }
    });
    
    // Инициализация
    resizeCanvas();
    loadSavedMaps();
    updateUI();
    draw();
    
    window.addEventListener('resize', () => {
      resizeCanvas();
      draw();
    });
  })();
</script>
</body>
</html>
