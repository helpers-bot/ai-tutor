<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ-панель — Редактор карт</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0a0a1a;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    
    .sidebar {
      width: 300px;
      min-width: 300px;
      background: #111133;
      padding: 12px;
      overflow-y: auto;
      border-right: 2px solid #3333aa;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .sidebar h2 {
      color: #ffd700;
      text-align: center;
      font-size: 1.1rem;
      margin-bottom: 3px;
    }
    
    .section {
      background: #1a1a3a;
      border-radius: 10px;
      padding: 10px;
      border: 1px solid #333366;
    }
    
    .section h3 {
      color: #66ccff;
      font-size: 0.85rem;
      margin-bottom: 6px;
    }
    
    label {
      display: block;
      font-size: 0.75rem;
      color: #aaaacc;
      margin-bottom: 2px;
    }
    
    input, select, textarea {
      width: 100%;
      padding: 6px 8px;
      border-radius: 6px;
      border: 1px solid #444488;
      background: #0a0a22;
      color: #fff;
      font-size: 0.8rem;
      margin-bottom: 6px;
    }
    
    input[type="range"] {
      padding: 0;
      height: 18px;
    }
    
    button {
      padding: 8px 12px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.8rem;
      transition: all 0.2s;
      width: 100%;
      margin-bottom: 4px;
    }
    
    button:hover {
      transform: translateY(-1px);
      opacity: 0.9;
    }
    
    .btn-primary { background: linear-gradient(180deg, #4488ff, #2266cc); color: #fff; }
    .btn-success { background: linear-gradient(180deg, #44cc44, #228822); color: #fff; }
    .btn-danger { background: linear-gradient(180deg, #ff4444, #cc2222); color: #fff; }
    .btn-warning { background: linear-gradient(180deg, #ffaa44, #cc7722); color: #fff; }
    .btn-info { background: linear-gradient(180deg, #aa44ff, #6622cc); color: #fff; }
    .btn-small {
      padding: 5px 8px;
      font-size: 0.7rem;
      width: auto;
    }
    
    .btn-group {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    
    .btn-group button {
      flex: 1;
      min-width: 60px;
    }
    
    .main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    
    .toolbar {
      background: #111133;
      padding: 8px 12px;
      border-bottom: 2px solid #3333aa;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    
    .toolbar button {
      width: auto;
      margin-bottom: 0;
    }
    
    .toolbar .info {
      font-size: 0.75rem;
      color: #aaaacc;
      margin-left: auto;
    }
    
    canvas {
      flex: 1;
      background: #000015;
      cursor: crosshair;
    }
    
    .map-list {
      max-height: 180px;
      overflow-y: auto;
    }
    
    .map-item {
      background: #1a1a3a;
      padding: 6px;
      border-radius: 6px;
      margin-bottom: 4px;
      cursor: pointer;
      border: 2px solid transparent;
      font-size: 0.75rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .map-item:hover { border-color: #4488ff; }
    .map-item.active { border-color: #ffd700; background: #222244; }
    
    .map-item .delete-map {
      background: #ff4444;
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      font-size: 0.65rem;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .obstacle-palette {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
    }
    
    .obstacle-btn {
      padding: 6px;
      border-radius: 6px;
      border: 2px solid transparent;
      cursor: pointer;
      font-size: 0.7rem;
      text-align: center;
      transition: all 0.2s;
      background: #1a1a3a;
      color: #fff;
    }
    
    .obstacle-btn:hover { border-color: #ffd700; }
    .obstacle-btn.selected { border-color: #44ff44; background: #223322; }
    
    .coords-display {
      font-family: monospace;
      font-size: 0.7rem;
      color: #88ff88;
    }
    
    .obstacle-list {
      max-height: 250px;
      overflow-y: auto;
    }
    
    .obstacle-item {
      background: #1a1a3a;
      padding: 4px 6px;
      border-radius: 4px;
      margin-bottom: 2px;
      font-size: 0.7rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid #333366;
      cursor: pointer;
    }
    
    .obstacle-item:hover { background: #222244; }
    .obstacle-item.selected-item { border-color: #ffd700 !important; background: #222244; }
    
    .obstacle-item .remove-obs {
      background: #ff4444;
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 16px;
      height: 16px;
      font-size: 0.55rem;
      cursor: pointer;
      padding: 0;
    }
    
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    
    .modal {
      background: #111133;
      padding: 16px;
      border-radius: 12px;
      border: 2px solid #4488ff;
      max-width: 450px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }
    
    .modal h3 { color: #ffd700; margin-bottom: 8px; text-align: center; font-size: 0.95rem; }
    .hidden { display: none !important; }
    
    .help-text {
      font-size: 0.7rem;
      color: #88aacc;
      margin-top: 4px;
    }
  </style>
</head>
<body>

<!-- Боковая панель -->
<div class="sidebar" id="sidebar">
  <h2>🛠️ Админ-панель</h2>
  
  <!-- Список карт -->
  <div class="section">
    <h3>📁 Сохранённые карты</h3>
    <div class="map-list" id="mapList"></div>
    <div class="btn-group">
      <button class="btn-primary" onclick="newMap()">➕ Новая</button>
      <button class="btn-success" onclick="saveMap()">💾 Сохранить</button>
    </div>
  </div>
  
  <!-- Параметры карты -->
  <div class="section">
    <h3>⚙️ Параметры карты</h3>
    <label>Название:</label>
    <input type="text" id="mapName" value="Новая карта">
    
    <label>Длина трассы (пиксели):</label>
    <div style="display:flex;gap:4px;">
      <input type="number" id="trackLength" value="3500" min="1000" max="10000" step="100" style="flex:1;">
      <span style="font-size:0.7rem;color:#aaa;align-self:center;">px</span>
    </div>
    
    <label>Количество шаров:</label>
    <select id="ballCount">
      <option value="4">4 шара</option>
      <option value="5">5 шаров</option>
      <option value="6" selected>6 шаров</option>
      <option value="8">8 шаров</option>
      <option value="10">10 шаров</option>
    </select>
    
    <label>Гравитация:</label>
    <input type="number" id="gravity" value="0.15" min="0.05" max="0.5" step="0.01">
    
    <label>Цвет фона:</label>
    <input type="color" id="bgColor" value="#000015">
  </div>
  
  <!-- Палитра препятствий -->
  <div class="section">
    <h3>🎯 Инструменты (клавиши 1-7)</h3>
    <div class="obstacle-palette" id="obstaclePalette">
      <button class="obstacle-btn" data-type="pin" style="border-color:#f4d03f;">1📌 Пин</button>
      <button class="obstacle-btn" data-type="bumper" style="border-color:#ff4466;">2🔼 Батут</button>
      <button class="obstacle-btn" data-type="funnel" style="border-color:#8844ff;">3🌀 Воронка</button>
      <button class="obstacle-btn selected" data-type="wall_gap" style="border-color:#888888;">4🧱 Стена</button>
      <button class="obstacle-btn" data-type="wall_angled" style="border-color:#ff6644;">5📐 Стена°</button>
      <button class="obstacle-btn" data-type="tunnel" style="border-color:#666666;">6🕳️ Туннель</button>
    </div>
    <button class="btn-danger btn-small" onclick="setTool('delete')" id="deleteTool" style="margin-top:4px;">🗑️ Удаление (Del)</button>
  </div>
  
  <!-- Свойства выбранного -->
  <div class="section hidden" id="propsPanel">
    <h3>🔧 Свойства</h3>
    <div id="propsContent"></div>
  </div>
  
  <!-- Список препятствий -->
  <div class="section">
    <h3>📋 Препятствия (<span id="obsCount">0</span>)</h3>
    <div class="obstacle-list" id="obstacleList"></div>
    <button class="btn-danger btn-small" onclick="clearAll()">🗑️ Очистить всё</button>
  </div>
  
  <!-- Экспорт/Импорт -->
  <div class="section">
    <h3>📤 Экспорт / Импорт</h3>
    <button class="btn-info btn-small" onclick="exportJSON()">📋 Копировать JSON</button>
    <button class="btn-warning btn-small" onclick="importJSON()">📥 Импорт JSON</button>
    <button class="btn-success btn-small" onclick="saveForGame()">🎮 Сохранить для игры</button>
    <p class="help-text">Кнопка "Сохранить для игры" делает карту доступной в основной игре</p>
  </div>
</div>

<!-- Основная область -->
<div class="main-area">
  <div class="toolbar">
    <span style="color:#ffd700; font-weight:bold;">🗺️ Редактор карт</span>
    <button class="btn-primary btn-small" onclick="zoomToFit()">🔍 Обзор</button>
    <span class="info coords-display" id="mouseCoords">X: 0, Y: 0</span>
    <span class="info" id="selectedInfo"></span>
  </div>
  <canvas id="editorCanvas"></canvas>
</div>

<!-- Модальное окно импорта -->
<div class="modal-overlay hidden" id="importModal">
  <div class="modal">
    <h3>📥 Импорт JSON</h3>
    <textarea id="importJSONText" rows="8" placeholder="Вставьте JSON код карты..."></textarea>
    <div class="btn-group">
      <button class="btn-success" onclick="doImport()">✅ Импортировать</button>
      <button class="btn-danger" onclick="closeImport()">❌ Отмена</button>
    </div>
  </div>
</div>

<script>
  (function() {
    const canvas = document.getElementById('editorCanvas');
    const ctx = canvas.getContext('2d');
    
    let currentTool = 'wall_gap';
    let selectedObstacle = null;
    let viewX = 0;
    let viewY = 0;
    let viewScale = 1;
    let isPanning = false;
    let panStartX = 0;
    let panStartY = 0;
    let panStartViewX = 0;
    let panStartViewY = 0;
    
    let mapData = {
      name: 'Новая карта',
      trackLength: 3500,
      trackWidth: 440,
      ballCount: 6,
      gravity: 0.15,
      bgColor: '#000015',
      obstacles: [],
      id: Date.now().toString()
    };
    
    let savedMaps = [];
    
    function loadSavedMaps() {
      const data = localStorage.getItem('admin_maps_v2');
      savedMaps = data ? JSON.parse(data) : [];
      if (savedMaps.length === 0) {
        savedMaps = [{ ...mapData, name: 'Демо карта', obstacles: generateDemoObstacles() }];
        saveAllMaps();
      }
      renderMapList();
      if (savedMaps.length > 0) {
        loadMap(savedMaps[0].id);
      }
    }
    
    function saveAllMaps() {
      localStorage.setItem('admin_maps_v2', JSON.stringify(savedMaps));
    }
    
    function generateDemoObstacles() {
      const obs = [];
      const w = mapData.trackWidth;
      const len = mapData.trackLength;
      const cx = w / 2;
      
      for (let y = 100; y < len - 200; y += 50 + Math.random() * 70) {
        const type = ['pin', 'bumper', 'funnel', 'wall_gap', 'wall_angled'][Math.floor(Math.random() * 5)];
        
        if (type === 'pin') {
          const count = 3 + Math.floor(Math.random() * 3);
          for (let i = 0; i < count; i++) {
            obs.push({ x: 30 + Math.random() * (w - 60), y: y + Math.random() * 15, radius: 4, type: 'pin', color: '#f4d03f' });
          }
        } else if (type === 'bumper') {
          obs.push({ x: cx + (Math.random() - 0.5) * w * 0.5, y: y, width: 50, height: 6, type: 'bumper', color: '#ff4466', force: 4 });
        } else if (type === 'funnel') {
          obs.push({ x: cx + (Math.random() - 0.5) * w * 0.3, y: y, radius: 25, type: 'funnel', color: '#8844ff' });
        } else if (type === 'wall_gap') {
          const gapX = 40 + Math.random() * (w - 80);
          obs.push({ x: gapX, y: y, width: 50, type: 'wall_gap', color: '#888888' });
        } else if (type === 'wall_angled') {
          obs.push({ x: cx + (Math.random() - 0.5) * w * 0.4, y: y, width: 60, angle: Math.floor(Math.random() * 12) * 15, type: 'wall_angled', color: '#ff6644' });
        }
      }
      return obs;
    }
    
    function renderMapList() {
      const list = document.getElementById('mapList');
      list.innerHTML = savedMaps.map(m => `
        <div class="map-item ${m.id === mapData.id ? 'active' : ''}" onclick="loadMap('${m.id}')">
          <span>${m.name} (${m.obstacles.length})</span>
          <button class="delete-map" onclick="event.stopPropagation(); deleteMap('${m.id}')">×</button>
        </div>
      `).join('');
    }
    
    window.newMap = function() {
      mapData = {
        name: 'Новая карта',
        trackLength: 3500,
        trackWidth: 440,
        ballCount: 6,
        gravity: 0.15,
        bgColor: '#000015',
        obstacles: [],
        id: Date.now().toString()
      };
      selectedObstacle = null;
      viewX = 0;
      viewY = 0;
      viewScale = 1;
      updateUI();
      renderMapList();
    };
    
    window.saveMap = function() {
      mapData.name = document.getElementById('mapName').value;
      mapData.trackLength = parseInt(document.getElementById('trackLength').value);
      mapData.ballCount = parseInt(document.getElementById('ballCount').value);
      mapData.gravity = parseFloat(document.getElementById('gravity').value);
      mapData.bgColor = document.getElementById('bgColor').value;
      
      const idx = savedMaps.findIndex(m => m.id === mapData.id);
      if (idx >= 0) {
        savedMaps[idx] = JSON.parse(JSON.stringify(mapData));
      } else {
        savedMaps.push(JSON.parse(JSON.stringify(mapData)));
      }
      saveAllMaps();
      renderMapList();
      alert('✅ Карта сохранена в админ-панели!');
    };
    
    window.saveForGame = function() {
      mapData.name = document.getElementById('mapName').value;
      mapData.trackLength = parseInt(document.getElementById('trackLength').value);
      mapData.ballCount = parseInt(document.getElementById('ballCount').value);
      mapData.gravity = parseFloat(document.getElementById('gravity').value);
      mapData.bgColor = document.getElementById('bgColor').value;
      
      // Сохраняем в админские карты
      const idx = savedMaps.findIndex(m => m.id === mapData.id);
      if (idx >= 0) {
        savedMaps[idx] = JSON.parse(JSON.stringify(mapData));
      } else {
        savedMaps.push(JSON.parse(JSON.stringify(mapData)));
      }
      saveAllMaps();
      
      // Сохраняем ВСЕ карты для игры
      localStorage.setItem('game_maps', JSON.stringify(savedMaps));
      
      renderMapList();
      alert('✅ Карта сохранена и готова к использованию в игре!\n\nВ игре откройте "Карты" и выберите эту карту.');
    };
    
    window.loadMap = function(id) {
      const map = savedMaps.find(m => m.id === id);
      if (map) {
        mapData = JSON.parse(JSON.stringify(map));
        selectedObstacle = null;
        viewX = 0;
        viewY = 0;
        viewScale = 1;
        updateUI();
        renderMapList();
        zoomToFit();
      }
    };
    
    window.deleteMap = function(id) {
      if (confirm('Удалить карту?')) {
        savedMaps = savedMaps.filter(m => m.id !== id);
        saveAllMaps();
        localStorage.setItem('game_maps', JSON.stringify(savedMaps));
        if (mapData.id === id && savedMaps.length > 0) {
          loadMap(savedMaps[0].id);
        } else if (savedMaps.length === 0) {
          window.newMap();
        }
        renderMapList();
      }
    };
    
    function updateUI() {
      document.getElementById('mapName').value = mapData.name;
      document.getElementById('trackLength').value = mapData.trackLength;
      document.getElementById('ballCount').value = mapData.ballCount;
      document.getElementById('gravity').value = mapData.gravity;
      document.getElementById('bgColor').value = mapData.bgColor;
      document.getElementById('obsCount').textContent = mapData.obstacles.length;
      renderObstacleList();
      updatePropsPanel();
      draw();
    }
    
    function renderObstacleList() {
      const list = document.getElementById('obstacleList');
      list.innerHTML = mapData.obstacles.map((o, i) => `
        <div class="obstacle-item ${i === selectedObstacle ? 'selected-item' : ''}" onclick="selectObstacle(${i})">
          <span>${getObsIcon(o.type)} ${o.type.replace('_',' ')} (${Math.round(o.x)}, ${Math.round(o.y)})${o.angle !== undefined ? ' '+o.angle+'°' : ''}</span>
          <button class="remove-obs" onclick="event.stopPropagation(); removeObstacle(${i})">×</button>
        </div>
      `).join('');
    }
    
    function getObsIcon(type) {
      const icons = { pin: '📌', bumper: '🔼', funnel: '🌀', wall_gap: '🧱', wall_angled: '📐', wall_seg: '🧱', tunnel: '🕳️', spinner: '⚙️' };
      return icons[type] || '❓';
    }
    
    window.selectObstacle = function(index) {
      selectedObstacle = index;
      updatePropsPanel();
      renderObstacleList();
      draw();
    };
    
    window.removeObstacle = function(index) {
      mapData.obstacles.splice(index, 1);
      if (selectedObstacle === index) selectedObstacle = null;
      else if (selectedObstacle > index) selectedObstacle--;
      updateUI();
      draw();
    };
    
    window.clearAll = function() {
      if (confirm('Удалить все препятствия?')) {
        mapData.obstacles = [];
        selectedObstacle = null;
        updateUI();
        draw();
      }
    };
    
    function updatePropsPanel() {
      const panel = document.getElementById('propsPanel');
      const content = document.getElementById('propsContent');
      
      if (selectedObstacle !== null && mapData.obstacles[selectedObstacle]) {
        panel.classList.remove('hidden');
        const o = mapData.obstacles[selectedObstacle];
        let html = `
          <label>Тип: <strong>${o.type.replace('_',' ')}</strong></label>
          <label>X:</label>
          <input type="number" value="${Math.round(o.x)}" onchange="updateProp('x', parseInt(this.value))">
          <label>Y:</label>
          <input type="number" value="${Math.round(o.y)}" onchange="updateProp('y', parseInt(this.value))">
        `;
        
        if (o.type === 'wall_angled') {
          html += `
            <label>Угол (градусы):</label>
            <input type="number" value="${o.angle || 0}" min="0" max="345" step="15" onchange="updateProp('angle', parseInt(this.value))">
            <input type="range" value="${o.angle || 0}" min="0" max="345" step="15" oninput="updateProp('angle', parseInt(this.value))">
            <label>Длина:</label>
            <input type="number" value="${o.width || 60}" onchange="updateProp('width', parseInt(this.value))">
          `;
        } else if (o.radius !== undefined) {
          html += `<label>Радиус:</label><input type="number" value="${o.radius}" onchange="updateProp('radius', parseInt(this.value))">`;
        }
        
        if (o.width !== undefined && o.type !== 'wall_angled') {
          html += `<label>Ширина:</label><input type="number" value="${o.width}" onchange="updateProp('width', parseInt(this.value))">`;
        }
        if (o.force !== undefined) {
          html += `<label>Сила:</label><input type="number" value="${o.force}" step="0.1" onchange="updateProp('force', parseFloat(this.value))">`;
        }
        
        html += `<label>Цвет:</label><input type="color" value="${o.color || '#ffffff'}" onchange="updateProp('color', this.value)">`;
        
        content.innerHTML = html;
      } else {
        panel.classList.add('hidden');
        content.innerHTML = '';
      }
    }
    
    window.updateProp = function(prop, value) {
      if (selectedObstacle !== null && mapData.obstacles[selectedObstacle]) {
        mapData.obstacles[selectedObstacle][prop] = value;
        updateUI();
        draw();
      }
    };
    
    window.setTool = function(tool) {
      currentTool = tool;
      document.querySelectorAll('.obstacle-btn').forEach(b => b.classList.remove('selected'));
      document.getElementById('deleteTool').style.borderColor = tool === 'delete' ? '#ff4444' : '';
      
      if (tool !== 'delete') {
        const btn = document.querySelector(`[data-type="${tool}"]`);
        if (btn) btn.classList.add('selected');
      }
    };
    
    // Палитра
    document.querySelectorAll('.obstacle-btn').forEach(btn => {
      btn.addEventListener('click', () => setTool(btn.dataset.type));
    });
    
    function resizeCanvas() {
      const rect = canvas.parentElement.getBoundingClientRect();
      canvas.width = rect.width;
      canvas.height = rect.height;
    }
    
    function screenToWorld(sx, sy) {
      return {
        x: (sx - viewX) / viewScale,
        y: (sy - viewY) / viewScale
      };
    }
    
    function worldToScreen(wx, wy) {
      return {
        x: wx * viewScale + viewX,
        y: wy * viewScale + viewY
      };
    }
    
    window.zoomToFit = function() {
      const totalHeight = mapData.trackLength + 50;
      const totalWidth = mapData.trackWidth + 20;
      const scaleX = canvas.width / totalWidth;
      const scaleY = canvas.height / totalHeight;
      viewScale = Math.min(scaleX, scaleY) * 0.9;
      viewX = (canvas.width - mapData.trackWidth * viewScale) / 2;
      viewY = (canvas.height - mapData.trackLength * viewScale) / 2;
      draw();
    };
    
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Фон
      ctx.fillStyle = '#0a0a1a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // Трасса
      const tl = worldToScreen(0, 0);
      const br = worldToScreen(mapData.trackWidth, mapData.trackLength);
      
      ctx.fillStyle = mapData.bgColor;
      ctx.fillRect(tl.x, tl.y, br.x - tl.x, br.y - tl.y);
      
      // Границы трассы
      ctx.strokeStyle = '#3355aa';
      ctx.lineWidth = 2;
      ctx.strokeRect(tl.x, tl.y, br.x - tl.x, br.y - tl.y);
      
      // Сетка
      ctx.strokeStyle = '#1a1a30';
      ctx.lineWidth = 0.5;
      for (let y = 0; y < mapData.trackLength; y += 50) {
        const sy = worldToScreen(0, y).y;
        ctx.beginPath();
        ctx.moveTo(tl.x, sy);
        ctx.lineTo(br.x, sy);
        ctx.stroke();
      }
      for (let x = 0; x < mapData.trackWidth; x += 50) {
        const sx = worldToScreen(x, 0).x;
        ctx.beginPath();
        ctx.moveTo(sx, tl.y);
        ctx.lineTo(sx, br.y);
        ctx.stroke();
      }
      
      // Препятствия
      mapData.obstacles.forEach((o, i) => {
        const pos = worldToScreen(o.x, o.y);
        const isSelected = i === selectedObstacle;
        
        if (o.type === 'pin') {
          ctx.beginPath();
          ctx.arc(pos.x, pos.y, o.radius * viewScale, 0, Math.PI * 2);
          ctx.fillStyle = o.color;
          ctx.fill();
          if (isSelected) {
            ctx.strokeStyle = '#ffd700';
            ctx.lineWidth = 3;
            ctx.stroke();
          }
        } else if (o.type === 'bumper') {
          ctx.fillStyle = o.color;
          ctx.fillRect(pos.x - o.width/2 * viewScale, pos.y - o.height/2 * viewScale, o.width * viewScale, o.height * viewScale);
          if (isSelected) {
            ctx.strokeStyle = '#ffd700';
            ctx.lineWidth = 3;
            ctx.strokeRect(pos.x - o.width/2 * viewScale, pos.y - o.height/2 * viewScale, o.width * viewScale, o.height * viewScale);
          }
        } else if (o.type === 'funnel') {
          ctx.beginPath();
          ctx.arc(pos.x, pos.y, o.radius * viewScale, 0, Math.PI * 2);
          ctx.strokeStyle = isSelected ? '#ffd700' : o.color;
          ctx.lineWidth = isSelected ? 3 : 2;
          ctx.stroke();
        } else if (o.type === 'wall_gap') {
          ctx.fillStyle = o.color;
          const wy = pos.y;
          ctx.fillRect(tl.x, wy - 2 * viewScale, pos.x - o.width/2 * viewScale - tl.x, 4 * viewScale);
          ctx.fillRect(pos.x + o.width/2 * viewScale, wy - 2 * viewScale, br.x - pos.x - o.width/2 * viewScale, 4 * viewScale);
          if (isSelected) {
            ctx.strokeStyle = '#ffd700';
            ctx.lineWidth = 2;
            ctx.setLineDash([4, 2]);
            ctx.strokeRect(pos.x - o.width/2 * viewScale, wy - 6 * viewScale, o.width * viewScale, 12 * viewScale);
            ctx.setLineDash([]);
          }
        } else if (o.type === 'wall_angled') {
          ctx.save();
          ctx.translate(pos.x, pos.y);
          ctx.rotate((o.angle || 0) * Math.PI / 180);
          
          ctx.fillStyle = o.color;
          ctx.fillRect(-o.width/2 * viewScale, -3 * viewScale, o.width * viewScale, 6 * viewScale);
          
          if (isSelected) {
            ctx.strokeStyle = '#ffd700';
            ctx.lineWidth = 2;
            ctx.strokeRect(-o.width/2 * viewScale, -3 * viewScale, o.width * viewScale, 6 * viewScale);
          }
          
          // Стрелка направления
          ctx.fillStyle = '#fff';
          ctx.beginPath();
          ctx.moveTo(o.width/2 * viewScale, 0);
          ctx.lineTo(o.width/2 * viewScale - 8, -5);
          ctx.lineTo(o.width/2 * viewScale - 8, 5);
          ctx.fill();
          
          ctx.restore();
        } else if (o.type === 'wall_seg') {
          ctx.fillStyle = o.color;
          ctx.fillRect(pos.x - o.width/2 * viewScale, pos.y - o.height/2 * viewScale, o.width * viewScale, o.height * viewScale);
          if (isSelected) {
            ctx.strokeStyle = '#ffd700';
            ctx.lineWidth = 2;
            ctx.strokeRect(pos.x - o.width/2 * viewScale, pos.y - o.height/2 * viewScale, o.width * viewScale, o.height * viewScale);
          }
        } else if (o.type === 'spinner') {
          ctx.save();
          ctx.translate(pos.x, pos.y);
          ctx.fillStyle = o.color;
          ctx.fillRect(-o.radius * viewScale, -2 * viewScale, o.radius * 2 * viewScale, 4 * viewScale);
          ctx.fillRect(-2 * viewScale, -o.radius * viewScale, 4 * viewScale, o.radius * 2 * viewScale);
          ctx.restore();
        }
        
        // Номер
        ctx.fillStyle = '#fff';
        ctx.font = `${Math.max(8, 10 * viewScale)}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.fillText(i, pos.x, pos.y - 10 * viewScale);
      });
      
      // Финиш
      const finishPos = worldToScreen(0, mapData.trackLength);
      ctx.strokeStyle = '#ffd700';
      ctx.lineWidth = 2;
      ctx.setLineDash([8, 4]);
      ctx.beginPath();
      ctx.moveTo(tl.x, finishPos.y);
      ctx.lineTo(br.x, finishPos.y);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = '#ffd700';
      ctx.font = `${Math.max(10, 14 * viewScale)}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText('🏁 ФИНИШ', mapData.trackWidth/2 * viewScale + viewX, finishPos.y - 10);
    }
    
    // Обработчики мыши
    canvas.addEventListener('mousedown', (e) => {
      const rect = canvas.getBoundingClientRect();
      const sx = e.clientX - rect.left;
      const sy = e.clientY - rect.top;
      
      if (e.button === 1 || e.altKey) {
        isPanning = true;
        panStartX = e.clientX;
        panStartY = e.clientY;
        panStartViewX = viewX;
        panStartViewY = viewY;
        canvas.style.cursor = 'grabbing';
        return;
      }
      
      const world = screenToWorld(sx, sy);
      
      if (currentTool === 'delete') {
        let closest = null;
        let minDist = 30 / viewScale;
        mapData.obstacles.forEach((o, i) => {
          const dist = Math.sqrt((o.x - world.x) ** 2 + (o.y - world.y) ** 2);
          if (dist < minDist) { minDist = dist; closest = i; }
        });
        if (closest !== null) removeObstacle(closest);
      } else {
        // Создание препятствия
        const newObs = createObstacle(currentTool, world.x, world.y);
        mapData.obstacles.push(newObs);
        selectedObstacle = mapData.obstacles.length - 1;
        updateUI();
        draw();
      }
    });
    
    canvas.addEventListener('mousemove', (e) => {
      const rect = canvas.getBoundingClientRect();
      const sx = e.clientX - rect.left;
      const sy = e.clientY - rect.top;
      const world = screenToWorld(sx, sy);
      
      document.getElementById('mouseCoords').textContent = `X: ${Math.round(world.x)}, Y: ${Math.round(world.y)} | Масштаб: ${viewScale.toFixed(2)}x`;
      
      if (isPanning) {
        viewX = panStartViewX + (e.clientX - panStartX);
        viewY = panStartViewY + (e.clientY - panStartY);
        draw();
      }
    });
    
    canvas.addEventListener('mouseup', () => {
      isPanning = false;
      canvas.style.cursor = 'crosshair';
    });
    
    canvas.addEventListener('wheel', (e) => {
      e.preventDefault();
      
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      
      const worldBefore = screenToWorld(mx, my);
      
      const zoomFactor = e.deltaY > 0 ? 0.85 : 1.18;
      const newScale = Math.max(0.1, Math.min(5, viewScale * zoomFactor));
      
      viewScale = newScale;
      
      const worldAfter = screenToWorld(mx, my);
      viewX += (worldAfter.x - worldBefore.x) * viewScale;
      viewY += (worldAfter.y - worldBefore.y) * viewScale;
      
      draw();
    });
    
    canvas.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const world = screenToWorld(e.clientX - rect.left, e.clientY - rect.top);
      
      let closest = null;
      let minDist = 30 / viewScale;
      mapData.obstacles.forEach((o, i) => {
        const dist = Math.sqrt((o.x - world.x) ** 2 + (o.y - world.y) ** 2);
        if (dist < minDist) { minDist = dist; closest = i; }
      });
      if (closest !== null) {
        selectedObstacle = closest;
        updateUI();
        draw();
      }
    });
    
    function createObstacle(type, x, y) {
      const base = { x, y };
      switch (type) {
        case 'pin': return { ...base, type: 'pin', radius: 4, color: '#f4d03f' };
        case 'bumper': return { ...base, type: 'bumper', width: 50, height: 6, color: '#ff4466', force: 4 };
        case 'funnel': return { ...base, type: 'funnel', radius: 25, color: '#8844ff' };
        case 'wall_gap': return { ...base, type: 'wall_gap', width: 50, color: '#888888' };
        case 'wall_angled': return { ...base, type: 'wall_angled', width: 60, angle: 0, color: '#ff6644' };
        case 'tunnel': return { ...base, type: 'wall_seg', width: 8, height: 14, color: '#666666' };
        default: return { ...base, type: 'pin', radius: 4, color: '#f4d03f' };
      }
    }
    
    window.exportJSON = function() {
      mapData.name = document.getElementById('mapName').value;
      mapData.trackLength = parseInt(document.getElementById('trackLength').value);
      
      const json = JSON.stringify(mapData, null, 2);
      navigator.clipboard.writeText(json).then(() => {
        alert('✅ JSON скопирован в буфер обмена!');
      }).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = json;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        alert('✅ JSON скопирован!');
      });
    };
    
    window.importJSON = function() {
      document.getElementById('importModal').classList.remove('hidden');
    };
    
    window.doImport = function() {
      try {
        const json = JSON.parse(document.getElementById('importJSONText').value);
        if (json.obstacles && Array.isArray(json.obstacles)) {
          mapData = { ...json, id: Date.now().toString() };
          selectedObstacle = null;
          viewX = 0;
          viewY = 0;
          viewScale = 1;
          updateUI();
          renderMapList();
          document.getElementById('importModal').classList.add('hidden');
          zoomToFit();
          alert('✅ Карта импортирована!');
        } else {
          alert('❌ Неверный формат JSON!');
        }
      } catch (e) {
        alert('❌ Ошибка парсинга JSON!');
      }
    };
    
    window.closeImport = function() {
      document.getElementById('importModal').classList.add('hidden');
    };
    
    // Горячие клавиши
    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      
      const tools = ['pin', 'bumper', 'funnel', 'wall_gap', 'wall_angled', 'tunnel', 'delete'];
      if (e.key >= '1' && e.key <= '7') {
        const tool = tools[parseInt(e.key) - 1];
        if (tool === 'delete') setTool('delete');
        else setTool(tool);
      }
      
      if (e.key === 'Delete' && selectedObstacle !== null) {
        removeObstacle(selectedObstacle);
      }
      
      if (e.ctrlKey && e.key === 's') {
        e.preventDefault();
        window.saveMap();
      }
      
      if (e.ctrlKey && e.key === 'z') {
        e.preventDefault();
        if (mapData.obstacles.length > 0) {
          mapData.obstacles.pop();
          if (selectedObstacle >= mapData.obstacles.length) selectedObstacle = null;
          updateUI();
          draw();
        }
      }
    });
    
    // Инициализация
    resizeCanvas();
    loadSavedMaps();
    updateUI();
    zoomToFit();
    
    window.addEventListener('resize', () => {
      resizeCanvas();
      draw();
    });
  })();
</script>
</body>
</html>
