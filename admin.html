<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пирамикс • Админ-панель</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(145deg, #0b0c0e 0%, #1a1c22 100%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
            color: #f5efe0;
            font-size: 14px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
        }

        .header {
            background: rgba(20, 22, 27, 0.8);
            backdrop-filter: blur(18px);
            border-radius: 1.8rem;
            border: 1px solid rgba(255, 215, 150, 0.2);
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #c084fc, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: rgba(20, 22, 27, 0.8);
            backdrop-filter: blur(16px);
            border-radius: 1.5rem;
            padding: 1.2rem;
            border: 1px solid rgba(255, 215, 150, 0.15);
            text-align: center;
        }

        .stat-label {
            font-size: 0.7rem;
            color: #b9b09a;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.3rem;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fad974, #ebaa5e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .panel {
            background: rgba(20, 22, 27, 0.8);
            backdrop-filter: blur(16px);
            border-radius: 1.5rem;
            padding: 1.5rem;
            border: 1px solid rgba(255, 215, 150, 0.15);
            margin-bottom: 1.5rem;
        }

        .panel h2 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #e9c274;
        }

        .input-group {
            margin-bottom: 1rem;
        }

        .input-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 500;
            color: #b9b09a;
            margin-bottom: 0.25rem;
            text-transform: uppercase;
        }

        .input-group input, .input-group textarea, .input-group select {
            width: 100%;
            background: rgba(15, 16, 20, 0.8);
            border: 1px solid rgba(220, 180, 100, 0.25);
            border-radius: 1rem;
            padding: 0.75rem 1rem;
            font-size: 0.9rem;
            color: #f5e7cc;
            outline: none;
            font-family: 'Inter', sans-serif;
            resize: vertical;
        }

        .input-group select {
            appearance: none;
            cursor: pointer;
        }

        .input-group select option {
            background: #1a1c22;
            color: #f5e7cc;
        }

        .input-group textarea {
            min-height: 60px;
        }

        .input-group input:focus, .input-group textarea:focus, .input-group select:focus {
            border-color: #c084fc;
            box-shadow: 0 0 12px rgba(192, 132, 252, 0.4);
        }

        .input-row {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .input-row .input-group {
            flex: 1;
            min-width: 200px;
        }

        .btn {
            background: linear-gradient(135deg, #c084fc, #7c3aed);
            border: none;
            color: #fff;
            font-weight: 700;
            font-size: 0.85rem;
            padding: 0.65rem 1.5rem;
            border-radius: 2rem;
            cursor: pointer;
            transition: 0.25s;
            box-shadow: 0 6px 15px rgba(124, 58, 237, 0.4);
        }

        .btn:hover {
            background: linear-gradient(135deg, #d8b4fe, #9333ea);
            box-shadow: 0 8px 20px rgba(192, 132, 252, 0.6);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff7043, #d32f2f);
            box-shadow: 0 6px 15px rgba(255, 112, 67, 0.4);
        }

        .btn-danger:hover {
            background: linear-gradient(135deg, #ff8a65, #e53935);
            box-shadow: 0 8px 20px rgba(255, 112, 67, 0.6);
        }

        .btn-success {
            background: linear-gradient(135deg, #4caf50, #2e7d32);
            box-shadow: 0 6px 15px rgba(76, 175, 80, 0.4);
        }

        .btn-success:hover {
            background: linear-gradient(135deg, #66bb6a, #388e3c);
            box-shadow: 0 8px 20px rgba(76, 175, 80, 0.6);
        }

        .btn-warning {
            background: linear-gradient(135deg, #f9a825, #f57f17);
            box-shadow: 0 6px 15px rgba(249, 168, 37, 0.4);
        }

        .btn-warning:hover {
            background: linear-gradient(135deg, #fbc02d, #f9a825);
            box-shadow: 0 8px 20px rgba(249, 168, 37, 0.6);
        }

        .btn-info {
            background: linear-gradient(135deg, #0288d1, #01579b);
            box-shadow: 0 6px 15px rgba(2, 136, 209, 0.4);
        }

        .btn-info:hover {
            background: linear-gradient(135deg, #039be5, #0277bd);
            box-shadow: 0 8px 20px rgba(2, 136, 209, 0.6);
        }

        .btn-sm {
            padding: 0.4rem 1rem;
            font-size: 0.75rem;
        }

        .user-info {
            background: rgba(0,0,0,0.3);
            border-radius: 1rem;
            padding: 1rem;
            margin: 1rem 0;
            border: 1px solid rgba(192, 132, 252, 0.3);
        }

        .user-info p {
            margin: 0.3rem 0;
            font-size: 0.85rem;
        }

        .user-info .label { color: #b9b09a; }
        .user-info .value { color: #f5d78c; font-weight: 600; }

        .password-field {
            font-family: monospace;
            background: rgba(0,0,0,0.5);
            padding: 0.2rem 0.5rem;
            border-radius: 0.3rem;
        }

        /* ===== ТЕСТОВАЯ ПАНЕЛЬ ===== */
        .test-panel {
            background: rgba(20, 22, 27, 0.8);
            backdrop-filter: blur(16px);
            border-radius: 1.5rem;
            padding: 1.5rem;
            border: 2px solid rgba(249, 168, 37, 0.5);
            margin-bottom: 1.5rem;
        }

        .test-panel h2 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #f9a825;
        }

        .test-log {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            padding: 1rem;
            margin-top: 1rem;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
            color: #b9b09a;
            line-height: 1.6;
        }

        .test-log .log-entry {
            padding: 0.3rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .test-log .log-success { color: #81c784; }
        .test-log .log-error { color: #ff7043; }
        .test-log .log-info { color: #64b5f6; }
        .test-log .log-warning { color: #ffb74d; }
        .test-log .log-time { color: #8b8a7a; font-size: 0.65rem; }

        .test-buttons {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        .test-status {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            border-radius: 1rem;
            font-size: 0.75rem;
            font-weight: 600;
            margin-left: 0.5rem;
        }

        .test-status.success { background: rgba(76, 175, 80, 0.3); color: #81c784; }
        .test-status.pending { background: rgba(255, 193, 7, 0.3); color: #ffb74d; }
        .test-status.error { background: rgba(255, 112, 67, 0.3); color: #ff7043; }

        /* ===== ДИАЛОГИ ===== */
        .dialog-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            max-height: 500px;
            overflow-y: auto;
        }

        .dialog-item {
            background: rgba(0,0,0,0.3);
            border-radius: 1rem;
            padding: 1rem;
            border: 1px solid rgba(212, 165, 60, 0.2);
            cursor: pointer;
            transition: all 0.2s;
        }

        .dialog-item:hover {
            border-color: rgba(192, 132, 252, 0.5);
            background: rgba(192, 132, 252, 0.1);
        }

        .dialog-item.has-unread {
            border-color: rgba(192, 132, 252, 0.6);
            background: rgba(192, 132, 252, 0.1);
            animation: pulseUnread 2s infinite;
        }

        @keyframes pulseUnread {
            0%, 100% { border-color: rgba(192, 132, 252, 0.4); }
            50% { border-color: rgba(192, 132, 252, 0.8); }
        }

        .dialog-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .dialog-nickname {
            font-weight: 700;
            font-size: 0.9rem;
            color: #f5d78c;
        }

        .dialog-badge {
            background: #ff7043;
            color: #fff;
            border-radius: 1rem;
            padding: 0.15rem 0.5rem;
            font-size: 0.65rem;
            font-weight: 700;
        }

        .dialog-last-message {
            font-size: 0.8rem;
            color: #b9b09a;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 0.3rem;
        }

        .dialog-meta {
            font-size: 0.65rem;
            color: #8b8a7a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* ===== МОДАЛЬНЫЕ ОКНА ДИАЛОГОВ ===== */
        .dialog-modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.3);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .dialog-modal-overlay.active {
            pointer-events: all;
        }

        .dialog-modal {
            position: absolute;
            background: rgba(20, 22, 27, 0.98);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(192, 132, 252, 0.5);
            border-radius: 1.5rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            min-width: 380px;
            max-width: 650px;
            width: 500px;
            max-height: 75vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .dialog-modal-header {
            background: linear-gradient(135deg, rgba(192, 132, 252, 0.3), rgba(124, 58, 237, 0.2));
            padding: 0.7rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
            border-bottom: 1px solid rgba(192, 132, 252, 0.3);
            gap: 0.5rem;
            flex-shrink: 0;
        }

        .dialog-modal-header h3 {
            font-size: 0.85rem;
            color: #e9c274;
            margin: 0;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .dialog-modal-header-btns {
            display: flex;
            gap: 0.3rem;
            flex-shrink: 0;
        }

        .dialog-modal-close {
            background: transparent;
            border: none;
            color: #b9b09a;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0;
            line-height: 1;
            transition: color 0.2s;
        }

        .dialog-modal-close:hover { color: #ff7043; }

        .dialog-modal-messages {
            flex: 1;
            padding: 1rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .dialog-msg {
            padding: 0.6rem 0.9rem;
            border-radius: 1rem;
            font-size: 0.78rem;
            line-height: 1.4;
            max-width: 85%;
            word-break: break-word;
        }

        .dialog-msg.user {
            background: rgba(243, 185, 91, 0.2);
            border: 1px solid rgba(243, 185, 91, 0.3);
            color: #f5efe0;
            align-self: flex-end;
            border-bottom-right-radius: 0.3rem;
        }

        .dialog-msg.admin {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid rgba(76, 175, 80, 0.4);
            color: #81c784;
            align-self: flex-start;
            border-bottom-left-radius: 0.3rem;
        }

        .dialog-msg-time {
            font-size: 0.6rem;
            color: #8b8a7a;
            margin-top: 0.2rem;
            text-align: right;
        }

        .dialog-modal-footer {
            padding: 0.7rem 1rem;
            border-top: 1px solid rgba(192, 132, 252, 0.2);
            display: flex;
            gap: 0.5rem;
            align-items: flex-end;
            flex-shrink: 0;
        }

        .dialog-modal-footer textarea {
            flex: 1;
            background: rgba(15, 16, 20, 0.8);
            border: 1px solid rgba(220, 180, 100, 0.25);
            border-radius: 1rem;
            padding: 0.6rem 1rem;
            font-size: 0.8rem;
            color: #f5e7cc;
            outline: none;
            font-family: 'Inter', sans-serif;
            resize: vertical;
            min-height: 38px;
            max-height: 100px;
        }

        .dialog-modal-footer textarea:focus {
            border-color: #c084fc;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 12px;
            color: #fff;
            font-weight: 500;
            font-size: 0.9rem;
            z-index: 9999;
            animation: slideInRight 0.3s ease-out;
            max-width: 350px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .toast-success { background: rgba(76, 175, 80, 0.9); border: 1px solid #4caf50; }
        .toast-error { background: rgba(255, 112, 67, 0.9); border: 1px solid #ff7043; }
        .toast-info { background: rgba(2, 136, 209, 0.9); border: 1px solid #0288d1; }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .badge {
            background: #ff7043;
            color: #fff;
            border-radius: 50%;
            padding: 0.2rem 0.5rem;
            font-size: 0.7rem;
            font-weight: 700;
            margin-left: 0.3rem;
        }

        .hidden { display: none !important; }

        @media (max-width: 600px) {
            .input-row { flex-direction: column; }
            .btn { width: 100%; }
            .header { flex-direction: column; text-align: center; }
            .dialog-modal {
                width: 95vw !important;
                min-width: auto !important;
                max-width: 95vw !important;
            }
            .test-buttons { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">👑 Пирамикс • Админ-панель</div>
            <button class="btn btn-danger btn-sm" onclick="logout()">🚪 Выход</button>
        </div>

        <!-- Статистика -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-label">👥 Всего пользователей</div>
                <div class="stat-value" id="statTotalUsers">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">📅 Сегодня</div>
                <div class="stat-value" id="statTodayUsers">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">💰 Выведено всего</div>
                <div class="stat-value" id="statTotalWithdrawn">0 $</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">💬 Диалогов</div>
                <div class="stat-value" id="statUnread">0</div>
            </div>
        </div>

        <!-- ===== ТЕСТИРОВАНИЕ ОПЛАТЫ VIP ===== -->
        <div class="test-panel">
            <h2>🧪 Тестирование оплаты VIP <span class="test-status pending" id="testGlobalStatus">Ожидание</span></h2>
            
            <div class="input-row">
                <div class="input-group">
                    <label>Никнейм тестового пользователя</label>
                    <input type="text" id="testNickname" placeholder="Введите никнейм пользователя для теста">
                </div>
                <div class="input-group">
                    <label>Криптовалюта</label>
                    <select id="testCrypto">
                        <option value="trx">TRON (TRX)</option>
                        <option value="ltc">Litecoin (LTC)</option>
                        <option value="eth">Ethereum (ETH)</option>
                        <option value="usdterc20">USDT (ERC20)</option>
                        <option value="usdtbsc">USDT (BEP20)</option>
                        <option value="doge">Dogecoin (DOGE)</option>
                        <option value="bch">Bitcoin Cash (BCH)</option>
                    </select>
                </div>
            </div>
            
            <div class="test-buttons">
                <button class="btn btn-success" onclick="testVipPayment('success')">
                    ✅ Тест: Успешная оплата
                </button>
                <button class="btn btn-warning" onclick="testVipPayment('expired')">
                    ⏰ Тест: Истечение / Отмена
                </button>
                <button class="btn btn-danger" onclick="testVipPayment('error')">
                    ❌ Тест: Ошибка оплаты
                </button>
                <button class="btn btn-info btn-sm" onclick="clearTestLog()">
                    🧹 Очистить лог
                </button>
            </div>
            
            <div class="test-log" id="testLog">
                <div class="log-entry">
                    <span class="log-time">[Ожидание]</span> 
                    <span class="log-info">🧪 Панель тестирования готова. Выберите действие для проверки оплаты VIP.</span>
                </div>
            </div>
        </div>

        <!-- Поиск пользователя -->
        <div class="panel">
            <h2>🔍 Поиск пользователя</h2>
            <div class="input-row">
                <div class="input-group">
                    <label>Никнейм пользователя</label>
                    <input type="text" id="searchNickname" placeholder="Введите никнейм...">
                </div>
                <div class="input-group" style="justify-content: flex-end; display: flex; align-items: flex-end;">
                    <button class="btn" onclick="searchUser()">🔍 Найти</button>
                </div>
            </div>
            <div id="userInfo" class="hidden">
                <div class="user-info" id="userInfoContent"></div>
                <div class="input-row" style="margin-top: 1rem;">
                    <div class="input-group">
                        <label>Сумма ($)</label>
                        <input type="number" id="balanceAmount" placeholder="Введите сумму" min="0.01" step="0.01">
                    </div>
                    <div style="display: flex; gap: 0.5rem; align-items: flex-end; flex-wrap: wrap;">
                        <button class="btn btn-success btn-sm" onclick="addBalance()">➕ Начислить</button>
                        <button class="btn btn-danger btn-sm" onclick="removeBalance()">➖ Списать</button>
                        <button class="btn btn-warning btn-sm" onclick="setVip()">👑 Установить VIP</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Диалоги -->
        <div class="panel">
            <h2>💬 Диалоги с пользователями <span class="badge" id="unreadBadge" style="display:none;">0</span></h2>
            <div class="dialog-list" id="dialogList">
                <p style="color: #b9b09a; text-align: center;">Загрузка диалогов...</p>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const supabaseUrl = 'https://zvneiyhsoivaozzhzeoy.supabase.co';
            const supabaseKey = 'sb_publishable_CFPn1BIheE6L8wS89l0LtA_G9GofNzt';
            const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

            let currentUser = null;
            let currentUserId = null;
            let activeDialogs = {};

            // ========== ТЕСТОВЫЙ ЛОГ ==========
            function addTestLog(message, type = 'info') {
                const logContainer = document.getElementById('testLog');
                const entry = document.createElement('div');
                entry.className = 'log-entry';
                const time = new Date().toLocaleTimeString('ru-RU');
                entry.innerHTML = `<span class="log-time">[${time}]</span> <span class="log-${type}">${message}</span>`;
                logContainer.appendChild(entry);
                logContainer.scrollTop = logContainer.scrollHeight;
            }

            window.clearTestLog = function() {
                document.getElementById('testLog').innerHTML = `
                    <div class="log-entry">
                        <span class="log-time">[${new Date().toLocaleTimeString('ru-RU')}]</span> 
                        <span class="log-info">🧹 Лог очищен.</span>
                    </div>
                `;
            };

            // ========== ТЕСТИРОВАНИЕ VIP ОПЛАТЫ ==========
            window.testVipPayment = async function(scenario) {
                const nickname = document.getElementById('testNickname').value.trim();
                const crypto = document.getElementById('testCrypto').value;
                const statusEl = document.getElementById('testGlobalStatus');

                if (!nickname) {
                    showToast('Введите никнейм пользователя для теста', 'error');
                    addTestLog('❌ Ошибка: Не указан никнейм пользователя', 'error');
                    return;
                }

                // Ищем пользователя
                addTestLog(`🔍 Поиск пользователя: "${nickname}"...`, 'info');
                const { data: userData, error: userError } = await supabase.rpc('admin_find_user', { p_nickname: nickname });

                if (!userData || !userData.success) {
                    addTestLog(`❌ Пользователь "${nickname}" не найден в базе данных`, 'error');
                    showToast('Пользователь не найден', 'error');
                    return;
                }

                const user = userData;
                addTestLog(`✅ Пользователь найден: ID=${user.id}, VIP=${user.vip_paid ? 'активен' : 'не активен'}, Баланс=${parseFloat(user.balance).toFixed(2)}$`, 'success');

                if (user.vip_paid) {
                    addTestLog(`⚠️ Внимание: У пользователя "${nickname}" уже активирован VIP статус`, 'warning');
                }

                // Симуляция разных сценариев
                if (scenario === 'success') {
                    statusEl.textContent = 'Тестирование...';
                    statusEl.className = 'test-status pending';
                    
                    addTestLog(`🧪 Запуск теста: УСПЕШНАЯ ОПЛАТА VIP`, 'info');
                    addTestLog(`💳 Симуляция: создание платежа ${crypto.toUpperCase()} на 10$...`, 'info');
                    
                    // Имитация задержки обработки платежа
                    await new Promise(resolve => setTimeout(resolve, 1500));
                    addTestLog(`⏳ Платёж обрабатывается...`, 'info');
                    
                    await new Promise(resolve => setTimeout(resolve, 1500));
                    addTestLog(`✅ Платёж подтверждён! Сумма: 10$ (${crypto.toUpperCase()})`, 'success');
                    
                    // Активируем VIP через RPC
                    addTestLog(`🔄 Вызов purchase_vip_crypto для пользователя ID=${user.id}...`, 'info');
                    const { data: vipData, error: vipError } = await supabase.rpc('purchase_vip_crypto', {
                        p_user_id: user.id
                    });

                    if (vipError) {
                        addTestLog(`❌ Ошибка RPC purchase_vip_crypto: ${vipError.message}`, 'error');
                        addTestLog(`💡 Возможные причины:`, 'warning');
                        addTestLog(`   • Функция не существует в Supabase`, 'warning');
                        addTestLog(`   • У пользователя уже есть VIP`, 'warning');
                        addTestLog(`   • Ошибка в логике функции`, 'warning');
                        statusEl.textContent = 'Ошибка RPC';
                        statusEl.className = 'test-status error';
                        showToast('Ошибка при вызове RPC функции', 'error');
                    } else if (vipData && vipData.success) {
                        addTestLog(`🎉 VIP статус успешно активирован для "${nickname}"!`, 'success');
                        
                        // Проверяем результат
                        const { data: verifyData } = await supabase.rpc('admin_find_user', { p_nickname: nickname });
                        if (verifyData && verifyData.vip_paid) {
                            addTestLog(`✅ Проверка: VIP статус подтверждён в базе данных`, 'success');
                            addTestLog(`📋 Реферальный код: ${verifyData.referral_code}`, 'info');
                            statusEl.textContent = '✅ Успешно';
                            statusEl.className = 'test-status success';
                            showToast('🎉 VIP успешно активирован! Проверьте пользователя', 'success');
                        } else {
                            addTestLog(`⚠️ Проверка: Статус VIP не изменился в базе данных`, 'warning');
                            statusEl.textContent = '⚠️ Требует проверки';
                            statusEl.className = 'test-status pending';
                        }
                    } else {
                        addTestLog(`❌ RPC вернул: ${JSON.stringify(vipData)}`, 'error');
                        statusEl.textContent = '❌ Ошибка';
                        statusEl.className = 'test-status error';
                        showToast('RPC функция не активировала VIP', 'error');
                    }

                    // Обновляем статистику
                    loadStats();

                } else if (scenario === 'expired') {
                    statusEl.textContent = 'Тестирование...';
                    statusEl.className = 'test-status pending';
                    
                    addTestLog(`🧪 Запуск теста: ИСТЕЧЕНИЕ / ОТМЕНА ПЛАТЕЖА`, 'info');
                    addTestLog(`💳 Симуляция: создание платежа ${crypto.toUpperCase()} на 10$...`, 'info');
                    
                    await new Promise(resolve => setTimeout(resolve, 1500));
                    addTestLog(`⏳ Ожидание оплаты...`, 'info');
                    
                    await new Promise(resolve => setTimeout(resolve, 2000));
                    addTestLog(`⏰ Время оплаты истекло (таймаут 15 минут)`, 'warning');
                    addTestLog(`🔄 Статус платежа: EXPIRED`, 'warning');
                    addTestLog(`ℹ️ VIP статус НЕ активирован (платёж не получен)`, 'info');
                    
                    // Проверяем что VIP не активировался
                    const { data: verifyData } = await supabase.rpc('admin_find_user', { p_nickname: nickname });
                    if (verifyData && !verifyData.vip_paid) {
                        addTestLog(`✅ Проверка: VIP статус корректно не активирован`, 'success');
                    }
                    
                    statusEl.textContent = '⏰ Истекло (OK)';
                    statusEl.className = 'test-status pending';
                    showToast('Тест истечения завершён', 'info');

                } else if (scenario === 'error') {
                    statusEl.textContent = 'Тестирование...';
                    statusEl.className = 'test-status pending';
                    
                    addTestLog(`🧪 Запуск теста: ОШИБКА ОПЛАТЫ`, 'info');
                    addTestLog(`💳 Симуляция: попытка создания платежа ${crypto.toUpperCase()}...`, 'info');
                    
                    await new Promise(resolve => setTimeout(resolve, 1000));
                    addTestLog(`❌ Ошибка платёжного шлюза: Недостаточно средств / Отклонено банком`, 'error');
                    addTestLog(`🔄 Статус платежа: FAILED`, 'error');
                    addTestLog(`ℹ️ VIP статус НЕ активирован`, 'info');
                    
                    // Проверяем что VIP не активировался
                    const { data: verifyData } = await supabase.rpc('admin_find_user', { p_nickname: nickname });
                    if (verifyData && !verifyData.vip_paid) {
                        addTestLog(`✅ Проверка: VIP статус корректно не активирован при ошибке`, 'success');
                    }
                    
                    statusEl.textContent = '❌ Ошибка (OK)';
                    statusEl.className = 'test-status error';
                    showToast('Тест ошибки завершён', 'info');
                }

                addTestLog(`📊 Тест завершён. Проверьте пользователя "${nickname}" в панели поиска`, 'info');
            };

            function checkAuth() {
                const adminAuth = sessionStorage.getItem('piramix_admin_auth');
                if (adminAuth !== 'true') {
                    showLoginForm();
                } else {
                    document.querySelector('.container').classList.remove('hidden');
                    loadStats();
                    loadDialogs();
                    setInterval(loadStats, 30000);
                    setInterval(loadDialogs, 10000);
                }
            }

            function showLoginForm() {
                document.querySelector('.container').classList.add('hidden');
                const overlay = document.createElement('div');
                overlay.id = 'loginOverlay';
                overlay.style.cssText = `
                    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
                    background: rgba(0,0,0,0.8); display: flex; align-items: center;
                    justify-content: center; z-index: 1000;
                `;
                overlay.innerHTML = `
                    <div style="background: rgba(20,22,27,0.95); border: 1px solid rgba(255,215,150,0.3);
                        border-radius: 1.8rem; padding: 2rem; width: 90%; max-width: 380px; color: #f5efe0;">
                        <h2 style="color: #e9c274; margin-bottom: 1.5rem; text-align: center;">👑 Админ-панель</h2>
                        <div style="margin-bottom: 1rem;">
                            <label style="display: block; font-size: 0.75rem; color: #b9b09a; margin-bottom: 0.25rem;">Пароль</label>
                            <input type="password" id="adminPassword" placeholder="Введите пароль"
                                style="width: 100%; background: rgba(15,16,20,0.8); border: 1px solid rgba(220,180,100,0.25);
                                border-radius: 1rem; padding: 0.75rem 1rem; font-size: 0.9rem; color: #f5e7cc; outline: none;">
                        </div>
                        <p id="loginError" style="color: #ff7043; font-size: 0.75rem; text-align: center; margin-bottom: 0.5rem; display: none;">❌ Неверный пароль</p>
                        <button onclick="verifyAdmin()" style="width: 100%; background: linear-gradient(135deg, #c084fc, #7c3aed);
                            border: none; color: #fff; font-weight: 700; font-size: 0.9rem; padding: 0.7rem;
                            border-radius: 2rem; cursor: pointer;">🔓 Войти</button>
                    </div>
                `;
                document.body.appendChild(overlay);
            }

            window.verifyAdmin = async function() {
                const password = document.getElementById('adminPassword').value;
                const { data, error } = await supabase.rpc('admin_verify_password', { p_password: password });
                
                if (data && data.success) {
                    sessionStorage.setItem('piramix_admin_auth', 'true');
                    const overlay = document.getElementById('loginOverlay');
                    if (overlay) overlay.remove();
                    document.querySelector('.container').classList.remove('hidden');
                    loadStats();
                    loadDialogs();
                } else {
                    document.getElementById('loginError').style.display = 'block';
                }
            };

            window.logout = function() {
                Object.values(activeDialogs).forEach(d => d.close());
                activeDialogs = {};
                sessionStorage.removeItem('piramix_admin_auth');
                location.reload();
            };

            function showToast(message, type = 'success') {
                const toast = document.createElement('div');
                toast.className = `toast toast-${type}`;
                toast.textContent = message;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 3000);
            }

            function formatNumber(num) {
                if (num >= 1000) return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.');
                return num.toString();
            }

            function groupMessagesByUser(messages) {
                const dialogs = {};
                
                messages.forEach(msg => {
                    const nickname = msg.nickname || 'User';
                    if (!dialogs[nickname]) {
                        dialogs[nickname] = {
                            nickname: nickname,
                            messages: [],
                            hasUnread: false,
                            lastMessage: null,
                            lastTime: null
                        };
                    }
                    
                    dialogs[nickname].messages.push(msg);
                    
                    if (!msg.is_read) {
                        dialogs[nickname].hasUnread = true;
                    }
                    
                    if (!dialogs[nickname].lastTime || new Date(msg.created_at) > new Date(dialogs[nickname].lastTime)) {
                        dialogs[nickname].lastMessage = msg.user_message;
                        dialogs[nickname].lastTime = msg.created_at;
                    }
                });
                
                return Object.values(dialogs).sort((a, b) => new Date(b.lastTime) - new Date(a.lastTime));
            }

            function openDialog(dialog) {
                const dialogKey = dialog.nickname;
                
                if (activeDialogs[dialogKey]) {
                    const existing = activeDialogs[dialogKey];
                    existing.modal.style.zIndex = getMaxZIndex() + 1;
                    existing.overlay.style.zIndex = getMaxZIndex();
                    existing.input.focus();
                    return;
                }

                const overlay = document.createElement('div');
                overlay.className = 'dialog-modal-overlay active';
                overlay.style.zIndex = getMaxZIndex();
                
                const modal = document.createElement('div');
                modal.className = 'dialog-modal';
                modal.style.zIndex = getMaxZIndex() + 1;
                modal.style.top = (40 + Object.keys(activeDialogs).length * 30) + 'px';
                modal.style.left = (60 + Object.keys(activeDialogs).length * 30) + 'px';
                
                const sortedMessages = [...dialog.messages].sort((a, b) => 
                    new Date(a.created_at) - new Date(b.created_at)
                );
                
                let messagesHTML = sortedMessages.map(msg => {
                    let html = '';
                    html += `
                        <div class="dialog-msg user">
                            ${escapeHtml(msg.user_message)}
                            <div class="dialog-msg-time">📅 ${new Date(msg.created_at).toLocaleString('ru-RU')}</div>
                        </div>
                    `;
                    if (msg.admin_response) {
                        html += `
                            <div class="dialog-msg admin">
                                ${escapeHtml(msg.admin_response)}
                                <div class="dialog-msg-time">✅ ${msg.responded_at ? new Date(msg.responded_at).toLocaleString('ru-RU') : ''}</div>
                            </div>
                        `;
                    }
                    return html;
                }).join('');

                modal.innerHTML = `
                    <div class="dialog-modal-header" id="modalHeader-${dialogKey}">
                        <h3>💬 ${escapeHtml(dialog.nickname)}</h3>
                        <div class="dialog-modal-header-btns">
                            <button class="btn btn-danger btn-sm modal-delete-btn" title="Удалить диалог">🗑</button>
                            <button class="dialog-modal-close modal-close-btn">✕</button>
                        </div>
                    </div>
                    <div class="dialog-modal-messages" id="modalMessages-${dialogKey}">
                        ${messagesHTML}
                    </div>
                    <div class="dialog-modal-footer">
                        <textarea id="modalResponseInput-${dialogKey}" placeholder="Введите сообщение..." rows="1"></textarea>
                        <button class="btn btn-success modal-send-btn" style="flex-shrink: 0;">📤</button>
                    </div>
                `;
                
                overlay.appendChild(modal);
                document.body.appendChild(overlay);
                
                const dialogObj = {
                    overlay: overlay,
                    modal: modal,
                    input: modal.querySelector(`#modalResponseInput-${dialogKey}`),
                    nickname: dialog.nickname,
                    close: function() {
                        overlay.remove();
                        delete activeDialogs[dialogKey];
                    }
                };
                activeDialogs[dialogKey] = dialogObj;

                setTimeout(() => {
                    const msgContainer = modal.querySelector(`#modalMessages-${dialogKey}`);
                    if (msgContainer) msgContainer.scrollTop = msgContainer.scrollHeight;
                }, 100);

                setTimeout(() => dialogObj.input.focus(), 200);

                overlay.addEventListener('mousedown', function(e) {
                    if (e.target === overlay) {
                        modal.style.zIndex = getMaxZIndex() + 1;
                        overlay.style.zIndex = getMaxZIndex();
                    }
                });

                modal.querySelector('.modal-close-btn').addEventListener('click', function() {
                    dialogObj.close();
                });

                modal.querySelector('.modal-delete-btn').addEventListener('click', async function() {
                    const choice = confirm(
                        `Удалить диалог с "${dialog.nickname}"?\n\n` +
                        `"ОК" — удалить только у вас\n"Отмена" — для выбора другого варианта`
                    );
                    
                    if (choice) {
                        for (const msg of dialog.messages) {
                            await supabase.rpc('admin_delete_support_message', { p_message_id: msg.id });
                        }
                        showToast('Диалог удалён у вас');
                    } else {
                        const choice2 = confirm(`Удалить диалог и у пользователя тоже?\n\n"ОК" — удалить у обоих`);
                        if (choice2) {
                            for (const msg of dialog.messages) {
                                await supabase.rpc('admin_delete_support_message', { p_message_id: msg.id });
                            }
                            showToast('Диалог удалён у обоих');
                        } else {
                            return;
                        }
                    }
                    
                    dialogObj.close();
                    loadDialogs();
                    loadStats();
                });

                modal.querySelector('.modal-send-btn').addEventListener('click', async function() {
                    await sendAdminMessage(dialogKey, dialogObj);
                });

                dialogObj.input.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        modal.querySelector('.modal-send-btn').click();
                    }
                });

                makeDraggable(modal, overlay);
            }

            function getMaxZIndex() {
                let max = 1000;
                Object.values(activeDialogs).forEach(d => {
                    const z = parseInt(d.overlay.style.zIndex) || 1000;
                    if (z > max) max = z;
                });
                return max + 2;
            }

            function makeDraggable(modal, overlay) {
                const header = modal.querySelector('.dialog-modal-header');
                let isDragging = false, startX, startY, startLeft, startTop;
                
                header.addEventListener('mousedown', function(e) {
                    if (e.target.closest('button')) return;
                    isDragging = true;
                    startX = e.clientX; startY = e.clientY;
                    startLeft = parseInt(modal.style.left) || 60;
                    startTop = parseInt(modal.style.top) || 40;
                    modal.style.transition = 'none';
                    e.preventDefault();
                });
                
                document.addEventListener('mousemove', function(e) {
                    if (!isDragging) return;
                    modal.style.left = Math.max(0, startLeft + (e.clientX - startX)) + 'px';
                    modal.style.top = Math.max(0, startTop + (e.clientY - startY)) + 'px';
                });
                
                document.addEventListener('mouseup', function() {
                    if (isDragging) {
                        isDragging = false;
                        modal.style.transition = '';
                    }
                });
            }

            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            async function sendAdminMessage(dialogKey, dialogObj) {
                const input = dialogObj.input;
                const message = input.value.trim();
                if (!message) return;
                
                const { data, error } = await supabase.rpc('admin_send_message_to_user', {
                    p_nickname: dialogObj.nickname,
                    p_message: message
                });
                
                if (error) {
                    console.error('Send error:', error);
                    showToast('Ошибка: ' + error.message, 'error');
                    return;
                }
                
                if (data && data.success) {
                    input.value = '';
                    
                    const msgContainer = document.getElementById(`modalMessages-${dialogKey}`);
                    if (msgContainer) {
                        const msgDiv = document.createElement('div');
                        msgDiv.className = 'dialog-msg admin';
                        msgDiv.innerHTML = `${escapeHtml(message)}<div class="dialog-msg-time">✅ Только что</div>`;
                        msgContainer.appendChild(msgDiv);
                        msgContainer.scrollTop = msgContainer.scrollHeight;
                    }
                    
                    showToast('Сообщение отправлено', 'success');
                    loadDialogs();
                    loadStats();
                } else {
                    showToast(data?.error || 'Ошибка отправки', 'error');
                }
            }

            async function loadStats() {
                const { data, error } = await supabase.rpc('admin_get_full_stats');
                if (data) {
                    document.getElementById('statTotalUsers').textContent = formatNumber(data.total_users);
                    document.getElementById('statTodayUsers').textContent = data.today_users;
                    document.getElementById('statTotalWithdrawn').textContent = formatNumber(Math.floor(data.total_withdrawn)) + ' $';
                    document.getElementById('statUnread').textContent = data.unread_messages;
                    
                    const badge = document.getElementById('unreadBadge');
                    if (data.unread_messages > 0) {
                        badge.style.display = 'inline';
                        badge.textContent = data.unread_messages;
                    } else {
                        badge.style.display = 'none';
                    }
                }
            }

            window.searchUser = async function() {
                const nickname = document.getElementById('searchNickname').value.trim();
                if (!nickname) return;
                
                const { data, error } = await supabase.rpc('admin_find_user', { p_nickname: nickname });
                
                if (data && data.success) {
                    currentUser = data;
                    currentUserId = data.id;
                    document.getElementById('userInfo').classList.remove('hidden');
                    document.getElementById('userInfoContent').innerHTML = `
                        <p><span class="label">ID:</span> <span class="value">${data.id}</span></p>
                        <p><span class="label">Никнейм:</span> <span class="value">${data.nickname}</span></p>
                        <p><span class="label">Пароль:</span> <span class="value password-field">${data.password}</span></p>
                        <p><span class="label">VIP статус:</span> <span class="value">${data.vip_paid ? '✅ Активирован' : '❌ Не активирован'}</span></p>
                        <p><span class="label">Баланс:</span> <span class="value">${parseFloat(data.balance).toFixed(2)} $</span></p>
                        <p><span class="label">Реферальный код:</span> <span class="value">${data.referral_code}</span></p>
                        <p><span class="label">Дата регистрации:</span> <span class="value">${new Date(data.created_at).toLocaleString('ru-RU')}</span></p>
                    `;
                } else {
                    showToast('Пользователь не найден', 'error');
                    document.getElementById('userInfo').classList.add('hidden');
                }
            };

            window.addBalance = async function() {
                if (!currentUserId) return;
                const amount = parseFloat(document.getElementById('balanceAmount').value);
                if (!amount || amount <= 0) return;
                
                const { data, error } = await supabase.rpc('admin_add_balance', {
                    p_user_id: currentUserId, p_amount: amount
                });
                
                if (data && data.success) {
                    showToast(data.message);
                    document.getElementById('balanceAmount').value = '';
                    searchUser(); loadStats();
                } else {
                    showToast(data?.error || 'Ошибка', 'error');
                }
            };

            window.removeBalance = async function() {
                if (!currentUserId) return;
                const amount = parseFloat(document.getElementById('balanceAmount').value);
                if (!amount || amount <= 0) return;
                
                const { data, error } = await supabase.rpc('admin_remove_balance', {
                    p_user_id: currentUserId, p_amount: amount
                });
                
                if (data && data.success) {
                    showToast(data.message);
                    document.getElementById('balanceAmount').value = '';
                    searchUser(); loadStats();
                } else {
                    showToast(data?.error || 'Ошибка', 'error');
                }
            };

            window.setVip = async function() {
                if (!currentUser) return;
                
                const { data, error } = await supabase.rpc('admin_set_vip_by_nickname', { 
                    p_nickname: currentUser.nickname 
                });
                
                if (data && data.success) {
                    showToast(data.message, 'success');
                    searchUser();
                    loadStats();
                } else {
                    showToast(data?.error || 'Ошибка', 'error');
                }
            };

            async function loadDialogs() {
                const { data, error } = await supabase.rpc('get_support_messages');
                const container = document.getElementById('dialogList');
                
                if (!data || data.length === 0) {
                    container.innerHTML = '<p style="color: #b9b09a; text-align: center;">Нет диалогов</p>';
                    return;
                }
                
                const dialogs = groupMessagesByUser(data);
                
                container.innerHTML = dialogs.map(dialog => `
                    <div class="dialog-item ${dialog.hasUnread ? 'has-unread' : ''}" onclick="openDialogByNickname('${dialog.nickname.replace(/'/g, "\\'")}')">
                        <div class="dialog-header">
                            <span class="dialog-nickname">
                                ${dialog.nickname}
                            </span>
                            ${dialog.hasUnread ? '<span class="dialog-badge">Новое</span>' : ''}
                        </div>
                        <div class="dialog-last-message">${dialog.lastMessage}</div>
                        <div class="dialog-meta">
                            <span>📅 ${new Date(dialog.lastTime).toLocaleString('ru-RU')}</span>
                            <span>📨 ${dialog.messages.length} сообщ.</span>
                        </div>
                    </div>
                `).join('');
            }

            window.openDialogByNickname = async function(nickname) {
                const { data, error } = await supabase.rpc('get_support_messages');
                if (data) {
                    const dialogs = groupMessagesByUser(data);
                    const dialog = dialogs.find(d => d.nickname === nickname);
                    if (dialog) {
                        openDialog(dialog);
                    }
                }
            };

            checkAuth();
        })();
    </script>
</body>
</html>
