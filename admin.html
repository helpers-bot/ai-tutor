<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пирамикс • Админ-панель</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(145deg, #0b0c0e 0%, #1a1c22 100%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
            color: #f5efe0;
            font-size: 14px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
        }

        .header {
            background: rgba(20, 22, 27, 0.8);
            backdrop-filter: blur(18px);
            border-radius: 1.8rem;
            border: 1px solid rgba(255, 215, 150, 0.2);
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #c084fc, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: rgba(20, 22, 27, 0.8);
            backdrop-filter: blur(16px);
            border-radius: 1.5rem;
            padding: 1.2rem;
            border: 1px solid rgba(255, 215, 150, 0.15);
            text-align: center;
        }

        .stat-label {
            font-size: 0.7rem;
            color: #b9b09a;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.3rem;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fad974, #ebaa5e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .panel {
            background: rgba(20, 22, 27, 0.8);
            backdrop-filter: blur(16px);
            border-radius: 1.5rem;
            padding: 1.5rem;
            border: 1px solid rgba(255, 215, 150, 0.15);
            margin-bottom: 1.5rem;
        }

        .panel h2 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #e9c274;
        }

        .input-group {
            margin-bottom: 1rem;
        }

        .input-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 500;
            color: #b9b09a;
            margin-bottom: 0.25rem;
            text-transform: uppercase;
        }

        .input-group input {
            width: 100%;
            background: rgba(15, 16, 20, 0.8);
            border: 1px solid rgba(220, 180, 100, 0.25);
            border-radius: 1rem;
            padding: 0.75rem 1rem;
            font-size: 0.9rem;
            color: #f5e7cc;
            outline: none;
            font-family: 'Inter', sans-serif;
        }

        .input-group input:focus {
            border-color: #c084fc;
            box-shadow: 0 0 12px rgba(192, 132, 252, 0.4);
        }

        .input-row {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .input-row .input-group {
            flex: 1;
            min-width: 200px;
        }

        .btn {
            background: linear-gradient(135deg, #c084fc, #7c3aed);
            border: none;
            color: #fff;
            font-weight: 700;
            font-size: 0.85rem;
            padding: 0.65rem 1.5rem;
            border-radius: 2rem;
            cursor: pointer;
            transition: 0.25s;
            box-shadow: 0 6px 15px rgba(124, 58, 237, 0.4);
        }

        .btn:hover {
            background: linear-gradient(135deg, #d8b4fe, #9333ea);
            box-shadow: 0 8px 20px rgba(192, 132, 252, 0.6);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff7043, #d32f2f);
            box-shadow: 0 6px 15px rgba(255, 112, 67, 0.4);
        }

        .btn-danger:hover {
            background: linear-gradient(135deg, #ff8a65, #e53935);
            box-shadow: 0 8px 20px rgba(255, 112, 67, 0.6);
        }

        .btn-success {
            background: linear-gradient(135deg, #4caf50, #2e7d32);
            box-shadow: 0 6px 15px rgba(76, 175, 80, 0.4);
        }

        .btn-success:hover {
            background: linear-gradient(135deg, #66bb6a, #388e3c);
            box-shadow: 0 8px 20px rgba(76, 175, 80, 0.6);
        }

        .btn-sm {
            padding: 0.4rem 1rem;
            font-size: 0.75rem;
        }

        .user-info {
            background: rgba(0,0,0,0.3);
            border-radius: 1rem;
            padding: 1rem;
            margin: 1rem 0;
            border: 1px solid rgba(192, 132, 252, 0.3);
        }

        .user-info p {
            margin: 0.3rem 0;
            font-size: 0.85rem;
        }

        .user-info .label {
            color: #b9b09a;
        }

        .user-info .value {
            color: #f5d78c;
            font-weight: 600;
        }

        .message-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            max-height: 500px;
            overflow-y: auto;
        }

        .message-item {
            background: rgba(0,0,0,0.3);
            border-radius: 1rem;
            padding: 1rem;
            border: 1px solid rgba(212, 165, 60, 0.2);
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .message-item:hover {
            border-color: rgba(192, 132, 252, 0.5);
            background: rgba(192, 132, 252, 0.1);
        }

        .message-item.unread {
            border-color: rgba(192, 132, 252, 0.5);
            background: rgba(192, 132, 252, 0.1);
        }

        .message-text {
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
            color: #f5efe0;
        }

        .message-meta {
            font-size: 0.7rem;
            color: #8b8a7a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .message-response {
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid rgba(76, 175, 80, 0.3);
            border-radius: 0.8rem;
            padding: 0.7rem;
            margin-top: 0.5rem;
            font-size: 0.8rem;
            color: #4caf50;
        }

        .response-area {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .response-area input {
            flex: 1;
            background: rgba(15, 16, 20, 0.8);
            border: 1px solid rgba(220, 180, 100, 0.25);
            border-radius: 1rem;
            padding: 0.5rem 0.8rem;
            font-size: 0.8rem;
            color: #f5e7cc;
            outline: none;
            font-family: 'Inter', sans-serif;
        }

        .response-area input:focus {
            border-color: #c084fc;
        }

        /* ===== ПЕРЕТАСКИВАЕМОЕ ОКНО СООБЩЕНИЯ ===== */
        .message-modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .message-modal {
            position: absolute;
            background: rgba(20, 22, 27, 0.97);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(192, 132, 252, 0.5);
            border-radius: 1.5rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            min-width: 380px;
            max-width: 700px;
            width: 500px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
        }

        .message-modal-header {
            background: linear-gradient(135deg, rgba(192, 132, 252, 0.3), rgba(124, 58, 237, 0.2));
            padding: 0.8rem 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
            border-bottom: 1px solid rgba(192, 132, 252, 0.3);
        }

        .message-modal-header h3 {
            font-size: 0.9rem;
            color: #e9c274;
            margin: 0;
            pointer-events: none;
        }

        .message-modal-close {
            background: transparent;
            border: none;
            color: #b9b09a;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 0;
            line-height: 1;
            transition: color 0.2s;
        }

        .message-modal-close:hover {
            color: #ff7043;
        }

        .message-modal-body {
            padding: 1.2rem;
            overflow-y: auto;
            max-height: 400px;
            flex: 1;
        }

        .message-modal-body .user-msg {
            background: rgba(243, 185, 91, 0.2);
            border: 1px solid rgba(243, 185, 91, 0.3);
            border-radius: 1rem;
            padding: 0.8rem;
            margin-bottom: 0.8rem;
            font-size: 0.85rem;
            color: #f5efe0;
        }

        .message-modal-body .admin-msg {
            background: rgba(76, 175, 80, 0.15);
            border: 1px solid rgba(76, 175, 80, 0.4);
            border-radius: 1rem;
            padding: 0.8rem;
            margin-bottom: 0.8rem;
            font-size: 0.85rem;
            color: #81c784;
        }

        .message-modal-body .msg-time {
            font-size: 0.65rem;
            color: #8b8a7a;
            margin-top: 0.3rem;
            text-align: right;
        }

        .message-modal-footer {
            padding: 0.8rem 1.2rem;
            border-top: 1px solid rgba(192, 132, 252, 0.2);
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
            flex-wrap: wrap;
        }

        .message-modal-footer .response-input {
            flex: 1;
            min-width: 200px;
            background: rgba(15, 16, 20, 0.8);
            border: 1px solid rgba(220, 180, 100, 0.25);
            border-radius: 1rem;
            padding: 0.5rem 0.8rem;
            font-size: 0.8rem;
            color: #f5e7cc;
            outline: none;
            font-family: 'Inter', sans-serif;
        }

        .message-modal-footer .response-input:focus {
            border-color: #c084fc;
        }

        /* Ресайз-хендл */
        .resize-handle {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 20px;
            height: 20px;
            cursor: nwse-resize;
            background: linear-gradient(135deg, transparent 50%, rgba(192, 132, 252, 0.5) 50%);
            border-radius: 0 0 1.5rem 0;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 12px;
            color: #fff;
            font-weight: 500;
            font-size: 0.9rem;
            z-index: 9999;
            animation: slideInRight 0.3s ease-out;
            max-width: 350px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .toast-success { background: rgba(76, 175, 80, 0.9); border: 1px solid #4caf50; }
        .toast-error { background: rgba(255, 112, 67, 0.9); border: 1px solid #ff7043; }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .badge {
            background: #ff7043;
            color: #fff;
            border-radius: 50%;
            padding: 0.2rem 0.5rem;
            font-size: 0.7rem;
            font-weight: 700;
            margin-left: 0.3rem;
        }

        .hidden { display: none !important; }

        @media (max-width: 600px) {
            .input-row { flex-direction: column; }
            .btn { width: 100%; }
            .header { flex-direction: column; text-align: center; }
            .message-modal {
                width: 95vw !important;
                min-width: auto !important;
                max-width: 95vw !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">👑 Пирамикс • Админ-панель</div>
            <button class="btn btn-danger btn-sm" onclick="logout()">🚪 Выход</button>
        </div>

        <!-- Статистика -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-label">👥 Всего пользователей</div>
                <div class="stat-value" id="statTotalUsers">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">📅 Сегодня</div>
                <div class="stat-value" id="statTodayUsers">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">💰 Выведено всего</div>
                <div class="stat-value" id="statTotalWithdrawn">0 $</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">💬 Новых сообщений</div>
                <div class="stat-value" id="statUnread">0</div>
            </div>
        </div>

        <!-- Поиск пользователя -->
        <div class="panel">
            <h2>🔍 Поиск пользователя</h2>
            <div class="input-row">
                <div class="input-group">
                    <label>Никнейм пользователя</label>
                    <input type="text" id="searchNickname" placeholder="Введите никнейм...">
                </div>
                <div class="input-group" style="justify-content: flex-end; display: flex; align-items: flex-end;">
                    <button class="btn" onclick="searchUser()">🔍 Найти</button>
                </div>
            </div>
            <div id="userInfo" class="hidden">
                <div class="user-info" id="userInfoContent"></div>
                <div class="input-row" style="margin-top: 1rem;">
                    <div class="input-group">
                        <label>Сумма ($)</label>
                        <input type="number" id="balanceAmount" placeholder="Введите сумму" min="0.01" step="0.01">
                    </div>
                    <div style="display: flex; gap: 0.5rem; align-items: flex-end;">
                        <button class="btn btn-success btn-sm" onclick="addBalance()">➕ Начислить</button>
                        <button class="btn btn-danger btn-sm" onclick="removeBalance()">➖ Списать</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Сообщения поддержки -->
        <div class="panel">
            <h2>💬 Сообщения поддержки <span class="badge" id="unreadBadge" style="display:none;">0</span></h2>
            <div class="message-list" id="messageList">
                <p style="color: #b9b09a; text-align: center;">Загрузка сообщений...</p>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const supabaseUrl = 'https://kmkgqegtulbmdjlmllka.supabase.co';
            const supabaseKey = 'sb_publishable_azFcv95b6rBSnDxU2jYWEA_pO2Z5qTI';
            const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

            let currentUser = null;
            let currentUserId = null;
            let currentMessageModal = null;

            // ===== ПРОВЕРКА ДОСТУПА =====
            function checkAuth() {
                const adminAuth = sessionStorage.getItem('piramix_admin_auth');
                if (adminAuth !== 'true') {
                    showLoginForm();
                } else {
                    document.querySelector('.container').classList.remove('hidden');
                    loadStats();
                    loadMessages();
                    setInterval(loadStats, 30000);
                    setInterval(loadMessages, 15000);
                }
            }

            function showLoginForm() {
                document.querySelector('.container').classList.add('hidden');
                const overlay = document.createElement('div');
                overlay.id = 'loginOverlay';
                overlay.style.cssText = `
                    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
                    background: rgba(0,0,0,0.8); display: flex; align-items: center;
                    justify-content: center; z-index: 1000;
                `;
                overlay.innerHTML = `
                    <div style="background: rgba(20,22,27,0.95); border: 1px solid rgba(255,215,150,0.3);
                        border-radius: 1.8rem; padding: 2rem; width: 90%; max-width: 380px; color: #f5efe0;
                        animation: modalSlideIn 0.4s cubic-bezier(0.22, 0.98, 0.41, 1.1);">
                        <h2 style="color: #e9c274; margin-bottom: 1.5rem; text-align: center;">👑 Админ-панель</h2>
                        <div style="margin-bottom: 1rem;">
                            <label style="display: block; font-size: 0.75rem; color: #b9b09a; margin-bottom: 0.25rem;">Пароль</label>
                            <input type="password" id="adminPassword" placeholder="Введите пароль"
                                style="width: 100%; background: rgba(15,16,20,0.8); border: 1px solid rgba(220,180,100,0.25);
                                border-radius: 1rem; padding: 0.75rem 1rem; font-size: 0.9rem; color: #f5e7cc; outline: none;">
                        </div>
                        <p id="loginError" style="color: #ff7043; font-size: 0.75rem; text-align: center; margin-bottom: 0.5rem; display: none;">❌ Неверный пароль</p>
                        <button onclick="verifyAdmin()" style="width: 100%; background: linear-gradient(135deg, #c084fc, #7c3aed);
                            border: none; color: #fff; font-weight: 700; font-size: 0.9rem; padding: 0.7rem;
                            border-radius: 2rem; cursor: pointer;">🔓 Войти</button>
                    </div>
                `;
                document.body.appendChild(overlay);
            }

            window.verifyAdmin = async function() {
                const password = document.getElementById('adminPassword').value;
                const { data, error } = await supabase.rpc('admin_verify_password', { p_password: password });
                
                if (data && data.success) {
                    sessionStorage.setItem('piramix_admin_auth', 'true');
                    const overlay = document.getElementById('loginOverlay');
                    if (overlay) overlay.remove();
                    document.querySelector('.container').classList.remove('hidden');
                    loadStats();
                    loadMessages();
                } else {
                    document.getElementById('loginError').style.display = 'block';
                }
            };

            window.logout = function() {
                sessionStorage.removeItem('piramix_admin_auth');
                location.reload();
            };

            function showToast(message, type = 'success') {
                const toast = document.createElement('div');
                toast.className = `toast toast-${type}`;
                toast.textContent = message;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 3000);
            }

            function formatNumber(num) {
                if (num >= 1000) return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.');
                return num.toString();
            }

            // ===== ПЕРЕТАСКИВАЕМОЕ ОКНО СООБЩЕНИЯ =====
            function openMessageModal(msg) {
                // Закрываем предыдущее окно
                if (currentMessageModal) {
                    currentMessageModal.remove();
                    currentMessageModal = null;
                }

                const overlay = document.createElement('div');
                overlay.className = 'message-modal-overlay';
                
                const modal = document.createElement('div');
                modal.className = 'message-modal';
                modal.style.top = '50px';
                modal.style.left = '50px';
                
                modal.innerHTML = `
                    <div class="message-modal-header" id="modalHeader">
                        <h3>💬 Сообщение #${msg.id}</h3>
                        <button class="message-modal-close" id="modalClose">✕</button>
                    </div>
                    <div class="message-modal-body">
                        <div class="user-msg">
                            ${msg.user_message}
                            <div class="msg-time">📅 ${new Date(msg.created_at).toLocaleString('ru-RU')}</div>
                        </div>
                        ${msg.admin_response ? `
                            <div class="admin-msg">
                                ${msg.admin_response}
                                <div class="msg-time">✅ Отвечено</div>
                            </div>
                        ` : ''}
                    </div>
                    <div class="message-modal-footer">
                        ${!msg.admin_response ? `
                            <input type="text" class="response-input" id="modalResponseInput" placeholder="Введите ответ...">
                            <button class="btn btn-success btn-sm" id="modalSendBtn">📤 Ответить</button>
                        ` : ''}
                        <button class="btn btn-danger btn-sm" id="modalDeleteBtn">🗑 Удалить</button>
                    </div>
                    <div class="resize-handle" id="resizeHandle"></div>
                `;
                
                overlay.appendChild(modal);
                document.body.appendChild(overlay);
                currentMessageModal = overlay;

                // Закрытие по клику на оверлей
                overlay.addEventListener('click', function(e) {
                    if (e.target === overlay) {
                        overlay.remove();
                        currentMessageModal = null;
                    }
                });

                // Закрытие по кнопке
                modal.querySelector('#modalClose').addEventListener('click', function() {
                    overlay.remove();
                    currentMessageModal = null;
                });

                // Перетаскивание
                const header = modal.querySelector('#modalHeader');
                let isDragging = false;
                let startX, startY, startLeft, startTop;

                header.addEventListener('mousedown', function(e) {
                    isDragging = true;
                    startX = e.clientX;
                    startY = e.clientY;
                    startLeft = parseInt(modal.style.left) || 50;
                    startTop = parseInt(modal.style.top) || 50;
                    document.body.style.userSelect = 'none';
                });

                document.addEventListener('mousemove', function(e) {
                    if (!isDragging || !currentMessageModal) return;
                    const dx = e.clientX - startX;
                    const dy = e.clientY - startY;
                    modal.style.left = Math.max(0, startLeft + dx) + 'px';
                    modal.style.top = Math.max(0, startTop + dy) + 'px';
                });

                document.addEventListener('mouseup', function() {
                    isDragging = false;
                    document.body.style.userSelect = '';
                });

                // Изменение размера
                const resizeHandle = modal.querySelector('#resizeHandle');
                let isResizing = false;
                let startWidth, startHeight, resizeStartX, resizeStartY;

                resizeHandle.addEventListener('mousedown', function(e) {
                    isResizing = true;
                    resizeStartX = e.clientX;
                    resizeStartY = e.clientY;
                    startWidth = modal.offsetWidth;
                    startHeight = modal.offsetHeight;
                    e.stopPropagation();
                    document.body.style.userSelect = 'none';
                });

                document.addEventListener('mousemove', function(e) {
                    if (!isResizing || !currentMessageModal) return;
                    const newWidth = Math.max(380, startWidth + (e.clientX - resizeStartX));
                    const newHeight = Math.max(200, startHeight + (e.clientY - resizeStartY));
                    modal.style.width = newWidth + 'px';
                    modal.style.minHeight = newHeight + 'px';
                });

                document.addEventListener('mouseup', function() {
                    isResizing = false;
                    document.body.style.userSelect = '';
                });

                // Отправка ответа
                const sendBtn = modal.querySelector('#modalSendBtn');
                if (sendBtn) {
                    sendBtn.addEventListener('click', async function() {
                        const input = modal.querySelector('#modalResponseInput');
                        const response = input.value.trim();
                        if (!response) return;
                        
                        const { data, error } = await supabase.rpc('admin_respond_support', {
                            p_message_id: msg.id,
                            p_response: response
                        });
                        
                        if (data && data.success) {
                            showToast('Ответ отправлен');
                            overlay.remove();
                            currentMessageModal = null;
                            loadMessages();
                            loadStats();
                        } else {
                            showToast(data?.error || 'Ошибка', 'error');
                        }
                    });
                }

                // Удаление сообщения
                modal.querySelector('#modalDeleteBtn').addEventListener('click', async function() {
                    if (!confirm('Удалить это сообщение?')) return;
                    
                    const { data, error } = await supabase.rpc('admin_delete_support_message', {
                        p_message_id: msg.id
                    });
                    
                    if (data && data.success) {
                        showToast('Сообщение удалено');
                        overlay.remove();
                        currentMessageModal = null;
                        loadMessages();
                        loadStats();
                    } else {
                        showToast(data?.error || 'Ошибка', 'error');
                    }
                });
            }

            // ===== ЗАГРУЗКА СТАТИСТИКИ =====
            async function loadStats() {
                const { data, error } = await supabase.rpc('admin_get_full_stats');
                if (data) {
                    document.getElementById('statTotalUsers').textContent = formatNumber(data.total_users);
                    document.getElementById('statTodayUsers').textContent = data.today_users;
                    document.getElementById('statTotalWithdrawn').textContent = formatNumber(Math.floor(data.total_withdrawn)) + ' $';
                    document.getElementById('statUnread').textContent = data.unread_messages;
                    
                    const badge = document.getElementById('unreadBadge');
                    if (data.unread_messages > 0) {
                        badge.style.display = 'inline';
                        badge.textContent = data.unread_messages;
                    } else {
                        badge.style.display = 'none';
                    }
                }
            }

            // ===== ПОИСК ПОЛЬЗОВАТЕЛЯ =====
            window.searchUser = async function() {
                const nickname = document.getElementById('searchNickname').value.trim();
                if (!nickname) return;
                
                const { data, error } = await supabase.rpc('admin_find_user', { p_nickname: nickname });
                
                if (data && data.success) {
                    currentUser = data;
                    currentUserId = data.id;
                    document.getElementById('userInfo').classList.remove('hidden');
                    document.getElementById('userInfoContent').innerHTML = `
                        <p><span class="label">ID:</span> <span class="value">${data.id}</span></p>
                        <p><span class="label">Никнейм:</span> <span class="value">${data.nickname}</span></p>
                        <p><span class="label">VIP статус:</span> <span class="value">${data.vip_paid ? '✅ Активирован' : '❌ Не активирован'}</span></p>
                        <p><span class="label">Баланс:</span> <span class="value">${parseFloat(data.balance).toFixed(2)} $</span></p>
                        <p><span class="label">Реферальный код:</span> <span class="value">${data.referral_code}</span></p>
                        <p><span class="label">Дата регистрации:</span> <span class="value">${new Date(data.created_at).toLocaleString('ru-RU')}</span></p>
                    `;
                } else {
                    showToast('Пользователь не найден', 'error');
                    document.getElementById('userInfo').classList.add('hidden');
                }
            };

            // ===== НАЧИСЛЕНИЕ БАЛАНСА =====
            window.addBalance = async function() {
                if (!currentUserId) return;
                const amount = parseFloat(document.getElementById('balanceAmount').value);
                if (!amount || amount <= 0) return;
                
                const { data, error } = await supabase.rpc('admin_add_balance', {
                    p_user_id: currentUserId,
                    p_amount: amount
                });
                
                if (data && data.success) {
                    showToast(data.message);
                    document.getElementById('balanceAmount').value = '';
                    searchUser();
                    loadStats();
                } else {
                    showToast(data?.error || 'Ошибка', 'error');
                }
            };

            // ===== СПИСАНИЕ БАЛАНСА =====
            window.removeBalance = async function() {
                if (!currentUserId) return;
                const amount = parseFloat(document.getElementById('balanceAmount').value);
                if (!amount || amount <= 0) return;
                
                const { data, error } = await supabase.rpc('admin_remove_balance', {
                    p_user_id: currentUserId,
                    p_amount: amount
                });
                
                if (data && data.success) {
                    showToast(data.message);
                    document.getElementById('balanceAmount').value = '';
                    searchUser();
                    loadStats();
                } else {
                    showToast(data?.error || 'Ошибка', 'error');
                }
            };

            // ===== ЗАГРУЗКА СООБЩЕНИЙ =====
            async function loadMessages() {
                const { data, error } = await supabase.rpc('get_support_messages');
                const container = document.getElementById('messageList');
                
                if (!data || data.length === 0) {
                    container.innerHTML = '<p style="color: #b9b09a; text-align: center;">Нет сообщений</p>';
                    return;
                }
                
                container.innerHTML = data.map(msg => `
                    <div class="message-item ${msg.is_read ? '' : 'unread'}" onclick="openMessageModalById(${msg.id})">
                        <div class="message-text">${msg.user_message}</div>
                        <div class="message-meta">
                            <span>📅 ${new Date(msg.created_at).toLocaleString('ru-RU')}</span>
                            <span>${msg.is_read ? '✅ Прочитано' : '🆕 Новое'} ${msg.admin_response ? '| ✉️ Отвечено' : ''}</span>
                        </div>
                    </div>
                `).join('');
            }

            // ===== ОТКРЫТИЕ ОКНА СООБЩЕНИЯ =====
            window.openMessageModalById = async function(messageId) {
                const { data, error } = await supabase.rpc('get_support_messages');
                if (data) {
                    const msg = data.find(m => m.id === messageId);
                    if (msg) {
                        openMessageModal(msg);
                    }
                }
            };

            // ===== ИНИЦИАЛИЗАЦИЯ =====
            checkAuth();
        })();
    </script>
</body>
</html>
