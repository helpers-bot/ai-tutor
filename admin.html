<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пирамикс • Админ-панель</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(145deg, #0b0c0e 0%, #1a1c22 100%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
            color: #f5efe0;
            font-size: 14px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
        }

        .header {
            background: rgba(20, 22, 27, 0.8);
            backdrop-filter: blur(18px);
            border-radius: 1.8rem;
            border: 1px solid rgba(255, 215, 150, 0.2);
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #c084fc, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: rgba(20, 22, 27, 0.8);
            backdrop-filter: blur(16px);
            border-radius: 1.5rem;
            padding: 1.2rem;
            border: 1px solid rgba(255, 215, 150, 0.15);
            text-align: center;
        }

        .stat-label {
            font-size: 0.7rem;
            color: #b9b09a;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.3rem;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fad974, #ebaa5e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .panel {
            background: rgba(20, 22, 27, 0.8);
            backdrop-filter: blur(16px);
            border-radius: 1.5rem;
            padding: 1.5rem;
            border: 1px solid rgba(255, 215, 150, 0.15);
            margin-bottom: 1.5rem;
        }

        .panel h2 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #e9c274;
        }

        .input-group {
            margin-bottom: 1rem;
        }

        .input-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 500;
            color: #b9b09a;
            margin-bottom: 0.25rem;
            text-transform: uppercase;
        }

        .input-group input {
            width: 100%;
            background: rgba(15, 16, 20, 0.8);
            border: 1px solid rgba(220, 180, 100, 0.25);
            border-radius: 1rem;
            padding: 0.75rem 1rem;
            font-size: 0.9rem;
            color: #f5e7cc;
            outline: none;
            font-family: 'Inter', sans-serif;
        }

        .input-group input:focus {
            border-color: #c084fc;
            box-shadow: 0 0 12px rgba(192, 132, 252, 0.4);
        }

        .input-row {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .input-row .input-group {
            flex: 1;
            min-width: 200px;
        }

        .btn {
            background: linear-gradient(135deg, #c084fc, #7c3aed);
            border: none;
            color: #fff;
            font-weight: 700;
            font-size: 0.85rem;
            padding: 0.65rem 1.5rem;
            border-radius: 2rem;
            cursor: pointer;
            transition: 0.25s;
            box-shadow: 0 6px 15px rgba(124, 58, 237, 0.4);
        }

        .btn:hover {
            background: linear-gradient(135deg, #d8b4fe, #9333ea);
            box-shadow: 0 8px 20px rgba(192, 132, 252, 0.6);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff7043, #d32f2f);
            box-shadow: 0 6px 15px rgba(255, 112, 67, 0.4);
        }

        .btn-danger:hover {
            background: linear-gradient(135deg, #ff8a65, #e53935);
            box-shadow: 0 8px 20px rgba(255, 112, 67, 0.6);
        }

        .btn-success {
            background: linear-gradient(135deg, #4caf50, #2e7d32);
            box-shadow: 0 6px 15px rgba(76, 175, 80, 0.4);
        }

        .btn-success:hover {
            background: linear-gradient(135deg, #66bb6a, #388e3c);
            box-shadow: 0 8px 20px rgba(76, 175, 80, 0.6);
        }

        .btn-warning {
            background: linear-gradient(135deg, #f9a825, #f57f17);
            box-shadow: 0 6px 15px rgba(249, 168, 37, 0.4);
        }

        .btn-warning:hover {
            background: linear-gradient(135deg, #fbc02d, #f9a825);
            box-shadow: 0 8px 20px rgba(249, 168, 37, 0.6);
        }

        .btn-sm {
            padding: 0.4rem 1rem;
            font-size: 0.75rem;
        }

        .user-info {
            background: rgba(0,0,0,0.3);
            border-radius: 1rem;
            padding: 1rem;
            margin: 1rem 0;
            border: 1px solid rgba(192, 132, 252, 0.3);
        }

        .user-info p {
            margin: 0.3rem 0;
            font-size: 0.85rem;
        }

        .user-info .label {
            color: #b9b09a;
        }

        .user-info .value {
            color: #f5d78c;
            font-weight: 600;
        }

        .password-field {
            font-family: monospace;
            background: rgba(0,0,0,0.5);
            padding: 0.2rem 0.5rem;
            border-radius: 0.3rem;
        }

        /* ===== ДИАЛОГИ ===== */
        .dialog-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            max-height: 500px;
            overflow-y: auto;
        }

        .dialog-item {
            background: rgba(0,0,0,0.3);
            border-radius: 1rem;
            padding: 1rem;
            border: 1px solid rgba(212, 165, 60, 0.2);
            cursor: pointer;
            transition: all 0.2s;
        }

        .dialog-item:hover {
            border-color: rgba(192, 132, 252, 0.5);
            background: rgba(192, 132, 252, 0.1);
        }

        .dialog-item.has-unread {
            border-color: rgba(192, 132, 252, 0.6);
            background: rgba(192, 132, 252, 0.1);
            animation: pulseUnread 2s infinite;
        }

        @keyframes pulseUnread {
            0%, 100% { border-color: rgba(192, 132, 252, 0.4); }
            50% { border-color: rgba(192, 132, 252, 0.8); }
        }

        .dialog-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .dialog-nickname {
            font-weight: 700;
            font-size: 0.9rem;
            color: #f5d78c;
        }

        .dialog-badge {
            background: #ff7043;
            color: #fff;
            border-radius: 1rem;
            padding: 0.15rem 0.5rem;
            font-size: 0.65rem;
            font-weight: 700;
        }

        .dialog-last-message {
            font-size: 0.8rem;
            color: #b9b09a;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 0.3rem;
        }

        .dialog-meta {
            font-size: 0.65rem;
            color: #8b8a7a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* ===== МОДАЛЬНОЕ ОКНО ДИАЛОГА ===== */
        .dialog-modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dialog-modal {
            position: absolute;
            background: rgba(20, 22, 27, 0.97);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(192, 132, 252, 0.5);
            border-radius: 1.5rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            min-width: 400px;
            max-width: 700px;
            width: 550px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
        }

        .dialog-modal-header {
            background: linear-gradient(135deg, rgba(192, 132, 252, 0.3), rgba(124, 58, 237, 0.2));
            padding: 0.8rem 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
            border-bottom: 1px solid rgba(192, 132, 252, 0.3);
        }

        .dialog-modal-header h3 {
            font-size: 0.9rem;
            color: #e9c274;
            margin: 0;
            pointer-events: none;
        }

        .dialog-modal-close {
            background: transparent;
            border: none;
            color: #b9b09a;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 0;
            line-height: 1;
            transition: color 0.2s;
        }

        .dialog-modal-close:hover {
            color: #ff7043;
        }

        .dialog-modal-messages {
            flex: 1;
            padding: 1rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .dialog-msg {
            padding: 0.7rem 1rem;
            border-radius: 1rem;
            font-size: 0.8rem;
            line-height: 1.4;
            max-width: 85%;
        }

        .dialog-msg.user {
            background: rgba(243, 185, 91, 0.2);
            border: 1px solid rgba(243, 185, 91, 0.3);
            color: #f5efe0;
            align-self: flex-end;
            border-bottom-right-radius: 0.3rem;
        }

        .dialog-msg.admin {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid rgba(76, 175, 80, 0.4);
            color: #81c784;
            align-self: flex-start;
            border-bottom-left-radius: 0.3rem;
        }

        .dialog-msg-time {
            font-size: 0.6rem;
            color: #8b8a7a;
            margin-top: 0.2rem;
            text-align: right;
        }

        .dialog-modal-footer {
            padding: 0.8rem 1.2rem;
            border-top: 1px solid rgba(192, 132, 252, 0.2);
            display: flex;
            gap: 0.5rem;
        }

        .dialog-modal-footer input {
            flex: 1;
            background: rgba(15, 16, 20, 0.8);
            border: 1px solid rgba(220, 180, 100, 0.25);
            border-radius: 1.5rem;
            padding: 0.6rem 1rem;
            font-size: 0.8rem;
            color: #f5e7cc;
            outline: none;
            font-family: 'Inter', sans-serif;
        }

        .dialog-modal-footer input:focus {
            border-color: #c084fc;
        }

        .resize-handle {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 20px;
            height: 20px;
            cursor: nwse-resize;
            background: linear-gradient(135deg, transparent 50%, rgba(192, 132, 252, 0.5) 50%);
            border-radius: 0 0 1.5rem 0;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 12px;
            color: #fff;
            font-weight: 500;
            font-size: 0.9rem;
            z-index: 9999;
            animation: slideInRight 0.3s ease-out;
            max-width: 350px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .toast-success { background: rgba(76, 175, 80, 0.9); border: 1px solid #4caf50; }
        .toast-error { background: rgba(255, 112, 67, 0.9); border: 1px solid #ff7043; }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .badge {
            background: #ff7043;
            color: #fff;
            border-radius: 50%;
            padding: 0.2rem 0.5rem;
            font-size: 0.7rem;
            font-weight: 700;
            margin-left: 0.3rem;
        }

        .hidden { display: none !important; }

        @media (max-width: 600px) {
            .input-row { flex-direction: column; }
            .btn { width: 100%; }
            .header { flex-direction: column; text-align: center; }
            .dialog-modal {
                width: 95vw !important;
                min-width: auto !important;
                max-width: 95vw !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">👑 Пирамикс • Админ-панель</div>
            <button class="btn btn-danger btn-sm" onclick="logout()">🚪 Выход</button>
        </div>

        <!-- Статистика -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-label">👥 Всего пользователей</div>
                <div class="stat-value" id="statTotalUsers">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">📅 Сегодня</div>
                <div class="stat-value" id="statTodayUsers">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">💰 Выведено всего</div>
                <div class="stat-value" id="statTotalWithdrawn">0 $</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">💬 Диалогов</div>
                <div class="stat-value" id="statUnread">0</div>
            </div>
        </div>

        <!-- Поиск пользователя -->
        <div class="panel">
            <h2>🔍 Поиск пользователя</h2>
            <div class="input-row">
                <div class="input-group">
                    <label>Никнейм пользователя</label>
                    <input type="text" id="searchNickname" placeholder="Введите никнейм...">
                </div>
                <div class="input-group" style="justify-content: flex-end; display: flex; align-items: flex-end;">
                    <button class="btn" onclick="searchUser()">🔍 Найти</button>
                </div>
            </div>
            <div id="userInfo" class="hidden">
                <div class="user-info" id="userInfoContent"></div>
                <div class="input-row" style="margin-top: 1rem;">
                    <div class="input-group">
                        <label>Сумма ($)</label>
                        <input type="number" id="balanceAmount" placeholder="Введите сумму" min="0.01" step="0.01">
                    </div>
                    <div style="display: flex; gap: 0.5rem; align-items: flex-end; flex-wrap: wrap;">
                        <button class="btn btn-success btn-sm" onclick="addBalance()">➕ Начислить</button>
                        <button class="btn btn-danger btn-sm" onclick="removeBalance()">➖ Списать</button>
                        <button class="btn btn-warning btn-sm" onclick="setVip()">👑 Установить VIP</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Диалоги -->
        <div class="panel">
            <h2>💬 Диалоги с пользователями <span class="badge" id="unreadBadge" style="display:none;">0</span></h2>
            <div class="dialog-list" id="dialogList">
                <p style="color: #b9b09a; text-align: center;">Загрузка диалогов...</p>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const supabaseUrl = 'https://zvneiyhsoivaozzhzeoy.supabase.co';
            const supabaseKey = 'sb_publishable_CFPn1BIheE6L8wS89l0LtA_G9GofNzt';
            const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

            let currentUser = null;
            let currentUserId = null;
            let currentDialogModal = null;

            function checkAuth() {
                const adminAuth = sessionStorage.getItem('piramix_admin_auth');
                if (adminAuth !== 'true') {
                    showLoginForm();
                } else {
                    document.querySelector('.container').classList.remove('hidden');
                    loadStats();
                    loadDialogs();
                    setInterval(loadStats, 30000);
                    setInterval(loadDialogs, 10000);
                }
            }

            function showLoginForm() {
                document.querySelector('.container').classList.add('hidden');
                const overlay = document.createElement('div');
                overlay.id = 'loginOverlay';
                overlay.style.cssText = `
                    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
                    background: rgba(0,0,0,0.8); display: flex; align-items: center;
                    justify-content: center; z-index: 1000;
                `;
                overlay.innerHTML = `
                    <div style="background: rgba(20,22,27,0.95); border: 1px solid rgba(255,215,150,0.3);
                        border-radius: 1.8rem; padding: 2rem; width: 90%; max-width: 380px; color: #f5efe0;">
                        <h2 style="color: #e9c274; margin-bottom: 1.5rem; text-align: center;">👑 Админ-панель</h2>
                        <div style="margin-bottom: 1rem;">
                            <label style="display: block; font-size: 0.75rem; color: #b9b09a; margin-bottom: 0.25rem;">Пароль</label>
                            <input type="password" id="adminPassword" placeholder="Введите пароль"
                                style="width: 100%; background: rgba(15,16,20,0.8); border: 1px solid rgba(220,180,100,0.25);
                                border-radius: 1rem; padding: 0.75rem 1rem; font-size: 0.9rem; color: #f5e7cc; outline: none;">
                        </div>
                        <p id="loginError" style="color: #ff7043; font-size: 0.75rem; text-align: center; margin-bottom: 0.5rem; display: none;">❌ Неверный пароль</p>
                        <button onclick="verifyAdmin()" style="width: 100%; background: linear-gradient(135deg, #c084fc, #7c3aed);
                            border: none; color: #fff; font-weight: 700; font-size: 0.9rem; padding: 0.7rem;
                            border-radius: 2rem; cursor: pointer;">🔓 Войти</button>
                    </div>
                `;
                document.body.appendChild(overlay);
            }

            window.verifyAdmin = async function() {
                const password = document.getElementById('adminPassword').value;
                const { data, error } = await supabase.rpc('admin_verify_password', { p_password: password });
                
                if (data && data.success) {
                    sessionStorage.setItem('piramix_admin_auth', 'true');
                    const overlay = document.getElementById('loginOverlay');
                    if (overlay) overlay.remove();
                    document.querySelector('.container').classList.remove('hidden');
                    loadStats();
                    loadDialogs();
                } else {
                    document.getElementById('loginError').style.display = 'block';
                }
            };

            window.logout = function() {
                sessionStorage.removeItem('piramix_admin_auth');
                location.reload();
            };

            function showToast(message, type = 'success') {
                const toast = document.createElement('div');
                toast.className = `toast toast-${type}`;
                toast.textContent = message;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 3000);
            }

            function formatNumber(num) {
                if (num >= 1000) return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.');
                return num.toString();
            }

            function groupMessagesByUser(messages) {
                const dialogs = {};
                
                messages.forEach(msg => {
                    const nickname = msg.nickname || 'User';
                    if (!dialogs[nickname]) {
                        dialogs[nickname] = {
                            nickname: nickname,
                            messages: [],
                            hasUnread: false,
                            lastMessage: null,
                            lastTime: null
                        };
                    }
                    
                    dialogs[nickname].messages.push(msg);
                    
                    if (!msg.is_read) {
                        dialogs[nickname].hasUnread = true;
                    }
                    
                    if (!dialogs[nickname].lastTime || new Date(msg.created_at) > new Date(dialogs[nickname].lastTime)) {
                        dialogs[nickname].lastMessage = msg.user_message;
                        dialogs[nickname].lastTime = msg.created_at;
                    }
                });
                
                return Object.values(dialogs).sort((a, b) => new Date(b.lastTime) - new Date(a.lastTime));
            }

            function openDialog(dialog) {
                if (currentDialogModal) {
                    currentDialogModal.remove();
                    currentDialogModal = null;
                }

                const overlay = document.createElement('div');
                overlay.className = 'dialog-modal-overlay';
                
                const modal = document.createElement('div');
                modal.className = 'dialog-modal';
                modal.style.top = '40px';
                modal.style.left = '60px';
                
                let messagesHTML = dialog.messages.map(msg => `
                    <div class="dialog-msg user">
                        ${msg.user_message}
                        <div class="dialog-msg-time">📅 ${new Date(msg.created_at).toLocaleString('ru-RU')}</div>
                    </div>
                    ${msg.admin_response ? `
                        <div class="dialog-msg admin">
                            ${msg.admin_response}
                            <div class="dialog-msg-time">✅ Отвечено</div>
                        </div>
                    ` : ''}
                `).join('');

                modal.innerHTML = `
                    <div class="dialog-modal-header" id="modalHeader">
                        <h3>💬 ${dialog.nickname}</h3>
                        <button class="dialog-modal-close" id="modalClose">✕</button>
                    </div>
                    <div class="dialog-modal-messages" id="modalMessages">
                        ${messagesHTML}
                    </div>
                    <div class="dialog-modal-footer">
                        <input type="text" id="modalResponseInput" placeholder="Введите ответ...">
                        <button class="btn btn-success btn-sm" id="modalSendBtn">📤</button>
                        <button class="btn btn-danger btn-sm" id="modalDeleteDialogBtn">🗑 Удалить диалог</button>
                    </div>
                    <div class="resize-handle" id="resizeHandle"></div>
                `;
                
                overlay.appendChild(modal);
                document.body.appendChild(overlay);
                currentDialogModal = overlay;

                setTimeout(() => {
                    const msgContainer = modal.querySelector('#modalMessages');
                    if (msgContainer) msgContainer.scrollTop = msgContainer.scrollHeight;
                }, 100);

                overlay.addEventListener('click', function(e) {
                    if (e.target === overlay) {
                        overlay.remove();
                        currentDialogModal = null;
                    }
                });
                modal.querySelector('#modalClose').addEventListener('click', function() {
                    overlay.remove();
                    currentDialogModal = null;
                });

                const header = modal.querySelector('#modalHeader');
                let isDragging = false, startX, startY, startLeft, startTop;
                header.addEventListener('mousedown', function(e) {
                    isDragging = true;
                    startX = e.clientX; startY = e.clientY;
                    startLeft = parseInt(modal.style.left) || 60;
                    startTop = parseInt(modal.style.top) || 40;
                    document.body.style.userSelect = 'none';
                });
                document.addEventListener('mousemove', function(e) {
                    if (!isDragging || !currentDialogModal) return;
                    modal.style.left = Math.max(0, startLeft + (e.clientX - startX)) + 'px';
                    modal.style.top = Math.max(0, startTop + (e.clientY - startY)) + 'px';
                });
                document.addEventListener('mouseup', function() {
                    isDragging = false;
                    document.body.style.userSelect = '';
                });

                const resizeHandle = modal.querySelector('#resizeHandle');
                let isResizing = false, startW, startH, rsX, rsY;
                resizeHandle.addEventListener('mousedown', function(e) {
                    isResizing = true;
                    rsX = e.clientX; rsY = e.clientY;
                    startW = modal.offsetWidth; startH = modal.offsetHeight;
                    e.stopPropagation();
                    document.body.style.userSelect = 'none';
                });
                document.addEventListener('mousemove', function(e) {
                    if (!isResizing || !currentDialogModal) return;
                    modal.style.width = Math.max(400, startW + (e.clientX - rsX)) + 'px';
                    modal.style.height = Math.max(300, startH + (e.clientY - rsY)) + 'px';
                });
                document.addEventListener('mouseup', function() {
                    isResizing = false;
                    document.body.style.userSelect = '';
                });

                modal.querySelector('#modalSendBtn').addEventListener('click', async function() {
                    const input = modal.querySelector('#modalResponseInput');
                    const response = input.value.trim();
                    if (!response) return;
                    
                    const unansweredMsg = dialog.messages.find(m => !m.admin_response);
                    if (!unansweredMsg) {
                        showToast('Все сообщения уже имеют ответ', 'error');
                        return;
                    }
                    
                    const { data, error } = await supabase.rpc('admin_respond_support', {
                        p_message_id: unansweredMsg.id,
                        p_response: response
                    });
                    
                    if (data && data.success) {
                        showToast('Ответ отправлен');
                        overlay.remove();
                        currentDialogModal = null;
                        loadDialogs();
                        loadStats();
                    } else {
                        showToast(data?.error || 'Ошибка', 'error');
                    }
                });

                modal.querySelector('#modalDeleteDialogBtn').addEventListener('click', async function() {
                    if (!confirm(`Удалить весь диалог с пользователем "${dialog.nickname}"?`)) return;
                    
                    for (const msg of dialog.messages) {
                        await supabase.rpc('admin_delete_support_message', { p_message_id: msg.id });
                    }
                    
                    showToast('Диалог удалён');
                    overlay.remove();
                    currentDialogModal = null;
                    loadDialogs();
                    loadStats();
                });
            }

            async function loadStats() {
                const { data, error } = await supabase.rpc('admin_get_full_stats');
                if (data) {
                    document.getElementById('statTotalUsers').textContent = formatNumber(data.total_users);
                    document.getElementById('statTodayUsers').textContent = data.today_users;
                    document.getElementById('statTotalWithdrawn').textContent = formatNumber(Math.floor(data.total_withdrawn)) + ' $';
                    document.getElementById('statUnread').textContent = data.unread_messages;
                    
                    const badge = document.getElementById('unreadBadge');
                    if (data.unread_messages > 0) {
                        badge.style.display = 'inline';
                        badge.textContent = data.unread_messages;
                    } else {
                        badge.style.display = 'none';
                    }
                }
            }

            window.searchUser = async function() {
                const nickname = document.getElementById('searchNickname').value.trim();
                if (!nickname) return;
                
                const { data, error } = await supabase.rpc('admin_find_user', { p_nickname: nickname });
                
                if (data && data.success) {
                    currentUser = data;
                    currentUserId = data.id;
                    document.getElementById('userInfo').classList.remove('hidden');
                    document.getElementById('userInfoContent').innerHTML = `
                        <p><span class="label">ID:</span> <span class="value">${data.id}</span></p>
                        <p><span class="label">Никнейм:</span> <span class="value">${data.nickname}</span></p>
                        <p><span class="label">Пароль:</span> <span class="value password-field">${data.password}</span></p>
                        <p><span class="label">VIP статус:</span> <span class="value">${data.vip_paid ? '✅ Активирован' : '❌ Не активирован'}</span></p>
                        <p><span class="label">Баланс:</span> <span class="value">${parseFloat(data.balance).toFixed(2)} $</span></p>
                        <p><span class="label">Реферальный код:</span> <span class="value">${data.referral_code}</span></p>
                        <p><span class="label">Дата регистрации:</span> <span class="value">${new Date(data.created_at).toLocaleString('ru-RU')}</span></p>
                    `;
                } else {
                    showToast('Пользователь не найден', 'error');
                    document.getElementById('userInfo').classList.add('hidden');
                }
            };

            window.addBalance = async function() {
                if (!currentUserId) return;
                const amount = parseFloat(document.getElementById('balanceAmount').value);
                if (!amount || amount <= 0) return;
                
                const { data, error } = await supabase.rpc('admin_add_balance', {
                    p_user_id: currentUserId, p_amount: amount
                });
                
                if (data && data.success) {
                    showToast(data.message);
                    document.getElementById('balanceAmount').value = '';
                    searchUser(); loadStats();
                } else {
                    showToast(data?.error || 'Ошибка', 'error');
                }
            };

            window.removeBalance = async function() {
                if (!currentUserId) return;
                const amount = parseFloat(document.getElementById('balanceAmount').value);
                if (!amount || amount <= 0) return;
                
                const { data, error } = await supabase.rpc('admin_remove_balance', {
                    p_user_id: currentUserId, p_amount: amount
                });
                
                if (data && data.success) {
                    showToast(data.message);
                    document.getElementById('balanceAmount').value = '';
                    searchUser(); loadStats();
                } else {
                    showToast(data?.error || 'Ошибка', 'error');
                }
            };

            window.setVip = async function() {
                if (!currentUser) return;
                
                const { data, error } = await supabase.rpc('admin_set_vip_by_nickname', { 
                    p_nickname: currentUser.nickname 
                });
                
                if (data && data.success) {
                    showToast(data.message, 'success');
                    searchUser();
                    loadStats();
                } else {
                    showToast(data?.error || 'Ошибка', 'error');
                }
            };

            async function loadDialogs() {
                const { data, error } = await supabase.rpc('get_support_messages');
                const container = document.getElementById('dialogList');
                
                if (!data || data.length === 0) {
                    container.innerHTML = '<p style="color: #b9b09a; text-align: center;">Нет диалогов</p>';
                    return;
                }
                
                const dialogs = groupMessagesByUser(data);
                
                container.innerHTML = dialogs.map(dialog => `
                    <div class="dialog-item ${dialog.hasUnread ? 'has-unread' : ''}" onclick="openDialogByNickname('${dialog.nickname.replace(/'/g, "\\'")}')">
                        <div class="dialog-header">
                            <span class="dialog-nickname">
                                ${dialog.nickname}
                                ${dialog.nickname === 'User' ? ' (гость)' : ''}
                            </span>
                            ${dialog.hasUnread ? '<span class="dialog-badge">Новое</span>' : ''}
                        </div>
                        <div class="dialog-last-message">${dialog.lastMessage}</div>
                        <div class="dialog-meta">
                            <span>📅 ${new Date(dialog.lastTime).toLocaleString('ru-RU')}</span>
                            <span>📨 ${dialog.messages.length} сообщ.</span>
                        </div>
                    </div>
                `).join('');
            }

            window.openDialogByNickname = async function(nickname) {
                const { data, error } = await supabase.rpc('get_support_messages');
                if (data) {
                    const dialogs = groupMessagesByUser(data);
                    const dialog = dialogs.find(d => d.nickname === nickname);
                    if (dialog) {
                        openDialog(dialog);
                    }
                }
            };

            checkAuth();
        })();
    </script>
</body>
</html>
