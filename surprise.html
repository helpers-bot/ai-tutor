<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>💝 Сюрприз</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            font-family:'Georgia',serif;
            background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);
            min-height:100vh;display:flex;align-items:center;justify-content:center;
            overflow-x:hidden;-webkit-tap-highlight-color:transparent;
        }
        body.quest-ready{background:linear-gradient(135deg,#2d1b2e 0%,#1a1a2e 50%,#16213e 100%);}
        .stars{
            position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;
        }
        .star{
            position:absolute;background:white;border-radius:50%;
            animation:twinkle var(--d) ease-in-out infinite;animation-delay:var(--del);opacity:0;
        }
        @keyframes twinkle{0%,100%{opacity:0.2;transform:scale(1);}50%{opacity:1;transform:scale(1.8);}}
        .container{
            position:relative;z-index:1;width:90%;max-width:440px;
            background:rgba(255,255,255,0.04);backdrop-filter:blur(20px);
            border-radius:30px;padding:36px 24px;
            border:1px solid rgba(255,255,255,0.1);
            box-shadow:0 20px 60px rgba(0,0,0,0.4);text-align:center;
        }
        .heart-icon{font-size:4em;animation:heartbeat 1.4s ease-in-out infinite;margin-bottom:20px;}
        @keyframes heartbeat{0%,100%{transform:scale(1);}15%{transform:scale(1.15);}30%{transform:scale(1);}45%{transform:scale(1.1);}60%{transform:scale(1);}}
        h1{color:#fff;font-size:1.6em;font-weight:normal;letter-spacing:1px;margin-bottom:6px;}
        .subtitle{color:rgba(255,255,255,0.5);font-size:0.9em;margin-bottom:24px;font-style:italic;min-height:40px;}
        .main-btn{
            display:inline-block;width:100%;padding:18px;border-radius:50px;border:none;
            font-size:1.15em;font-family:'Georgia',serif;letter-spacing:2px;
            cursor:pointer;transition:all 0.5s ease;
        }
        .main-btn.locked{background:#3a3a4a;color:#777;cursor:not-allowed;}
        .main-btn.unlocked{
            background:linear-gradient(135deg,#ff6b9d,#c44569);color:#fff;
            box-shadow:0 10px 30px rgba(255,107,157,0.4);
            animation:glowPulse 2s ease-in-out infinite;
        }
        @keyframes glowPulse{0%,100%{box-shadow:0 10px 30px rgba(255,107,157,0.4);}50%{box-shadow:0 14px 40px rgba(255,107,157,0.7);}}
        .main-btn.unlocked:active{transform:scale(0.95);}
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="container">
        <div class="heart-icon">💝</div>
        <h1>Сюрприз для тебя</h1>
        <p class="subtitle" id="statusText">Новых заданий пока нет...</p>
        <button class="main-btn locked" id="mainBtn" disabled>🔒 Жди сюрприз...</button>
    </div>
    <script>
        (function(){
            const box=document.getElementById('stars');
            for(let i=0;i<80;i++){
                const s=document.createElement('div');
                s.classList.add('star');
                s.style.left=Math.random()*100+'%';
                s.style.top=Math.random()*100+'%';
                s.style.width=(Math.random()*3+1)+'px';
                s.style.height=s.style.width;
                s.style.setProperty('--d',(Math.random()*3+2)+'s');
                s.style.setProperty('--del',Math.random()*4+'s');
                box.appendChild(s);
            }
        })();

        function checkQuest(){
            const data=localStorage.getItem('activeQuest');
            const done=localStorage.getItem('questCompleted');
            const btn=document.getElementById('mainBtn');
            const txt=document.getElementById('statusText');
            if(data && !done){
                btn.className='main-btn unlocked';
                btn.innerHTML='✨ Открыть сюрприз!';
                btn.disabled=false;
                txt.textContent='Тебя ждёт кое-что особенное... 💕';
                document.body.classList.add('quest-ready');
            }else if(done){
                btn.className='main-btn locked';
                btn.innerHTML='✅ Сюрприз получен';
                btn.disabled=true;
                txt.textContent='Ты уже всё разгадала! Жди нового... 🌸';
                document.body.classList.remove('quest-ready');
            }else{
                btn.className='main-btn locked';
                btn.innerHTML='🔒 Жди сюрприз...';
                btn.disabled=true;
                txt.textContent='Новых заданий пока нет...';
                document.body.classList.remove('quest-ready');
            }
        }

        document.getElementById('mainBtn').addEventListener('click',()=>{
            window.location.href='adminn.html?mode=play';
        });

        setInterval(checkQuest,3000);
        checkQuest();
        window.addEventListener('storage',function(e){
            if(e.key==='activeQuest'||e.key==='questCompleted') checkQuest();
        });
    </script>
</body>
</html>
