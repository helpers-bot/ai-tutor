<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>💝 Сюрприз</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --accent: #ff6b9d;
            --gold: #ffd700;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.8s ease;
        }
        body.quest-ready {
            background: linear-gradient(135deg, #2d1b2e 0%, #1a1a2e 50%, #16213e 100%);
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--d) ease-in-out infinite;
            animation-delay: var(--del);
            opacity: 0;
        }
        @keyframes twinkle {
            0%,
            100% {
                opacity: 0.2;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.8);
            }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 440px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 36px 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            text-align: center;
            transition: all 0.5s ease;
        }

        .heart-icon {
            font-size: 4em;
            animation: heartbeat 1.4s ease-in-out infinite;
            margin-bottom: 20px;
        }
        @keyframes heartbeat {
            0%,
            100% {
                transform: scale(1);
            }
            15% {
                transform: scale(1.15);
            }
            30% {
                transform: scale(1);
            }
            45% {
                transform: scale(1.1);
            }
            60% {
                transform: scale(1);
            }
        }

        h1 {
            color: #fff;
            font-size: 1.6em;
            font-weight: normal;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        .subtitle {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9em;
            margin-bottom: 24px;
            font-style: italic;
            min-height: 40px;
        }

        .main-btn {
            display: inline-block;
            width: 100%;
            padding: 18px;
            border-radius: 50px;
            border: none;
            font-size: 1.15em;
            font-family: 'Georgia', serif;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.5s ease;
            position: relative;
            overflow: hidden;
        }
        .main-btn.locked {
            background: #3a3a4a;
            color: #777;
            cursor: not-allowed;
            box-shadow: none;
        }
        .main-btn.unlocked {
            background: linear-gradient(135deg, #ff6b9d, #c44569);
            color: #fff;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 107, 157, 0.4);
            animation: glowPulse 2s ease-in-out infinite;
        }
        @keyframes glowPulse {
            0%,
            100% {
                box-shadow: 0 10px 30px rgba(255, 107, 157, 0.4);
            }
            50% {
                box-shadow: 0 14px 40px rgba(255, 107, 157, 0.7);
            }
        }
        .main-btn.unlocked:active {
            transform: scale(0.95);
        }

        .notif-btn {
            margin-top: 16px;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 0.8em;
            display: inline-block;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.6);
            background: transparent;
            font-family: 'Georgia', serif;
        }
        .notif-btn.on {
            border-color: #4effb4;
            color: #4effb4;
        }
        .notif-btn.off {
            border-color: #ff6b6b;
            color: #ff6b6b;
        }

        /* Модальное окно */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .modal {
            background: #1e1e38;
            border-radius: 24px;
            padding: 28px 20px;
            width: 90%;
            max-width: 420px;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 12px;
            right: 16px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.5em;
            cursor: pointer;
            z-index: 5;
        }

        /* Конфетти */
        #confetti-box {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 200;
        }
        .confetti-piece {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 3px;
            animation: confettiFall var(--fd) linear forwards;
            animation-delay: var(--fdel);
            opacity: 0;
        }
        @keyframes confettiFall {
            0% {
                transform: translateY(-100px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(105vh) rotate(720deg);
                opacity: 0;
            }
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #4effb4;
            color: #1a1a2e;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: bold;
            z-index: 300;
            animation: slideUp 0.4s ease, slideDown 0.4s ease 2.5s forwards;
            font-family: 'Georgia', serif;
            font-size: 0.9em;
        }
        @keyframes slideUp {
            from {
                transform: translateX(-50%) translateY(100px);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }
        @keyframes slideDown {
            from {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
            to {
                transform: translateX(-50%) translateY(100px);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    <div id="confetti-box"></div>

    <div class="container">
        <div class="heart-icon">💝</div>
        <h1>Сюрприз для тебя</h1>
        <p class="subtitle" id="statusText">Новых заданий пока нет...<br>Но скоро обязательно будет!</p>
        <button class="main-btn locked" id="mainBtn" disabled>
            🔒 Жди сюрприз...
        </button>
        <br>
        <button class="notif-btn off" id="notifToggle">
            🔔 Уведомления выключены
        </button>
    </div>

    <div class="modal-overlay" id="questModal" style="display: none;">
        <div class="modal" id="questContent"></div>
    </div>

    <script>
        // ============ ЗВЁЗДЫ ============
        (function createStars() {
            const box = document.getElementById('stars');
            for (let i = 0; i < 80; i++) {
                const s = document.createElement('div');
                s.classList.add('star');
                s.style.left = Math.random() * 100 + '%';
                s.style.top = Math.random() * 100 + '%';
                s.style.width = (Math.random() * 3 + 1) + 'px';
                s.style.height = s.style.width;
                s.style.setProperty('--d', (Math.random() * 3 + 2) + 's');
                s.style.setProperty('--del', Math.random() * 4 + 's');
                box.appendChild(s);
            }
        })();

        // ============ КОНФЕТТИ ============
        function launchConfetti() {
            const box = document.getElementById('confetti-box');
            const colors = ['#ff6b9d', '#ffd700', '#4effb4', '#ff9f43', '#54a0ff', '#ff4757', '#a29bfe', '#fd79a8'];
            for (let i = 0; i < 100; i++) {
                const p = document.createElement('div');
                p.classList.add('confetti-piece');
                p.style.left = Math.random() * 100 + '%';
                p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                p.style.setProperty('--fd', (Math.random() * 2 + 2.5) + 's');
                p.style.setProperty('--fdel', Math.random() * 1.5 + 's');
                p.style.width = (Math.random() * 10 + 8) + 'px';
                p.style.height = (Math.random() * 10 + 8) + 'px';
                box.appendChild(p);
                setTimeout(() => p.remove(), 4000);
            }
        }

        // ============ TOAST ============
        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        // ============ PUSH-УВЕДОМЛЕНИЯ ============
        const VAPID_PUBLIC_KEY = 'BEl62iXVY5Gt5GgJzV7FcXZwJ3hKPcEz4JyZ6F-GM9DqWzN8mH6kLq3VtRxYpAsDfGhJkLzXcVbNmLwQrStU';
        let swReg = null;
        let isSubscribed = false;

        function urlB64ToU8(b64) {
            const pad = '='.repeat((4 - b64.length % 4) % 4);
            const b = (b64 + pad).replace(/-/g, '+').replace(/_/g, '/');
            const raw = window.atob(b);
            const arr = new Uint8Array(raw.length);
            for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
            return arr;
        }

        async function registerSW() {
            if (!('serviceWorker' in navigator) || !('PushManager' in window) || !('Notification' in window))
                return null;
            try {
                const reg = await navigator.serviceWorker.register('/sw.js');
                console.log('SW ok');
                return reg;
            } catch (e) {
                console.error('SW error:', e);
                return null;
            }
        }

        async function requestPermission() {
            if (Notification.permission === 'granted') return true;
            if (Notification.permission === 'denied') return false;
            const r = await Notification.requestPermission();
            return r === 'granted';
        }

        async function subscribe(reg) {
            try {
                const sub = await reg.pushManager.subscribe({
                    userVisibleOnly: true,
                    applicationServerKey: urlB64ToU8(VAPID_PUBLIC_KEY),
                });
                localStorage.setItem('pushSub', JSON.stringify(sub));
                return sub;
            } catch (e) {
                console.error('Sub error:', e);
                return null;
            }
        }

        async function unsubscribe(reg) {
            const sub = await reg.pushManager.getSubscription();
            if (sub) {
                await sub.unsubscribe();
                localStorage.removeItem('pushSub');
            }
        }

        function updateNotifUI() {
            const btn = document.getElementById('notifToggle');
            if (isSubscribed) {
                btn.textContent = '🔔 Уведомления включены';
                btn.className = 'notif-btn on';
            } else {
                btn.textContent = '🔔 Уведомления выключены';
                btn.className = 'notif-btn off';
            }
        }

        async function initPush() {
            if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
                document.getElementById('notifToggle').textContent = '🔕 Не поддерживается';
                return;
            }
            swReg = await registerSW();
            if (!swReg) return;
            const sub = await swReg.pushManager.getSubscription();
            isSubscribed = !!sub;
            if (isSubscribed) {
                localStorage.setItem('pushSub', JSON.stringify(sub));
            }
            updateNotifUI();
        }

        document.getElementById('notifToggle').addEventListener('click', async () => {
            if (!swReg) {
                showToast('Уведомления не поддерживаются');
                return;
            }
            if (isSubscribed) {
                await unsubscribe(swReg);
                isSubscribed = false;
                showToast('Уведомления отключены');
            } else {
                const ok = await requestPermission();
                if (!ok) {
                    showToast('Разреши уведомления в настройках браузера');
                    return;
                }
                const sub = await subscribe(swReg);
                if (sub) {
                    isSubscribed = true;
                    showToast('Уведомления включены! ✨');
                }
            }
            updateNotifUI();
        });

        // ============ ПРОВЕРКА КВЕСТА ============
        function checkQuest() {
            const data = localStorage.getItem('activeQuest');
            const done = localStorage.getItem('questCompleted');
            const btn = document.getElementById('mainBtn');
            const txt = document.getElementById('statusText');

            if (data && !done) {
                btn.className = 'main-btn unlocked';
                btn.innerHTML = '✨ Открыть сюрприз!';
                btn.disabled = false;
                txt.textContent = 'Тебя ждёт кое-что особенное... 💕';
                document.body.classList.add('quest-ready');
            } else if (done) {
                btn.className = 'main-btn locked';
                btn.innerHTML = '✅ Сюрприз получен';
                btn.disabled = true;
                txt.textContent = 'Ты уже разгадала все секреты! Жди нового... 🌸';
                document.body.classList.remove('quest-ready');
            } else {
                btn.className = 'main-btn locked';
                btn.innerHTML = '🔒 Жди сюрприз...';
                btn.disabled = true;
                txt.textContent = 'Новых заданий пока нет...\nНо скоро обязательно будет!';
                document.body.classList.remove('quest-ready');
            }
        }

        document.getElementById('mainBtn').addEventListener('click', () => {
            const data = localStorage.getItem('activeQuest');
            const done = localStorage.getItem('questCompleted');
            if (!data || done) return;
            try {
                openQuest(JSON.parse(data));
            } catch (e) {
                console.error(e);
            }
        });

        // ============ КВЕСТ В МОДАЛКЕ ============
        let qs = {};

        function openQuest(quest) {
            qs = {
                ...quest,
                currentStep: 0,
                colorSlots: [null, null, null, null],
                selectedColor: null,
            };
            renderStep();
            document.getElementById('questModal').style.display = 'flex';
        }

        function closeQuest() {
            document.getElementById('questModal').style.display = 'none';
        }

        document.getElementById('questModal').addEventListener('click', function(e) {
            if (e.target === this) closeQuest();
        });

        function renderStep() {
            const box = document.getElementById('questContent');
            const step = qs.steps[qs.currentStep];

            let html = `
                <button class="modal-close" onclick="closeQuest()">✕</button>
                <div style="text-align:center; margin-bottom:16px;">
                    <span style="color:rgba(255,255,255,0.4); font-size:0.85em;">Шаг ${qs.currentStep+1} из ${qs.steps.length}</span>
                </div>
                <h2 style="text-align:center; color:#ff6b9d; margin-bottom:4px;">${step.title||'Задание'}</h2>
                <p style="text-align:center; color:rgba(255,255,255,0.7); margin-bottom:16px;">${step.question}</p>
            `;

            if (step.type === 'text') {
                html += `
                    <input id="qAnswer" placeholder="Твой ответ..." style="width:100%;padding:14px;border-radius:50px;border:2px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.07);color:#fff;text-align:center;font-size:1.1em;outline:none;">
                    <div id="qError" style="color:#ff4757;font-size:0.8em;margin-top:8px;text-align:center;min-height:20px;"></div>
                    <button id="qSubmit" style="width:100%;margin-top:12px;padding:14px;border-radius:50px;border:none;background:linear-gradient(135deg,#ff6b9d,#c44569);color:#fff;font-size:1em;cursor:pointer;font-family:Georgia;letter-spacing:1px;">💫 Проверить</button>
                `;
            } else if (step.type === 'colors') {
                const pal = step.options || ['❤️', '💜', '💙', '💚', '🧡', '💛'];
                html += '<div style="display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:12px;">';
                pal.forEach(c => {
                    const placed = qs.colorSlots.includes(c);
                    html +=
                        `<div class="hpick" data-color="${c}" style="width:50px;height:50px;border-radius:50%;font-size:2em;display:flex;align-items:center;justify-content:center;cursor:${placed?'default':'pointer'};opacity:${placed?'0.4':'1'};background:rgba(255,255,255,0.05);transition:all 0.3s;">${c}</div>`;
                });
                html += '</div><div style="display:flex;justify-content:center;gap:10px;margin:16px 0;">';
                for (let i = 0; i < (step.answer || []).length; i++) {
                    html +=
                        `<div class="cslot" data-slot="${i}" style="width:50px;height:50px;border-radius:50%;border:2px dashed rgba(255,255,255,0.4);display:flex;align-items:center;justify-content:center;font-size:2em;cursor:pointer;">${qs.colorSlots[i]||'◌'}</div>`;
                }
                html +=
                    '</div><p style="color:rgba(255,255,255,0.4);font-size:0.75em;text-align:center;">Нажимай на цвет → затем на кружок. Долгий тап — убрать.</p>';
                html +=
                    '<button id="qClear" style="width:100%;margin-top:8px;padding:10px;border-radius:50px;border:1px solid rgba(255,255,255,0.2);background:transparent;color:#fff;cursor:pointer;font-family:Georgia;">🔄 Заново</button>';
                html +=
                    '<button id="qColorSubmit" style="width:100%;margin-top:8px;padding:14px;border-radius:50px;border:none;background:linear-gradient(135deg,#ff6b9d,#c44569);color:#fff;font-size:1em;cursor:pointer;font-family:Georgia;letter-spacing:1px;">💫 Проверить</button>';
                html +=
                    '<div id="qError" style="color:#ff4757;font-size:0.8em;margin-top:8px;text-align:center;min-height:20px;"></div>';
            } else if (step.type === 'number') {
                html += `
                    <input type="number" id="qAnswer" placeholder="Введи число..." style="width:100%;padding:14px;border-radius:50px;border:2px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.07);color:#fff;text-align:center;font-size:1.1em;outline:none;">
                    <div id="qError" style="color:#ff4757;font-size:0.8em;margin-top:8px;text-align:center;min-height:20px;"></div>
                    <button id="qSubmit" style="width:100%;margin-top:12px;padding:14px;border-radius:50px;border:none;background:linear-gradient(135deg,#ff6b9d,#c44569);color:#fff;font-size:1em;cursor:pointer;font-family:Georgia;letter-spacing:1px;">💫 Проверить</button>
                `;
            }

            box.innerHTML = html;
            bindStepEvents(step);
        }

        function bindStepEvents(step) {
            const submit = document.getElementById('qSubmit');
            const input = document.getElementById('qAnswer');
            const err = document.getElementById('qError');

            if (submit && input) {
                input.addEventListener('keydown', e => { if (e.key === 'Enter') submit.click(); });
                submit.addEventListener('click', () => {
                    const ans = input.value.trim().toLowerCase();
                    const correct = String(step.answer).toLowerCase();
                    if (ans === correct) {
                        err.textContent = '';
                        input.style.borderColor = '#4effb4';
                        submit.disabled = true;
                        submit.textContent = '✅ Верно!';
                        advanceQuest();
                    } else {
                        err.textContent = 'Не совсем так... попробуй ещё раз 💕';
                        input.style.borderColor = '#ff4757';
                        setTimeout(() => input.style.borderColor = 'rgba(255,255,255,0.2)', 600);
                    }
                });
                setTimeout(() => input?.focus(), 300);
            }

            // Цвета
            document.querySelectorAll('.hpick').forEach(el => {
                el.addEventListener('click', function() {
                    if (this.style.opacity === '0.4') return;
                    document.querySelectorAll('.hpick').forEach(e => e.style.background =
                        'rgba(255,255,255,0.05)');
                    this.style.background = 'rgba(255,107,157,0.4)';
                    qs.selectedColor = this.dataset.color;
                });
            });
            document.querySelectorAll('.cslot').forEach(el => {
                el.addEventListener('click', function() {
                    const idx = parseInt(this.dataset.slot);
                    if (qs.colorSlots[idx] !== null || !qs.selectedColor) return;
                    qs.colorSlots[idx] = qs.selectedColor;
                    qs.selectedColor = null;
                    document.querySelectorAll('.hpick').forEach(e => e.style.background =
                        'rgba(255,255,255,0.05)');
                    renderStep();
                });
                let lt;
                el.addEventListener('touchstart', () => {
                    lt = setTimeout(() => {
                        qs.colorSlots[parseInt(el.dataset.slot)] = null;
                        renderStep();
                    }, 600);
                });
                el.addEventListener('touchend', () => clearTimeout(lt));
                el.addEventListener('touchmove', () => clearTimeout(lt));
            });

            const clr = document.getElementById('qClear');
            if (clr) clr.addEventListener('click', () => {
                qs.colorSlots = [null, null, null, null];
                qs.selectedColor = null;
                renderStep();
            });

            const csub = document.getElementById('qColorSubmit');
            if (csub) csub.addEventListener('click', () => {
                const correct = step.answer;
                const filled = qs.colorSlots.every(c => c !== null);
                if (!filled) {
                    document.getElementById('qError').textContent = 'Заполни все кружочки! 🎨';
                    return;
                }
                if (qs.colorSlots.every((c, i) => c === correct[i])) {
                    document.getElementById('qError').textContent = '';
                    csub.disabled = true;
                    csub.textContent = '✅ Идеально!';
                    advanceQuest();
                } else {
                    document.getElementById('qError').textContent =
                        'Не совсем правильный порядок... попробуй иначе 🌈';
                }
            });
        }

        function advanceQuest() {
            setTimeout(() => {
                if (qs.currentStep < qs.steps.length - 1) {
                    qs.currentStep++;
                    qs.selectedColor = null;
                    renderStep();
                } else {
                    showPrize();
                }
            }, 700);
        }

        function showPrize() {
            const box = document.getElementById('questContent');
            const prize = qs.prize;
            launchConfetti();
            localStorage.setItem('questCompleted', 'true');
            localStorage.removeItem('activeQuest');
            box.innerHTML = `
                <button class="modal-close" onclick="closeQuest();checkQuest();">✕</button>
                <div style="text-align:center;">
                    <div style="font-size:5em;">🎁</div>
                    <h2 style="color:#ffd700;margin:12px 0;">Ты справилась!</h2>
                    <p style="color:#fff;font-size:1.1em;line-height:1.7;margin:12px 0;">${prize.message||'Твой приз ждёт тебя!'}</p>
                    ${prize.link?`<a href="${prize.link}" target="_blank" style="display:inline-block;margin-top:12px;padding:14px 28px;background:#ffd700;color:#1a1a2e;border-radius:50px;text-decoration:none;font-weight:bold;">${prize.linkText||'🎁 Забрать приз'}</a>`:''}
                    <p style="color:rgba(255,255,255,0.4);font-size:0.75em;margin-top:16px;">Я люблю тебя бесконечно ♾️</p>
                </div>
            `;
            setTimeout(() => checkQuest(), 1500);
        }

        // Периодически проверяем новые квесты (каждые 5 секунд)
        setInterval(checkQuest, 5000);

        // ============ ЗАПУСК ============
        initPush();
        checkQuest();

        // Слушаем изменения localStorage из других вкладок (для мгновенного обновления)
        window.addEventListener('storage', function(e) {
            if (e.key === 'activeQuest' || e.key === 'questCompleted') {
                checkQuest();
            }
        });
    </script>
</body>
</html>
