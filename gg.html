<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=yes">
  <title>Mine Tycoon · Telegram Web App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    body {
      background: #0a0c0f;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 12px;
    }

    /* main tele frame */
    .game-container {
      max-width: 420px;
      width: 100%;
      background: radial-gradient(circle at 20% 10%, #1e252b, #0b0e12);
      border-radius: 36px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.7), 0 0 0 2px rgba(212, 175, 55, 0.3);
      padding: 16px 12px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative;
      backdrop-filter: blur(10px);
      color: #f0e6c5;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(20, 25, 30, 0.8);
      backdrop-filter: blur(12px);
      border-radius: 60px;
      padding: 10px 18px;
      box-shadow: 0 8px 18px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,215,0,0.2);
      border: 1px solid rgba(212, 175, 55, 0.25);
    }

    .balance {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 1.2rem;
      text-shadow: 0 0 10px gold;
    }

    .balance img {
      width: 28px;
      height: 28px;
      filter: drop-shadow(0 0 6px #ffb300);
    }

    .crystal-balance {
      background: #1e242c;
      padding: 4px 12px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 5px;
      font-weight: bold;
      color: #b9e6ff;
      text-shadow: 0 0 8px #00b8ff;
    }

    .lang-btn {
      background: #2a2f36;
      border: none;
      color: #e0c88c;
      font-weight: bold;
      border-radius: 30px;
      padding: 6px 14px;
      cursor: pointer;
      font-size: 0.9rem;
      box-shadow: 0 2px 8px black;
      transition: 0.2s;
      border: 1px solid #4d4530;
    }

    .lang-btn:active {
      background: #4d4230;
      color: white;
    }

    .main-screen {
      background: #12171d;
      border-radius: 32px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      box-shadow: inset 0 0 30px rgba(0,0,0,0.8), 0 10px 20px black;
      border: 1px solid #3a3322;
    }

    .mine-animation-area {
      background: #1b1f26;
      border-radius: 24px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 25px rgba(255,180,0,0.3);
    }

    .miner-sprite {
      font-size: 2.4rem;
      filter: drop-shadow(0 0 8px gold);
      animation: float 2s infinite ease-in-out;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(0px); }
    }

    .resource-counter {
      background: #0e1217;
      border-radius: 20px;
      padding: 8px 15px;
      display: flex;
      justify-content: space-between;
      font-weight: 600;
      color: #cfb87c;
    }

    .tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .tab {
      flex: 1;
      background: #20262e;
      border: none;
      padding: 10px 5px;
      border-radius: 20px;
      color: #b9b09b;
      font-weight: bold;
      font-size: 0.75rem;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 4px 8px black;
      text-transform: uppercase;
    }

    .tab.active {
      background: #c9a73c;
      color: #0a0c0f;
      box-shadow: 0 0 18px #ffb300;
      border: 1px solid #ffd966;
    }

    .panel {
      background: #141a20;
      border-radius: 24px;
      padding: 12px;
      max-height: 320px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      border: 1px solid #3f3a2a;
    }

    .card {
      background: #1e232a;
      border-radius: 20px;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 6px 12px black;
      border-left: 4px solid #d4af37;
    }

    .locked-card {
      opacity: 0.6;
      filter: grayscale(0.7);
      border-left: 4px solid #5a5a5a;
    }

    button {
      background: #e5b93c;
      border: none;
      border-radius: 30px;
      padding: 8px 16px;
      font-weight: bold;
      color: #0a0c0f;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 4px 10px rgba(212, 175, 55, 0.4);
    }

    button:active {
      transform: scale(0.95);
      background: #f5cd5c;
    }

    .upgrade-btn {
      background: #2c3a4b;
      color: #f0e3b0;
      box-shadow: 0 0 12px #2c3a4b;
    }

    .floating-number {
      position: absolute;
      animation: rise 1.2s ease-out forwards;
      font-weight: bold;
      color: #ffd966;
      text-shadow: 0 0 8px black;
      pointer-events: none;
    }

    @keyframes rise {
      0% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-45px); }
    }
  </style>
</head>
<body>
<div class="game-container" id="gameApp">
  <div class="top-bar">
    <div class="balance"><span>🪙</span> <span id="coinDisplay">0</span></div>
    <div class="crystal-balance"><span>💎</span> <span id="crystalDisplay">0</span></div>
    <button class="lang-btn" id="langToggle">🌐 EN</button>
  </div>

  <div class="main-screen">
    <div class="mine-animation-area" id="animationArea">
      <span class="miner-sprite">⛏️</span>
      <span class="miner-sprite">👷</span>
      <span id="resourceParticle" style="font-size:1.8rem;">💎</span>
    </div>
    <div class="resource-counter">
      <span id="totalMinedLabel">⛏️ 0</span>
      <span id="incomePerSecLabel">+0/s</span>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="mines">⛰️ <span data-i18n="minesTab">Mines</span></button>
    <button class="tab" data-tab="miners">👷 <span data-i18n="minersTab">Miners</span></button>
    <button class="tab" data-tab="shop">🛒 <span data-i18n="shopTab">Shop</span></button>
    <button class="tab" data-tab="achievements">🏆 <span data-i18n="achieveTab">Achieve</span></button>
  </div>

  <div class="panel" id="dynamicPanel"></div>
</div>

<script>
  (function() {
    // ---------- TRANSLATIONS ----------
    const translations = {
      en: {
        minesTab: "Mines", minersTab: "Miners", shopTab: "Shop", achieveTab: "Achieve",
        buyMiner: "Buy Miner", upgrade: "Upgrade", locked: "Locked", level: "Lv",
        income: "Income", cost: "Cost", unlockRequirement: "Unlock: prev mine lv",
        coalMine: "Coal Mine", ironMine: "Iron Mine", goldMine: "Gold Mine",
        crystalMine: "Crystal Mine", diamondMine: "Diamond Mine",
        minerName: "Miner", offlineEarn: "Offline earnings"
      },
      ru: {
        minesTab: "Шахты", minersTab: "Шахтёры", shopTab: "Магазин", achieveTab: "Достиж",
        buyMiner: "Купить шахтёра", upgrade: "Улучшить", locked: "Закрыто", level: "Ур",
        income: "Доход", cost: "Цена", unlockRequirement: "Откр: пред. шахта ур",
        coalMine: "Угольная", ironMine: "Железная", goldMine: "Золотая",
        crystalMine: "Кристальная", diamondMine: "Алмазная",
        minerName: "Шахтёр", offlineEarn: "Оффлайн доход"
      }
    };

    let currentLang = 'en';
    function t(key) {
      return translations[currentLang]?.[key] || key;
    }

    // ---------- GAME STATE ----------
    const defaultState = {
      coins: 50,
      crystals: 2,
      totalMined: 0,
      mines: [
        { id: 0, nameKey: 'coalMine', level: 1, baseProduction: 0.8, unlockLevel: 0, upgradeCost: 25, productionFactor: 0.2 },
        { id: 1, nameKey: 'ironMine', level: 0, baseProduction: 1.5, unlockLevel: 10, upgradeCost: 70, productionFactor: 0.3 },
        { id: 2, nameKey: 'goldMine', level: 0, baseProduction: 2.8, unlockLevel: 20, upgradeCost: 200, productionFactor: 0.5 },
        { id: 3, nameKey: 'crystalMine', level: 0, baseProduction: 4.5, unlockLevel: 30, upgradeCost: 600, productionFactor: 0.8 },
        { id: 4, nameKey: 'diamondMine', level: 0, baseProduction: 7.2, unlockLevel: 40, upgradeCost: 1500, productionFactor: 1.2 }
      ],
      miners: [
        { id: 0, nameKey: 'minerName', level: 1, speed: 0.5, cost: 40, baseCost: 40 }
      ],
      lastSaveTime: Date.now()
    };

    let game = JSON.parse(localStorage.getItem('mineTycoonSave'));
    if (!game) {
      game = JSON.parse(JSON.stringify(defaultState));
    } else {
      // ensure new fields
      game.mines = game.mines || defaultState.mines;
      game.miners = game.miners || defaultState.miners;
    }

    function saveGame() {
      game.lastSaveTime = Date.now();
      localStorage.setItem('mineTycoonSave', JSON.stringify(game));
    }

    // ---------- HELPER: income per second ----------
    function calcTotalIncome() {
      let total = 0;
      game.mines.forEach(mine => {
        if (mine.level > 0) {
          total += mine.baseProduction * mine.level * (1 + (mine.level-1) * mine.productionFactor);
        }
      });
      game.miners.forEach(miner => {
        total += miner.speed * miner.level;
      });
      return total;
    }

    function updateUI() {
      document.getElementById('coinDisplay').innerText = Math.floor(game.coins);
      document.getElementById('crystalDisplay').innerText = Math.floor(game.crystals);
      document.getElementById('totalMinedLabel').innerText = `⛏️ ${Math.floor(game.totalMined)}`;
      const income = calcTotalIncome();
      document.getElementById('incomePerSecLabel').innerText = `+${income.toFixed(1)}/s`;
    }

    // offline earnings
    function applyOfflineEarnings() {
      const now = Date.now();
      const diffSeconds = (now - (game.lastSaveTime || now)) / 1000;
      if (diffSeconds > 3 && diffSeconds < 86400) {
        const income = calcTotalIncome();
        const earned = income * diffSeconds * 0.7; // 70% offline efficiency
        if (earned > 0) {
          game.coins += earned;
          game.totalMined += earned;
          showFloatingText(`💤 +${Math.floor(earned)}`, 80);
        }
      }
      game.lastSaveTime = now;
      saveGame();
    }

    // floating text
    function showFloatingText(text, yOffset = 40) {
      const area = document.getElementById('animationArea');
      const el = document.createElement('div');
      el.className = 'floating-number';
      el.innerText = text;
      el.style.left = '50%';
      el.style.top = `${yOffset}px`;
      area.appendChild(el);
      setTimeout(() => el.remove(), 1200);
    }

    // ---------- MINES UNLOCK LOGIC ----------
    function isMineUnlocked(mine, index) {
      if (index === 0) return true;
      const prevMine = game.mines[index-1];
      return prevMine && prevMine.level >= mine.unlockLevel;
    }

    function upgradeMine(index) {
      const mine = game.mines[index];
      if (!isMineUnlocked(mine, index)) return;
      const cost = Math.floor(mine.upgradeCost * (1 + mine.level * 0.5));
      if (game.coins < cost) return;

      game.coins -= cost;
      mine.level++;
      game.totalMined += 0.5;
      if (mine.level === 1 && index > 0) game.crystals += 1;
      showFloatingText(`⬆️ +1 Lv`, 50);
      saveGame();
      renderPanel();
      updateUI();
    }

    function buyMiner() {
      const lastMiner = game.miners[game.miners.length-1];
      const cost = Math.floor(lastMiner.baseCost * (1 + game.miners.length * 0.7));
      if (game.coins < cost) return;
      game.coins -= cost;
      const newMiner = {
        id: game.miners.length,
        nameKey: 'minerName',
        level: 1,
        speed: 0.5 + game.miners.length * 0.15,
        cost: cost,
        baseCost: lastMiner.baseCost + 25
      };
      game.miners.push(newMiner);
      showFloatingText('👷 +1', 60);
      saveGame();
      renderPanel();
      updateUI();
    }

    function upgradeMiner(minerId) {
      const miner = game.miners.find(m => m.id === minerId);
      if (!miner) return;
      const cost = Math.floor(miner.baseCost * (1 + miner.level * 0.6));
      if (game.coins < cost) return;
      game.coins -= cost;
      miner.level++;
      showFloatingText('⚡ speed+', 50);
      saveGame();
      renderPanel();
      updateUI();
    }

    // ---------- RENDER PANELS ----------
    function renderMines() {
      const panel = document.getElementById('dynamicPanel');
      panel.innerHTML = '';
      game.mines.forEach((mine, idx) => {
        const unlocked = isMineUnlocked(mine, idx);
        const card = document.createElement('div');
        card.className = `card ${unlocked ? '' : 'locked-card'}`;
        const mineName = t(mine.nameKey);
        const levelText = unlocked ? `${t('level')} ${mine.level}` : t('locked');
        const cost = Math.floor(mine.upgradeCost * (1 + mine.level * 0.5));
        card.innerHTML = `
          <div><strong>${mineName}</strong><br><small>${levelText} | ${t('income')}: ${(mine.baseProduction * (mine.level||0)).toFixed(1)}/s</small></div>
          <button class="upgrade-btn" ${!unlocked ? 'disabled' : ''}>${unlocked ? `⬆️ ${cost} 🪙` : t('locked')}</button>
        `;
        if (unlocked) {
          card.querySelector('button').addEventListener('click', (e) => {
            e.stopPropagation();
            upgradeMine(idx);
          });
        }
        panel.appendChild(card);
      });
    }

    function renderMiners() {
      const panel = document.getElementById('dynamicPanel');
      panel.innerHTML = '';
      game.miners.forEach(miner => {
        const cost = Math.floor(miner.baseCost * (1 + miner.level * 0.6));
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div><strong>${t(miner.nameKey)} ${miner.id+1}</strong><br><small>${t('level')} ${miner.level} | ${(miner.speed*miner.level).toFixed(1)}/s</small></div>
          <button class="upgrade-btn">⬆️ ${cost} 🪙</button>
        `;
        card.querySelector('button').addEventListener('click', () => upgradeMiner(miner.id));
        panel.appendChild(card);
      });
      const buyBtn = document.createElement('button');
      const minerCost = Math.floor((game.miners[game.miners.length-1]?.baseCost || 40) * (1 + game.miners.length * 0.7));
      buyBtn.innerText = `${t('buyMiner')} 🪙${minerCost}`;
      buyBtn.style.marginTop = '8px';
      buyBtn.addEventListener('click', buyMiner);
      panel.appendChild(buyBtn);
    }

    function renderShop() {
      const panel = document.getElementById('dynamicPanel');
      panel.innerHTML = `<div style="padding:10px; text-align:center;">🛒 ${t('shopTab')} - Crystals 💎</div>`;
    }

    function renderAchievements() {
      const panel = document.getElementById('dynamicPanel');
      panel.innerHTML = `<div style="padding:10px;">🏆 ${t('achieveTab')}: mine 1000 total</div>`;
    }

    function renderPanel(tab = 'mines') {
      switch(tab) {
        case 'mines': renderMines(); break;
        case 'miners': renderMiners(); break;
        case 'shop': renderShop(); break;
        case 'achievements': renderAchievements(); break;
        default: renderMines();
      }
    }

    // Tab switching
    function setActiveTab(tabName) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`.tab[data-tab="${tabName}"]`).classList.add('active');
      renderPanel(tabName);
    }

    // Language switch
    function switchLanguage() {
      currentLang = currentLang === 'en' ? 'ru' : 'en';
      document.getElementById('langToggle').innerText = currentLang === 'en' ? '🌐 EN' : '🌐 RU';
      localStorage.setItem('mineLang', currentLang);
      applyLanguageToUI();
      const activeTab = document.querySelector('.tab.active')?.dataset.tab || 'mines';
      renderPanel(activeTab);
    }

    function applyLanguageToUI() {
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        el.innerText = t(key);
      });
    }

    // Game loop
    setInterval(() => {
      const income = calcTotalIncome();
      if (income > 0) {
        game.coins += income * 0.1;
        game.totalMined += income * 0.1;
        updateUI();
      }
      saveGame();
    }, 100);

    // Init
    window.addEventListener('load', () => {
      const savedLang = localStorage.getItem('mineLang') || 'en';
      currentLang = savedLang;
      document.getElementById('langToggle').innerText = currentLang === 'en' ? '🌐 EN' : '🌐 RU';
      applyOfflineEarnings();
      updateUI();
      applyLanguageToUI();
      renderPanel('mines');

      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', (e) => {
          const tabName = e.currentTarget.dataset.tab;
          setActiveTab(tabName);
        });
      });

      document.getElementById('langToggle').addEventListener('click', switchLanguage);

      // Telegram WebApp integration (safe)
      if (window.Telegram?.WebApp) {
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
      }
    });
  })();
</script>
</body>
</html>
