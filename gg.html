<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hamster Kombat • Mining Empire</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        body {
            background: #0a0c0f;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 12px;
        }
        .game-container {
            max-width: 420px;
            width: 100%;
            background: radial-gradient(circle at 20% 10%, #1e252b, #0b0e12);
            border-radius: 36px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7), 0 0 0 2px rgba(212, 175, 55, 0.4);
            padding: 16px 12px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            color: #f0e6c5;
        }
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(20, 25, 30, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 10px 18px;
            box-shadow: 0 8px 18px black, inset 0 1px 0 gold;
            border: 1px solid #d4af37;
        }
        .balance {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 1.3rem;
            text-shadow: 0 0 12px orange;
        }
        .lang-btn {
            background: #2a2f36;
            border: none;
            color: #e0c88c;
            font-weight: bold;
            border-radius: 30px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 0.9rem;
            border: 1px solid #4d4530;
        }
        .main-screen {
            background: #12171d;
            border-radius: 32px;
            padding: 14px;
            box-shadow: inset 0 0 30px black;
            border: 1px solid #3a3322;
        }
        .mine-animation-area {
            background: #1b1f26;
            border-radius: 24px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            position: relative;
        }
        .miner-sprite {
            font-size: 2.5rem;
            filter: drop-shadow(0 0 8px gold);
            animation: float 2s infinite ease-in-out;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
            100% { transform: translateY(0px); }
        }
        .tabs {
            display: flex;
            gap: 6px;
        }
        .tab {
            flex: 1;
            background: #20262e;
            border: none;
            padding: 10px 5px;
            border-radius: 20px;
            color: #b9b09b;
            font-weight: bold;
            font-size: 0.75rem;
            cursor: pointer;
        }
        .tab.active {
            background: #c9a73c;
            color: black;
            box-shadow: 0 0 18px gold;
        }
        .panel {
            background: #141a20;
            border-radius: 24px;
            padding: 12px;
            max-height: 320px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .card {
            background: #1e232a;
            border-radius: 20px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #d4af37;
        }
        button {
            background: #e5b93c;
            border: none;
            border-radius: 30px;
            padding: 8px 16px;
            font-weight: bold;
            color: black;
            cursor: pointer;
        }
        .floating-number {
            position: absolute;
            animation: rise 1.2s ease-out forwards;
            font-weight: bold;
            color: #ffd966;
        }
        @keyframes rise {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-45px); }
        }
    </style>
</head>
<body>
<div class="game-container" id="gameApp">
    <div class="top-bar">
        <div class="balance"><span>🪙</span> <span id="coinDisplay">0</span></div>
        <div class="balance"><span>💎</span> <span id="crystalDisplay">0</span></div>
        <button class="lang-btn" id="langToggle">🌐 EN</button>
    </div>
    <div class="main-screen">
        <div class="mine-animation-area" id="animationArea">
            <span class="miner-sprite">⛏️</span>
            <span class="miner-sprite">👷</span>
        </div>
        <div style="display: flex; justify-content: space-between; margin-top: 8px;">
            <span id="totalMinedLabel">⛏️ 0</span>
            <span id="incomePerSecLabel">+0/s</span>
        </div>
    </div>
    <div class="tabs">
        <button class="tab active" data-tab="mines">⛰️ <span data-i18n="minesTab">Mines</span></button>
        <button class="tab" data-tab="miners">👷 <span data-i18n="minersTab">Miners</span></button>
    </div>
    <div class="panel" id="dynamicPanel"></div>
</div>
<script>
    (function() {
        const translations = {
            en: { minesTab: "Mines", minersTab: "Miners", buyMiner: "Buy Miner", upgrade: "Upgrade", locked: "Locked", level: "Lv", coalMine: "Coal Mine", ironMine: "Iron Mine", goldMine: "Gold Mine", crystalMine: "Crystal Mine", diamondMine: "Diamond Mine", minerName: "Miner" },
            ru: { minesTab: "Шахты", minersTab: "Шахтёры", buyMiner: "Купить шахтёра", upgrade: "Улучшить", locked: "Закрыто", level: "Ур", coalMine: "Угольная", ironMine: "Железная", goldMine: "Золотая", crystalMine: "Кристальная", diamondMine: "Алмазная", minerName: "Шахтёр" }
        };
        let currentLang = localStorage.getItem('mineLang') || 'en';
        function t(key) { return translations[currentLang]?.[key] || key; }

        let game = JSON.parse(localStorage.getItem('hamsterMineSave')) || {
            coins: 50, crystals: 2, totalMined: 0,
            mines: [
                { id:0, nameKey:'coalMine', level:1, baseProd:0.8, unlock:0, cost:25 },
                { id:1, nameKey:'ironMine', level:0, baseProd:1.5, unlock:10, cost:70 },
                { id:2, nameKey:'goldMine', level:0, baseProd:2.8, unlock:20, cost:200 },
                { id:3, nameKey:'crystalMine', level:0, baseProd:4.5, unlock:30, cost:600 },
                { id:4, nameKey:'diamondMine', level:0, baseProd:7.2, unlock:40, cost:1500 }
            ],
            miners: [{ id:0, level:1, speed:0.5, cost:40 }],
            lastSave: Date.now()
        };

        function save() { game.lastSave = Date.now(); localStorage.setItem('hamsterMineSave', JSON.stringify(game)); }

        function income() {
            let total = 0;
            game.mines.forEach(m => { if(m.level>0) total += m.baseProd * m.level; });
            game.miners.forEach(m => total += m.speed * m.level);
            return total;
        }

        function updateUI() {
            document.getElementById('coinDisplay').innerText = Math.floor(game.coins);
            document.getElementById('crystalDisplay').innerText = Math.floor(game.crystals);
            document.getElementById('totalMinedLabel').innerText = `⛏️ ${Math.floor(game.totalMined)}`;
            document.getElementById('incomePerSecLabel').innerText = `+${income().toFixed(1)}/s`;
        }

        function showFloat(text) {
            let el = document.createElement('div');
            el.className = 'floating-number';
            el.innerText = text;
            el.style.left = '50%'; el.style.top = '30px';
            document.getElementById('animationArea').appendChild(el);
            setTimeout(() => el.remove(), 1200);
        }

        function isUnlocked(mine, i) {
            if(i===0) return true;
            return game.mines[i-1].level >= mine.unlock;
        }

        function upgradeMine(i) {
            let mine = game.mines[i];
            if(!isUnlocked(mine,i)) return;
            let cost = Math.floor(mine.cost * (1 + mine.level * 0.5));
            if(game.coins < cost) return;
            game.coins -= cost;
            mine.level++;
            if(mine.level===1 && i>0) game.crystals++;
            showFloat('⬆️ +1');
            save(); updateUI(); renderPanel();
        }

        function buyMiner() {
            let last = game.miners[game.miners.length-1];
            let cost = Math.floor(last.cost * (1 + game.miners.length * 0.6));
            if(game.coins < cost) return;
            game.coins -= cost;
            game.miners.push({ id: game.miners.length, level:1, speed:0.5 + game.miners.length*0.15, cost: cost+30 });
            showFloat('👷 +1');
            save(); updateUI(); renderPanel();
        }

        function upgradeMiner(id) {
            let miner = game.miners.find(m=>m.id===id);
            if(!miner) return;
            let cost = Math.floor(miner.cost * (1 + miner.level * 0.5));
            if(game.coins < cost) return;
            game.coins -= cost;
            miner.level++;
            showFloat('⚡');
            save(); updateUI(); renderPanel();
        }

        function renderPanel(tab = 'mines') {
            let panel = document.getElementById('dynamicPanel');
            panel.innerHTML = '';
            if(tab==='mines') {
                game.mines.forEach((m,i)=>{
                    let unlocked = isUnlocked(m,i);
                    let card = document.createElement('div');
                    card.className = 'card';
                    card.style.opacity = unlocked ? 1 : 0.6;
                    let cost = Math.floor(m.cost * (1 + m.level * 0.5));
                    card.innerHTML = `<div><strong>${t(m.nameKey)}</strong><br>${t('level')} ${m.level} | ${unlocked?'✅':t('locked')}</div>
                    <button>${unlocked ? `⬆️ ${cost}🪙` : t('locked')}</button>`;
                    if(unlocked) card.querySelector('button').onclick = ()=>upgradeMine(i);
                    panel.appendChild(card);
                });
            } else {
                game.miners.forEach(m=>{
                    let cost = Math.floor(m.cost * (1 + m.level * 0.5));
                    let card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `<div><strong>${t('minerName')} ${m.id+1}</strong><br>${t('level')} ${m.level}</div>
                    <button>⬆️ ${cost}🪙</button>`;
                    card.querySelector('button').onclick = ()=>upgradeMiner(m.id);
                    panel.appendChild(card);
                });
                let btn = document.createElement('button');
                btn.innerText = `${t('buyMiner')} 🪙${Math.floor((game.miners[game.miners.length-1]?.cost||40)*(1+game.miners.length*0.6))}`;
                btn.onclick = buyMiner;
                panel.appendChild(btn);
            }
        }

        function switchLang() {
            currentLang = currentLang === 'en' ? 'ru' : 'en';
            localStorage.setItem('mineLang', currentLang);
            document.getElementById('langToggle').innerText = currentLang==='en'?'🌐 EN':'🌐 RU';
            document.querySelectorAll('[data-i18n]').forEach(el=> el.innerText = t(el.dataset.i18n));
            renderPanel(document.querySelector('.tab.active')?.dataset.tab || 'mines');
        }

        window.onload = ()=>{
            if(localStorage.getItem('mineLang')) currentLang = localStorage.getItem('mineLang');
            document.getElementById('langToggle').innerText = currentLang==='en'?'🌐 EN':'🌐 RU';
            let diff = (Date.now() - game.lastSave)/1000;
            if(diff>3 && diff<86400) { let earn = income()*diff*0.7; game.coins+=earn; game.totalMined+=earn; }
            updateUI();
            renderPanel('mines');
            document.querySelectorAll('.tab').forEach(t=> t.onclick = (e)=>{
                document.querySelectorAll('.tab').forEach(bt=>bt.classList.remove('active'));
                e.currentTarget.classList.add('active');
                renderPanel(e.currentTarget.dataset.tab);
            });
            document.getElementById('langToggle').onclick = switchLang;
            if(window.Telegram?.WebApp) { window.Telegram.WebApp.ready(); window.Telegram.WebApp.expand(); }
        };
        setInterval(()=>{ game.coins += income()*0.1; game.totalMined+=income()*0.1; updateUI(); save(); }, 100);
    })();
</script>
</body>
</html>
