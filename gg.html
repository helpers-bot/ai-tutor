<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gg Mining</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }
        
        body {
            background: #0a0c0f;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 0;
            margin: 0;
        }
        
        .game-container {
            max-width: 100%;
            width: 100%;
            min-height: 100vh;
            background: linear-gradient(180deg, #1a1f2b 0%, #0b0e12 100%);
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            color: #f0e6c5;
        }
        
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(20, 25, 30, 0.95);
            border-radius: 50px;
            padding: 12px 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5), inset 0 1px 0 rgba(212, 175, 55, 0.3);
            border: 1px solid rgba(212, 175, 55, 0.3);
        }
        
        .balance-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 700;
            font-size: 1rem;
        }
        
        .balance-icon {
            font-size: 1.2rem;
        }
        
        .lang-btn {
            background: #2a2f36;
            border: none;
            color: #e0c88c;
            font-weight: bold;
            border-radius: 25px;
            padding: 8px 15px;
            cursor: pointer;
            font-size: 0.85rem;
            border: 1px solid #4d4530;
            transition: all 0.3s;
        }
        
        .lang-btn:active {
            background: #4d4230;
            transform: scale(0.95);
        }
        
        .mining-display {
            background: #12171d;
            border-radius: 25px;
            padding: 20px;
            text-align: center;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
            border: 1px solid #3a3322;
        }
        
        .miners-animation {
            font-size: 3rem;
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
            animation: miningAnim 2s infinite;
        }
        
        @keyframes miningAnim {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        
        .stats-row {
            display: flex;
            justify-content: space-around;
            font-size: 0.9rem;
            color: #cfb87c;
        }
        
        .tabs {
            display: flex;
            gap: 8px;
        }
        
        .tab {
            flex: 1;
            background: #20262e;
            border: none;
            padding: 12px;
            border-radius: 20px;
            color: #b9b09b;
            font-weight: bold;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .tab.active {
            background: #c9a73c;
            color: #000;
            box-shadow: 0 0 20px rgba(201, 167, 60, 0.5);
        }
        
        .content-panel {
            background: #141a20;
            border-radius: 20px;
            padding: 15px;
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 55vh;
        }
        
        .card {
            background: #1e232a;
            border-radius: 15px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #d4af37;
            transition: all 0.3s;
        }
        
        .card.locked {
            opacity: 0.5;
            border-left-color: #555;
        }
        
        .card-info h3 {
            font-size: 1rem;
            margin-bottom: 5px;
        }
        
        .card-info p {
            font-size: 0.8rem;
            color: #aaa;
        }
        
        .btn {
            background: linear-gradient(180deg, #e5b93c 0%, #c49a28 100%);
            border: none;
            border-radius: 25px;
            padding: 10px 20px;
            font-weight: bold;
            color: #000;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
            white-space: nowrap;
        }
        
        .btn:active {
            transform: scale(0.95);
        }
        
        .btn:disabled {
            background: #555;
            color: #999;
        }
        
        .floating-text {
            position: fixed;
            animation: floatUp 1.5s ease-out forwards;
            font-weight: bold;
            color: #ffd700;
            pointer-events: none;
            z-index: 1000;
            font-size: 1.2rem;
        }
        
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-80px) scale(1.5); }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="top-bar">
            <div class="balance-item">
                <span class="balance-icon">🪙</span>
                <span id="coinsDisplay">0</span>
            </div>
            <div class="balance-item">
                <span class="balance-icon">💎</span>
                <span id="crystalsDisplay">0</span>
            </div>
            <button class="lang-btn" id="langToggle">🌐 RU</button>
        </div>
        
        <div class="mining-display">
            <div class="miners-animation">⛏️👷⚒️</div>
            <div class="stats-row">
                <span>Добыто: <strong id="totalMined">0</strong></span>
                <span>Доход: <strong id="incomeRate">+0.0/с</strong></span>
            </div>
        </div>
        
        <div class="tabs">
            <button class="tab active" data-tab="mines">⛰️ Шахты</button>
            <button class="tab" data-tab="miners">👷 Шахтёры</button>
            <button class="tab" data-tab="shop">🛒 Магазин</button>
        </div>
        
        <div class="content-panel" id="contentPanel"></div>
    </div>

    <script>
        // Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        // Система перевода
        const lang = {
            ru: {
                mines: 'Шахты',
                miners: 'Шахтёры',
                shop: 'Магазин',
                coalMine: 'Угольная шахта',
                ironMine: 'Железная шахта',
                goldMine: 'Золотая шахта',
                crystalMine: 'Кристальная шахта',
                diamondMine: 'Алмазная шахта',
                miner: 'Шахтёр',
                level: 'Уровень',
                income: 'Доход',
                upgrade: 'Улучшить',
                buyMiner: 'Нанять шахтёра',
                locked: 'Заблокировано',
                unlockAt: 'Откроется на уровне'
            },
            en: {
                mines: 'Mines',
                miners: 'Miners',
                shop: 'Shop',
                coalMine: 'Coal Mine',
                ironMine: 'Iron Mine',
                goldMine: 'Gold Mine',
                crystalMine: 'Crystal Mine',
                diamondMine: 'Diamond Mine',
                miner: 'Miner',
                level: 'Level',
                income: 'Income',
                upgrade: 'Upgrade',
                buyMiner: 'Hire Miner',
                locked: 'Locked',
                unlockAt: 'Unlocks at level'
            }
        };
        
        let currentLang = 'ru';
        
        function t(key) {
            return lang[currentLang]?.[key] || key;
        }
        
        // Игра
        const game = JSON.parse(localStorage.getItem('ggMiningGame')) || {
            coins: 100,
            crystals: 10,
            totalMined: 0,
            mines: [
                { id: 0, type: 'coalMine', level: 1, baseIncome: 1, upgradeCost: 50, unlockLevel: 0 },
                { id: 1, type: 'ironMine', level: 0, baseIncome: 3, upgradeCost: 150, unlockLevel: 15 },
                { id: 2, type: 'goldMine', level: 0, baseIncome: 8, upgradeCost: 500, unlockLevel: 25 },
                { id: 3, type: 'crystalMine', level: 0, baseIncome: 20, upgradeCost: 1500, unlockLevel: 35 },
                { id: 4, type: 'diamondMine', level: 0, baseIncome: 50, upgradeCost: 5000, unlockLevel: 50 }
            ],
            miners: [
                { id: 0, level: 1, income: 0.5, upgradeCost: 30 }
            ]
        };
        
        function saveGame() {
            localStorage.setItem('ggMiningGame', JSON.stringify(game));
        }
        
        function getIncome() {
            let total = 0;
            game.mines.forEach(m => { if (m.level > 0) total += m.baseIncome * m.level; });
            game.miners.forEach(m => total += m.income * m.level);
            return total;
        }
        
        function updateDisplay() {
            document.getElementById('coinsDisplay').textContent = Math.floor(game.coins);
            document.getElementById('crystalsDisplay').textContent = Math.floor(game.crystals);
            document.getElementById('totalMined').textContent = Math.floor(game.totalMined);
            document.getElementById('incomeRate').textContent = '+' + getIncome().toFixed(1) + '/с';
        }
        
        function floatText(text) {
            const el = document.createElement('div');
            el.className = 'floating-text';
            el.textContent = text;
            el.style.left = '50%';
            el.style.top = '50%';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1500);
        }
        
        function isUnlocked(mineIndex) {
            if (mineIndex === 0) return true;
            return game.mines[mineIndex - 1].level >= game.mines[mineIndex].unlockLevel;
        }
        
        function upgradeMine(index) {
            if (!isUnlocked(index)) return;
            const mine = game.mines[index];
            const cost = Math.floor(mine.upgradeCost * Math.pow(1.5, mine.level));
            if (game.coins < cost) return;
            
            game.coins -= cost;
            mine.level++;
            if (mine.level === 1 && index > 0) game.crystals += 2;
            game.totalMined += 10;
            floatText('+1 ⬆️');
            saveGame();
            renderContent();
            updateDisplay();
        }
        
        function hireMiner() {
            const count = game.miners.length;
            const cost = Math.floor(50 * Math.pow(1.6, count));
            if (game.coins < cost) return;
            
            game.coins -= cost;
            game.miners.push({
                id: count,
                level: 1,
                income: 0.5 + (count * 0.3),
                upgradeCost: 30 + (count * 20)
            });
            floatText('👷 +1');
            saveGame();
            renderContent();
            updateDisplay();
        }
        
        function upgradeMiner(id) {
            const miner = game.miners.find(m => m.id === id);
            if (!miner) return;
            const cost = Math.floor(miner.upgradeCost * Math.pow(1.4, miner.level));
            if (game.coins < cost) return;
            
            game.coins -= cost;
            miner.level++;
            floatText('⚡ +1');
            saveGame();
            renderContent();
            updateDisplay();
        }
        
        function renderContent(tab = 'mines') {
            const panel = document.getElementById('contentPanel');
            panel.innerHTML = '';
            
            if (tab === 'mines') {
                game.mines.forEach((mine, i) => {
                    const unlocked = isUnlocked(i);
                    const cost = Math.floor(mine.upgradeCost * Math.pow(1.5, mine.level));
                    const card = document.createElement('div');
                    card.className = `card ${unlocked ? '' : 'locked'}`;
                    card.innerHTML = `
                        <div class="card-info">
                            <h3>${t(mine.type)}</h3>
                            <p>${t('level')}: ${mine.level} | ${t('income')}: ${mine.baseIncome * mine.level}/с</p>
                            ${!unlocked ? `<p>🔒 ${t('unlockAt')} ${mine.unlockLevel}</p>` : ''}
                        </div>
                        <button class="btn" ${!unlocked ? 'disabled' : ''}>
                            ${unlocked ? `⬆️ ${cost} 🪙` : t('locked')}
                        </button>
                    `;
                    if (unlocked) {
                        card.querySelector('.btn').onclick = () => upgradeMine(i);
                    }
                    panel.appendChild(card);
                });
            } else if (tab === 'miners') {
                game.miners.forEach(miner => {
                    const cost = Math.floor(miner.upgradeCost * Math.pow(1.4, miner.level));
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="card-info">
                            <h3>${t('miner')} #${miner.id + 1}</h3>
                            <p>${t('level')}: ${miner.level} | ${t('income')}: ${(miner.income * miner.level).toFixed(1)}/с</p>
                        </div>
                        <button class="btn">⬆️ ${cost} 🪙</button>
                    `;
                    card.querySelector('.btn').onclick = () => upgradeMiner(miner.id);
                    panel.appendChild(card);
                });
                
                const hireCost = Math.floor(50 * Math.pow(1.6, game.miners.length));
                const hireBtn = document.createElement('button');
                hireBtn.className = 'btn';
                hireBtn.textContent = `${t('buyMiner')} 🪙 ${hireCost}`;
                hireBtn.style.width = '100%';
                hireBtn.onclick = hireMiner;
                panel.appendChild(hireBtn);
            } else if (tab === 'shop') {
                panel.innerHTML = '<div style="text-align:center;padding:20px;"><h3>🛒 Магазин</h3><p>💎 Кристаллы: ' + Math.floor(game.crystals) + '</p><p style="color:#888;">Скоро...</p></div>';
            }
        }
        
        function switchLang() {
            currentLang = currentLang === 'ru' ? 'en' : 'ru';
            document.getElementById('langToggle').textContent = currentLang === 'ru' ? '🌐 RU' : '🌐 EN';
            const activeTab = document.querySelector('.tab.active').dataset.tab;
            document.querySelectorAll('.tab').forEach(t => {
                const tabName = t.dataset.tab;
                t.textContent = tabName === 'mines' ? '⛰️ ' + t('mines') : 
                               tabName === 'miners' ? '👷 ' + t('miners') : 
                               '🛒 ' + t('shop');
            });
            renderContent(activeTab);
        }
        
        // Инициализация
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                renderContent(this.dataset.tab);
            });
        });
        
        document.getElementById('langToggle').addEventListener('click', switchLang);
        
        // Игровой цикл
        setInterval(() => {
            const income = getIncome();
            if (income > 0) {
                game.coins += income * 0.1;
                game.totalMined += income * 0.1;
                updateDisplay();
            }
        }, 100);
        
        // Автосохранение
        setInterval(saveGame, 5000);
        
        // Старт
        updateDisplay();
        renderContent('mines');
    </script>
</body>
</html>
