      function spawnParticles() {
        if (!$('treasureSection') || !$('giftIcon')) return;
        var container = $('treasureSection');
        var giftRect = $('giftIcon').getBoundingClientRect();
        var containerRect = container.getBoundingClientRect();
        var centerX = giftRect.left + giftRect.width / 2 - containerRect.left;
        var centerY = giftRect.top + giftRect.height / 2 - containerRect.top;
        var colors = ['#ff3333', '#ff4444', '#cc0000', '#3333ff', '#4444ff', '#0000cc', '#ffdd00', '#ffcc00', '#ffaa00'];
        for (var i = 0; i < 30; i++) {
          var particle = document.createElement('div');
          particle.className = 'particle';
          particle.style.position = 'absolute';
          particle.style.left = centerX + 'px';
          particle.style.top = centerY + 'px';
          particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
          particle.style.width = (4 + Math.random() * 8) + 'px';
          particle.style.height = (4 + Math.random() * 8) + 'px';
          particle.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
          var angle = Math.random() * Math.PI * 2;
          var distance = 30 + Math.random() * 80;
          particle.style.setProperty('--px', Math.cos(angle) * distance + 'px');
          particle.style.setProperty('--py', Math.sin(angle) * distance + 'px');
          particle.style.animationDuration = (0.8 + Math.random() * 1.5) + 's';
          container.appendChild(particle);
          setTimeout(function() { if (particle.parentNode) particle.remove(); }, 2000);
        }
      }

        $('nameFormModal').classList.add('hidden'); $('customRewardsModal').classList.add('hidden'); $('jackpotPrizesModal').classList.add('hidden');
        $('winDetailModal').classList.add('hidden'); $('supportModal').classList.add('hidden'); $('winningsModal').classList.add('hidden');
        useCustomRewards = false; updateMainBalance(); debouncedSave();
      }

      async function debouncedSave() { if (!userData) { saveDiamonds(); return; } if (saveTimeout) clearTimeout(saveTimeout); saveTimeout = setTimeout(async function() { await API.saveUserData(userData.user_uid, { diamonds: diamonds, treasure_progress: treasureProgress, free_spins: freeSpins, jackpot_boost: jackpotBoost ? 1 : 0 }); }, 2000); }

      // Event listeners
      $('logoutBtn').addEventListener('click', logout);
      $('mainTopUpBtn').addEventListener('click', function() { $('paymentModal').classList.remove('hidden'); });
      document.querySelectorAll('.thread-btn[data-mode]').forEach(function(b) { b.addEventListener('click', function() { useCustomRewards = false; currentMode = this.dataset.mode; enterSlot(); }); });
      $('spinButton').addEventListener('click', spin);
      $('backToMenu').addEventListener('click', backToMenu);
      $('donateButton').addEventListener('click', function() { $('paymentModal').classList.remove('hidden'); });
      $('closeWinBtn').addEventListener('click', function() { $('winOverlay').classList.add('hidden'); });
      $('closePaymentBtn').addEventListener('click', function() { $('paymentModal').classList.add('hidden'); });
      document.querySelectorAll('.diamond-option').forEach(function(o) { o.addEventListener('click', function() { diamonds += parseInt(this.dataset.diamonds); updateDiamondsDisplay(); updateMainBalance(); debouncedSave(); $('paymentModal').classList.add('hidden'); showMessage('✨ +' + this.dataset.diamonds + '💎'); }); });
      $('historyBtn').addEventListener('click', function() { if (userData) loadJackpotHistory(); else { loadHistory(); renderHistory(); } $('historyModal').classList.remove('hidden'); });
      $('closeHistoryBtn').addEventListener('click', function() { $('historyModal').classList.add('hidden'); });
      $('winningsBtn').addEventListener('click', function() { if (userData) loadJackpotFeed(); else loadJackpotFeedData(); $('winningsModal').classList.remove('hidden'); });
      $('closeWinningsBtn').addEventListener('click', function() { $('winningsModal').classList.add('hidden'); });
      $('autoSpinBtn').addEventListener('click', function() { if (gamePaused) return; autoSpinning = !autoSpinning; if (autoSpinning) { $('autoSpinBtn').classList.add('active'); $('autoSpinBtn').innerHTML = '🔄<br>STOP'; if (!spinning) spin(); } else { $('autoSpinBtn').classList.remove('active'); $('autoSpinBtn').innerHTML = '🔄<br>AUTO'; } });
      $('sendToPartnerBtn').addEventListener('click', openNameForm);
      $('downloadWithNamesBtn').addEventListener('click', function() { var un = $('userNameInput').value.trim() || 'User', pn = $('partnerNameInput').value.trim() || 'Partner'; if (pendingJackpotIcon && pendingJackpotWish) generateLuxuryCertificate(pendingJackpotIcon, pendingJackpotWish, un, pn); $('nameFormModal').classList.add('hidden'); });
      $('closeNameFormBtn').addEventListener('click', function() { $('nameFormModal').classList.add('hidden'); });
      $('closeWinDetailBtn').addEventListener('click', function() { $('winDetailModal').classList.add('hidden'); });
      $('customRewardsBtn').addEventListener('click', function() { renderCustomRewards(); $('customRewardsModal').classList.remove('hidden'); });
      $('closeCustomRewardsBtn').addEventListener('click', function() { $('customRewardsModal').classList.add('hidden'); });
      $('addCustomRewardBtn').addEventListener('click', function() { if (customRewards.length >= 10) return; customRewards.push(''); renderCustomRewards(); });
      $('saveAndPlayBtn').addEventListener('click', function() { var valid = customRewards.filter(function(r) { return r.trim() !== ''; }); if (valid.length < 3) { alert(currentLanguage === 'ru' ? 'Нужно минимум 3 желания!' : currentLanguage === 'ua' ? 'Потрібно мінімум 3 бажання!' : 'Need at least 3 wishes!'); return; } customRewards = valid; saveCustomRewardsData(); useCustomRewards = true; $('customRewardsModal').classList.add('hidden'); enterSlot(); showMessage('🎁 ' + (currentLanguage === 'ru' ? 'Игра с вашими желаниями!' : currentLanguage === 'ua' ? 'Гра з вашими бажаннями!' : 'Playing with your wishes!')); });
      $('jackpotPrizesBtn').addEventListener('click', showJackpotPrizes);
      $('closeJackpotPrizesBtn').addEventListener('click', function() { $('jackpotPrizesModal').classList.add('hidden'); });
      $('supportBtn').addEventListener('click', function() { loadSupportHistory().then(function() { renderSupportMessages(); $('supportModal').classList.remove('hidden'); }); });
      $('sendChatBtn').addEventListener('click', handleChatSend);
      $('chatInput').addEventListener('keypress', function(e) { if (e.key === 'Enter') handleChatSend(); });
      $('closeSupportBtn').addEventListener('click', function() { $('supportModal').classList.add('hidden'); });
      $('privacyPolicyLink').addEventListener('click', function() { showPolicy('privacy'); });
      $('termsOfUseLink').addEventListener('click', function() { showPolicy('terms'); });
      $('closePolicyBtn').addEventListener('click', function() { $('policyModal').classList.add('hidden'); });
      $('langRuOuter').addEventListener('click', function() { setLanguage('ru'); });
      $('langUaOuter').addEventListener('click', function() { setLanguage('ua'); });
      $('langEnOuter').addEventListener('click', function() { setLanguage('en'); });
      [$('winOverlay'), $('paymentModal'), $('historyModal'), $('nameFormModal'), $('customRewardsModal'), $('jackpotPrizesModal'), $('winDetailModal'), $('supportModal'), $('policyModal'), $('winningsModal')].forEach(function(m) { m.addEventListener('click', function(e) { if (e.target === m) m.classList.add('hidden'); }); });

      setLanguage('ru');
      updateAllTexts();
      $('mainMenu').classList.add('hidden');
      $('slotUI').classList.add('hidden');
      $('authOverlay').classList.remove('hidden');
    })();
  </script>
</body>
</html>
