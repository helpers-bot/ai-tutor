<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bounce Masters - Физическая арена</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a2e;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        canvas {
            display: block;
        }

        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        #topPanel {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 30px;
            align-items: center;
            pointer-events: all;
        }

        .stat {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 12px 25px;
            border-radius: 50px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            border: 2px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stat-icon {
            font-size: 24px;
        }

        #comboDisplay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 72px;
            font-weight: 900;
            color: #FFD700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            transition: transform 0.2s;
            pointer-events: none;
        }

        #comboDisplay.active {
            transform: translate(-50%, -50%) scale(1);
            animation: comboAnim 0.5s ease-out;
        }

        @keyframes comboAnim {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
        }

        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            pointer-events: all;
        }

        .control-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-size: 28px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:active {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(0.9);
        }

        #shop {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: all;
        }

        .skin-btn {
            width: 60px;
            height: 60px;
            border-radius: 15px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(0, 0, 0, 0.5);
        }

        .skin-btn:hover {
            border-color: #FFD700;
            transform: scale(1.1);
        }

        .skin-btn.selected {
            border-color: #FFD700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        #leaderboard {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px;
            color: white;
            min-width: 200px;
            pointer-events: all;
        }

        #leaderboard h3 {
            color: #FFD700;
            margin-bottom: 10px;
            text-align: center;
        }

        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        #dailyChallenge {
            position: absolute;
            top: 100px;
            right: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            border-radius: 20px;
            color: white;
            pointer-events: all;
            max-width: 250px;
        }

        #dailyChallenge h3 {
            margin-bottom: 10px;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 5px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #FFD700;
            border-radius: 5px;
            transition: width 0.3s;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div id="topPanel">
            <div class="stat">
                <span class="stat-icon">⭐</span>
                <span id="score">0</span>
            </div>
            <div class="stat">
                <span class="stat-icon">🔥</span>
                <span id="combo">x1</span>
            </div>
            <div class="stat">
                <span class="stat-icon">⏱️</span>
                <span id="timer">60</span>
            </div>
        </div>

        <div id="comboDisplay">COMBO x5!</div>

        <div id="leaderboard">
            <h3>🏆 Лидеры</h3>
            <div id="leaderboardList"></div>
        </div>

        <div id="dailyChallenge">
            <h3>🎯 Задание дня</h3>
            <p id="challengeText">Наберите 500 очков</p>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
            <p id="reward">Награда: 🎁 100 монет</p>
        </div>

        <div id="shop">
            <button class="skin-btn selected" style="background: #FF6B6B;" onclick="selectSkin('default')">🔴</button>
            <button class="skin-btn" style="background: #4ECDC4;" onclick="selectSkin('ice')">🔵</button>
            <button class="skin-btn" style="background: #FFE66D;" onclick="selectSkin('gold')">🟡</button>
            <button class="skin-btn" style="background: #A8E6CF;" onclick="selectSkin('ghost')">👻</button>
        </div>

        <div id="controls">
            <button class="control-btn" id="leftBtn">◀</button>
            <button class="control-btn" id="jumpBtn">⬆</button>
            <button class="control-btn" id="rightBtn">▶</button>
        </div>
    </div>

    <canvas id="game"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script>
        // ============================================
        // BOUNCE MASTERS - Физическая арена
        // ============================================

        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        // Размеры canvas
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // Matter.js движок
        const { Engine, World, Bodies, Body, Constraint, Events, Composite } = Matter;

        const engine = Engine.create({
            gravity: { x: 0, y: 2 }
        });
        
        const world = engine.world;

        // Игровые переменные
        let player = null;
        let score = 0;
        let combo = 1;
        let comboTimer = 0;
        let gameTime = 60;
        let gameInterval = null;
        let particles = [];
        let platforms = [];
        let enemies = [];
        let coins = [];
        let selectedSkin = 'default';
        let isJumping = false;
        let jumpsLeft = 2;
        let lastPlatformY = 0;

        // Цветовые схемы скинов
        const skins = {
            default: { main: '#FF6B6B', glow: '#FF4444', trail: '#FF9999' },
            ice: { main: '#4ECDC4', glow: '#45B7AA', trail: '#7EDDD6' },
            gold: { main: '#FFE66D', glow: '#FFD700', trail: '#FFF4B8' },
            ghost: { main: '#A8E6CF', glow: '#88D8B0', trail: '#CCF2E3' }
        };

        // Инициализация игрока
        function createPlayer() {
            player = Bodies.circle(400, 200, 25, {
                restitution: 0.6,
                friction: 0.1,
                density: 0.002,
                render: {
                    fillStyle: skins[selectedSkin].main
                }
            });
            World.add(world, player);
        }

        // Создание платформ
        function createPlatform(x, y, width, height, type = 'normal') {
            const platform = Bodies.rectangle(x, y, width, height, {
                isStatic: true,
                friction: 0.5,
                render: {
                    fillStyle: type === 'bouncy' ? '#FFD700' : 
                              type === 'danger' ? '#FF4444' : '#666666'
                },
                platformType: type
            });
            World.add(world, platform);
            platforms.push(platform);
            return platform;
        }

        // Создание монет
        function createCoin(x, y) {
            const coin = Bodies.circle(x, y, 10, {
                isStatic: true,
                isSensor: true,
                render: {
                    fillStyle: '#FFD700'
                },
                isCoin: true
            });
            World.add(world, coin);
            coins.push(coin);
        }

        // Создание врага
        function createEnemy(x, y) {
            const enemy = Bodies.circle(x, y, 20, {
                restitution: 0.8,
                friction: 0.1,
                render: {
                    fillStyle: '#FF0000'
                }
            });
            World.add(world, enemy);
            enemies.push(enemy);
            
            // Враг двигается
            setInterval(() => {
                if (enemy.position.y > canvas.height + 100) {
                    Body.setPosition(enemy, {
                        x: Math.random() * canvas.width,
                        y: -50
                    });
                }
                Body.applyForce(enemy, enemy.position, {
                    x: (Math.random() - 0.5) * 0.01,
                    y: 0
                });
            }, 100);
        }

        // Генерация уровня
        function generateLevel() {
            // Очистка старых объектов
            platforms.forEach(p => World.remove(world, p));
            coins.forEach(c => World.remove(world, c));
            enemies.forEach(e => World.remove(world, e));
            platforms = [];
            coins = [];
            enemies = [];
            
            // Создание пола
            createPlatform(canvas.width / 2, canvas.height - 20, canvas.width, 40);
            
            // Создание платформ
            for (let i = 0; i < 10; i++) {
                const x = Math.random() * (canvas.width - 200) + 100;
                const y = canvas.height - 200 - i * 150;
                const width = Math.random() * 150 + 100;
                const type = Math.random() < 0.2 ? 'bouncy' : 
                            Math.random() < 0.2 ? 'danger' : 'normal';
                
                createPlatform(x, y, width, 20, type);
                
                // Монетки над платформой
                if (Math.random() < 0.7) {
                    createCoin(x + Math.random() * width - width/2, y - 40);
                }
            }
            
            // Создание врагов
            for (let i = 0; i < 3; i++) {
                createEnemy(
                    Math.random() * canvas.width,
                    Math.random() * -500
                );
            }
        }

        // Эффекты частиц
        function createParticles(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8 - 3,
                    life: 1,
                    color: color,
                    size: Math.random() * 5 + 2
                });
            }
        }

        // Система комбо
        function addScore(points) {
            combo++;
            comboTimer = 120; // 2 секунды при 60 FPS
            
            const comboMultiplier = Math.min(combo, 10);
            score += points * comboMultiplier;
            
            document.getElementById('score').textContent = score;
            document.getElementById('combo').textContent = `x${comboMultiplier}`;
            
            if (combo % 5 === 0 && combo > 0) {
                showComboMessage(combo);
            }
            
            updateDailyChallenge();
        }

        function showComboMessage(comboCount) {
            const display = document.getElementById('comboDisplay');
            display.textContent = `COMBO x${comboCount}!`;
            display.className = 'active';
            setTimeout(() => {
                display.className = '';
            }, 500);
        }

        // Ежедневные испытания
        const challenges = [
            { text: 'Наберите 500 очков', goal: 500, reward: 100 },
            { text: 'Достигните комбо x10', goal: 'combo', reward: 200 },
            { text: 'Уничтожьте 3 врагов', goal: 'kills', reward: 150 },
            { text: 'Соберите 20 монет', goal: 'coins', reward: 100 }
        ];

        let currentChallenge = challenges[Math.floor(Math.random() * challenges.length)];
        document.getElementById('challengeText').textContent = currentChallenge.text;

        function updateDailyChallenge() {
            let progress = 0;
            if (typeof currentChallenge.goal === 'number') {
                progress = (score / currentChallenge.goal) * 100;
            }
            document.getElementById('progressFill').style.width = Math.min(progress, 100) + '%';
            
            if (progress >= 100) {
                completeChallenge();
            }
        }

        function completeChallenge() {
            document.getElementById('reward').textContent = '✅ Награда получена!';
            setTimeout(() => {
                currentChallenge = challenges[Math.floor(Math.random() * challenges.length)];
                document.getElementById('challengeText').textContent = currentChallenge.text;
                document.getElementById('progressFill').style.width = '0%';
                document.getElementById('reward').textContent = `Награда: 🎁 ${currentChallenge.reward} монет`;
            }, 3000);
        }

        // Выбор скина
        function selectSkin(skin) {
            selectedSkin = skin;
            document.querySelectorAll('.skin-btn').forEach(b => b.classList.remove('selected'));
            document.querySelector(`[onclick="selectSkin('${skin}')"]`).classList.add('selected');
            if (player) {
                player.render.fillStyle = skins[skin].main;
            }
        }

        // Обработка столкновений
        Events.on(engine, 'collisionStart', (event) => {
            event.pairs.forEach(pair => {
                const bodyA = pair.bodyA;
                const bodyB = pair.bodyB;
                
                // Игрок касается платформы
                if ((bodyA === player || bodyB === player) && 
                    (bodyA.platformType || bodyB.platformType)) {
                    
                    const platform = bodyA.platformType ? bodyA : bodyB;
                    jumpsLeft = 2;
                    
                    if (platform.platformType === 'bouncy') {
                        Body.setVelocity(player, {
                            x: player.velocity.x,
                            y: -20
                        });
                        createParticles(player.position.x, player.position.y, '#FFD700');
                        addScore(10);
                    }
                    
                    if (platform.platformType === 'danger') {
                        createParticles(player.position.x, player.position.y, '#FF4444');
                        score = Math.max(0, score - 50);
                        document.getElementById('score').textContent = score;
                    }
                }
                
                // Игрок касается монеты
                if ((bodyA === player && bodyB.isCoin) || 
                    (bodyB === player && bodyA.isCoin)) {
                    const coin = bodyA.isCoin ? bodyA : bodyB;
                    World.remove(world, coin);
                    coins = coins.filter(c => c !== coin);
                    createParticles(coin.position.x, coin.position.y, '#FFD700');
                    addScore(25);
                }
                
                // Игрок касается врага (сверху)
                if ((bodyA === player || bodyB === player) && 
                    (bodyA.render?.fillStyle === '#FF0000' || bodyB.render?.fillStyle === '#FF0000')) {
                    
                    const enemy = bodyA.render?.fillStyle === '#FF0000' ? bodyA : bodyB;
                    
                    if (player.velocity.y > 3) {
                        // Уничтожение врага
                        World.remove(world, enemy);
                        enemies = enemies.filter(e => e !== enemy);
                        createParticles(enemy.position.x, enemy.position.y, '#FF0000');
                        Body.setVelocity(player, { x: player.velocity.x, y: -15 });
                        addScore(100);
                    }
                }
            });
        });

        // Игровой цикл
        function gameLoop() {
            // Обновление физики
            Engine.update(engine, 1000 / 60);
            
            // Очистка canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Градиентный фон
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#0a0a2e');
            gradient.addColorStop(1, '#1a1a4e');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Звезды на фоне
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            for (let i = 0; i < 100; i++) {
                const x = (i * 137.5) % canvas.width;
                const y = (i * 97.3) % canvas.height;
                const size = Math.sin(Date.now() * 0.001 + i) * 1.5 + 1.5;
                ctx.fillRect(x, y, size, size);
            }
            
            // Отрисовка платформ
            platforms.forEach(platform => {
                ctx.save();
                ctx.translate(platform.position.x, platform.position.y);
                ctx.rotate(platform.angle);
                
                // Свечение для особых платформ
                if (platform.platformType === 'bouncy') {
                    ctx.shadowColor = '#FFD700';
                    ctx.shadowBlur = 20;
                } else if (platform.platformType === 'danger') {
                    ctx.shadowColor = '#FF4444';
                    ctx.shadowBlur = 20;
                }
                
                ctx.fillStyle = platform.render.fillStyle;
                ctx.fillRect(
                    -platform.bounds.max.x + platform.position.x,
                    -platform.bounds.max.y + platform.position.y,
                    platform.bounds.max.x - platform.bounds.min.x,
                    platform.bounds.max.y - platform.bounds.min.y
                );
                
                ctx.restore();
            });
            
            // Отрисовка монет
            coins.forEach(coin => {
                ctx.save();
                ctx.translate(coin.position.x, coin.position.y);
                
                // Пульсация
                const scale = 1 + Math.sin(Date.now() * 0.005) * 0.2;
                ctx.scale(scale, scale);
                
                ctx.shadowColor = '#FFD700';
                ctx.shadowBlur = 15;
                ctx.fillStyle = coin.render.fillStyle;
                ctx.beginPath();
                ctx.arc(0, 0, 10, 0, Math.PI * 2);
                ctx.fill();
                
                // Блик
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.beginPath();
                ctx.arc(-3, -3, 4, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            });
            
            // Отрисовка врагов
            enemies.forEach(enemy => {
                ctx.save();
                ctx.translate(enemy.position.x, enemy.position.y);
                
                ctx.shadowColor = '#FF0000';
                ctx.shadowBlur = 15;
                ctx.fillStyle = enemy.render.fillStyle;
                ctx.beginPath();
                ctx.arc(0, 0, 20, 0, Math.PI * 2);
                ctx.fill();
                
                // Глаза
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(-5, -5, 5, 0, Math.PI * 2);
                ctx.arc(5, -5, 5, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = 'black';
                ctx.beginPath();
                ctx.arc(-5, -5, 2, 0, Math.PI * 2);
                ctx.arc(5, -5, 2, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            });
            
            // Отрисовка игрока
            if (player) {
                ctx.save();
                ctx.translate(player.position.x, player.position.y);
                ctx.rotate(player.angle);
                
                // Свечение
                const skin = skins[selectedSkin];
                ctx.shadowColor = skin.glow;
                ctx.shadowBlur = 25;
                
                // Основное тело
                ctx.fillStyle = skin.main;
                ctx.beginPath();
                ctx.arc(0, 0, 25, 0, Math.PI * 2);
                ctx.fill();
                
                // Блик
                const gradient = ctx.createRadialGradient(-5, -5, 0, 0, 0, 25);
                gradient.addColorStop(0, 'rgba(255, 255, 255, 0.5)');
                gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(0, 0, 25, 0, Math.PI * 2);
                ctx.fill();
                
                // Глаза
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(-8, -5, 7, 0, Math.PI * 2);
                ctx.arc(8, -5, 7, 0, Math.PI * 2);
                ctx.fill();
                
                // Зрачки (следят за мышкой)
                const dx = (mouseX - player.position.x) * 0.001;
                const dy = (mouseY - player.position.y) * 0.001;
                
                ctx.fillStyle = 'black';
                ctx.beginPath();
                ctx.arc(-8 + dx, -5 + dy, 3, 0, Math.PI * 2);
                ctx.arc(8 + dx, -5 + dy, 3, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
                
                // Трейл
                ctx.save();
                ctx.globalAlpha = 0.3;
                ctx.fillStyle = skin.trail;
                ctx.beginPath();
                ctx.arc(
                    player.position.x - player.velocity.x * 2,
                    player.position.y - player.velocity.y * 2,
                    15,
                    0,
                    Math.PI * 2
                );
                ctx.fill();
                ctx.restore();
            }
            
            // Отрисовка частиц
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.3;
                p.life -= 0.02;
                
                ctx.save();
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.shadowColor = p.color;
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
                
                return p.life > 0;
            });
            
            // Ограничение игрока в пределах экрана
            if (player) {
                if (player.position.x < 25) Body.setPosition(player, { x: 25, y: player.position.y });
                if (player.position.x > canvas.width - 25) Body.setPosition(player, { x: canvas.width - 25, y: player.position.y });
                
                // Падение за экран
                if (player.position.y > canvas.height + 100) {
                    Body.setPosition(player, { x: canvas.width / 2, y: 100 });
                    Body.setVelocity(player, { x: 0, y: 0 });
                    score = Math.max(0, score - 100);
                    document.getElementById('score').textContent = score;
                    createParticles(player.position.x, player.position.y, '#FF0000');
                }
            }
            
            // Обновление комбо
            if (comboTimer > 0) {
                comboTimer--;
                if (comboTimer === 0) {
                    combo = 1;
                    document.getElementById('combo').textContent = 'x1';
                }
            }
            
            requestAnimationFrame(gameLoop);
        }

        // Управление
        const keys = {};
        let mouseX = 0;
        let mouseY = 0;

        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        // Мобильное управление
        document.getElementById('leftBtn').addEventListener('touchstart', () => keys['ArrowLeft'] = true);
        document.getElementById('leftBtn').addEventListener('touchend', () => keys['ArrowLeft'] = false);
        document.getElementById('rightBtn').addEventListener('touchstart', () => keys['ArrowRight'] = true);
        document.getElementById('rightBtn').addEventListener('touchend', () => keys['ArrowRight'] = false);
        document.getElementById('jumpBtn').addEventListener('touchstart', () => {
            if (player && jumpsLeft > 0) {
                Body.setVelocity(player, {
                    x: player.velocity.x,
                    y: -15
                });
                jumpsLeft--;
                createParticles(player.position.x, player.position.y, skins[selectedSkin].glow);
            }
        });

        // Игровой тик
        setInterval(() => {
            if (player) {
                const force = 0.005;
                
                if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
                    Body.applyForce(player, player.position, { x: -force, y: 0 });
                }
                if (keys['ArrowRight'] || keys['d'] || keys['D']) {
                    Body.applyForce(player, player.position, { x: force, y: 0 });
                }
                if ((keys['ArrowUp'] || keys['w'] || keys['W'] || keys[' ']) && jumpsLeft > 0) {
                    Body.setVelocity(player, {
                        x: player.velocity.x,
                        y: -15
                    });
                    jumpsLeft--;
                    createParticles(player.position.x, player.position.y, skins[selectedSkin].glow);
                    keys['ArrowUp'] = false;
                    keys['w'] = false;
                    keys['W'] = false;
                    keys[' '] = false;
                }
            }
        }, 16);

        // Таймер игры
        function startGameTimer() {
            gameInterval = setInterval(() => {
                gameTime--;
                document.getElementById('timer').textContent = gameTime;
                
                if (gameTime <= 0) {
                    clearInterval(gameInterval);
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            alert(`Игра окончена! Ваш счет: ${score}`);
            score = 0;
            gameTime = 60;
            combo = 1;
            document.getElementById('score').textContent = '0';
            document.getElementById('timer').textContent = '60';
            document.getElementById('combo').textContent = 'x1';
            generateLevel();
            startGameTimer();
        }

        // Запуск игры
        createPlayer();
        generateLevel();
        startGameTimer();
        gameLoop();

        // Сохранение в Supabase (раскомментируйте когда настроите)

        async function saveScore() {
            const { data, error } = await supabase
                .from('leaderboard')
                .insert([
                    { player_name: 'Player', score: score }
                ]);
        }
        */
    </script>
</body>
