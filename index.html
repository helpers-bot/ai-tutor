<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.2, user-scalable=yes, viewport-fit=cover">
  <title>Space Pinball Cadet — Гонка шаров</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
    }
    body {
      background: #000010;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      touch-action: pan-x pan-y;
      font-size: 0.85rem;
      color: #fff;
    }
    .game-container {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      max-width: 500px;
      background: #000a28;
      padding: 6px 8px 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      border: 2px solid #004488;
    }
    .canvas-wrapper {
      position: relative;
      flex: 1;
      width: 100%;
      min-height: 0;
      max-height: 55vh;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #000020;
      border-radius: 12px;
      border: 2px solid #004488;
      touch-action: none;
    }
    .top-bar {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
      gap: 3px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .stars-box {
      background: #0a1a3a;
      border-radius: 20px;
      padding: 4px 8px;
      display: flex;
      align-items: center;
      gap: 3px;
      font-weight: bold;
      font-size: 0.8rem;
      border: 1px solid #ffd700;
      color: #ffd700;
    }
    .exp-box {
      background: #0a1a3a;
      border-radius: 20px;
      padding: 4px 8px;
      display: flex;
      align-items: center;
      gap: 3px;
      font-weight: bold;
      font-size: 0.8rem;
      border: 1px solid #44ff44;
      color: #44ff44;
    }
    .map-indicator {
      background: #0a1a3a;
      border-radius: 20px;
      padding: 4px 8px;
      font-weight: bold;
      font-size: 0.7rem;
      border: 1px solid #0066cc;
      color: #66ccff;
    }
    button {
      background: #004488;
      border: none;
      color: #fff;
      font-weight: bold;
      border-radius: 16px;
      padding: 6px 10px;
      font-size: 0.7rem;
      cursor: pointer;
      border: 1px solid #4488cc;
      white-space: nowrap;
    }
    button:active {
      background: #0066cc;
    }
    button:disabled {
      opacity: 0.4;
      pointer-events: none;
    }
    .big-btn {
      padding: 8px 14px;
      font-size: 0.8rem;
      border-radius: 20px;
      background: #22aa22;
    }
    .small-btn {
      padding: 6px 8px;
      font-size: 0.65rem;
      border-radius: 12px;
    }
    .maps-btn {
      background: #5522aa;
      border-color: #9966dd;
    }
    .user-greeting {
      background: rgba(0,100,200,0.2);
      padding: 4px 8px;
      border-radius: 14px;
      font-weight: 600;
      font-size: 0.65rem;
      border: 1px solid rgba(100,180,255,0.3);
    }
    .hidden {
      display: none !important;
    }
    .modal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,20,0.85);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }
    .modal-content {
      background: #0a1a3a;
      padding: 16px;
      border-radius: 16px;
      width: 90%;
      max-width: 380px;
      border: 2px solid #0066cc;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 80vh;
      overflow-y: auto;
    }
    .result-content {
      background: #0a1a3a;
      padding: 16px;
      border-radius: 16px;
      width: 90%;
      max-width: 350px;
      border: 2px solid #66ccff;
      display: flex;
      flex-direction: column;
      gap: 10px;
      text-align: left;
    }
    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .result-row:last-child {
      border-bottom: none;
    }
    .result-label {
      color: #88aacc;
      font-size: 0.8rem;
    }
    .result-value {
      font-weight: bold;
      font-size: 0.85rem;
    }
    .ball-selection {
      display: flex;
      gap: 6px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .ball-select-item {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      transition: all 0.2s;
    }
    .ball-select-item:hover {
      transform: scale(1.15);
    }
    .ball-select-item.selected {
      border-color: #ffd700;
      box-shadow: 0 0 10px #ffd700;
    }
    .bet-input {
      display: flex;
      align-items: center;
      gap: 6px;
      justify-content: center;
    }
    .bet-input input {
      width: 100px;
      text-align: center;
      font-size: 1rem;
      font-weight: bold;
      padding: 8px;
      border-radius: 12px;
      border: 1px solid #4488cc;
      background: #0a0a22;
      color: #fff;
    }
    .race-info {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(0,0,0,0.8);
      padding: 3px 8px;
      border-radius: 8px;
      font-weight: bold;
      font-size: 0.75rem;
      color: #ffd700;
      z-index: 10;
      pointer-events: none;
    }
    .action-row {
      display: flex;
      gap: 4px;
      justify-content: center;
      flex-wrap: wrap;
      align-items: center;
      flex-shrink: 0;
      margin-top: 4px;
    }
    .maps-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
      gap: 6px;
    }
    .map-card {
      background: #0d2040;
      border-radius: 12px;
      padding: 8px 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      border: 2px solid #1a3a6a;
      cursor: pointer;
      font-size: 0.7rem;
    }
    .map-card:hover {
      border-color: #4488ff;
    }
    .map-card.active {
      border-color: #ffd700;
    }
    .map-icon {
      font-size: 1.5rem;
    }
    .map-name {
      font-size: 0.7rem;
      font-weight: bold;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="game-container" id="gameContainer">
  <div class="top-bar">
    <div class="user-greeting" id="userGreeting">👨‍🚀 Гость</div>
    <div class="exp-box">✨ <span id="expDisplay">0</span></div>
    <div class="stars-box">⭐ <span id="balanceDisplay">100</span></div>
    <div class="map-indicator" id="mapIndicator">🌍 Карта 1</div>
  </div>
  
  <div class="canvas-wrapper">
    <canvas id="gameCanvas"></canvas>
    <div class="race-info hidden" id="raceInfo">🏁 1/6</div>
  </div>
  
  <div class="action-row">
    <button id="dropButton" class="big-btn">🎯 Выбрать шар</button>
    <button id="shakeButton" class="big-btn" disabled>🌌 Толчок</button>
  </div>
  <div class="action-row">
    <button id="mapsButton" class="maps-btn small-btn">🗺️ Карты</button>
    <button id="profileButton" class="small-btn">👤 Профиль</button>
    <button id="logoutButton" class="small-btn">🚪 Выйти</button>
  </div>
</div>

<!-- Модальные окна -->
<div id="betModal" class="modal hidden">
  <div class="modal-content">
    <h2 style="color:#ffd700; text-align:center; font-size:1rem;">🎯 Выберите шар</h2>
    <div class="ball-selection" id="ballSelection"></div>
    <h3 style="color:#ffd700; text-align:center; font-size:0.9rem;">💰 Ставка (⭐)</h3>
    <div class="bet-input">
      <button id="betMinus">➖</button>
      <input type="number" id="betAmount" value="10" min="1" max="999999">
      <button id="betPlus">➕</button>
    </div>
    <div style="display: flex; gap: 8px; justify-content: center;">
      <button id="confirmBetBtn" class="big-btn">✅ Подтвердить</button>
      <button id="cancelBetBtn">❌ Отмена</button>
    </div>
  </div>
</div>

<div id="startModal" class="modal hidden">
  <div class="modal-content">
    <h2 style="color:#ffd700; text-align:center; font-size:1rem;">🚀 Готовы к гонке?</h2>
    <p style="text-align:center; font-size:0.85rem;">Выбран шар: <span id="startBallInfo" style="color:#ffd700;"></span></p>
    <p style="text-align:center; font-size:0.85rem;">Ставка: ⭐ <span id="startBetInfo" style="color:#ffd700;"></span></p>
    <div style="display: flex; gap: 8px; justify-content: center;">
      <button id="startRaceBtn" class="big-btn" style="background:#44ff44;">🏁 СТАРТ</button>
      <button id="cancelStartBtn">❌ Отменить</button>
    </div>
  </div>
</div>

<div id="resultModal" class="modal hidden">
  <div class="result-content" id="resultContent"></div>
</div>

<div id="authModal" class="modal">
  <div class="modal-content">
    <h2 style="font-size:1rem;">🔐 Вход в космопорт</h2>
    <input type="text" id="usernameInput" placeholder="Позывной пилота" maxlength="16" autocomplete="off" style="padding:8px;border-radius:12px;border:1px solid #4488cc;background:#0a0a22;color:#fff;width:100%;">
    <button id="loginBtn">▶ Запуск</button>
    <p style="font-size:0.7rem; color:#88aacc;">Новый пилот получит ID, 100 ⭐ и 0 ✨</p>
  </div>
</div>

<div id="mapsModal" class="modal hidden">
  <div class="modal-content">
    <h2 style="color:#ffd700; text-align:center; font-size:1rem;">🗺️ Карты миссий</h2>
    <p style="text-align:center; font-size:0.75rem; color:#88aacc;">Опыт: ✨ <span id="mapsExpDisplay">0</span></p>
    <div id="mapsContainer" class="maps-grid"></div>
    <button id="closeMapsBtn" style="align-self: center;">Закрыть</button>
  </div>
</div>

<div id="profileModal" class="modal hidden">
  <div class="modal-content">
    <h2 style="font-size:1rem;">👤 Профиль пилота</h2>
    <p style="font-size:0.85rem;">Имя: <strong id="profileName"></strong></p>
    <p style="font-size:0.85rem;">ID: <strong id="profileId"></strong></p>
    <p style="font-size:0.85rem;">Звёзд: ⭐ <strong id="profileBalance"></strong></p>
    <p style="font-size:0.85rem;">Опыт: ✨ <strong id="profileExp"></strong></p>
    <p style="font-size:0.85rem;">Открыто карт: <strong id="profileMaps"></strong></p>
    <button id="closeProfileBtn">Закрыть</button>
  </div>
</div>

<script>
  (function() {
    // ========== ЗВУКИ ==========
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;

    function initAudio() {
      if (!audioCtx) audioCtx = new AudioContext();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playSound(freq, type, duration, vol = 0.06) {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      gain.gain.setValueAtTime(vol, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + duration);
    }

    function soundBounce() { playSound(200 + Math.random() * 200, 'triangle', 0.05, 0.04); }
    function soundBumper() { playSound(400, 'triangle', 0.06, 0.05); }
    function soundFinish() { playSound(500, 'triangle', 0.2, 0.1); setTimeout(() => playSound(700, 'triangle', 0.2, 0.1), 0.08); }

    // ========== БАЗА ДАННЫХ ==========
    const STORAGE_KEY = 'space_pinball_race_db_v3';
    let currentUser = null;

    function loadUsers() { const data = localStorage.getItem(STORAGE_KEY); return data ? JSON.parse(data) : {}; }
    function saveUsers(users) { localStorage.setItem(STORAGE_KEY, JSON.stringify(users)); }
    function getOrCreateUser(name) {
      const users = loadUsers();
      const trimmed = name.trim().toLowerCase();
      if (!trimmed) return null;
      for (let [id, user] of Object.entries(users)) {
        if (user.name.toLowerCase() === trimmed) {
          if (!user.exp) user.exp = 0;
          if (!user.selectedBall) user.selectedBall = 1;
          if (!user.unlockedMaps) user.unlockedMaps = [1];
          if (!user.currentMapId) user.currentMapId = 1;
          return user;
        }
      }
      const newId = Math.floor(10000000 + Math.random() * 90000000).toString();
      const newUser = { id: newId, name: trimmed, balance: 100, exp: 0, selectedBall: 1, unlockedMaps: [1], currentMapId: 1 };
      users[newId] = newUser;
      saveUsers(users);
      return newUser;
    }
    function updateUserData(u) { const users = loadUsers(); if (users[u.id]) { users[u.id] = u; saveUsers(users); currentUser = u; } }

    // ========== ЗАГРУЗКА КАРТ ИЗ АДМИН-ПАНЕЛИ ==========
    function loadGameMaps() {
      const data = localStorage.getItem('game_maps');
      if (data) {
        try {
          const maps = JSON.parse(data);
          if (Array.isArray(maps) && maps.length > 0) {
            return maps.map((m, i) => ({
              id: m.id || 'map_' + i,
              name: m.name || 'Карта ' + (i + 1),
              icon: '🗺️',
              expCost: 0,
              trackLength: m.trackLength || 3500,
              trackWidth: m.trackWidth || 440,
              ballCount: m.ballCount || 6,
              gravity: m.gravity || 0.08,
              bgColor: m.bgColor || '#000015',
              obstacles: m.obstacles || []
            }));
          }
        } catch (e) {
          console.error('Ошибка загрузки карт:', e);
        }
      }
      // Если нет карт из админ-панели, создаём одну базовую
      return [{
        id: 'default',
        name: 'Базовая карта',
        icon: '🌍',
        expCost: 0,
        trackLength: 3500,
        trackWidth: 440,
        ballCount: 6,
        gravity: 0.08,
        bgColor: '#000015',
        obstacles: []
      }];
    }

    let gameMaps = loadGameMaps();

    function getCurrentMap() {
      const id = currentUser ? currentUser.currentMapId : 1;
      // Ищем по ID или используем первую карту
      const found = gameMaps.find(m => m.id === id);
      return found || gameMaps[0];
    }

    // ========== ИГРОВЫЕ ПЕРЕМЕННЫЕ ==========
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
      const wrapper = canvas.parentElement;
      const rect = wrapper.getBoundingClientRect();
      canvas.width = Math.floor(rect.width - 16);
      canvas.height = Math.floor(rect.height - 8);
    }
    resizeCanvas();
    window.addEventListener('resize', () => { resizeCanvas(); buildTrack(); });

    const GRAVITY = 0.08;
    const BOUNCE = 0.3;
    const BALL_RADIUS = 12;
    const BALL_COLORS = ['#ff6666', '#66bbff', '#66ff66', '#ffee66', '#ff66ff', '#ffaa66'];
    const BALL_NAMES = ['Красный', 'Синий', 'Зелёный', 'Жёлтый', 'Розовый', 'Оранжевый'];

    let trackLength = 3500;
    let trackWidth = 0;
    let cameraY = 0;
    let obstacles = [];
    let finishLine = 3500;
    let balls = [];
    let selectedBallIndex = 0;
    let betAmount = 10;
    let raceActive = false;
    let raceFinished = false;
    let finishOrder = [];
    let shakeActive = false;
    let shakeTimer = 0;
    let sessionExp = 0;
    let currentGravity = GRAVITY;

    function buildTrack() {
      const map = getCurrentMap();
      trackWidth = map.trackWidth || canvas.width;
      trackLength = map.trackLength || 3500;
      currentGravity = map.gravity || GRAVITY;
      finishLine = trackLength - 100;
      
      // Используем препятствия из карты
      obstacles = [];
      if (map.obstacles && Array.isArray(map.obstacles)) {
        obstacles = map.obstacles.map(o => ({ ...o }));
      }
      
      // Добавляем финиш если его нет
      const hasFinish = obstacles.some(o => o.type === 'finish');
      if (!hasFinish) {
        obstacles.push({ y: finishLine, type: 'finish' });
      }
      
      canvas.style.background = map.bgColor || '#000015';
    }

    function initBalls() {
      const map = getCurrentMap();
      const ballCount = map.ballCount || 6;
      balls = [];
      
      // Центрируем шары
      const spacing = Math.min(20, (trackWidth - 40) / ballCount);
      const startX = trackWidth / 2 - (ballCount - 1) * spacing / 2;
      
      for (let i = 0; i < ballCount; i++) {
        balls.push({
          x: startX + i * spacing,
          y: 30,
          vx: 0,
          vy: 0,
          active: true,
          finished: false,
          finishPos: 0,
          color: BALL_COLORS[i % BALL_COLORS.length],
          index: i
        });
      }
      cameraY = 0;
      raceActive = false;
      raceFinished = false;
      finishOrder = [];
      shakeActive = false;
      shakeTimer = 0;
      sessionExp = 0;
    }

    function updateUI() {
      if (!currentUser) {
        document.getElementById('balanceDisplay').textContent = '0';
        document.getElementById('expDisplay').textContent = '0';
        document.getElementById('userGreeting').textContent = '👨‍🚀 Гость';
        document.getElementById('mapIndicator').textContent = '🗺️ Карта';
        return;
      }
      document.getElementById('balanceDisplay').textContent = Math.floor(currentUser.balance);
      document.getElementById('expDisplay').textContent = Math.floor(currentUser.exp);
      document.getElementById('userGreeting').textContent = `👨‍🚀 ${currentUser.name}`;
      const cm = getCurrentMap();
      document.getElementById('mapIndicator').textContent = `${cm.icon || '🗺️'} ${cm.name}`;
    }

    function applyPhysics() {
      if (!raceActive) return;
      
      if (shakeActive) {
        shakeTimer--;
        if (shakeTimer <= 0) shakeActive = false;
      }
      
      let allFinished = true;
      
      for (let b of balls) {
        if (!b.active || b.finished) continue;
        allFinished = false;
        
        b.vy += currentGravity;
        b.x += b.vx;
        b.y += b.vy;
        
        if (shakeActive) {
          b.vx += (Math.random() - 0.5) * 0.8;
          b.vy += (Math.random() - 0.5) * 0.8;
        }
        
        // Мягкие стенки
        if (b.x - BALL_RADIUS < 5) { 
          b.x = BALL_RADIUS + 5; 
          b.vx = Math.abs(b.vx) * BOUNCE; 
          soundBounce();
        }
        if (b.x + BALL_RADIUS > trackWidth - 5) { 
          b.x = trackWidth - BALL_RADIUS - 5; 
          b.vx = -Math.abs(b.vx) * BOUNCE; 
          soundBounce();
        }
        
        // Препятствия
        for (let obs of obstacles) {
          if (obs.type === 'pin') {
            const dx = b.x - obs.x;
            const dy = b.y - obs.y;
            const dist = Math.sqrt(dx*dx+dy*dy);
            if (dist < BALL_RADIUS + (obs.radius || 4)) {
              const nx = dx/dist, ny = dy/dist;
              b.x += nx * (BALL_RADIUS + (obs.radius || 4) - dist);
              b.y += ny * (BALL_RADIUS + (obs.radius || 4) - dist);
              const vn = b.vx*nx + b.vy*ny;
              if (vn < 0) { b.vx -= 1.2*vn*nx; b.vy -= 1.2*vn*ny; }
              soundBounce();
              if (currentUser) { currentUser.exp += 1; sessionExp += 1; updateUserData(currentUser); }
            }
          } else if (obs.type === 'bumper') {
            if (b.x > obs.x - obs.width/2 - BALL_RADIUS && b.x < obs.x + obs.width/2 + BALL_RADIUS &&
                b.y > obs.y - obs.height/2 - BALL_RADIUS && b.y < obs.y + obs.height/2 + BALL_RADIUS) {
              b.vy = -Math.abs(b.vy) * (obs.force || 2.5) - 2;
              b.vx += (Math.random() - 0.5) * 2;
              soundBumper();
              if (currentUser) { currentUser.exp += 1; sessionExp += 1; updateUserData(currentUser); }
            }
          } else if (obs.type === 'funnel') {
            const dx = b.x - obs.x;
            const dy = b.y - obs.y;
            const dist = Math.sqrt(dx*dx+dy*dy);
            if (dist < (obs.radius || 25) && dist > 5) {
              const force = 0.08;
              b.vx += (-dy / dist) * force;
              b.vy += (dx / dist) * force;
              obs.spin = (obs.spin || 0) + 0.03;
            }
          } else if (obs.type === 'wall_seg') {
            if (b.x > obs.x - obs.width/2 - BALL_RADIUS && b.x < obs.x + obs.width/2 + BALL_RADIUS &&
                b.y > obs.y - obs.height/2 - BALL_RADIUS && b.y < obs.y + obs.height/2 + BALL_RADIUS) {
              if (b.x < obs.x) { b.x = obs.x - obs.width/2 - BALL_RADIUS; b.vx = -Math.abs(b.vx) * BOUNCE; }
              else { b.x = obs.x + obs.width/2 + BALL_RADIUS; b.vx = Math.abs(b.vx) * BOUNCE; }
              soundBounce();
            }
          } else if (obs.type === 'wall_gap') {
            if (Math.abs(b.y - obs.y) < BALL_RADIUS + 3) {
              if (b.x < obs.x - obs.width/2 || b.x > obs.x + obs.width/2) {
                b.vy = Math.abs(b.vy) * BOUNCE;
                b.y = obs.y - BALL_RADIUS - 3;
                soundBounce();
              }
            }
          } else if (obs.type === 'wall_angled') {
            const angle = (obs.angle || 0) * Math.PI / 180;
            const cos = Math.cos(angle);
            const sin = Math.sin(angle);
            
            const dx = b.x - obs.x;
            const dy = b.y - obs.y;
            
            const localX = dx * cos + dy * sin;
            const localY = -dx * sin + dy * cos;
            
            const halfW = obs.width / 2;
            const halfH = 3;
            
            if (Math.abs(localX) < halfW + BALL_RADIUS && Math.abs(localY) < halfH + BALL_RADIUS) {
              if (localY > 0) {
                b.x -= -sin * (halfH + BALL_RADIUS - localY);
                b.y -= cos * (halfH + BALL_RADIUS - localY);
                const vn = b.vx * (-sin) + b.vy * cos;
                if (vn < 0) { b.vx -= 1.2 * vn * (-sin); b.vy -= 1.2 * vn * cos; }
              } else {
                b.x -= -sin * (-halfH - BALL_RADIUS - localY);
                b.y -= cos * (-halfH - BALL_RADIUS - localY);
                const vn = b.vx * (-sin) + b.vy * cos;
                if (vn > 0) { b.vx -= 1.2 * vn * (-sin); b.vy -= 1.2 * vn * cos; }
              }
              soundBounce();
            }
          } else if (obs.type === 'spinner') {
            const dx = b.x - obs.x;
            const dy = b.y - obs.y;
            const dist = Math.sqrt(dx*dx+dy*dy);
            if (dist < BALL_RADIUS + (obs.radius || 20)) {
              obs.angle = (obs.angle || 0) + (obs.speed || 0.04);
              const fx = Math.cos(obs.angle) * 1;
              const fy = Math.sin(obs.angle) * 1;
              b.vx += fx;
              b.vy += fy;
              if (currentUser) { currentUser.exp += 1; sessionExp += 1; updateUserData(currentUser); }
            }
          }
        }
        
        // Финиш
        if (b.y >= finishLine && !b.finished) {
          b.finished = true;
          b.finishPos = finishOrder.length + 1;
          finishOrder.push(b.index);
          soundFinish();
        }
        
        // Очень мягкое трение
        b.vx *= 0.999;
        b.vy *= 0.999;
      }
      
      const selectedBall = balls[selectedBallIndex];
      if (selectedBall && selectedBall.active) {
        const targetY = selectedBall.y - canvas.height * 0.4;
        cameraY += (targetY - cameraY) * 0.08;
        if (cameraY < 0) cameraY = 0;
        if (cameraY > trackLength - canvas.height) cameraY = trackLength - canvas.height;
      }
      
      updateRacePosition();
      
      if (allFinished || finishOrder.length >= balls.length) {
        endRace();
      }
      
      updateUI();
    }

    function updateRacePosition() {
      const selectedBall = balls[selectedBallIndex];
      if (!selectedBall || selectedBall.finished) {
        document.getElementById('raceInfo').classList.add('hidden');
        return;
      }
      
      const sorted = balls.filter(b => b.active).sort((a, b) => b.y - a.y);
      const position = sorted.indexOf(selectedBall) + 1;
      const total = sorted.length;
      
      document.getElementById('raceInfo').textContent = `🏁 ${position}/${total}`;
      document.getElementById('raceInfo').classList.remove('hidden');
    }

    function endRace() {
      raceActive = false;
      raceFinished = true;
      document.getElementById('raceInfo').classList.add('hidden');
      
      const selectedPos = balls[selectedBallIndex].finishPos || finishOrder.indexOf(selectedBallIndex) + 1;
      const totalBalls = balls.length;
      
      let multiplier = 0;
      let winnings = 0;
      
      if (selectedPos === 1) { multiplier = 3; winnings = betAmount * 3; }
      else if (selectedPos === 2) { multiplier = 2; winnings = betAmount * 2; }
      else if (selectedPos === 3) { multiplier = 1; winnings = betAmount; }
      else if (selectedPos === 4) { multiplier = 0.5; winnings = -Math.floor(betAmount * 0.5); }
      else if (selectedPos >= 5) { multiplier = 0; winnings = -betAmount; }
      
      const oldBalance = currentUser ? currentUser.balance : 0;
      if (currentUser) {
        currentUser.balance += winnings;
        updateUserData(currentUser);
      }
      const newBalance = currentUser ? currentUser.balance : 0;
      
      const resultDiv = document.getElementById('resultContent');
      const positions = ['', '🥇', '🥈', '🥉'];
      let orderHTML = finishOrder.map((idx, i) => 
        `<div style="color:${BALL_COLORS[idx % BALL_COLORS.length]}; margin: 2px 0; font-size:0.8rem;">${positions[i+1] || (i+1)+'️⃣'} ${BALL_NAMES[idx % BALL_NAMES.length]}</div>`
      ).join('');
      
      resultDiv.innerHTML = `
        <h3 style="color:#66ccff; text-align:center; font-size:0.95rem;">🏁 Результаты гонки</h3>
        <div style="background:rgba(0,0,0,0.3); border-radius:12px; padding:10px;">
          <div style="margin-bottom:8px;">${orderHTML}</div>
          <div class="result-row"><span class="result-label">Ваш шар</span><span class="result-value" style="color:${BALL_COLORS[selectedBallIndex % BALL_COLORS.length]};">${BALL_NAMES[selectedBallIndex % BALL_NAMES.length]} — ${selectedPos} место</span></div>
          <div class="result-row"><span class="result-label">Ставка</span><span class="result-value">⭐ ${betAmount}</span></div>
          <div class="result-row"><span class="result-label">Множитель</span><span class="result-value" style="color:#ffd700;">x${multiplier}</span></div>
          <div class="result-row"><span class="result-label">Выигрыш</span><span class="result-value" style="color:${winnings>=0?'#4caf50':'#f44336'};">${winnings>=0?'+':''}${winnings} ⭐</span></div>
          <div class="result-row"><span class="result-label">Опыт</span><span class="result-value" style="color:#44ff44;">+${sessionExp} ✨</span></div>
        </div>
        <button id="closeResultBtn" style="align-self:center;">Ок</button>
      `;
      document.getElementById('resultModal').classList.remove('hidden');
      document.getElementById('closeResultBtn').onclick = () => {
        document.getElementById('resultModal').classList.add('hidden');
        resetGame();
      };
    }

    function resetGame() {
      gameMaps = loadGameMaps();
      initBalls();
      buildTrack();
      document.getElementById('shakeButton').disabled = true;
      document.getElementById('dropButton').textContent = '🎯 Выбрать шар';
      document.getElementById('raceInfo').classList.add('hidden');
      updateUI();
    }

    function drawScene() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      const map = getCurrentMap();
      ctx.fillStyle = map.bgColor || '#000015';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      ctx.fillStyle = '#1a1a3a';
      ctx.fillRect(0, 0, 5, canvas.height);
      ctx.fillRect(trackWidth - 5, 0, 5, canvas.height);
      
      ctx.save();
      ctx.translate(0, -cameraY);
      
      for (let obs of obstacles) {
        if (obs.y < cameraY - 50 || obs.y > cameraY + canvas.height + 50) continue;
        
        if (obs.type === 'pin') {
          ctx.beginPath();
          ctx.arc(obs.x, obs.y, obs.radius || 4, 0, Math.PI*2);
          ctx.fillStyle = obs.color || '#f4d03f';
          ctx.fill();
        } else if (obs.type === 'bumper') {
          ctx.fillStyle = obs.color || '#ff4466';
          ctx.fillRect(obs.x - obs.width/2, obs.y - obs.height/2, obs.width, obs.height || 6);
          ctx.fillStyle = '#fff';
          ctx.font = '9px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText('▲▲▲', obs.x, obs.y + 4);
        } else if (obs.type === 'funnel') {
          ctx.beginPath();
          ctx.arc(obs.x, obs.y, obs.radius || 25, 0, Math.PI*2);
          ctx.strokeStyle = obs.color || '#8844ff';
          ctx.lineWidth = 2;
          ctx.stroke();
        } else if (obs.type === 'wall_seg') {
          ctx.fillStyle = obs.color || '#666666';
          ctx.fillRect(obs.x - obs.width/2, obs.y - obs.height/2, obs.width, obs.height || 14);
        } else if (obs.type === 'wall_gap') {
          ctx.fillStyle = obs.color || '#888888';
          ctx.fillRect(0, obs.y - 2, obs.x - obs.width/2, 4);
          ctx.fillRect(obs.x + obs.width/2, obs.y - 2, trackWidth - obs.x - obs.width/2, 4);
        } else if (obs.type === 'wall_angled') {
          ctx.save();
          ctx.translate(obs.x, obs.y);
          ctx.rotate((obs.angle || 0) * Math.PI / 180);
          ctx.fillStyle = obs.color || '#ff6644';
          ctx.fillRect(-obs.width/2, -3, obs.width, 6);
          ctx.restore();
        } else if (obs.type === 'spinner') {
          ctx.save();
          ctx.translate(obs.x, obs.y);
          ctx.rotate(obs.angle || 0);
          ctx.fillStyle = obs.color || '#ff8800';
          ctx.fillRect(-(obs.radius || 20), -2, (obs.radius || 20)*2, 4);
          ctx.fillRect(-2, -(obs.radius || 20), 4, (obs.radius || 20)*2);
          ctx.restore();
        } else if (obs.type === 'finish') {
          for (let fx = 0; fx < trackWidth; fx += 16) {
            ctx.fillStyle = (Math.floor(fx/16) % 2 === 0) ? '#000' : '#ffd700';
            ctx.fillRect(fx, obs.y - 2, 16, 4);
          }
        }
      }
      
      for (let b of balls) {
        if (!b.active) continue;
        if (b.y < cameraY - 50 || b.y > cameraY + canvas.height + 50) continue;
        
        // Большой мягкий шар
        ctx.beginPath();
        ctx.arc(b.x, b.y, BALL_RADIUS, 0, Math.PI*2);
        
        // Градиент для мягкости
        const grad = ctx.createRadialGradient(b.x - 3, b.y - 3, BALL_RADIUS * 0.2, b.x, b.y, BALL_RADIUS);
        grad.addColorStop(0, '#ffffff');
        grad.addColorStop(0.4, b.color);
        grad.addColorStop(1, '#000033');
        ctx.fillStyle = grad;
        ctx.fill();
        
        ctx.strokeStyle = 'rgba(255,255,255,0.5)';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        
        // Подсветка выбранного шара
        if (b.index === selectedBallIndex) {
          ctx.beginPath();
          ctx.arc(b.x, b.y, BALL_RADIUS + 4, 0, Math.PI*2);
          ctx.strokeStyle = '#ffd700';
          ctx.lineWidth = 2;
          ctx.setLineDash([4, 4]);
          ctx.stroke();
          ctx.setLineDash([]);
        }
      }
      
      ctx.restore();
      
      // Миникарта
      if (raceActive) {
        const sorted = balls.filter(b => b.active && !b.finished).sort((a, b) => b.y - a.y);
        const miniX = trackWidth - 45;
        const miniY = 8;
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(miniX - 4, miniY - 4, 40, sorted.length * 18 + 8);
        sorted.forEach((b, i) => {
          ctx.beginPath();
          ctx.arc(miniX + 12, miniY + 12 + i * 18, 6, 0, Math.PI*2);
          ctx.fillStyle = b.color;
          ctx.fill();
          ctx.fillStyle = '#fff';
          ctx.font = 'bold 9px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText(i+1, miniX + 30, miniY + 15 + i * 18);
        });
      }
    }

    function gameLoop() {
      if (raceActive) applyPhysics();
      drawScene();
      requestAnimationFrame(gameLoop);
    }

    // ========== МОДАЛЬНЫЕ ОКНА ==========
    function openBetModal() {
      if (!currentUser) { alert('Войдите в аккаунт'); return; }
      initAudio();
      
      const map = getCurrentMap();
      const ballCount = map.ballCount || 6;
      
      const selection = document.getElementById('ballSelection');
      selection.innerHTML = '';
      for (let i = 0; i < ballCount; i++) {
        const div = document.createElement('div');
        div.className = 'ball-select-item';
        if (i === selectedBallIndex) div.classList.add('selected');
        div.style.backgroundColor = BALL_COLORS[i % BALL_COLORS.length];
        div.textContent = i + 1;
        div.addEventListener('click', () => {
          selectedBallIndex = i;
          document.querySelectorAll('.ball-select-item').forEach((el, idx) => {
            el.classList.toggle('selected', idx === i);
          });
        });
        selection.appendChild(div);
      }
      
      document.getElementById('betAmount').value = betAmount;
      document.getElementById('betModal').classList.remove('hidden');
    }

    function showProfile() {
      if (!currentUser) { alert('Войдите в аккаунт'); return; }
      document.getElementById('profileName').textContent = currentUser.name;
      document.getElementById('profileId').textContent = currentUser.id;
      document.getElementById('profileBalance').textContent = Math.floor(currentUser.balance);
      document.getElementById('profileExp').textContent = Math.floor(currentUser.exp);
      document.getElementById('profileMaps').textContent = `${gameMaps.length} карт`;
      document.getElementById('profileModal').classList.remove('hidden');
    }

    function openMaps() {
      if (!currentUser) { alert('Войдите в аккаунт'); return; }
      gameMaps = loadGameMaps();
      
      const container = document.getElementById('mapsContainer');
      document.getElementById('mapsExpDisplay').textContent = Math.floor(currentUser.exp);
      container.innerHTML = '';
      
      gameMaps.forEach(map => {
        const isActive = map.id === (currentUser.currentMapId || gameMaps[0].id);
        const card = document.createElement('div');
        card.className = 'map-card';
        if (isActive) card.classList.add('active');
        
        card.innerHTML = `
          <div class="map-icon">${map.icon || '🗺️'}</div>
          <div class="map-name">${map.name}</div>
          <div style="font-size:0.6rem; color:#88aacc;">${map.obstacles ? map.obstacles.length : 0} преп.</div>
          ${isActive ? '<div style="color:#ffd700; font-size:0.6rem;">✅ Активна</div>' : '<button class="selectMapBtn" style="font-size:0.6rem; padding:3px 6px;">Выбрать</button>'}
        `;
        
        if (!isActive) {
          card.addEventListener('click', () => {
            currentUser.currentMapId = map.id;
            updateUserData(currentUser);
            updateUI();
            buildTrack();
            initBalls();
            openMaps();
          });
        }
        
        container.appendChild(card);
      });
      
      document.getElementById('mapsModal').classList.remove('hidden');
    }

    function loginUser(name) {
      const user = getOrCreateUser(name);
      if (!user) { alert('Введите имя'); return; }
      currentUser = user;
      if (!currentUser.currentMapId || !gameMaps.find(m => m.id === currentUser.currentMapId)) {
        currentUser.currentMapId = gameMaps[0].id;
      }
      document.getElementById('authModal').classList.add('hidden');
      initBalls();
      buildTrack();
      updateUI();
    }

    function logout() {
      currentUser = null;
      document.getElementById('authModal').classList.remove('hidden');
      resetGame();
      updateUI();
    }

    // ========== ОБРАБОТЧИКИ ==========
    document.getElementById('dropButton').addEventListener('click', openBetModal);
    document.getElementById('profileButton').addEventListener('click', showProfile);
    document.getElementById('mapsButton').addEventListener('click', openMaps);
    document.getElementById('logoutButton').addEventListener('click', logout);
    document.getElementById('closeMapsBtn').addEventListener('click', () => document.getElementById('mapsModal').classList.add('hidden'));
    document.getElementById('closeProfileBtn').addEventListener('click', () => document.getElementById('profileModal').classList.add('hidden'));

    document.getElementById('shakeButton').addEventListener('click', () => {
      if (!raceActive || shakeActive) return;
      initAudio();
      shakeActive = true;
      shakeTimer = 60;
    });

    document.getElementById('betPlus').addEventListener('click', () => {
      const input = document.getElementById('betAmount');
      input.value = Math.min(999999, parseInt(input.value) + 10);
    });
    document.getElementById('betMinus').addEventListener('click', () => {
      const input = document.getElementById('betAmount');
      input.value = Math.max(1, parseInt(input.value) - 10);
    });

    document.getElementById('confirmBetBtn').addEventListener('click', () => {
      betAmount = Math.max(1, parseInt(document.getElementById('betAmount').value) || 10);
      if (currentUser && betAmount > currentUser.balance) {
        alert('Недостаточно звёзд!');
        return;
      }
      document.getElementById('betModal').classList.add('hidden');
      document.getElementById('startBallInfo').textContent = BALL_NAMES[selectedBallIndex % BALL_NAMES.length];
      document.getElementById('startBallInfo').style.color = BALL_COLORS[selectedBallIndex % BALL_COLORS.length];
      document.getElementById('startBetInfo').textContent = betAmount;
      document.getElementById('startModal').classList.remove('hidden');
    });

    document.getElementById('cancelBetBtn').addEventListener('click', () => {
      document.getElementById('betModal').classList.add('hidden');
    });

    document.getElementById('startRaceBtn').addEventListener('click', () => {
      document.getElementById('startModal').classList.add('hidden');
      initBalls();
      buildTrack();
      raceActive = true;
      document.getElementById('shakeButton').disabled = false;
      document.getElementById('dropButton').textContent = '🏁 Гонка...';
      updateUI();
    });

    document.getElementById('cancelStartBtn').addEventListener('click', () => {
      document.getElementById('startModal').classList.add('hidden');
    });

    document.getElementById('loginBtn').addEventListener('click', () => {
      initAudio();
      const name = document.getElementById('usernameInput').value.trim();
      if (name) loginUser(name);
    });

    document.getElementById('usernameInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') document.getElementById('loginBtn').click();
    });

    // ========== ИНИЦИАЛИЗАЦИЯ ==========
    document.getElementById('shakeButton').disabled = true;

    const savedId = localStorage.getItem('space_pinball_race_current_v3');
    if (savedId) {
      const users = loadUsers();
      if (users[savedId]) {
        currentUser = users[savedId];
        if (!currentUser.currentMapId || !gameMaps.find(m => m.id === currentUser.currentMapId)) {
          currentUser.currentMapId = gameMaps[0].id;
        }
        document.getElementById('authModal').classList.add('hidden');
      } else {
        document.getElementById('authModal').classList.remove('hidden');
      }
    } else {
      document.getElementById('authModal').classList.remove('hidden');
    }

    window.addEventListener('beforeunload', () => {
      if (currentUser) localStorage.setItem('space_pinball_race_current_v3', currentUser.id);
    });

    initBalls();
    buildTrack();
    updateUI();
    gameLoop();
  })();
</script>
