<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.2, user-scalable=yes, viewport-fit=cover">
  <title>Space Pinball Cadet — Гонка шаров</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
    }
    body {
      background: #000010;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      touch-action: pan-x pan-y;
      font-size: 0.85rem;
      color: #fff;
    }
    .game-container {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      max-width: 500px;
      background: #000a28;
      padding: 8px 10px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      border: 2px solid #004488;
    }
    canvas {
      display: block;
      width: 100%;
      flex: 1;
      min-height: 0;
      background: #000020;
      border-radius: 12px;
      border: 2px solid #004488;
      touch-action: none;
    }
    .top-bar {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      gap: 4px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .stars-box {
      background: #0a1a3a;
      border-radius: 20px;
      padding: 5px 10px;
      display: flex;
      align-items: center;
      gap: 4px;
      font-weight: bold;
      font-size: 0.85rem;
      border: 1px solid #ffd700;
      color: #ffd700;
    }
    .exp-box {
      background: #0a1a3a;
      border-radius: 20px;
      padding: 5px 10px;
      display: flex;
      align-items: center;
      gap: 4px;
      font-weight: bold;
      font-size: 0.85rem;
      border: 1px solid #44ff44;
      color: #44ff44;
    }
    .map-indicator {
      background: #0a1a3a;
      border-radius: 20px;
      padding: 5px 10px;
      font-weight: bold;
      font-size: 0.75rem;
      border: 1px solid #0066cc;
      color: #66ccff;
    }
    button {
      background: #004488;
      border: none;
      color: #fff;
      font-weight: bold;
      border-radius: 18px;
      padding: 8px 12px;
      font-size: 0.75rem;
      cursor: pointer;
      border: 1px solid #4488cc;
      white-space: nowrap;
    }
    button:active {
      background: #0066cc;
    }
    button:disabled {
      opacity: 0.4;
      pointer-events: none;
    }
    .big-btn {
      padding: 10px 16px;
      font-size: 0.9rem;
      border-radius: 22px;
      background: #22aa22;
    }
    .small-btn {
      padding: 7px 10px;
      font-size: 0.7rem;
      border-radius: 14px;
    }
    .maps-btn {
      background: #5522aa;
      border-color: #9966dd;
    }
    .user-greeting {
      background: rgba(0,100,200,0.2);
      padding: 5px 10px;
      border-radius: 14px;
      font-weight: 600;
      font-size: 0.7rem;
      border: 1px solid rgba(100,180,255,0.3);
    }
    .hidden {
      display: none !important;
    }
    .modal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,20,0.85);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }
    .modal-content {
      background: #0a1a3a;
      padding: 20px;
      border-radius: 20px;
      width: 90%;
      max-width: 420px;
      border: 2px solid #0066cc;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 85vh;
      overflow-y: auto;
    }
    .result-content {
      background: #0a1a3a;
      padding: 20px;
      border-radius: 20px;
      width: 90%;
      max-width: 380px;
      border: 2px solid #66ccff;
      display: flex;
      flex-direction: column;
      gap: 12px;
      text-align: left;
    }
    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .result-row:last-child {
      border-bottom: none;
    }
    .result-label {
      color: #88aacc;
      font-size: 0.85rem;
    }
    .result-value {
      font-weight: bold;
      font-size: 0.9rem;
    }
    .ball-selection {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .ball-select-item {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      transition: all 0.2s;
    }
    .ball-select-item:hover {
      transform: scale(1.15);
    }
    .ball-select-item.selected {
      border-color: #ffd700;
      box-shadow: 0 0 15px #ffd700;
    }
    .bet-input {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .bet-input input {
      width: 120px;
      text-align: center;
      font-size: 1.2rem;
      font-weight: bold;
    }
    .race-info {
      position: absolute;
      top: 50px;
      right: 10px;
      background: rgba(0,0,0,0.8);
      padding: 5px 10px;
      border-radius: 10px;
      font-weight: bold;
      font-size: 0.9rem;
      color: #ffd700;
      z-index: 10;
      pointer-events: none;
    }
    .action-row {
      display: flex;
      gap: 5px;
      justify-content: center;
      flex-wrap: wrap;
      align-items: center;
      flex-shrink: 0;
      margin-top: 6px;
    }
  </style>
</head>
<body>

<div class="game-container" id="gameContainer">
  <div class="top-bar">
    <div class="user-greeting" id="userGreeting">👨‍🚀 Гость</div>
    <div class="exp-box">✨ <span id="expDisplay">0</span></div>
    <div class="stars-box">⭐ <span id="balanceDisplay">100</span></div>
    <div class="map-indicator" id="mapIndicator">🌍 Карта 1</div>
  </div>
  
  <div style="position: relative; flex: 1; width: 100%; min-height: 0;">
    <canvas id="gameCanvas" width="440" height="700"></canvas>
    <div class="race-info hidden" id="raceInfo">🏁 1/6</div>
  </div>
  
  <div class="action-row" id="actionButtons">
    <button id="dropButton" class="big-btn">🎯 Выбрать шар</button>
    <button id="shakeButton" class="big-btn" disabled>🌌 Толчок</button>
  </div>
  <div class="action-row">
    <button id="mapsButton" class="maps-btn small-btn">🗺️ Карты</button>
    <button id="shopButton" class="small-btn">🛒 Магазин</button>
    <button id="profileButton" class="small-btn">👤 Профиль</button>
    <button id="logoutButton" class="small-btn">🚪 Выйти</button>
  </div>
</div>

<!-- Модальное окно выбора шара и ставки -->
<div id="betModal" class="modal hidden">
  <div class="modal-content">
    <h2 style="color:#ffd700; text-align:center;">🎯 Выберите шар</h2>
    <div class="ball-selection" id="ballSelection"></div>
    <h3 style="color:#ffd700; text-align:center;">💰 Ставка (⭐)</h3>
    <div class="bet-input">
      <button id="betMinus">➖</button>
      <input type="number" id="betAmount" value="10" min="1" max="999999">
      <button id="betPlus">➕</button>
    </div>
    <div style="display: flex; gap: 10px; justify-content: center;">
      <button id="confirmBetBtn" class="big-btn">✅ Подтвердить</button>
      <button id="cancelBetBtn">❌ Отмена</button>
    </div>
  </div>
</div>

<!-- Модальное окно старта -->
<div id="startModal" class="modal hidden">
  <div class="modal-content">
    <h2 style="color:#ffd700; text-align:center;">🚀 Готовы к гонке?</h2>
    <p style="text-align:center;">Выбран шар: <span id="startBallInfo" style="color:#ffd700;"></span></p>
    <p style="text-align:center;">Ставка: ⭐ <span id="startBetInfo" style="color:#ffd700;"></span></p>
    <div style="display: flex; gap: 10px; justify-content: center;">
      <button id="startRaceBtn" class="big-btn" style="background:#44ff44;">🏁 СТАРТ</button>
      <button id="cancelStartBtn">❌ Отменить</button>
    </div>
  </div>
</div>

<!-- Окно результата -->
<div id="resultModal" class="modal hidden">
  <div class="result-content" id="resultContent"></div>
</div>

<!-- Остальные модальные окна -->
<div id="authModal" class="modal">
  <div class="modal-content">
    <h2>🔐 Вход в космопорт</h2>
    <input type="text" id="usernameInput" placeholder="Позывной пилота" maxlength="16" autocomplete="off">
    <button id="loginBtn">▶ Запуск</button>
    <p style="font-size:0.75rem; color:#88aacc;">Новый пилот получит ID, 100 ⭐ и 0 ✨</p>
  </div>
</div>

<div id="mapsModal" class="modal hidden">
  <div class="modal-content">
    <h2 style="color:#ffd700; text-align:center;">🗺️ Карты миссий</h2>
    <p style="text-align:center; font-size:0.8rem; color:#88aacc;">Опыт: ✨ <span id="mapsExpDisplay">0</span></p>
    <div id="mapsContainer" class="maps-grid"></div>
    <button id="closeMapsBtn" style="align-self: center;">Закрыть</button>
  </div>
</div>

<div id="shopModal" class="modal hidden">
  <div class="modal-content">
    <h2 style="color:#ffd700; text-align:center;">🛒 Магазин шариков</h2>
    <p style="text-align:center; font-size:0.8rem; color:#88aacc;">Выбран: <span id="shopSelectedBall" style="color:#ffd700;"></span></p>
    <div id="shopItemsContainer" class="shop-grid"></div>
    <button id="closeShopBtn" style="align-self: center;">Закрыть</button>
  </div>
</div>

<div id="profileModal" class="modal hidden">
  <div class="modal-content">
    <h2>👤 Профиль пилота</h2>
    <p>Имя: <strong id="profileName"></strong></p>
    <p>ID: <strong id="profileId"></strong></p>
    <p>Звёзд: ⭐ <strong id="profileBalance"></strong></p>
    <p>Опыт: ✨ <strong id="profileExp"></strong></p>
    <p>Открыто карт: <strong id="profileMaps"></strong></p>
    <button id="closeProfileBtn">Закрыть</button>
  </div>
</div>

<script>
  (function() {
    // ========== ЗВУКИ ==========
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;

    function initAudio() {
      if (!audioCtx) audioCtx = new AudioContext();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playSound(freq, type, duration, vol = 0.08) {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      gain.gain.setValueAtTime(vol, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + duration);
    }

    function soundBounce() { playSound(300 + Math.random() * 300, 'triangle', 0.06, 0.05); }
    function soundBumper() { playSound(500, 'square', 0.08, 0.07); }
    function soundFinish() { playSound(600, 'triangle', 0.3, 0.15); setTimeout(() => playSound(800, 'triangle', 0.3, 0.15), 0.1); }

    // ========== БАЗА ДАННЫХ ==========
    const STORAGE_KEY = 'space_pinball_race_db_v1';
    let currentUser = null;

    function loadUsers() { const data = localStorage.getItem(STORAGE_KEY); return data ? JSON.parse(data) : {}; }
    function saveUsers(users) { localStorage.setItem(STORAGE_KEY, JSON.stringify(users)); }
    function getOrCreateUser(name) {
      const users = loadUsers();
      const trimmed = name.trim().toLowerCase();
      if (!trimmed) return null;
      for (let [id, user] of Object.entries(users)) {
        if (user.name.toLowerCase() === trimmed) {
          if (!user.exp) user.exp = 0;
          if (!user.selectedBall) user.selectedBall = 1;
          return user;
        }
      }
      const newId = Math.floor(10000000 + Math.random() * 90000000).toString();
      const newUser = { id: newId, name: trimmed, balance: 100, exp: 0, selectedBall: 1 };
      users[newId] = newUser;
      saveUsers(users);
      return newUser;
    }
    function updateUserData(u) { const users = loadUsers(); if (users[u.id]) { users[u.id] = u; saveUsers(users); currentUser = u; } }

    // ========== ИГРОВЫЕ ПЕРЕМЕННЫЕ ==========
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
      const container = canvas.parentElement;
      const rect = container.getBoundingClientRect();
      canvas.width = Math.floor(rect.width - 20);
      canvas.height = Math.floor(rect.height);
    }
    resizeCanvas();
    window.addEventListener('resize', () => { resizeCanvas(); buildTrack(); });

    const GRAVITY = 0.15;
    const BALL_RADIUS = 6;
    const BALL_COLORS = ['#ff4444', '#44aaff', '#44ff44', '#ffdd44', '#ff44ff', '#ff8844'];
    const BALL_NAMES = ['Красный', 'Синий', 'Зелёный', 'Жёлтый', 'Розовый', 'Оранжевый'];

    // Препятствия 6 видов
    const OBSTACLE_TYPES = ['pin', 'bumper', 'funnel', 'tunnel', 'spinner', 'wall'];

    let trackLength = 3500;
    let trackWidth = 0;
    let cameraY = 0;
    let obstacles = [];
    let finishLine = 3500;

    let balls = [];
    let selectedBallIndex = 0;
    let betAmount = 10;
    let raceActive = false;
    let raceFinished = false;
    let finishOrder = [];
    let shakeActive = false;
    let shakeTimer = 0;
    let sessionExp = 0;

    function getBallColor(index) { return BALL_COLORS[index] || '#ffffff'; }

    function buildTrack() {
      trackWidth = canvas.width;
      finishLine = trackLength - 100;
      obstacles = [];
      
      // Генерируем препятствия по всей длине трассы
      for (let y = 100; y < trackLength - 200; y += 40 + Math.random() * 60) {
        const type = OBSTACLE_TYPES[Math.floor(Math.random() * OBSTACLE_TYPES.length)];
        const cx = trackWidth / 2;
        
        if (type === 'pin') {
          // Круглые пины
          const count = 3 + Math.floor(Math.random() * 4);
          for (let i = 0; i < count; i++) {
            const px = 30 + Math.random() * (trackWidth - 60);
            obstacles.push({ x: px, y: y + Math.random() * 20, radius: 4, type: 'pin', color: '#f4d03f' });
          }
        } else if (type === 'bumper') {
          // Батуты
          const bw = 40 + Math.random() * 30;
          obstacles.push({ x: cx + (Math.random() - 0.5) * trackWidth * 0.6, y: y, width: bw, height: 6, type: 'bumper', color: '#ff4466', force: 4 });
        } else if (type === 'funnel') {
          // Воронка
          obstacles.push({ x: cx + (Math.random() - 0.5) * trackWidth * 0.4, y: y, radius: 25, type: 'funnel', color: '#8844ff', spin: 0 });
        } else if (type === 'tunnel') {
          // Туннель (стенки по бокам)
          const tunnelY = y;
          for (let ty = 0; ty < 150; ty += 15) {
            obstacles.push({ x: 15, y: tunnelY + ty, width: 8, height: 14, type: 'wall_seg', color: '#666666' });
            obstacles.push({ x: trackWidth - 15, y: tunnelY + ty, width: 8, height: 14, type: 'wall_seg', color: '#666666' });
          }
        } else if (type === 'spinner') {
          // Вращающаяся лопасть
          obstacles.push({ x: cx, y: y, radius: 20, type: 'spinner', color: '#ff8800', angle: Math.random() * Math.PI * 2, speed: 0.03 + Math.random() * 0.05 });
        } else if (type === 'wall') {
          // Стена с проходом
          const gapX = 40 + Math.random() * (trackWidth - 80);
          obstacles.push({ x: gapX, y: y, width: 50, type: 'wall_gap', color: '#888888' });
        }
      }
      
      // Финишная линия
      obstacles.push({ y: finishLine, type: 'finish' });
    }

    function initBalls() {
      balls = [];
      for (let i = 0; i < 6; i++) {
        balls.push({
          x: trackWidth / 2 + (i - 2.5) * 15,
          y: 30,
          vx: 0,
          vy: 0,
          active: true,
          finished: false,
          finishPos: 0,
          color: BALL_COLORS[i],
          index: i
        });
      }
      cameraY = 0;
      raceActive = false;
      raceFinished = false;
      finishOrder = [];
      shakeActive = false;
      shakeTimer = 0;
      sessionExp = 0;
    }

    function updateUI() {
      if (!currentUser) {
        document.getElementById('balanceDisplay').textContent = '0';
        document.getElementById('expDisplay').textContent = '0';
        document.getElementById('userGreeting').textContent = '👨‍🚀 Гость';
        return;
      }
      document.getElementById('balanceDisplay').textContent = Math.floor(currentUser.balance);
      document.getElementById('expDisplay').textContent = Math.floor(currentUser.exp);
      document.getElementById('userGreeting').textContent = `👨‍🚀 ${currentUser.name}`;
    }

    function applyPhysics() {
      if (!raceActive) return;
      
      if (shakeActive) {
        shakeTimer--;
        if (shakeTimer <= 0) shakeActive = false;
      }
      
      let allFinished = true;
      
      for (let b of balls) {
        if (!b.active || b.finished) continue;
        allFinished = false;
        
        b.vy += GRAVITY;
        b.x += b.vx;
        b.y += b.vy;
        
        // Тряска
        if (shakeActive) {
          b.vx += (Math.random() - 0.5) * 1.5;
          b.vy += (Math.random() - 0.5) * 1.5;
        }
        
        // Стены
        if (b.x - BALL_RADIUS < 5) { b.x = BALL_RADIUS + 5; b.vx = Math.abs(b.vx) * 0.5; }
        if (b.x + BALL_RADIUS > trackWidth - 5) { b.x = trackWidth - BALL_RADIUS - 5; b.vx = -Math.abs(b.vx) * 0.5; }
        
        // Препятствия
        for (let obs of obstacles) {
          if (obs.type === 'pin') {
            const dx = b.x - obs.x;
            const dy = b.y - obs.y;
            const dist = Math.sqrt(dx*dx+dy*dy);
            if (dist < BALL_RADIUS + obs.radius) {
              const nx = dx/dist, ny = dy/dist;
              b.x += nx * (BALL_RADIUS + obs.radius - dist);
              b.y += ny * (BALL_RADIUS + obs.radius - dist);
              const vn = b.vx*nx + b.vy*ny;
              if (vn < 0) { b.vx -= 1.5*vn*nx; b.vy -= 1.5*vn*ny; }
              if (currentUser) { currentUser.exp += 1; sessionExp += 1; updateUserData(currentUser); }
            }
          } else if (obs.type === 'bumper') {
            if (b.x > obs.x - obs.width/2 - BALL_RADIUS && b.x < obs.x + obs.width/2 + BALL_RADIUS &&
                b.y > obs.y - obs.height/2 - BALL_RADIUS && b.y < obs.y + obs.height/2 + BALL_RADIUS) {
              b.vy = -Math.abs(b.vy) * obs.force - 3;
              b.vx += (Math.random() - 0.5) * 3;
              soundBumper();
              if (currentUser) { currentUser.exp += 1; sessionExp += 1; updateUserData(currentUser); }
            }
          } else if (obs.type === 'funnel') {
            const dx = b.x - obs.x;
            const dy = b.y - obs.y;
            const dist = Math.sqrt(dx*dx+dy*dy);
            if (dist < obs.radius && dist > 5) {
              const force = 0.15;
              b.vx += (-dy / dist) * force;
              b.vy += (dx / dist) * force;
              obs.spin = (obs.spin || 0) + 0.05;
            }
          } else if (obs.type === 'wall_seg') {
            if (b.x > obs.x - obs.width/2 - BALL_RADIUS && b.x < obs.x + obs.width/2 + BALL_RADIUS &&
                b.y > obs.y - obs.height/2 - BALL_RADIUS && b.y < obs.y + obs.height/2 + BALL_RADIUS) {
              if (b.x < obs.x) { b.x = obs.x - obs.width/2 - BALL_RADIUS; b.vx = -Math.abs(b.vx) * 0.5; }
              else { b.x = obs.x + obs.width/2 + BALL_RADIUS; b.vx = Math.abs(b.vx) * 0.5; }
            }
          } else if (obs.type === 'spinner') {
            const dx = b.x - obs.x;
            const dy = b.y - obs.y;
            const dist = Math.sqrt(dx*dx+dy*dy);
            if (dist < BALL_RADIUS + obs.radius) {
              obs.angle += obs.speed;
              const fx = Math.cos(obs.angle) * 2;
              const fy = Math.sin(obs.angle) * 2;
              b.vx += fx;
              b.vy += fy;
              if (currentUser) { currentUser.exp += 1; sessionExp += 1; updateUserData(currentUser); }
            }
          } else if (obs.type === 'wall_gap') {
            if (Math.abs(b.y - obs.y) < BALL_RADIUS + 3) {
              if (b.x < obs.x - obs.width/2 || b.x > obs.x + obs.width/2) {
                b.vy = Math.abs(b.vy) * 0.5;
                b.y = obs.y - BALL_RADIUS - 3;
              }
            }
          }
        }
        
        // Финиш
        if (b.y >= finishLine && !b.finished) {
          b.finished = true;
          b.finishPos = finishOrder.length + 1;
          finishOrder.push(b.index);
          soundFinish();
        }
        
        b.vx *= 0.998;
        b.vy *= 0.998;
      }
      
      // Обновление камеры
      const selectedBall = balls[selectedBallIndex];
      if (selectedBall && selectedBall.active) {
        const targetY = selectedBall.y - canvas.height * 0.4;
        cameraY += (targetY - cameraY) * 0.1;
        if (cameraY < 0) cameraY = 0;
        if (cameraY > trackLength - canvas.height) cameraY = trackLength - canvas.height;
      }
      
      // Обновление позиции в гонке
      updateRacePosition();
      
      if (allFinished || finishOrder.length >= 6) {
        endRace();
      }
      
      updateUI();
    }

    function updateRacePosition() {
      const selectedBall = balls[selectedBallIndex];
      if (!selectedBall || selectedBall.finished) return;
      
      const sorted = balls.filter(b => b.active).sort((a, b) => b.y - a.y);
      const position = sorted.indexOf(selectedBall) + 1;
      const total = sorted.length;
      
      document.getElementById('raceInfo').textContent = `🏁 ${position}/${total}`;
      document.getElementById('raceInfo').classList.remove('hidden');
    }

    function endRace() {
      raceActive = false;
      raceFinished = true;
      document.getElementById('raceInfo').classList.add('hidden');
      
      // Определяем позицию выбранного шара
      const selectedPos = balls[selectedBallIndex].finishPos || finishOrder.indexOf(selectedBallIndex) + 1;
      
      // Расчёт выигрыша
      const multipliers = [0, 3, 2, 1, 0.5, 0, 0]; // 1-е: x3, 2-е: x2, 3-е: x1, 4-е: -50%, 5-е: -100%, 6-е: -150%
      let multiplier = 0;
      let winnings = 0;
      
      if (selectedPos === 1) { multiplier = 3; winnings = betAmount * 3; }
      else if (selectedPos === 2) { multiplier = 2; winnings = betAmount * 2; }
      else if (selectedPos === 3) { multiplier = 1; winnings = betAmount; }
      else if (selectedPos === 4) { multiplier = 0.5; winnings = -Math.floor(betAmount * 0.5); }
      else if (selectedPos === 5) { multiplier = 0; winnings = -betAmount; }
      else if (selectedPos === 6) { multiplier = -0.5; winnings = -Math.floor(betAmount * 1.5); }
      
      const oldBalance = currentUser ? currentUser.balance : 0;
      if (currentUser) {
        currentUser.balance += winnings;
        updateUserData(currentUser);
      }
      const newBalance = currentUser ? currentUser.balance : 0;
      
      // Показ результата
      const resultDiv = document.getElementById('resultContent');
      const positions = ['', '🥇', '🥈', '🥉', '4️⃣', '5️⃣', '6️⃣'];
      let orderHTML = finishOrder.map((idx, i) => 
        `<div style="color:${BALL_COLORS[idx]}; margin: 2px 0;">${positions[i+1]} ${BALL_NAMES[idx]}</div>`
      ).join('');
      
      resultDiv.innerHTML = `
        <h3 style="color:#66ccff; text-align:center;">🏁 Результаты гонки</h3>
        <div style="background:rgba(0,0,0,0.3); border-radius:12px; padding:12px;">
          <div style="margin-bottom:10px;">${orderHTML}</div>
          <div class="result-row"><span class="result-label">Ваш шар</span><span class="result-value" style="color:${BALL_COLORS[selectedBallIndex]};">${BALL_NAMES[selectedBallIndex]} — ${positions[selectedPos]} место</span></div>
          <div class="result-row"><span class="result-label">Ставка</span><span class="result-value">⭐ ${betAmount}</span></div>
          <div class="result-row"><span class="result-label">Множитель</span><span class="result-value" style="color:#ffd700;">x${multiplier}</span></div>
          <div class="result-row"><span class="result-label">Выигрыш</span><span class="result-value" style="color:${winnings>=0?'#4caf50':'#f44336'};">${winnings>=0?'+':''}${winnings} ⭐</span></div>
          <div class="result-row"><span class="result-label">Опыт</span><span class="result-value" style="color:#44ff44;">+${sessionExp} ✨</span></div>
        </div>
        <button id="closeResultBtn" style="align-self:center;">Ок</button>
      `;
      document.getElementById('resultModal').classList.remove('hidden');
      document.getElementById('closeResultBtn').addEventListener('click', () => {
        document.getElementById('resultModal').classList.add('hidden');
        resetGame();
      });
    }

    function resetGame() {
      initBalls();
      buildTrack();
      document.getElementById('shakeButton').disabled = true;
      document.getElementById('dropButton').textContent = '🎯 Выбрать шар';
      document.getElementById('raceInfo').classList.add('hidden');
      updateUI();
    }

    function drawScene() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Фон трассы
      const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
      gradient.addColorStop(0, '#001a33');
      gradient.addColorStop(1, '#000010');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // Боковые стены
      ctx.fillStyle = '#1a1a3a';
      ctx.fillRect(0, 0, 5, canvas.height);
      ctx.fillRect(trackWidth - 5, 0, 5, canvas.height);
      
      ctx.save();
      ctx.translate(0, -cameraY);
      
      // Препятствия
      for (let obs of obstacles) {
        if (obs.y < cameraY - 50 || obs.y > cameraY + canvas.height + 50) continue;
        
        if (obs.type === 'pin') {
          ctx.beginPath();
          ctx.arc(obs.x, obs.y, obs.radius, 0, Math.PI*2);
          ctx.fillStyle = obs.color;
          ctx.fill();
        } else if (obs.type === 'bumper') {
          ctx.fillStyle = obs.color;
          ctx.fillRect(obs.x - obs.width/2, obs.y - obs.height/2, obs.width, obs.height);
          ctx.fillStyle = '#fff';
          ctx.font = '10px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText('▲▲▲', obs.x, obs.y + 4);
        } else if (obs.type === 'funnel') {
          ctx.beginPath();
          ctx.arc(obs.x, obs.y, obs.radius, 0, Math.PI*2);
          ctx.strokeStyle = obs.color;
          ctx.lineWidth = 3;
          ctx.stroke();
          // Спираль
          ctx.beginPath();
          for (let a = 0; a < Math.PI*4; a += 0.2) {
            const r = obs.radius * 0.2 + a * 1.5;
            const px = obs.x + Math.cos(a + (obs.spin||0)) * r;
            const py = obs.y + Math.sin(a + (obs.spin||0)) * r;
            if (a === 0) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
          }
          ctx.strokeStyle = '#ffffff';
          ctx.lineWidth = 1;
          ctx.stroke();
        } else if (obs.type === 'wall_seg') {
          ctx.fillStyle = obs.color;
          ctx.fillRect(obs.x - obs.width/2, obs.y - obs.height/2, obs.width, obs.height);
        } else if (obs.type === 'spinner') {
          ctx.save();
          ctx.translate(obs.x, obs.y);
          ctx.rotate(obs.angle);
          ctx.fillStyle = obs.color;
          ctx.fillRect(-obs.radius, -3, obs.radius*2, 6);
          ctx.fillRect(-3, -obs.radius, 6, obs.radius*2);
          ctx.restore();
        } else if (obs.type === 'wall_gap') {
          ctx.fillStyle = obs.color;
          ctx.fillRect(0, obs.y - 2, obs.x - obs.width/2, 4);
          ctx.fillRect(obs.x + obs.width/2, obs.y - 2, trackWidth - obs.x - obs.width/2, 4);
        } else if (obs.type === 'finish') {
          ctx.fillStyle = '#ffd700';
          ctx.fillRect(0, obs.y - 3, trackWidth, 6);
          // Клетчатый узор
          for (let fx = 0; fx < trackWidth; fx += 20) {
            ctx.fillStyle = (Math.floor(fx/20) % 2 === 0) ? '#000' : '#ffd700';
            ctx.fillRect(fx, obs.y - 3, 20, 6);
          }
        }
      }
      
      // Шары
      for (let b of balls) {
        if (!b.active) continue;
        if (b.y < cameraY - 50 || b.y > cameraY + canvas.height + 50) continue;
        
        ctx.beginPath();
        ctx.arc(b.x, b.y, BALL_RADIUS, 0, Math.PI*2);
        ctx.fillStyle = b.color;
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        
        // Подсветка выбранного шара
        if (b.index === selectedBallIndex) {
          ctx.beginPath();
          ctx.arc(b.x, b.y, BALL_RADIUS + 4, 0, Math.PI*2);
          ctx.strokeStyle = '#ffd700';
          ctx.lineWidth = 2;
          ctx.setLineDash([3, 3]);
          ctx.stroke();
          ctx.setLineDash([]);
        }
      }
      
      ctx.restore();
      
      // Миникарта позиций (справа)
      if (raceActive) {
        const sorted = balls.filter(b => b.active && !b.finished).sort((a, b) => b.y - a.y);
        const miniX = trackWidth - 50;
        const miniY = 10;
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(miniX - 5, miniY - 5, 45, sorted.length * 22 + 10);
        sorted.forEach((b, i) => {
          ctx.beginPath();
          ctx.arc(miniX + 15, miniY + 15 + i * 22, 7, 0, Math.PI*2);
          ctx.fillStyle = b.color;
          ctx.fill();
          ctx.fillStyle = '#fff';
          ctx.font = 'bold 10px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText(i+1, miniX + 35, miniY + 19 + i * 22);
        });
      }
    }

    function gameLoop() {
      if (raceActive) applyPhysics();
      drawScene();
      requestAnimationFrame(gameLoop);
    }

    function openBetModal() {
      if (!currentUser) { alert('Войдите в аккаунт'); return; }
      initAudio();
      
      const selection = document.getElementById('ballSelection');
      selection.innerHTML = '';
      for (let i = 0; i < 6; i++) {
        const div = document.createElement('div');
        div.className = 'ball-select-item';
        if (i === selectedBallIndex) div.classList.add('selected');
        div.style.backgroundColor = BALL_COLORS[i];
        div.textContent = i + 1;
        div.addEventListener('click', () => {
          selectedBallIndex = i;
          document.querySelectorAll('.ball-select-item').forEach((el, idx) => {
            el.classList.toggle('selected', idx === i);
          });
        });
        selection.appendChild(div);
      }
      
      document.getElementById('betAmount').value = betAmount;
      document.getElementById('betModal').classList.remove('hidden');
    }

    document.getElementById('betPlus').addEventListener('click', () => {
      const input = document.getElementById('betAmount');
      input.value = Math.min(999999, parseInt(input.value) + 10);
    });
    document.getElementById('betMinus').addEventListener('click', () => {
      const input = document.getElementById('betAmount');
      input.value = Math.max(1, parseInt(input.value) - 10);
    });

    document.getElementById('confirmBetBtn').addEventListener('click', () => {
      betAmount = Math.max(1, parseInt(document.getElementById('betAmount').value) || 10);
      if (currentUser && betAmount > currentUser.balance) {
        alert('Недостаточно звёзд!');
        return;
      }
      document.getElementById('betModal').classList.add('hidden');
      document.getElementById('startBallInfo').textContent = BALL_NAMES[selectedBallIndex];
      document.getElementById('startBallInfo').style.color = BALL_COLORS[selectedBallIndex];
      document.getElementById('startBetInfo').textContent = betAmount;
      document.getElementById('startModal').classList.remove('hidden');
    });

    document.getElementById('cancelBetBtn').addEventListener('click', () => {
      document.getElementById('betModal').classList.add('hidden');
    });

    document.getElementById('startRaceBtn').addEventListener('click', () => {
      document.getElementById('startModal').classList.add('hidden');
      initBalls();
      buildTrack();
      raceActive = true;
      document.getElementById('shakeButton').disabled = false;
      document.getElementById('dropButton').textContent = '🏁 Гонка...';
      updateUI();
    });

    document.getElementById('cancelStartBtn').addEventListener('click', () => {
      document.getElementById('startModal').classList.add('hidden');
    });

    document.getElementById('dropButton').addEventListener('click', openBetModal);

    document.getElementById('shakeButton').addEventListener('click', () => {
      if (!raceActive || shakeActive) return;
      initAudio();
      shakeActive = true;
      shakeTimer = 60; // 1 секунда при 60 FPS
    });

    function loginUser(name) {
      const user = getOrCreateUser(name);
      if (!user) { alert('Введите имя'); return; }
      currentUser = user;
      document.getElementById('authModal').classList.add('hidden');
      initBalls();
      buildTrack();
      updateUI();
    }

    function logout() {
      currentUser = null;
      document.getElementById('authModal').classList.remove('hidden');
      resetGame();
      updateUI();
    }

    document.getElementById('loginBtn').addEventListener('click', () => {
      initAudio();
      const name = document.getElementById('usernameInput').value.trim();
      if (name) loginUser(name);
    });

    document.getElementById('logoutButton').addEventListener('click', logout);
    document.getElementById('shakeButton').disabled = true;

    // Проверка сохранённой сессии
    const savedId = localStorage.getItem('space_pinball_race_current');
    if (savedId) {
      const users = loadUsers();
      if (users[savedId]) {
        currentUser = users[savedId];
        document.getElementById('authModal').classList.add('hidden');
      } else {
        document.getElementById('authModal').classList.remove('hidden');
      }
    } else {
      document.getElementById('authModal').classList.remove('hidden');
    }

    window.addEventListener('beforeunload', () => {
      if (currentUser) localStorage.setItem('space_pinball_race_current', currentUser.id);
    });

    initBalls();
    buildTrack();
    updateUI();
    gameLoop();
  })();
</script>
