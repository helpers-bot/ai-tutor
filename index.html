<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Plinko Pro Deluxe</title>
    <style>
        :root { --accent: #ff6ec7; --bg: #05050f; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; overflow: hidden; height: 100vh; }
        #gameCanvas { background: #0b0b1a; touch-action: none; border-left: 4px solid #333; border-right: 4px solid #333; }
        .ui { width: 100%; max-width: 500px; padding: 15px; display: flex; justify-content: space-between; background: #16162e; z-index: 10; }
        .menu { display: flex; gap: 10px; margin-top: 10px; }
        button { padding: 12px 20px; border-radius: 12px; border: none; background: var(--accent); font-weight: bold; cursor: pointer; transition: transform 0.2s; }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div class="ui">
    <div>💰 <span id="balance">100.0</span></div>
    <div>🎯 x<span id="multiplier">1</span></div>
</div>

<canvas id="gameCanvas"></canvas>

<div class="menu">
    <button onclick="launchBall()">ЗАПУСК</button>
    <button onclick="alert('Магазин шаров')">МАГАЗИН</button>
    <button onclick="alert('Профиль ID: 12345678')">ПРОФИЛЬ</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(freq, type, dur) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + dur);
}

// Адаптация размера
function resize() {
    canvas.width = Math.min(window.innerWidth, 500);
    canvas.height = window.innerHeight * 0.7;
}
window.onresize = resize; resize();

let balance = 100, ballMult = 1, isRunning = false;
const pins = [];
const rows = 12, cols = 10;
for(let i=0; i<rows; i++) {
    for(let j=0; j<cols; j++) {
        pins.push({ x: (canvas.width/(cols+1)) * (j + 1) + (i%2 ? 15 : -15), y: 150 + i * 35 });
    }
}

function draw() {
    ctx.fillStyle = '#0b0b1a'; ctx.fillRect(0,0, canvas.width, canvas.height);
    ctx.fillStyle = '#ff6ec7';
    pins.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill(); });
    // Ячейки
    for(let i=0; i<cols; i++) {
        ctx.fillStyle = i%2 ? '#222' : '#333';
        ctx.fillRect(i*(canvas.width/cols), canvas.height-40, canvas.width/cols-2, 40);
    }
}

function launchBall() {
    if(isRunning || balance < 1) return;
    balance--; document.getElementById('balance').innerText = balance.toFixed(1);
    isRunning = true;
    let ball = { x: canvas.width/2, y: 50, vx: (Math.random()-0.5)*2, vy: 2 };

    function frame() {
        ball.vy += 0.2; ball.x += ball.vx; ball.y += ball.vy;
        if(ball.x < 10 || ball.x > canvas.width-10) { ball.vx *= -0.8; playSound(100, 'square', 0.1); }
        
        pins.forEach(p => {
            if(Math.hypot(ball.x-p.x, ball.y-p.y) < 10) {
                ball.vy = -ball.vy * 0.6; ball.vx = (Math.random()-0.5)*5;
                playSound(400, 'sine', 0.05);
            }
        });

        draw();
        ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(ball.x, ball.y, 8, 0, Math.PI*2); ctx.fill();

        if(ball.y < canvas.height - 40) requestAnimationFrame(frame);
        else {
            const idx = Math.floor(ball.x / (canvas.width/cols));
            const rewards = [0.2, 0.5, 1, 2, 5, 5, 2, 1, 0.5, 0.2];
            balance += rewards[idx] * ballMult;
            document.getElementById('balance').innerText = balance.toFixed(1);
            playSound(800, 'triangle', 0.3);
            isRunning = false;
        }
    }
    frame();
}
draw();
</script>
</body>
</html>
