        }

            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #f9d56e, #e6a861);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
        }
        .subtitle {
            color: #b7a16c;
            font-weight: 500;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            text-align: center;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .stat-box {
            background: rgba(0,0,0,0.3);
            border-radius: 1rem;
            padding: 1rem;
            text-align: center;
            flex: 1;
            min-width: 150px;
        }
        .stat-label {
            font-size: 0.7rem;
            color: #b9b09a;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.3rem;
        }
        .stat-value {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fad974, #ebaa5e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .nickname-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 0.5rem;
            max-height: 60vh;
            overflow-y: auto;
            padding: 1rem;
            background: rgba(0,0,0,0.2);
            border-radius: 1rem;
            margin-bottom: 1.5rem;
        }
        .nickname-item {
            background: rgba(25, 22, 17, 0.6);
            border-radius: 0.8rem;
            padding: 0.5rem 0.8rem;
            font-size: 0.78rem;
            border: 1px solid rgba(212, 165, 60, 0.2);
            color: #f5d78c;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .nickname-item:hover {
            background: rgba(243, 185, 91, 0.2);
            border-color: #f3b95b;
            transform: translateY(-2px);
        }
        .btn {
            background: linear-gradient(135deg, #e2a542, #c7851e);
            border: none;
            color: #0f0e0a;
            font-weight: 700;
            font-size: 0.9rem;
            padding: 0.7rem 1.6rem;
            border-radius: 2rem;
            cursor: pointer;
            transition: 0.25s;
            box-shadow: 0 6px 15px rgba(226, 165, 66, 0.35);
            margin: 0.5rem;
        }
        .btn:hover {
            background: linear-gradient(135deg, #f3b95b, #da9729);
            box-shadow: 0 8px 20px rgba(243, 185, 91, 0.6);
            color: #000;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #c9a357;
            color: #e9c274;
            font-weight: 600;
            font-size: 0.8rem;
            padding: 0.45rem 1.2rem;
            border-radius: 1.8rem;
            cursor: pointer;
            transition: 0.25s;
            text-decoration: none;
            margin: 0.5rem;
        }
        .btn-outline:hover {
            background: #f3b95b20;
            border-color: #f3b95b;
            color: #ffe6b3;
            box-shadow: 0 0 12px rgba(243, 185, 91, 0.3);
        }
        .controls {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .search-box {
            width: 100%;
            max-width: 400px;
            background: rgba(15, 16, 20, 0.8);
            border: 1px solid rgba(220, 180, 100, 0.25);
            border-radius: 1rem;
            padding: 0.75rem 1rem;
            font-size: 0.9rem;
            color: #f5e7cc;
            outline: none;
            font-family: 'Inter', sans-serif;
            margin: 0 auto 1rem;
            display: block;
        }
        .search-box:focus {
            border-color: #f3b95b;
            box-shadow: 0 0 12px rgba(243, 185, 91, 0.4);
        }
        .info-text {
            color: #b9b09a;
            font-size: 0.75rem;
            text-align: center;
            margin-top: 1rem;
        }
        .highlight {
            color: #4caf50;
            font-weight: 600;
        }
    </style>

            'MoneyMaker2000', 'CashFlow1999', 'GoldDigger1988', 'DiamondHands1977', 'CryptoKing1966',
            'BitMaster1955', 'CoinLord1944', 'TokenKing1933', 'ChainMaster1922', 'BlockBuilder1911',
            'MemeLord1888', 'TrollKing1877', 'JokeMaster1866', 'FunMaker1855', 'LaughKing1844',
            'StormBorn1833', 'FireKissed1822', 'IceTouched1811', 'WindBlessed1800', 'EarthBound1799',
            'StarChild1788', 'MoonBorn1777', 'SunKissed1766', 'SkyWalker1755', 'SeaSpirit1744',
            'BattleAxe1733', 'WarHammer1722', 'PeaceMaker1711', 'TroubleShooter1700', 'ProblemSolver1699',
            'QuantumLeap1688', 'StringTheory1677', 'ChaosTheory1666', 'GameTheory1655', 'NumberTheory1644',
            'PixelArt1633', 'VectorGraph1622', 'BitmapImage1611', 'JpegMaster1600', 'PngKing1599'
        ];

        // ============================================
        // ФУНКЦИИ ДЛЯ РАБОТЫ С НИКНЕЙМАМИ
        // ============================================
        
        // Получить случайный никнейм
        function randomNick() {
            return allNicks[Math.floor(Math.random() * allNicks.length)];
        }

        // Получить случайный никнейм для депозита
        function randomDepositNick() {
            return allNicks[Math.floor(Math.random() * allNicks.length)];
        }

        // Получить случайный никнейм для вывода
        function randomWithdrawNick() {
            return allNicks[Math.floor(Math.random() * allNicks.length)];
        }

        // Получить случайную сумму вывода (1-130$)
        function randomWithdrawAmount() {
            return Math.floor(Math.random() * 130) + 1;
        }

        // Получить текущее время в формате ЧЧ:ММ:СС
        function getCurrentTime() {
            return new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        // Получить случайное время в прошлом
        function getRandomPastTime(index, total) {
            const now = new Date();
            const secondsAgo = 30 + Math.floor((140 - 30) * (index / Math.max(total - 1, 1)));
            const randomOffset = Math.floor(Math.random() * 10) - 5;
            const finalSecondsAgo = Math.max(5, secondsAgo + randomOffset);
            now.setSeconds(now.getSeconds() - finalSecondsAgo);
            return now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        // ============================================
        // ОТОБРАЖЕНИЕ НА СТРАНИЦЕ
        // ============================================
        
        function renderNicknames(filter = '') {
            const grid = document.getElementById('nicknameGrid');
            const filtered = filter ? allNicks.filter(n => n.toLowerCase().includes(filter.toLowerCase())) : allNicks;
            
            grid.innerHTML = filtered.map(nick => 
                `<div class="nickname-item" onclick="copyNick('${nick.replace(/'/g, "\\'")}')" title="Нажмите чтобы скопировать">${nick}</div>`
            ).join('');
            
            document.getElementById('totalNicks').textContent = allNicks.length;
            document.getElementById('russianNicks').textContent = allNicks.filter(n => /[а-яё]/i.test(n)).length;
            document.getElementById('englishNicks').textContent = allNicks.filter(n => !/[а-яё]/i.test(n)).length;
        }

        function copyNick(nick) {
            navigator.clipboard.writeText(nick).then(() => {
                showToast('Скопировано: ' + nick);
            });
        }

        function copyAllNicks() {
            navigator.clipboard.writeText(allNicks.join('\n')).then(() => {
                showToast('Все 1000 никнеймов скопированы!');
            });
        }

        function downloadNicks() {
            const blob = new Blob([allNicks.join('\n')], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'piramix_nicknames.txt';
            a.click();
            URL.revokeObjectURL(url);
            showToast('Файл скачан!');
        }

        function showRandomTransactions() {
            const deposits = [];
            const withdrawals = [];
            
            for (let i = 0; i < 5; i++) {
                deposits.push({
                    nickname: randomDepositNick(),
                    amount: 10,
                    time: getRandomPastTime(i, 5)
                });
                withdrawals.push({
                    nickname: randomWithdrawNick(),
                    amount: randomWithdrawAmount(),
                    time: getRandomPastTime(i, 5)
                });
            }
            
            let html = '<div style="margin-top:1rem;padding:1rem;background:rgba(0,0,0,0.3);border-radius:1rem;">';
            html += '<h3 style="color:#e9c274;margin-bottom:0.5rem;">🟢 Пример пополнений (10$)</h3>';
            deposits.forEach(d => {
                html += `<div style="display:flex;justify-content:space-between;padding:0.3rem 0;font-size:0.8rem;">
                    <span><span style="color:#f5d78c">${d.nickname}</span> <span style="color:#8b8a7a">${d.time}</span></span>
                    <span style="color:#4caf50;font-weight:700">${d.amount}$</span></div>`;
            });
            html += '<h3 style="color:#e9c274;margin:0.8rem 0 0.5rem;">🔴 Пример выводов (1-130$)</h3>';
            withdrawals.forEach(w => {
                html += `<div style="display:flex;justify-content:space-between;padding:0.3rem 0;font-size:0.8rem;">
                    <span><span style="color:#f5d78c">${w.nickname}</span> <span style="color:#8b8a7a">${w.time}</span></span>
                    <span style="color:#ff7043;font-weight:700">${w.amount}$</span></div>`;
            });
            html += '</div>';
            
            const existing = document.getElementById('randomTransactions');
            if (existing) existing.remove();
            
            const div = document.createElement('div');
            div.id = 'randomTransactions';
            div.innerHTML = html;
            document.querySelector('.info-text').before(div);
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:12px;
                color:#fff;font-weight:500;font-size:0.9rem;z-index:9999;
                background:rgba(76,175,80,0.9);border:1px solid #4caf50;
                backdrop-filter:blur(10px);box-shadow:0 8px 20px rgba(0,0,0,0.3);
                animation:slideInRight 0.3s ease-out, fadeOut 0.3s 2.7s ease-out forwards;
                max-width:350px;
            `;
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => { if (toast.parentNode) toast.remove(); }, 3000);
        }

        // Поиск
        document.getElementById('searchInput').addEventListener('input', function(e) {
            renderNicknames(e.target.value);
        });

        // Инициализация
        renderNicknames();

        // Добавляем стили для анимации
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideInRight {
                from { transform: translateX(100%); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
            @keyframes fadeOut {
                from { opacity: 1; }
                to { opacity: 0; }
            }
        `;
        document.head.appendChild(style);

        // Экспорт функций в глобальную область
        window.randomNick = randomNick;
        window.randomDepositNick = randomDepositNick;
        window.randomWithdrawNick = randomWithdrawNick;
        window.randomWithdrawAmount = randomWithdrawAmount;
        window.getCurrentTime = getCurrentTime;
        window.getRandomPastTime = getRandomPastTime;
        window.allNicks = allNicks;

        console.log('✅ База никнеймов загружена. Всего:', allNicks.length);
        console.log('Функции доступны: randomNick(), randomDepositNick(), randomWithdrawNick(), randomWithdrawAmount()');
    </script>
</body>
</html>
