<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Brutal Ball</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0a;
            height: 100vh;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
        }
        
        .game-container {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            background: #0d0d0d;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1a1a1a;
            border-radius: 20px;
            padding: 8px 15px;
            margin: 8px;
            border: 1px solid #333;
            z-index: 10;
        }
        
        .score-display {
            font-weight: bold;
            font-size: 16px;
            color: #c0c0c0;
            font-family: 'Courier New', monospace;
        }
        
        .game-area {
            flex: 1;
            position: relative;
            overflow: hidden;
            margin: 0 8px;
            border-radius: 10px;
            border: 1px solid #222;
            background: #111;
        }
        
        .ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 80px;
            background: linear-gradient(0deg, #1a1a1a, #222);
            border-top: 2px solid #333;
        }
        
        .ground-texture {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 80px;
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 20px,
                #1f1f1f 20px,
                #1f1f1f 22px
            );
        }
        
        .platform {
            position: absolute;
            height: 20px;
            background: linear-gradient(0deg, #1a1a1a, #2a2a2a);
            border-top: 2px solid #444;
            border-bottom: 2px solid #333;
            z-index: 3;
        }
        
        .ball {
            position: absolute;
            width: 30px;
            height: 30px;
            background: radial-gradient(circle at 35% 35%, #808080, #3a3a3a);
            border-radius: 50%;
            left: 40px;
            bottom: 80px;
            z-index: 5;
            border: 2px solid #555;
            box-shadow: 0 0 10px rgba(100,100,100,0.5), inset 0 2px 5px rgba(255,255,255,0.2);
            transition: none;
        }
        
        .ball.exploding {
            animation: brutalExplode 3s forwards;
        }
        
        @keyframes brutalExplode {
            0% { 
                transform: scale(1); 
                opacity: 1;
            }
            30% { 
                transform: scale(1.5); 
                opacity: 0.8;
                background: radial-gradient(circle at 35% 35%, #ff4444, #880000);
            }
            70% { 
                transform: scale(2.5); 
                opacity: 0.5;
                background: radial-gradient(circle at 35% 35%, #ff8800, #cc4400);
            }
            100% { 
                transform: scale(3.5); 
                opacity: 0;
            }
        }
        
        .obstacle {
            position: absolute;
            z-index: 4;
        }
        
        .spike {
            width: 30px;
            height: 30px;
            position: relative;
        }
        
        .spike-body {
            width: 4px;
            height: 20px;
            background: #555;
            position: absolute;
            bottom: 0;
            left: 13px;
        }
        
        .spike-tip {
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-bottom: 20px solid #666;
            position: absolute;
            top: 0;
            left: 0;
            filter: drop-shadow(0 0 3px rgba(100,0,0,0.8));
        }
        
        .arrow {
            position: absolute;
            z-index: 4;
        }
        
        .arrow-body {
            width: 35px;
            height: 4px;
            background: #555;
            position: relative;
        }
        
        .arrow-head {
            width: 0;
            height: 0;
            border-top: 6px solid transparent;
            border-bottom: 6px solid transparent;
            border-left: 10px solid #666;
            position: absolute;
            left: 35px;
            top: -4px;
        }
        
        .diamond-collect {
            position: absolute;
            font-size: 20px;
            z-index: 3;
            pointer-events: none;
            animation: diamondFloat 0.8s forwards;
        }
        
        @keyframes diamondFloat {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-40px) scale(0.5); }
        }
        
        .controls {
            position: absolute;
            bottom: 100px;
            left: 15px;
            z-index: 10;
        }
        
        .jump-btn {
            width: 80px;
            height: 80px;
            background: radial-gradient(circle at 40% 40%, #555, #222);
            border: 3px solid #444;
            border-radius: 50%;
            font-size: 32px;
            cursor: pointer;
            color: #999;
            box-shadow: 0 5px 15px rgba(0,0,0,0.8), inset 0 2px 5px rgba(255,255,255,0.1);
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .jump-btn:active {
            transform: scale(0.9);
            background: radial-gradient(circle at 40% 40%, #666, #333);
            box-shadow: 0 2px 5px rgba(0,0,0,0.9);
        }
        
        .bottom-nav {
            display: flex;
            gap: 5px;
            background: #1a1a1a;
            border-radius: 20px;
            padding: 6px;
            margin: 8px;
            border: 1px solid #333;
            z-index: 10;
        }
        
        .nav-btn {
            flex: 1;
            background: #222;
            border: none;
            padding: 10px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
            color: #666;
        }
        
        .nav-btn.active {
            background: #333;
            color: #999;
            box-shadow: 0 0 10px rgba(100,100,100,0.3);
        }
        
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        
        .menu-overlay.show {
            display: flex;
        }
        
        .menu-panel {
            background: #1a1a1a;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            border: 2px solid #333;
            max-width: 280px;
            width: 90%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        
        .menu-panel h2 {
            color: #999;
            margin-bottom: 15px;
            font-size: 22px;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
        }
        
        .menu-panel p {
            color: #777;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .menu-btn {
            background: #333;
            border: 2px solid #555;
            padding: 10px 25px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
            font-size: 14px;
            color: #999;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        
        .menu-btn:active {
            background: #444;
            transform: scale(0.95);
        }
        
        .shake {
            animation: brutalShake 0.3s infinite;
        }
        
        @keyframes brutalShake {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(-8px, 8px) rotate(-2deg); }
            50% { transform: translate(8px, -8px) rotate(2deg); }
            75% { transform: translate(-8px, -8px) rotate(-2deg); }
        }
    </style>
</head>
<body>
    <div class="game-container" id="gameContainer">
        <div class="top-bar">
            <div class="score-display">💎 <span id="scoreDisplay">0</span></div>
            <div class="score-display">🏆 <span id="bestDisplay">0</span></div>
        </div>
        
        <div class="game-area" id="gameArea">
            <div class="ground">
                <div class="ground-texture"></div>
            </div>
            <div class="ball" id="ball"></div>
        </div>
        
        <div class="controls">
            <button class="jump-btn" id="jumpBtn">▲</button>
        </div>
        
        <div class="bottom-nav">
            <button class="nav-btn active" data-screen="game">🎮</button>
            <button class="nav-btn" data-screen="shop">🛒</button>
            <button class="nav-btn" data-screen="profile">👤</button>
        </div>
    </div>
    
    <div class="menu-overlay" id="menuOverlay">
        <div class="menu-panel">
            <h2>💀 Потрачено</h2>
            <p>Счёт: <strong id="finalScore">0</strong> 💎</p>
            <p>Рекорд: <strong id="menuBest">0</strong> 🏆</p>
            <button class="menu-btn" id="restartBtn">🔄 Заново</button>
            <button class="menu-btn" id="menuBtn">📋 В меню</button>
        </div>
    </div>

    <script>
        // Telegram
        try {
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
        } catch(e) {}
        
        let score = 0;
        let bestScore = parseInt(localStorage.getItem('brutalBallBest')) || 0;
        let speed = 2;
        let isPlaying = false;
        let isGameOver = false;
        let canJump = true;
        
        const ball = document.getElementById('ball');
        const gameArea = document.getElementById('gameArea');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const bestDisplay = document.getElementById('bestDisplay');
        const menuOverlay = document.getElementById('menuOverlay');
        const gameContainer = document.getElementById('gameContainer');
        
        // В CSS bottom - это расстояние от НИЗА экрана
        // Чем БОЛЬШЕ bottom, тем ВЫШЕ объект
        let ballBottom = 80; // Начальная позиция на земле
        let ballVelocity = 0;
        const GRAVITY = 0.8;
        const JUMP_FORCE = -14; // Отрицательное = вверх (увеличивает bottom)
        const GROUND_LEVEL = 80;
        
        let obstacles = [];
        let platforms = [];
        let gameLoop;
        let spawnTimeout;
        let platformTimeout;
        let speedInterval;
        
        bestDisplay.textContent = bestScore;
        
        function jump() {
            if (!isPlaying || isGameOver) return;
            if (!canJump) return;
            
            ballVelocity = JUMP_FORCE;
            canJump = false;
        }
        
        function updateBall() {
            // Гравитация уменьшает скорость (тянет вниз)
            ballVelocity += GRAVITY;
            // Изменяем позицию
            ballBottom += ballVelocity;
            
            // Проверка платформ
            if (ballVelocity < 0) {
                // Движется вверх - проверяем столкновение с платформами снизу
                for (let platform of platforms) {
                    const platBottom = parseFloat(platform.style.bottom);
                    const platRight = parseFloat(platform.style.right) || 0;
                    const platWidth = parseFloat(platform.style.width);
                    const platLeft = gameArea.offsetWidth - platRight - platWidth;
                    
                    if (ballBottom + 30 >= platBottom && 
                        ballBottom <= platBottom + 20 &&
                        ballBottom + ballVelocity <= platBottom &&
                        40 >= platLeft - 10 && 
                        40 <= platLeft + platWidth + 10) {
                        ballBottom = platBottom - 30;
                        ballVelocity = 0;
                        break;
                    }
                }
            } else if (ballVelocity > 0) {
                // Движется вниз - проверяем приземление на платформы
                for (let platform of platforms) {
                    const platBottom = parseFloat(platform.style.bottom);
                    const platRight = parseFloat(platform.style.right) || 0;
                    const platWidth = parseFloat(platform.style.width);
                    const platLeft = gameArea.offsetWidth - platRight - platWidth;
                    
                    if (ballBottom <= platBottom + 20 && 
                        ballBottom + ballVelocity >= platBottom &&
                        40 >= platLeft - 10 && 
                        40 <= platLeft + platWidth + 10) {
                        ballBottom = platBottom + 20;
                        ballVelocity = 0;
                        canJump = true;
                        break;
                    }
                }
            }
            
            // Пол
            if (ballBottom <= GROUND_LEVEL) {
                ballBottom = GROUND_LEVEL;
                ballVelocity = 0;
                canJump = true;
            }
            
            // Потолок
            if (ballBottom > gameArea.offsetHeight - 50) {
                ballBottom = gameArea.offsetHeight - 50;
                ballVelocity = 0;
            }
            
            ball.style.bottom = ballBottom + 'px';
        }
        
        function createPlatform() {
            if (!isPlaying) return;
            
            const platform = document.createElement('div');
            platform.className = 'platform';
            
            const width = 80 + Math.random() * 60;
            const bottomPos = 180 + Math.random() * 200;
            
            platform.style.width = width + 'px';
            platform.style.bottom = bottomPos + 'px';
            platform.style.right = '-100px';
            
            gameArea.appendChild(platform);
            platforms.push(platform);
        }
        
        function createObstacle() {
            if (!isPlaying) return;
            
            const type = Math.random();
            const obstacle = document.createElement('div');
            obstacle.className = 'obstacle';
            
            if (type < 0.5) {
                // Шипы на земле
                obstacle.innerHTML = `
                    <div class="spike">
                        <div class="spike-tip"></div>
                        <div class="spike-body"></div>
                    </div>
                `;
                obstacle.style.bottom = '80px';
            } else {
                // Летящая стрела
                obstacle.innerHTML = `
                    <div class="arrow">
                        <div class="arrow-body"></div>
                        <div class="arrow-head"></div>
                    </div>
                `;
                obstacle.style.bottom = (100 + Math.random() * 150) + 'px';
            }
            
            obstacle.style.right = '-60px';
            obstacle.style.left = 'auto';
            gameArea.appendChild(obstacle);
            obstacles.push(obstacle);
        }
        
        function moveObstacles() {
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obstacle = obstacles[i];
                const currentRight = parseFloat(obstacle.style.right) || -60;
                const newRight = currentRight + speed;
                obstacle.style.right = newRight + 'px';
                
                if (checkCollision(obstacle)) {
                    gameOver();
                    return;
                }
                
                if (newRight > gameArea.offsetWidth + 100) {
                    obstacle.remove();
                    obstacles.splice(i, 1);
                    score++;
                    scoreDisplay.textContent = score;
                    showDiamondAnimation();
                }
            }
        }
        
        function movePlatforms() {
            for (let i = platforms.length - 1; i >= 0; i--) {
                const platform = platforms[i];
                const currentRight = parseFloat(platform.style.right) || -100;
                const newRight = currentRight + speed;
                platform.style.right = newRight + 'px';
                
                if (newRight > gameArea.offsetWidth + 150) {
                    platform.remove();
                    platforms.splice(i, 1);
                }
            }
        }
        
        function checkCollision(obstacle) {
            const ballRect = ball.getBoundingClientRect();
            const obsRect = obstacle.getBoundingClientRect();
            
            const margin = 8;
            
            return ballRect.left + margin < obsRect.right &&
                   ballRect.right - margin > obsRect.left &&
                   ballRect.top + margin < obsRect.bottom &&
                   ballRect.bottom - margin > obsRect.top;
        }
        
        function gameOver() {
            if (!isPlaying) return;
            
            isPlaying = false;
            isGameOver = true;
            
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('brutalBallBest', bestScore);
                bestDisplay.textContent = bestScore;
            }
            
            gameContainer.classList.add('shake');
            ball.classList.add('exploding');
            
            clearInterval(speedInterval);
            clearTimeout(spawnTimeout);
            clearTimeout(platformTimeout);
            
            setTimeout(() => {
                gameContainer.classList.remove('shake');
                ball.classList.remove('exploding');
                
                document.getElementById('finalScore').textContent = score;
                document.getElementById('menuBest').textContent = bestScore;
                menuOverlay.classList.add('show');
            }, 3000);
        }
        
        function restartGame() {
            obstacles.forEach(o => o.remove());
            platforms.forEach(p => p.remove());
            obstacles = [];
            platforms = [];
            score = 0;
            speed = 2;
            ballBottom = GROUND_LEVEL;
            ballVelocity = 0;
            canJump = true;
            isPlaying = true;
            isGameOver = false;
            
            ball.style.bottom = GROUND_LEVEL + 'px';
            ball.classList.remove('exploding');
            scoreDisplay.textContent = '0';
            
            gameContainer.classList.remove('shake');
            menuOverlay.classList.remove('show');
            
            startSpawning();
            startSpeedIncrease();
        }
        
        function showDiamondAnimation() {
            const diamond = document.createElement('div');
            diamond.className = 'diamond-collect';
            diamond.textContent = '💎';
            diamond.style.left = '50%';
            diamond.style.top = '40%';
            document.body.appendChild(diamond);
            setTimeout(() => diamond.remove(), 800);
        }
        
        function startSpeedIncrease() {
            clearInterval(speedInterval);
            speedInterval = setInterval(() => {
                if (isPlaying && speed < 8) {
                    speed += 0.3;
                }
            }, 3000);
        }
        
        function startSpawning() {
            clearTimeout(spawnTimeout);
            clearTimeout(platformTimeout);
            
            function spawnObstacle() {
                if (!isPlaying) return;
                createObstacle();
                const delay = Math.max(1800 / speed, 900);
                spawnTimeout = setTimeout(spawnObstacle, delay);
            }
            
            function spawnPlatform() {
                if (!isPlaying) return;
                createPlatform();
                platformTimeout = setTimeout(spawnPlatform, 3500 / speed);
            }
            
            // Задержка перед первым появлением
            spawnTimeout = setTimeout(spawnObstacle, 2000);
            platformTimeout = setTimeout(spawnPlatform, 3000);
        }
        
        function gameTick() {
            if (!isPlaying) return;
            updateBall();
            moveObstacles();
            movePlatforms();
        }
        
        // Обработчики
        const jumpBtn = document.getElementById('jumpBtn');
        
        jumpBtn.addEventListener('click', (e) => {
            e.preventDefault();
            jump();
        });
        
        jumpBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            jump();
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
                e.preventDefault();
                jump();
            }
        });
        
        document.addEventListener('touchmove', (e) => {
            e.preventDefault();
        }, { passive: false });
        
        document.getElementById('restartBtn').addEventListener('click', restartGame);
        document.getElementById('menuBtn').addEventListener('click', () => {
            menuOverlay.classList.remove('show');
            restartGame();
        });
        
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            });
        });
        
        function init() {
            isPlaying = true;
            canJump = true;
            ballBottom = GROUND_LEVEL;
            ballVelocity = 0;
            ball.style.bottom = GROUND_LEVEL + 'px';
            startSpawning();
            startSpeedIncrease();
            gameLoop = setInterval(gameTick, 16);
        }
        
        init();
    </script>
</body>
</html>
