<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ball Jump</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0c0f;
            height: 100vh;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            overflow: hidden;
            touch-action: manipulation;
        }
        
        .game-container {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            background: linear-gradient(180deg, #1a1f2b, #0b0e12);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(26, 31, 43, 0.9);
            border-radius: 30px;
            padding: 10px 15px;
            margin: 10px;
            border: 1px solid #d4af37;
            z-index: 10;
        }
        
        .score-display {
            font-weight: bold;
            font-size: 18px;
            color: #ffd700;
        }
        
        .game-area {
            flex: 1;
            position: relative;
            overflow: hidden;
            margin: 0 10px;
            border-radius: 15px;
            border: 1px solid #3a3322;
            background: linear-gradient(180deg, #87CEEB, #E0F7FA);
        }
        
        .ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 60px;
            background: linear-gradient(0deg, #4a7c3f, #6b9e4a);
            border-top: 3px solid #3d6b35;
        }
        
        .ball {
            position: absolute;
            width: 40px;
            height: 40px;
            background: radial-gradient(circle at 30% 30%, #ff4444, #cc0000);
            border-radius: 50%;
            left: 50px;
            bottom: 60px;
            z-index: 5;
            box-shadow: 0 5px 15px rgba(255,0,0,0.5);
            transition: none;
        }
        
        .ball.exploding {
            animation: explode 3s forwards;
        }
        
        @keyframes explode {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(2); opacity: 0.7; }
            100% { transform: scale(3); opacity: 0; }
        }
        
        .obstacle {
            position: absolute;
            bottom: 60px;
            z-index: 4;
        }
        
        .hole {
            width: 50px;
            height: 20px;
            background: #1a1510;
            border-radius: 50%;
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.8);
        }
        
        .spike {
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-bottom: 25px solid #888;
            position: relative;
        }
        
        .spike::after {
            content: '';
            position: absolute;
            top: 25px;
            left: -10px;
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 15px solid #ff0000;
        }
        
        .arrow {
            width: 40px;
            height: 6px;
            background: #8B4513;
            position: relative;
        }
        
        .arrow::after {
            content: '';
            position: absolute;
            right: -8px;
            top: -5px;
            width: 0;
            height: 0;
            border-top: 8px solid transparent;
            border-bottom: 8px solid transparent;
            border-left: 12px solid #8B4513;
        }
        
        .diamond-collect {
            position: absolute;
            font-size: 24px;
            z-index: 3;
            animation: diamondFloat 1s forwards;
        }
        
        @keyframes diamondFloat {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-50px); }
        }
        
        .controls {
            display: flex;
            padding: 10px;
            z-index: 10;
        }
        
        .jump-btn {
            flex: 1;
            background: linear-gradient(180deg, #ffd700, #ffaa00);
            border: none;
            padding: 25px;
            border-radius: 20px;
            font-size: 30px;
            cursor: pointer;
            font-weight: bold;
            color: #000;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.5);
            transition: all 0.1s;
        }
        
        .jump-btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 5px rgba(255, 215, 0, 0.3);
        }
        
        .bottom-nav {
            display: flex;
            gap: 5px;
            background: rgba(26, 31, 43, 0.95);
            border-radius: 25px;
            padding: 8px;
            margin: 10px;
            border: 1px solid #d4af37;
            z-index: 10;
        }
        
        .nav-btn {
            flex: 1;
            background: #20262e;
            border: none;
            padding: 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 24px;
            transition: all 0.3s;
            color: #b9b09b;
        }
        
        .nav-btn.active {
            background: #c9a73c;
            box-shadow: 0 0 20px rgba(201, 167, 60, 0.5);
        }
        
        /* Меню Game Over */
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        
        .menu-overlay.show {
            display: flex;
        }
        
        .menu-panel {
            background: linear-gradient(180deg, #1a1f2b, #0b0e12);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            border: 2px solid #d4af37;
            max-width: 300px;
            width: 90%;
        }
        
        .menu-panel h2 {
            color: #ffd700;
            margin-bottom: 15px;
            font-size: 24px;
        }
        
        .menu-panel p {
            color: #cfb87c;
            margin-bottom: 10px;
            font-size: 16px;
        }
        
        .menu-btn {
            background: #ffd700;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
            font-size: 16px;
        }
        
        .shake {
            animation: shake 0.5s infinite;
        }
        
        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(-10px, 10px); }
            50% { transform: translate(10px, -10px); }
            75% { transform: translate(-10px, -10px); }
        }
    </style>
</head>
<body>
    <div class="game-container" id="gameContainer">
        <div class="top-bar">
            <div class="score-display">💎 <span id="scoreDisplay">0</span></div>
            <div class="score-display">🏆 <span id="bestDisplay">0</span></div>
        </div>
        
        <div class="game-area" id="gameArea">
            <div class="ground"></div>
            <div class="ball" id="ball"></div>
        </div>
        
        <div class="controls">
            <button class="jump-btn" id="jumpBtn">⬆️</button>
        </div>
        
        <div class="bottom-nav">
            <button class="nav-btn active" data-screen="game">🎮</button>
            <button class="nav-btn" data-screen="shop">🛒</button>
            <button class="nav-btn" data-screen="profile">👤</button>
        </div>
    </div>
    
    <div class="menu-overlay" id="menuOverlay">
        <div class="menu-panel">
            <h2>💥 Взрыв!</h2>
            <p>Счёт: <strong id="finalScore">0</strong> 💎</p>
            <p>Рекорд: <strong id="menuBest">0</strong> 🏆</p>
            <button class="menu-btn" id="restartBtn">🔄 Заново</button>
            <button class="menu-btn" id="menuBtn">📋 В меню</button>
        </div>
    </div>

    <script>
        // Telegram
        try {
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
        } catch(e) {}
        
        // Состояние игры
        let score = 0;
        let bestScore = parseInt(localStorage.getItem('ballJumpBest')) || 0;
        let speed = 5;
        let isPlaying = false;
        let isGameOver = false;
        let jumpCount = 0;
        let maxJumps = 2;
        
        const ball = document.getElementById('ball');
        const gameArea = document.getElementById('gameArea');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const bestDisplay = document.getElementById('bestDisplay');
        const menuOverlay = document.getElementById('menuOverlay');
        const gameContainer = document.getElementById('gameContainer');
        
        let ballY = 60;
        let ballVelocity = 0;
        let isJumping = false;
        let obstacles = [];
        let gameLoop;
        let speedTimer;
        
        bestDisplay.textContent = bestScore;
        
        // Физика прыжка
        const GRAVITY = 0.8;
        const JUMP_FORCE = -12;
        
        function jump() {
            if (!isPlaying || isGameOver) return;
            
            if (jumpCount < maxJumps) {
                ballVelocity = JUMP_FORCE;
                isJumping = true;
                jumpCount++;
            }
        }
        
        function updateBall() {
            ballVelocity += GRAVITY;
            ballY += ballVelocity;
            
            const groundLevel = 60;
            
            if (ballY >= groundLevel) {
                ballY = groundLevel;
                ballVelocity = 0;
                isJumping = false;
                jumpCount = 0;
            }
            
            if (ballY < 20) {
                ballY = 20;
                ballVelocity = 0;
            }
            
            ball.style.bottom = ballY + 'px';
        }
        
        function createObstacle() {
            const type = Math.random();
            const obstacle = document.createElement('div');
            obstacle.className = 'obstacle';
            
            if (type < 0.4) {
                // Яма
                obstacle.innerHTML = '<div class="hole"></div>';
                obstacle.style.bottom = '40px';
                obstacle.dataset.type = 'hole';
            } else if (type < 0.7) {
                // Шипы
                obstacle.innerHTML = '<div class="spike"></div>';
                obstacle.style.bottom = '60px';
                obstacle.dataset.type = 'spike';
            } else {
                // Стрела
                obstacle.innerHTML = '<div class="arrow"></div>';
                obstacle.style.bottom = (60 + Math.random() * 40) + 'px';
                obstacle.dataset.type = 'arrow';
            }
            
            obstacle.style.right = '-60px';
            gameArea.appendChild(obstacle);
            obstacles.push(obstacle);
        }
        
        function moveObstacles() {
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obstacle = obstacles[i];
                const currentRight = parseInt(obstacle.style.right) || -60;
                obstacle.style.right = (currentRight + speed) + 'px';
                
                // Проверка столкновения
                if (checkCollision(obstacle)) {
                    gameOver();
                    return;
                }
                
                // Удаление ушедших препятствий
                if (currentRight > gameArea.offsetWidth + 100) {
                    obstacle.remove();
                    obstacles.splice(i, 1);
                    score++;
                    scoreDisplay.textContent = score;
                    
                    // Анимация алмаза
                    showDiamondAnimation();
                }
            }
        }
        
        function checkCollision(obstacle) {
            const ballRect = ball.getBoundingClientRect();
            const obsRect = obstacle.getBoundingClientRect();
            
            // Небольшой отступ для честной игры
            const margin = 10;
            
            return ballRect.left + margin < obsRect.right &&
                   ballRect.right - margin > obsRect.left &&
                   ballRect.top + margin < obsRect.bottom &&
                   ballRect.bottom - margin > obsRect.top;
        }
        
        function gameOver() {
            isPlaying = false;
            isGameOver = true;
            
            // Сохраняем рекорд
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('ballJumpBest', bestScore);
                bestDisplay.textContent = bestScore;
            }
            
            // Тряска экрана
            gameContainer.classList.add('shake');
            
            // Шар увеличивается и взрывается
            ball.classList.add('exploding');
            
            setTimeout(() => {
                gameContainer.classList.remove('shake');
                ball.classList.remove('exploding');
                ball.style.transform = 'scale(1)';
                ball.style.opacity = '1';
                
                // Показываем меню
                document.getElementById('finalScore').textContent = score;
                document.getElementById('menuBest').textContent = bestScore;
                menuOverlay.classList.add('show');
            }, 3000);
        }
        
        function restartGame() {
            // Очистка
            obstacles.forEach(o => o.remove());
            obstacles = [];
            score = 0;
            speed = 5;
            jumpCount = 0;
            ballY = 60;
            ballVelocity = 0;
            isPlaying = true;
            isGameOver = false;
            
            ball.style.bottom = '60px';
            ball.style.transform = 'scale(1)';
            ball.style.opacity = '1';
            scoreDisplay.textContent = '0';
            
            gameContainer.classList.remove('shake');
            menuOverlay.classList.remove('show');
            
            // Перезапуск спавна препятствий
            startObstacleSpawning();
        }
        
        function showDiamondAnimation() {
            const diamond = document.createElement('div');
            diamond.className = 'diamond-collect';
            diamond.textContent = '💎';
            diamond.style.left = '50%';
            diamond.style.top = '50%';
            gameArea.appendChild(diamond);
            setTimeout(() => diamond.remove(), 1000);
        }
        
        function startObstacleSpawning() {
            if (speedTimer) clearInterval(speedTimer);
            
            // Увеличиваем скорость каждые 3 секунды
            speedTimer = setInterval(() => {
                if (isPlaying) {
                    speed += 1;
                }
            }, 3000);
            
            // Спавн препятствий
            function spawnLoop() {
                if (!isPlaying) return;
                
                createObstacle();
                setTimeout(spawnLoop, 1500 / (speed / 3));
            }
            
            setTimeout(spawnLoop, 1000);
        }
        
        function gameTick() {
            if (!isPlaying) return;
            
            updateBall();
            moveObstacles();
        }
        
        // Обработчики
        document.getElementById('jumpBtn').addEventListener('click', jump);
        document.getElementById('jumpBtn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            jump();
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                e.preventDefault();
                jump();
            }
        });
        
        document.getElementById('restartBtn').addEventListener('click', restartGame);
        document.getElementById('menuBtn').addEventListener('click', () => {
            menuOverlay.classList.remove('show');
            restartGame();
        });
        
        // Нижнее меню
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                if (this.dataset.screen === 'game') {
                    if (!isPlaying && !isGameOver) {
                        restartGame();
                    }
                }
            });
        });
        
        // Запуск игры
        function init() {
            isPlaying = true;
            startObstacleSpawning();
            
            gameLoop = setInterval(gameTick, 16); // ~60 FPS
        }
        
        init();
    </script>
</body>
</html>
