<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Flick Shot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #05070a;
            font-family: monospace;
            touch-action: manipulation;
            user-select: none;
            height: 100vh;
        }
        
        .game {
            position: relative;
            width: 100%;
            max-width: 420px;
            height: 100vh;
            margin: auto;
            overflow: hidden;
        }
        
        .layer {
            position: absolute;
            width: 220%;
            height: 100%;
            left: 0;
            top: 0;
            will-change: transform;
        }
        
        .bg {
            background: radial-gradient(circle at 70% 20%, rgba(255,255,255,0.08), transparent 40%),
                        radial-gradient(circle at 30% 70%, rgba(80,80,80,0.12), transparent 50%),
                        linear-gradient(#0b0f14, #05070a);
            z-index: 0;
        }
        
        .stones {
            background: radial-gradient(circle at 20% 60%, rgba(90,90,90,0.25), transparent 45%),
                        radial-gradient(circle at 60% 40%, rgba(60,60,60,0.2), transparent 50%),
                        radial-gradient(circle at 90% 80%, rgba(100,100,100,0.15), transparent 40%);
            z-index: 1;
            opacity: 0.9;
        }
        
        .roots {
            background: repeating-linear-gradient(45deg, transparent, transparent 90px,
                        rgba(60,40,20,0.15) 90px, rgba(60,40,20,0.15) 92px);
            z-index: 2;
            opacity: 0.6;
        }
        
        .light {
            position: absolute;
            top: -60px;
            right: -60px;
            width: 220px;
            height: 220px;
            background: radial-gradient(circle, rgba(255,255,255,0.22), rgba(120,140,255,0.08), transparent 60%);
            filter: blur(2px);
            z-index: 3;
            animation: pulse 3s infinite ease-in-out;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .floor {
            position: absolute;
            bottom: 0;
            width: 220%;
            height: 95px;
            background: repeating-linear-gradient(90deg, #0a0c10, #0a0c10 22px, #07090c 22px, #07090c 44px),
                        repeating-linear-gradient(0deg, transparent, transparent 18px,
                        rgba(255,255,255,0.02) 18px, rgba(255,255,255,0.02) 20px);
            border-top: 1px solid #1a1f28;
            z-index: 5;
        }
        
        .score-display {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            color: #b7c0cc;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(180,200,255,0.4);
            text-align: center;
        }
        
        .combo-display {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            color: #ffd700;
            font-size: 14px;
            font-weight: bold;
            text-shadow: 0 0 15px rgba(255,215,0,0.6);
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        /* Зона попадания */
        .target-zone {
            position: absolute;
            z-index: 15;
            pointer-events: none;
        }
        
        .zone-rect {
            width: 80px;
            height: 200px;
            border: 2px solid rgba(180,200,255,0.2);
            border-radius: 8px;
            position: absolute;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(100,140,255,0.05);
            box-shadow: 0 0 20px rgba(100,140,255,0.1);
        }
        
        .zone-marker {
            position: absolute;
            right: 60px;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            border: 2px dashed rgba(255,255,255,0.3);
            border-radius: 50%;
            z-index: 16;
            pointer-events: none;
        }
        
        .zone-marker::after {
            content: '🎯';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20px;
            opacity: 0.5;
        }
        
        /* Цель */
        .target {
            position: absolute;
            z-index: 12;
            pointer-events: none;
            transition: none;
        }
        
        .target-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,80,80,0.8), rgba(200,30,30,0.6));
            border: 2px solid rgba(255,100,100,0.9);
            box-shadow: 0 0 25px rgba(255,0,0,0.5);
            animation: targetGlow 0.5s infinite;
        }
        
        @keyframes targetGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(255,0,0,0.5); }
            50% { box-shadow: 0 0 40px rgba(255,0,0,0.8), 0 0 60px rgba(255,50,50,0.4); }
        }
        
        .crosshair {
            position: absolute;
            width: 4px;
            height: 20px;
            background: rgba(255,255,255,0.4);
            top: 15px;
            left: 23px;
        }
        
        .crosshair::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 4px;
            background: rgba(255,255,255,0.4);
            top: 8px;
            left: -8px;
        }
        
        /* Трассер */
        .tracer {
            position: absolute;
            z-index: 11;
            pointer-events: none;
            animation: tracerFly 0.6s forwards;
        }
        
        @keyframes tracerFly {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }
        
        /* Вспышка при попадании */
        .hit-flash {
            position: absolute;
            z-index: 14;
            pointer-events: none;
            animation: flash 0.3s forwards;
        }
        
        @keyframes flash {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }
        
        /* Кнопка выстрела */
        .shoot-btn {
            position: absolute;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle, #2a1a1a, #1a0a0a);
            border: 2px solid #442222;
            color: #ff4444;
            font-size: 32px;
            z-index: 20;
            touch-action: manipulation;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255,0,0,0.3);
        }
        
        .shoot-btn:active {
            background: radial-gradient(circle, #3a1a1a, #2a0a0a);
            box-shadow: 0 0 40px rgba(255,0,0,0.6);
        }
        
        /* Стартовый экран */
        .start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5,7,10,0.9);
            z-index: 30;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .start-screen h1 {
            color: #b7c0cc;
            font-size: 26px;
            margin-bottom: 8px;
            text-shadow: 0 0 15px rgba(255,100,100,0.3);
        }
        
        .start-screen p {
            color: #6d7682;
            margin-bottom: 20px;
            font-size: 13px;
            text-align: center;
            padding: 0 20px;
        }
        
        .start-btn {
            background: #1c232d;
            color: #ff6666;
            border: 2px solid #442222;
            padding: 15px 40px;
            border-radius: 25px;
            font-size: 18px;
            cursor: pointer;
            font-family: monospace;
        }
        
        .start-btn:active {
            background: #2a1a1a;
        }
        
        /* Конец игры */
        .gameover-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5,7,10,0.85);
            z-index: 25;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .gameover-screen h2 {
            color: #ff6666;
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .gameover-screen p {
            color: #b7c0cc;
            margin: 5px 0;
            font-size: 14px;
        }
        
        .restart-btn {
            background: #1c232d;
            color: #ff6666;
            border: 2px solid #ff4444;
            padding: 12px 35px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            font-family: monospace;
            margin-top: 15px;
        }
        
        /* Нижнее меню */
        .bottom-nav {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 20;
            background: rgba(10,12,16,0.9);
            border-radius: 20px;
            padding: 6px;
            border: 1px solid #1a1f28;
        }
        
        .nav-btn {
            background: #1c232d;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            color: #6d7682;
            transition: all 0.3s;
        }
        
        .nav-btn.active {
            background: #2a3442;
            color: #b7c0cc;
        }
        
        .hidden {
            display: none !important;
        }
        
        .shake {
            animation: shake 0.3s infinite;
        }
        
        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(-5px, 3px); }
            50% { transform: translate(5px, -3px); }
            75% { transform: translate(-3px, -3px); }
        }
    </style>
</head>
<body>
    <div class="game" id="gameContainer">
        <div class="layer bg" id="bg"></div>
        <div class="layer stones" id="stones"></div>
        <div class="layer roots" id="roots"></div>
        
        <div class="light"></div>
        <div class="floor" id="floor"></div>
        
        <div class="zone-rect"></div>
        <div class="zone-marker"></div>
        
        <div class="target" id="target">
            <div class="target-circle">
                <div class="crosshair"></div>
            </div>
        </div>
        
        <div class="score-display" id="scoreDisplay">🎯 0 очков</div>
        <div class="combo-display" id="comboDisplay"></div>
        
        <button class="shoot-btn" id="shootBtn">💥</button>
        
        <div class="start-screen" id="startScreen">
            <h1>🎯 FLICK SHOT</h1>
            <p>Цель летит слева направо.<br>Нажми 💥 когда она в зоне!</p>
            <button class="start-btn" id="startGameBtn">▶ НАЧАТЬ</button>
        </div>
        
        <div class="gameover-screen" id="gameoverScreen">
            <h2>💀 Игра окончена</h2>
            <p>Счёт: <strong id="finalScore">0</strong></p>
            <p>Лучший: <strong id="bestScore">0</strong></p>
            <button class="restart-btn" id="restartBtn">🔄 ЗАНОВО</button>
        </div>
        
        <div class="bottom-nav" id="bottomNav">
            <button class="nav-btn active" data-screen="game">🎮</button>
            <button class="nav-btn" data-screen="shop">🛒</button>
            <button class="nav-btn" data-screen="profile">👤</button>
        </div>
    </div>

    <script>
        // Telegram
        try {
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
        } catch(e) {}
        
        // Состояние
        let score = 0;
        let bestScore = parseInt(localStorage.getItem('flickBest')) || 0;
        let combo = 0;
        let isPlaying = false;
        let isGameOver = false;
        let targetX = -60;
        let targetSpeed = 3;
        let targetDirection = 1;
        let misses = 0;
        const MAX_MISSES = 3;
        
        const gameContainer = document.getElementById('gameContainer');
        const target = document.getElementById('target');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const comboDisplay = document.getElementById('comboDisplay');
        const startScreen = document.getElementById('startScreen');
        const gameoverScreen = document.getElementById('gameoverScreen');
        const bottomNav = document.getElementById('bottomNav');
        const bg = document.getElementById('bg');
        const stones = document.getElementById('stones');
        const roots = document.getElementById('roots');
        const floor = document.getElementById('floor');
        
        let worldX = 0;
        let gameLoop;
        let targetAnimLoop;
        
        // Зона попадания (правая часть экрана)
        const zoneLeft = window.innerWidth - 150;
        const zoneRight = window.innerWidth - 30;
        
        function shoot() {
            if (!isPlaying || isGameOver) return;
            
            // Проверяем в зоне ли цель
            if (targetX >= zoneLeft && targetX <= zoneRight) {
                // Попадание!
                const distanceFromCenter = Math.abs(targetX - (zoneLeft + zoneRight) / 2);
                const zoneWidth = (zoneRight - zoneLeft) / 2;
                const accuracy = 1 - (distanceFromCenter / zoneWidth);
                
                combo++;
                const points = Math.floor(10 + accuracy * 90);
                score += points;
                
                scoreDisplay.textContent = '🎯 ' + score + ' очков';
                
                // Комбо
                if (combo > 1) {
                    comboDisplay.textContent = 'COMBO x' + combo + '!';
                    comboDisplay.style.opacity = '1';
                    setTimeout(() => { comboDisplay.style.opacity = '0'; }, 1500);
                }
                
                // Эффект попадания
                createHitEffect();
                createTracer();
                
                // Сброс цели
                resetTarget();
                targetSpeed += 0.3;
            } else {
                // Промах
                misses++;
                combo = 0;
                comboDisplay.style.opacity = '0';
                
                // Тряска при промахе
                gameContainer.classList.add('shake');
                setTimeout(() => gameContainer.classList.remove('shake'), 300);
                
                if (misses >= MAX_MISSES) {
                    endGame();
                }
            }
        }
        
        function resetTarget() {
            targetX = -60;
            targetDirection = 1;
            target.style.left = targetX + 'px';
            target.style.top = (80 + Math.random() * (window.innerHeight - 250)) + 'px';
        }
        
        function createHitEffect() {
            const flash = document.createElement('div');
            flash.className = 'hit-flash';
            flash.style.width = '60px';
            flash.style.height = '60px';
            flash.style.borderRadius = '50%';
            flash.style.background = 'rgba(255,255,255,0.8)';
            flash.style.left = targetX + 'px';
            flash.style.top = target.style.top;
            gameContainer.appendChild(flash);
            setTimeout(() => flash.remove(), 300);
        }
        
        function createTracer() {
            const tracer = document.createElement('div');
            tracer.className = 'tracer';
            tracer.style.width = '3px';
            tracer.style.height = '40px';
            tracer.style.background = 'rgba(255,200,100,0.8)';
            tracer.style.left = targetX + 'px';
            tracer.style.top = (parseFloat(target.style.top) + 10) + 'px';
            tracer.style.boxShadow = '0 0 10px rgba(255,200,100,0.6)';
            gameContainer.appendChild(tracer);
            setTimeout(() => tracer.remove(), 600);
        }
        
        function updateTarget() {
            if (!isPlaying) return;
            
            targetX += targetSpeed * targetDirection;
            
            // Если цель ушла за правый край
            if (targetX > window.innerWidth + 60) {
                misses++;
                combo = 0;
                comboDisplay.style.opacity = '0';
                
                if (misses >= MAX_MISSES) {
                    endGame();
                    return;
                }
                
                resetTarget();
            }
            
            target.style.left = targetX + 'px';
            
            // Параллакс
            worldX -= 1;
            bg.style.transform = `translateX(${worldX * 0.1}px)`;
            stones.style.transform = `translateX(${worldX * 0.2}px)`;
            roots.style.transform = `translateX(${worldX * 0.3}px)`;
            floor.style.transform = `translateX(${worldX * 0.6}px)`;
        }
        
        function endGame() {
            isPlaying = false;
            isGameOver = true;
            
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('flickBest', bestScore);
            }
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('bestScore').textContent = bestScore;
            
            gameoverScreen.style.display = 'flex';
            bottomNav.classList.remove('hidden');
            
            gameContainer.classList.add('shake');
            setTimeout(() => gameContainer.classList.remove('shake'), 500);
        }
        
        function restartGame() {
            score = 0;
            combo = 0;
            misses = 0;
            targetSpeed = 3;
            targetX = -60;
            targetDirection = 1;
            isPlaying = true;
            isGameOver = false;
            
            scoreDisplay.textContent = '🎯 0 очков';
            comboDisplay.style.opacity = '0';
            resetTarget();
            
            gameoverScreen.style.display = 'none';
            bottomNav.classList.add('hidden');
        }
        
        // Обработчики
        document.getElementById('shootBtn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            shoot();
        });
        document.getElementById('shootBtn').addEventListener('click', shoot);
        
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'KeyF') {
                e.preventDefault();
                shoot();
            }
        });
        
        document.getElementById('startGameBtn').addEventListener('click', () => {
            startScreen.style.display = 'none';
            bottomNav.classList.add('hidden');
            isPlaying = true;
            resetTarget();
        });
        
        document.getElementById('restartBtn').addEventListener('click', restartGame);
        
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                if (this.dataset.screen === 'game' && isGameOver) {
                    restartGame();
                }
            });
        });
        
        // Игровой цикл
        function gameTick() {
            updateTarget();
            requestAnimationFrame(gameTick);
        }
        
        // Запуск
        target.style.top = '200px';
        gameTick();
    </script>
</body>
</html>
