<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cave Ball</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #05070a;
            font-family: monospace;
            touch-action: manipulation;
            user-select: none;
            height: 100vh;
        }
        
        .game {
            position: relative;
            width: 100%;
            max-width: 420px;
            height: 100vh;
            margin: auto;
            overflow: hidden;
        }
        
        /* ===== PARALLAX BACKGROUND ===== */
        .layer {
            position: absolute;
            width: 220%;
            height: 100%;
            left: 0;
            top: 0;
            will-change: transform;
        }
        
        .bg {
            background: radial-gradient(circle at 70% 20%, rgba(255,255,255,0.08), transparent 40%),
                        radial-gradient(circle at 30% 70%, rgba(80,80,80,0.12), transparent 50%),
                        linear-gradient(#0b0f14, #05070a);
            z-index: 0;
        }
        
        .stones {
            background: radial-gradient(circle at 20% 60%, rgba(90,90,90,0.25), transparent 45%),
                        radial-gradient(circle at 60% 40%, rgba(60,60,60,0.2), transparent 50%),
                        radial-gradient(circle at 90% 80%, rgba(100,100,100,0.15), transparent 40%);
            z-index: 1;
            opacity: 0.9;
        }
        
        .roots {
            background: repeating-linear-gradient(45deg, transparent, transparent 90px,
                        rgba(60,40,20,0.15) 90px, rgba(60,40,20,0.15) 92px);
            z-index: 2;
            opacity: 0.6;
        }
        
        .light {
            position: absolute;
            top: -60px;
            right: -60px;
            width: 220px;
            height: 220px;
            background: radial-gradient(circle, rgba(255,255,255,0.22), rgba(120,140,255,0.08), transparent 60%);
            filter: blur(2px);
            z-index: 3;
            animation: pulse 3s infinite ease-in-out;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .floor {
            position: absolute;
            bottom: 0;
            width: 220%;
            height: 95px;
            background: repeating-linear-gradient(90deg, #0a0c10, #0a0c10 22px, #07090c 22px, #07090c 44px),
                        repeating-linear-gradient(0deg, transparent, transparent 18px,
                        rgba(255,255,255,0.02) 18px, rgba(255,255,255,0.02) 20px);
            border-top: 1px solid #1a1f28;
            z-index: 5;
        }
        
        .ball {
            position: absolute;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            left: 90px;
            bottom: 95px;
            background: radial-gradient(circle at 30% 30%, #ffffff 0%, #bfc7d1 10%, #6d7682 30%, #2b313a 60%, #0b0f14 100%);
            box-shadow: inset 3px 3px 6px rgba(255,255,255,0.2),
                        inset -4px -4px 10px rgba(0,0,0,0.6),
                        0 0 18px rgba(180,200,255,0.15);
            z-index: 10;
        }
        
        .ball.exploding {
            animation: explode 2.5s forwards;
        }
        
        @keyframes explode {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(2.5); opacity: 0.6; background: radial-gradient(circle at 30% 30%, #ff4444, #880000); }
            100% { transform: scale(4); opacity: 0; }
        }
        
        .shadow {
            position: absolute;
            width: 40px;
            height: 12px;
            background: rgba(0,0,0,0.55);
            border-radius: 50%;
            left: 90px;
            bottom: 85px;
            filter: blur(3px);
            z-index: 9;
        }
        
        /* ===== OBSTACLES ===== */
        .obstacle {
            position: absolute;
            z-index: 8;
        }
        
        .crystal-spike {
            width: 28px;
            height: 35px;
            position: relative;
        }
        
        .crystal-spike .spike-base {
            width: 8px;
            height: 18px;
            background: linear-gradient(180deg, #3a3a4a, #1a1a2a);
            position: absolute;
            bottom: 0;
            left: 10px;
            border-radius: 2px;
        }
        
        .crystal-spike .spike-top {
            width: 0;
            height: 0;
            border-left: 14px solid transparent;
            border-right: 14px solid transparent;
            border-bottom: 20px solid #4a4a6a;
            position: absolute;
            top: 0;
            left: 0;
            filter: drop-shadow(0 0 4px rgba(100,100,200,0.4));
        }
        
        .floating-arrow {
            width: 40px;
            height: 5px;
            background: linear-gradient(90deg, #3a3a4a, #5a5a7a);
            position: relative;
            border-radius: 2px;
            box-shadow: 0 0 6px rgba(100,100,200,0.3);
        }
        
        .floating-arrow::after {
            content: '';
            position: absolute;
            left: -8px;
            top: -4px;
            width: 0;
            height: 0;
            border-top: 7px solid transparent;
            border-bottom: 7px solid transparent;
            border-right: 10px solid #5a5a7a;
        }
        
        .score-display {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            color: #b7c0cc;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(180,200,255,0.4);
        }
        
        .jump-btn {
            position: absolute;
            left: 12px;
            bottom: 95px;
            width: 58px;
            height: 58px;
            border-radius: 50%;
            background: #1c232d;
            color: #b7c0cc;
            border: 1px solid #2a3442;
            z-index: 20;
            touch-action: manipulation;
            font-size: 22px;
            cursor: pointer;
        }
        
        .jump-btn:active {
            background: #2a3442;
        }
        
        /* ===== START SCREEN ===== */
        .start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5,7,10,0.9);
            z-index: 30;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .start-screen h1 {
            color: #b7c0cc;
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(180,200,255,0.3);
        }
        
        .start-screen p {
            color: #6d7682;
            margin-bottom: 20px;
        }
        
        .start-btn {
            background: #1c232d;
            color: #b7c0cc;
            border: 2px solid #2a3442;
            padding: 15px 40px;
            border-radius: 25px;
            font-size: 18px;
            cursor: pointer;
            font-family: monospace;
        }
        
        .start-btn:active {
            background: #2a3442;
        }
        
        /* ===== GAME OVER ===== */
        .gameover-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5,7,10,0.85);
            z-index: 25;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .gameover-screen h2 {
            color: #ff6666;
            font-size: 26px;
            margin-bottom: 10px;
        }
        
        .gameover-screen p {
            color: #b7c0cc;
            margin-bottom: 20px;
            font-size: 16px;
        }
        
        .restart-btn {
            background: #1c232d;
            color: #ff6666;
            border: 2px solid #ff4444;
            padding: 12px 35px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            font-family: monospace;
        }
        
        /* ===== BOTTOM NAV ===== */
        .bottom-nav {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 20;
            background: rgba(10,12,16,0.9);
            border-radius: 20px;
            padding: 6px;
            border: 1px solid #1a1f28;
        }
        
        .nav-btn {
            background: #1c232d;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 22px;
            cursor: pointer;
            color: #6d7682;
            transition: all 0.3s;
        }
        
        .nav-btn.active {
            background: #2a3442;
            color: #b7c0cc;
        }
        
        .shake {
            animation: shake 0.5s infinite;
        }
        
        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(-10px, 5px); }
            50% { transform: translate(10px, -5px); }
            75% { transform: translate(-5px, -5px); }
        }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="game" id="gameContainer">
        <div class="layer bg" id="bg"></div>
        <div class="layer stones" id="stones"></div>
        <div class="layer roots" id="roots"></div>
        
        <div class="light"></div>
        <div class="floor" id="floor"></div>
        
        <div class="shadow" id="shadow"></div>
        <div class="ball" id="ball"></div>
        
        <div class="score-display" id="scoreDisplay">💎 0</div>
        
        <button class="jump-btn" id="jumpBtn">▲</button>
        
        <!-- Стартовый экран -->
        <div class="start-screen" id="startScreen">
            <h1>🕳️ CAVE BALL</h1>
            <p>Прыгай и уклоняйся!</p>
            <button class="start-btn" id="startGameBtn">▶ НАЧАТЬ</button>
        </div>
        
        <!-- Экран проигрыша -->
        <div class="gameover-screen" id="gameoverScreen">
            <h2>💀 Потрачено</h2>
            <p>Счёт: <strong id="finalScore">0</strong> 💎</p>
            <button class="restart-btn" id="restartBtn">🔄 ЗАНОВО</button>
        </div>
        
        <!-- Нижнее меню -->
        <div class="bottom-nav" id="bottomNav">
            <button class="nav-btn active" data-screen="game">🎮</button>
            <button class="nav-btn" data-screen="shop">🛒</button>
            <button class="nav-btn" data-screen="profile">👤</button>
        </div>
    </div>

    <script>
        // Telegram
        try {
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
        } catch(e) {}
        
        // ===== СОСТОЯНИЕ =====
        let y = 95;
        let v = 0;
        let jumps = 2;
        let worldX = 0;
        let score = 0;
        let speed = 2;
        let isPlaying = false;
        let isGameOver = false;
        let canJump = true;
        
        const GRAVITY = -0.75;
        const JUMP_POWER = 12;
        const GROUND = 95;
        
        let obstacles = [];
        let gameLoop;
        let spawnTimeout;
        
        // ===== ЭЛЕМЕНТЫ =====
        const ball = document.getElementById('ball');
        const shadow = document.getElementById('shadow');
        const bg = document.getElementById('bg');
        const stones = document.getElementById('stones');
        const roots = document.getElementById('roots');
        const floor = document.getElementById('floor');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const startScreen = document.getElementById('startScreen');
        const gameoverScreen = document.getElementById('gameoverScreen');
        const gameContainer = document.getElementById('gameContainer');
        const bottomNav = document.getElementById('bottomNav');
        
        // ===== ПРЫЖОК =====
        function jump() {
            if (!isPlaying || isGameOver) return;
            if (jumps <= 0) return;
            
            v = JUMP_POWER;
            jumps--;
            canJump = false;
        }
        
        function resetJump() {
            if (y <= GROUND) {
                jumps = 2;
                canJump = true;
            }
        }
        
        // ===== ПРЕПЯТСТВИЯ =====
        function createObstacle() {
            if (!isPlaying) return;
            
            const obstacle = document.createElement('div');
            obstacle.className = 'obstacle';
            
            if (Math.random() < 0.6) {
                // Кристальные шипы
                obstacle.innerHTML = `
                    <div class="crystal-spike">
                        <div class="spike-top"></div>
                        <div class="spike-base"></div>
                    </div>
                `;
                obstacle.style.bottom = '95px';
            } else {
                // Летящие стрелы
                obstacle.innerHTML = '<div class="floating-arrow"></div>';
                obstacle.style.bottom = (110 + Math.random() * 120) + 'px';
            }
            
            obstacle.style.right = '-60px';
            gameContainer.appendChild(obstacle);
            obstacles.push(obstacle);
        }
        
        function moveObstacles() {
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];
                const currentRight = parseFloat(obs.style.right) || -60;
                const newRight = currentRight + speed;
                obs.style.right = newRight + 'px';
                
                if (checkCollision(obs)) {
                    endGame();
                    return;
                }
                
                if (newRight > window.innerWidth + 100) {
                    obs.remove();
                    obstacles.splice(i, 1);
                    score++;
                    scoreDisplay.textContent = '💎 ' + score;
                }
            }
        }
        
        function checkCollision(obstacle) {
            const ballRect = ball.getBoundingClientRect();
            const obsRect = obstacle.getBoundingClientRect();
            
            return ballRect.left + 8 < obsRect.right &&
                   ballRect.right - 8 > obsRect.left &&
                   ballRect.top + 8 < obsRect.bottom &&
                   ballRect.bottom - 8 > obsRect.top;
        }
        
        // ===== КОНЕЦ ИГРЫ =====
        function endGame() {
            isPlaying = false;
            isGameOver = true;
            
            gameContainer.classList.add('shake');
            ball.classList.add('exploding');
            
            clearTimeout(spawnTimeout);
            
            setTimeout(() => {
                gameContainer.classList.remove('shake');
                ball.classList.remove('exploding');
                
                document.getElementById('finalScore').textContent = score;
                gameoverScreen.style.display = 'flex';
                bottomNav.classList.remove('hidden');
            }, 2500);
        }
        
        function restartGame() {
            obstacles.forEach(o => o.remove());
            obstacles = [];
            score = 0;
            speed = 2;
            y = GROUND;
            v = 0;
            jumps = 2;
            canJump = true;
            isPlaying = true;
            isGameOver = false;
            
            ball.style.bottom = GROUND + 'px';
            shadow.style.bottom = (GROUND - 10) + 'px';
            ball.classList.remove('exploding');
            scoreDisplay.textContent = '💎 0';
            
            gameContainer.classList.remove('shake');
            gameoverScreen.style.display = 'none';
            bottomNav.classList.add('hidden');
            
            startSpawning();
        }
        
        function startSpawning() {
            clearTimeout(spawnTimeout);
            
            function spawn() {
                if (!isPlaying) return;
                createObstacle();
                const delay = Math.max(1800 / speed, 1000);
                spawnTimeout = setTimeout(spawn, delay);
            }
            
            spawnTimeout = setTimeout(spawn, 2000);
        }
        
        // ===== ИГРОВОЙ ЦИКЛ =====
        function update() {
            if (!isPlaying) {
                requestAnimationFrame(update);
                return;
            }
            
            v += GRAVITY;
            y += v;
            
            if (y < GROUND) {
                y = GROUND;
                v = 0;
                resetJump();
            }
            
            if (y > window.innerHeight - 50) {
                y = window.innerHeight - 50;
                v = 0;
            }
            
            ball.style.bottom = y + 'px';
            shadow.style.bottom = (y - 10) + 'px';
            ball.style.transform = 'rotate(' + y * 1.8 + 'deg)';
            
            worldX -= speed;
            
            bg.style.transform = `translateX(${worldX * 0.15}px)`;
            stones.style.transform = `translateX(${worldX * 0.3}px)`;
            roots.style.transform = `translateX(${worldX * 0.45}px)`;
            floor.style.transform = `translateX(${worldX * 0.8}px)`;
            
            moveObstacles();
            
            // Увеличение скорости
            if (score > 0 && score % 5 === 0 && speed < 8) {
                speed += 0.1;
            }
            
            requestAnimationFrame(update);
        }
        
        // ===== ОБРАБОТЧИКИ =====
        document.getElementById('jumpBtn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            jump();
        });
        document.getElementById('jumpBtn').addEventListener('click', jump);
        
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                e.preventDefault();
                jump();
            }
        });
        
        document.getElementById('startGameBtn').addEventListener('click', () => {
            startScreen.style.display = 'none';
            bottomNav.classList.add('hidden');
            isPlaying = true;
            startSpawning();
        });
        
        document.getElementById('restartBtn').addEventListener('click', restartGame);
        
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                if (this.dataset.screen === 'game' && isGameOver) {
                    restartGame();
                }
            });
        });
        
        // Запуск
        update();
    </script>
</body>
</html>
