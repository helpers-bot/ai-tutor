<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gg Mining</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0c0f;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            color: #f0e6c5;
        }
        
        .game-container {
            max-width: 420px;
            margin: 0 auto;
            min-height: 100vh;
            background: linear-gradient(180deg, #1a1f2b, #0b0e12);
            padding: 10px;
        }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1a1f2b;
            border-radius: 30px;
            padding: 10px 15px;
            margin-bottom: 10px;
            border: 1px solid #d4af37;
        }
        
        .balance {
            font-weight: bold;
            font-size: 16px;
        }
        
        .lang-btn {
            background: #333;
            color: #ffd700;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .mines-area {
            margin-bottom: 10px;
        }
        
        .mine-box {
            background: #1a1510;
            border-radius: 15px;
            height: 100px;
            margin-bottom: 5px;
            position: relative;
            overflow: hidden;
            border: 1px solid #3a3322;
        }
        
        .ground-line {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 30px;
            background: #3d2b0f;
            border-top: 2px solid #6b4c25;
        }
        
        .mine-icon {
            position: absolute;
            left: 10px;
            bottom: 25px;
            font-size: 35px;
        }
        
        .storage-icon {
            position: absolute;
            right: 10px;
            bottom: 25px;
            font-size: 30px;
        }
        
        .miner {
            position: absolute;
            bottom: 28px;
            font-size: 30px;
            transition: left 2s linear;
        }
        
        .resource {
            position: absolute;
            bottom: 35px;
            font-size: 16px;
            opacity: 0;
            transition: all 2s linear;
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            margin: 10px 0;
            font-size: 14px;
        }
        
        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
        }
        
        .tab {
            flex: 1;
            background: #20262e;
            border: none;
            padding: 12px;
            border-radius: 15px;
            color: #b9b09b;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
        }
        
        .tab.active {
            background: #c9a73c;
            color: #000;
        }
        
        .panel {
            background: #141a20;
            border-radius: 15px;
            padding: 10px;
        }
        
        .card {
            background: #1e232a;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #d4af37;
        }
        
        .card.locked {
            opacity: 0.5;
            border-left-color: #666;
        }
        
        .btn {
            background: #ffd700;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            color: #000;
        }
        
        .btn:active {
            background: #ffed4a;
        }
        
        .btn:disabled {
            background: #555;
            color: #999;
        }
        
        .float-text {
            position: fixed;
            top: 50%;
            left: 50%;
            color: #ffd700;
            font-weight: bold;
            font-size: 20px;
            pointer-events: none;
            animation: floatUp 1s forwards;
            z-index: 999;
        }
        
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-50px); }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="top-bar">
            <div class="balance">💰 <span id="coinsDisplay">0</span></div>
            <div class="balance">💠 <span id="crystalsDisplay">0</span></div>
            <button class="lang-btn" id="langToggle">🌐 РУС</button>
        </div>
        
        <div class="mines-area" id="minesArea"></div>
        
        <div class="stats">
            <span>Добыто: <strong id="totalMined">0</strong></span>
            <span>Доход: <strong id="incomeRate">0/с</strong></span>
        </div>
        
        <div class="tabs">
            <button class="tab active" data-tab="mines">⛰️ Шахты</button>
            <button class="tab" data-tab="miners">👷 Шахтёры</button>
        </div>
        
        <div class="panel" id="panel"></div>
    </div>

    <script>
        // Telegram
        try {
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
        } catch(e) {}
        
        // Язык
        const lang = {
            ru: {
                coal: 'Угольная шахта',
                iron: 'Железная шахта',
                gold: 'Золотая шахта',
                crystal: 'Кристальная шахта',
                diamond: 'Алмазная шахта',
                level: 'Уровень',
                miners: 'Шахтёров',
                upgrade: 'Улучшить',
                hire: 'Нанять',
                locked: 'Закрыто',
                need: 'Нужен'
            },
            en: {
                coal: 'Coal Mine',
                iron: 'Iron Mine',
                gold: 'Gold Mine',
                crystal: 'Crystal Mine',
                diamond: 'Diamond Mine',
                level: 'Level',
                miners: 'Miners',
                upgrade: 'Upgrade',
                hire: 'Hire',
                locked: 'Locked',
                need: 'Need'
            }
        };
        
        let currentLang = 'ru';
        
        function t(key) {
            return lang[currentLang][key] || key;
        }
        
        // Игра
        let game = {
            coins: 100,
            crystals: 10,
            total: 0,
            mines: [
                { id:0, name:'coal', level:1, income:1, cost:50, unlock:0, miners:1, max:5 },
                { id:1, name:'iron', level:0, income:3, cost:150, unlock:10, miners:0, max:7 },
                { id:2, name:'gold', level:0, income:8, cost:500, unlock:20, miners:0, max:9 },
                { id:3, name:'crystal', level:0, income:20, cost:1500, unlock:30, miners:0, max:11 },
                { id:4, name:'diamond', level:0, income:50, cost:5000, unlock:40, miners:0, max:13 }
            ]
        };
        
        // Загрузка
        const saved = localStorage.getItem('ggGame');
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                game = parsed;
            } catch(e) {}
        }
        
        function save() {
            localStorage.setItem('ggGame', JSON.stringify(game));
        }
        
        // Анимации
        const animations = {};
        
        function createMiners() {
            const area = document.getElementById('minesArea');
            area.innerHTML = '';
            
            const icons = ['⛏️', '⚒️', '💎', '🔮', '👑'];
            
            game.mines.forEach((mine, index) => {
                if (mine.level > 0) {
                    const box = document.createElement('div');
                    box.className = 'mine-box';
                    box.id = 'mine-' + mine.id;
                    
                    box.innerHTML = `
                        <div class="ground-line"></div>
                        <div class="mine-icon">${icons[index]}</div>
                        <div class="storage-icon">📦</div>
                    `;
                    
                    // Добавляем шахтёров
                    for (let i = 0; i < mine.miners; i++) {
                        const minerEl = document.createElement('div');
                        minerEl.className = 'miner';
                        minerEl.id = 'miner-' + mine.id + '-' + i;
                        minerEl.textContent = '👷';
                        minerEl.style.left = '60px';
                        box.appendChild(minerEl);
                        
                        const resourceEl = document.createElement('div');
                        resourceEl.className = 'resource';
                        resourceEl.id = 'res-' + mine.id + '-' + i;
                        resourceEl.textContent = '💎';
                        resourceEl.style.left = '60px';
                        box.appendChild(resourceEl);
                    }
                    
                    area.appendChild(box);
                }
            });
            
            // Запускаем анимацию
            startAnimations();
        }
        
        function startAnimations() {
            // Очищаем старые анимации
            Object.values(animations).forEach(id => clearInterval(id));
            
            game.mines.forEach(mine => {
                if (mine.level > 0) {
                    for (let i = 0; i < mine.miners; i++) {
                        animateMiner(mine.id, i);
                    }
                }
            });
        }
        
        function animateMiner(mineId, minerIndex) {
            const minerEl = document.getElementById('miner-' + mineId + '-' + minerIndex);
            const resEl = document.getElementById('res-' + mineId + '-' + minerIndex);
            
            if (!minerEl) return;
            
            const box = document.getElementById('mine-' + mineId);
            if (!box) return;
            
            const maxLeft = box.offsetWidth - 50;
            let left = 60;
            let goingRight = true;
            let hasResource = false;
            
            const key = mineId + '-' + minerIndex;
            
            animations[key] = setInterval(() => {
                if (goingRight) {
                    left += 2;
                    if (left >= maxLeft) {
                        goingRight = false;
                        // Дошёл до склада
                        if (hasResource) {
                            const mine = game.mines.find(m => m.id === mineId);
                            if (mine && mine.level > 0) {
                                const earned = mine.income * mine.level;
                                game.coins += earned;
                                game.total += earned;
                                updateUI();
                                showFloat('+' + earned.toFixed(1));
                            }
                            hasResource = false;
                            if (resEl) resEl.style.opacity = '0';
                        }
                    }
                } else {
                    left -= 2;
                    if (left <= 60) {
                        goingRight = true;
                        // Дошёл до шахты
                        hasResource = true;
                        if (resEl) resEl.style.opacity = '1';
                    }
                }
                
                minerEl.style.left = left + 'px';
                if (resEl && hasResource) {
                    resEl.style.left = (left + 10) + 'px';
                }
            }, 50);
        }
        
        function updateUI() {
            document.getElementById('coinsDisplay').textContent = Math.floor(game.coins);
            document.getElementById('crystalsDisplay').textContent = Math.floor(game.crystals);
            document.getElementById('totalMined').textContent = Math.floor(game.total);
            
            let totalIncome = 0;
            game.mines.forEach(m => {
                if (m.level > 0) totalIncome += m.income * m.level * m.miners;
            });
            document.getElementById('incomeRate').textContent = totalIncome.toFixed(1) + '/с';
        }
        
        function showFloat(text) {
            const el = document.createElement('div');
            el.className = 'float-text';
            el.textContent = text;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }
        
        function isUnlocked(index) {
            if (index === 0) return true;
            return game.mines[index - 1].level >= game.mines[index].unlock;
        }
        
        function upgradeMine(index) {
            if (!isUnlocked(index)) return;
            
            const mine = game.mines[index];
            const cost = Math.floor(mine.cost * Math.pow(1.5, mine.level));
            
            if (game.coins < cost) return;
            
            game.coins -= cost;
            
            if (mine.level === 0) {
                mine.level = 1;
                mine.miners = 1;
                if (index > 0) game.crystals += 2;
            } else {
                mine.level++;
            }
            
            game.total += 10;
            showFloat('+1 ⬆️');
            save();
            createMiners();
            renderPanel();
            updateUI();
        }
        
        function hireMiner(mineId) {
            const mine = game.mines.find(m => m.id === mineId);
            if (!mine || mine.level === 0) return;
            if (mine.miners >= mine.max) return;
            
            const cost = Math.floor(100 * Math.pow(1.5, mine.miners));
            if (game.coins < cost) return;
            
            game.coins -= cost;
            mine.miners++;
            showFloat('👷 +1');
            save();
            createMiners();
            renderPanel();
            updateUI();
        }
        
        function renderPanel(tab) {
            const panel = document.getElementById('panel');
            panel.innerHTML = '';
            
            if (tab === 'mines') {
                game.mines.forEach((mine, i) => {
                    const unlocked = isUnlocked(i);
                    const cost = Math.floor(mine.cost * Math.pow(1.5, mine.level));
                    
                    const card = document.createElement('div');
                    card.className = 'card' + (unlocked ? '' : ' locked');
                    
                    card.innerHTML = `
                        <div>
                            <strong>${t(mine.name)}</strong><br>
                            <small>${t('level')}: ${mine.level} | ${t('miners')}: ${mine.miners}/${mine.max}</small>
                            ${!unlocked ? '<br><small>🔒 ' + t('need') + ' ' + mine.unlock + '</small>' : ''}
                        </div>
                        <button class="btn" ${!unlocked ? 'disabled' : ''}>
                            ${unlocked ? '⬆️ ' + cost + ' 💰' : t('locked')}
                        </button>
                    `;
                    
                    if (unlocked) {
                        card.querySelector('.btn').onclick = () => upgradeMine(i);
                    }
                    
                    panel.appendChild(card);
                });
            } else {
                game.mines.forEach(mine => {
                    if (mine.level > 0) {
                        const cost = Math.floor(100 * Math.pow(1.5, mine.miners));
                        
                        const card = document.createElement('div');
                        card.className = 'card';
                        
                        card.innerHTML = `
                            <div>
                                <strong>${t(mine.name)}</strong><br>
                                <small>${t('miners')}: ${mine.miners}/${mine.max}</small>
                            </div>
                            <button class="btn" ${mine.miners >= mine.max ? 'disabled' : ''}>
                                ${mine.miners >= mine.max ? 'Макс' : t('hire') + ' 💰 ' + cost}
                            </button>
                        `;
                        
                        if (mine.miners < mine.max) {
                            card.querySelector('.btn').onclick = () => hireMiner(mine.id);
                        }
                        
                        panel.appendChild(card);
                    }
                });
            }
        }
        
        // Переключение языка
        document.getElementById('langToggle').onclick = function() {
            currentLang = currentLang === 'ru' ? 'en' : 'ru';
            this.textContent = currentLang === 'ru' ? '🌐 РУС' : '🌐 ENG';
            
            document.querySelectorAll('.tab').forEach(t => {
                if (t.dataset.tab === 'mines') t.textContent = '⛰️ ' + (currentLang === 'ru' ? 'Шахты' : 'Mines');
                if (t.dataset.tab === 'miners') t.textContent = '👷 ' + (currentLang === 'ru' ? 'Шахтёры' : 'Miners');
            });
            
            const activeTab = document.querySelector('.tab.active').dataset.tab;
            renderPanel(activeTab);
        };
        
        // Переключение вкладок
        document.querySelectorAll('.tab').forEach(tab => {
            tab.onclick = function() {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                renderPanel(this.dataset.tab);
            };
        });
        
        // Игровой цикл
        setInterval(() => {
            let income = 0;
            game.mines.forEach(m => {
                if (m.level > 0) income += m.income * m.level * m.miners;
            });
            
            if (income > 0) {
                game.coins += income * 0.05;
                game.total += income * 0.05;
                updateUI();
            }
        }, 100);
        
        // Автосохранение
        setInterval(save, 5000);
        
        // Запуск
        createMiners();
        updateUI();
        renderPanel('mines');
    </script>
</body>
</html>
