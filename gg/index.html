<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gg Mining</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: #0a0c0f;
            min-height: 100vh;
            padding: 0;
            margin: 0;
            color: #f0e6c5;
            user-select: none;
        }
        
        .game-container {
            max-width: 100%;
            width: 100%;
            min-height: 100vh;
            background: linear-gradient(180deg, #1a1f2b 0%, #0b0e12 100%);
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(20, 25, 30, 0.95);
            border-radius: 50px;
            padding: 10px 15px;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }
        
        .balance-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: 700;
            font-size: 0.9rem;
        }
        
        .lang-btn {
            background: #2a2f36;
            border: none;
            color: #e0c88c;
            font-weight: bold;
            border-radius: 20px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 0.8rem;
            border: 1px solid #4d4530;
        }
        
        .mines-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 350px;
            overflow-y: auto;
        }
        
        .mine-scene {
            background: #12171d;
            border-radius: 15px;
            border: 1px solid #3a3322;
            overflow: hidden;
            position: relative;
            height: 100px;
            background: linear-gradient(0deg, #2a1f0a 0%, #1a1510 60%, #1a1f2b 100%);
            min-height: 100px;
        }
        
        .mine-ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 35%;
            background: linear-gradient(0deg, #3d2b0f 0%, #5a3d1a 50%, #2a1f0a 100%);
            border-top: 2px solid #6b4c25;
        }
        
        .mine-entrance {
            position: absolute;
            left: 10px;
            bottom: 32%;
            font-size: 2.2rem;
            z-index: 2;
        }
        
        .mine-storage {
            position: absolute;
            right: 10px;
            bottom: 32%;
            font-size: 2rem;
            z-index: 2;
        }
        
        .miner-wrapper {
            position: absolute;
            bottom: 34%;
            transition: left 1.5s linear;
            z-index: 3;
        }
        
        .miner-figure {
            position: relative;
            width: 35px;
            height: 45px;
        }
        
        .miner-head {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.2rem;
            z-index: 2;
        }
        
        .miner-body-part {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 14px;
            background: #d4a574;
            border-radius: 4px;
            z-index: 1;
        }
        
        .miner-arm-left {
            position: absolute;
            top: 18px;
            left: 2px;
            width: 6px;
            height: 14px;
            background: #c9966b;
            border-radius: 3px;
            transform-origin: top center;
            animation: swingLeft 0.6s infinite;
        }
        
        .miner-arm-right {
            position: absolute;
            top: 18px;
            right: 2px;
            width: 6px;
            height: 14px;
            background: #c9966b;
            border-radius: 3px;
            transform-origin: top center;
            animation: swingRight 0.6s infinite;
        }
        
        .miner-pickaxe {
            position: absolute;
            top: 12px;
            right: -10px;
            font-size: 0.9rem;
            animation: swingPick 0.6s infinite;
        }
        
        .miner-leg-left {
            position: absolute;
            bottom: 0;
            left: 8px;
            width: 7px;
            height: 12px;
            background: #3d2b0f;
            border-radius: 3px;
            animation: walkLeg 0.4s infinite;
        }
        
        .miner-leg-right {
            position: absolute;
            bottom: 0;
            right: 8px;
            width: 7px;
            height: 12px;
            background: #3d2b0f;
            border-radius: 3px;
            animation: walkLeg 0.4s infinite 0.2s;
        }
        
        .carried-resource {
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        @keyframes swingLeft {
            0%, 100% { transform: rotate(-20deg); }
            50% { transform: rotate(20deg); }
        }
        
        @keyframes swingRight {
            0%, 100% { transform: rotate(20deg); }
            50% { transform: rotate(-20deg); }
        }
        
        @keyframes swingPick {
            0%, 100% { transform: rotate(-25deg); }
            50% { transform: rotate(25deg); }
        }
        
        @keyframes walkLeg {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-5px) rotate(10deg); }
        }
        
        .stats-row {
            display: flex;
            justify-content: space-around;
            font-size: 0.8rem;
            color: #cfb87c;
            margin: 5px 0;
        }
        
        .tabs {
            display: flex;
            gap: 5px;
        }
        
        .tab {
            flex: 1;
            background: #20262e;
            border: none;
            padding: 10px;
            border-radius: 15px;
            color: #b9b09b;
            font-weight: bold;
            font-size: 0.75rem;
            cursor: pointer;
        }
        
        .tab.active {
            background: #c9a73c;
            color: #000;
        }
        
        .content-panel {
            background: #141a20;
            border-radius: 15px;
            padding: 10px;
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .card {
            background: #1e232a;
            border-radius: 12px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #d4af37;
        }
        
        .card.locked {
            opacity: 0.5;
            border-left-color: #555;
        }
        
        .card-info h3 {
            font-size: 0.9rem;
            margin-bottom: 3px;
        }
        
        .card-info p {
            font-size: 0.7rem;
            color: #aaa;
        }
        
        .btn {
            background: #e5b93c;
            border: none;
            border-radius: 20px;
            padding: 8px 15px;
            font-weight: bold;
            color: #000;
            cursor: pointer;
            font-size: 0.8rem;
            white-space: nowrap;
        }
        
        .btn:active {
            transform: scale(0.95);
        }
        
        .btn:disabled {
            background: #555;
            color: #999;
        }
        
        .floating-text {
            position: fixed;
            animation: floatUp 1.5s ease-out forwards;
            font-weight: bold;
            color: #ffd700;
            pointer-events: none;
            z-index: 1000;
            font-size: 1.2rem;
        }
        
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-80px) scale(1.5); }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="top-bar">
            <div class="balance-item">
                <span>💰</span>
                <span id="coinsDisplay">0</span>
            </div>
            <div class="balance-item">
                <span>💠</span>
                <span id="crystalsDisplay">0</span>
            </div>
            <button class="lang-btn" id="langToggle">🌐 РУС</button>
        </div>
        
        <div class="mines-container" id="minesContainer"></div>
        
        <div class="stats-row">
            <span>Добыто: <strong id="totalMined">0</strong></span>
            <span>Доход: <strong id="incomeRate">+0.0/с</strong></span>
        </div>
        
        <div class="tabs">
            <button class="tab active" data-tab="mines">⛰️ Шахты</button>
            <button class="tab" data-tab="miners">👷 Шахтёры</button>
        </div>
        
        <div class="content-panel" id="contentPanel"></div>
    </div>

    <script>
        // Telegram WebApp
        try {
            if (window.Telegram && window.Telegram.WebApp) {
                const tg = window.Telegram.WebApp;
                tg.ready();
                tg.expand();
            }
        } catch (e) {}
        
        const translations = {
            ru: {
                coalMine: 'Угольная шахта',
                ironMine: 'Железная шахта',
                goldMine: 'Золотая шахта',
                crystalMine: 'Кристальная шахта',
                diamondMine: 'Алмазная шахта',
                level: 'Уровень',
                income: 'Доход',
                upgrade: 'Улучшить',
                buyMiner: 'Нанять шахтёра',
                locked: 'Закрыто',
                unlockAt: 'Нужен уровень',
                minersCount: 'Шахтёров',
                max: 'Макс'
            },
            en: {
                coalMine: 'Coal Mine',
                ironMine: 'Iron Mine',
                goldMine: 'Gold Mine',
                crystalMine: 'Crystal Mine',
                diamondMine: 'Diamond Mine',
                level: 'Level',
                income: 'Income',
                upgrade: 'Upgrade',
                buyMiner: 'Hire Miner',
                locked: 'Locked',
                unlockAt: 'Need level',
                minersCount: 'Miners',
                max: 'Max'
            }
        };
        
        let currentLang = 'ru';
        
        function t(key) {
            return translations[currentLang]?.[key] || key;
        }
        
        // Игра
        const game = JSON.parse(localStorage.getItem('ggMiningGame')) || {
            coins: 100,
            crystals: 10,
            totalMined: 0,
            mines: [
                { id: 0, type: 'coalMine', level: 1, baseIncome: 1, upgradeCost: 50, unlockLevel: 0, miners: 1, maxMiners: 5 },
                { id: 1, type: 'ironMine', level: 0, baseIncome: 3, upgradeCost: 150, unlockLevel: 10, miners: 0, maxMiners: 7 },
                { id: 2, type: 'goldMine', level: 0, baseIncome: 8, upgradeCost: 500, unlockLevel: 20, miners: 0, maxMiners: 9 },
                { id: 3, type: 'crystalMine', level: 0, baseIncome: 20, upgradeCost: 1500, unlockLevel: 30, miners: 0, maxMiners: 11 },
                { id: 4, type: 'diamondMine', level: 0, baseIncome: 50, upgradeCost: 5000, unlockLevel: 40, miners: 0, maxMiners: 13 }
            ]
        };
        
        const minerAnimations = {};
        
        function createMinerElement(mineId, minerIndex) {
            const scene = document.querySelector(`.mine-scene[data-mine="${mineId}"]`);
            if (!scene) return null;
            
            const wrapper = document.createElement('div');
            wrapper.className = 'miner-wrapper';
            wrapper.id = `miner-${mineId}-${minerIndex}`;
            wrapper.style.left = '80px';
            
            wrapper.innerHTML = `
                <div class="miner-figure">
                    <div class="miner-head">👷</div>
                    <div class="miner-body-part"></div>
                    <div class="miner-arm-left"></div>
                    <div class="miner-arm-right"></div>
                    <div class="miner-pickaxe">⛏️</div>
                    <div class="miner-leg-left"></div>
                    <div class="miner-leg-right"></div>
                    <div class="carried-resource">💎</div>
                </div>
            `;
            
            scene.appendChild(wrapper);
            return wrapper;
        }
        
        function startMinerAnimation(mineId, minerIndex) {
            const minerEl = document.getElementById(`miner-${mineId}-${minerIndex}`);
            if (!minerEl) return;
            
            const scene = minerEl.parentElement;
            const sceneWidth = scene.offsetWidth;
            const leftLimit = 70;
            const rightLimit = sceneWidth - 70;
            let position = leftLimit + (minerIndex * 15);
            let goingRight = true;
            let hasResource = false;
            
            const animId = `${mineId}-${minerIndex}`;
            
            if (minerAnimations[animId]) {
                clearInterval(minerAnimations[animId]);
            }
            
            minerAnimations[animId] = setInterval(() => {
                if (goingRight) {
                    position += 2;
                    if (position >= rightLimit) {
                        goingRight = false;
                        if (hasResource) {
                            const mine = game.mines.find(m => m.id === mineId);
                            if (mine && mine.level > 0) {
                                const earned = mine.baseIncome * mine.level;
                                game.coins += earned;
                                game.totalMined += earned;
                                updateDisplay();
                                floatText('+' + earned.toFixed(1));
                            }
                            hasResource = false;
                            const resource = minerEl.querySelector('.carried-resource');
                            if (resource) resource.style.opacity = '0';
                        }
                    }
                } else {
                    position -= 2;
                    if (position <= leftLimit) {
                        goingRight = true;
                        hasResource = true;
                        const resource = minerEl.querySelector('.carried-resource');
                        if (resource) resource.style.opacity = '1';
                    }
                }
                
                minerEl.style.left = position + 'px';
            }, 50);
        }
        
        function updateAllMiners() {
            document.querySelectorAll('.mine-scene').forEach(scene => {
                scene.querySelectorAll('.miner-wrapper').forEach(w => w.remove());
            });
            
            Object.keys(minerAnimations).forEach(key => {
                clearInterval(minerAnimations[key]);
                delete minerAnimations[key];
            });
            
            game.mines.forEach(mine => {
                if (mine.level > 0 && mine.miners > 0) {
                    for (let i = 0; i < mine.miners; i++) {
                        const minerEl = createMinerElement(mine.id, i);
                        if (minerEl) {
                            startMinerAnimation(mine.id, i);
                        }
                    }
                }
            });
        }
        
        function renderMineScenes() {
            const container = document.getElementById('minesContainer');
            container.innerHTML = '';
            
            game.mines.forEach((mine, index) => {
                if (mine.level > 0) {
                    const scene = document.createElement('div');
                    scene.className = 'mine-scene';
                    scene.dataset.mine = mine.id;
                    
                    const icons = ['⛏️', '⚒️', '💎', '🔮', '👑'];
                    
                    scene.innerHTML = `
                        <div class="mine-ground"></div>
                        <div class="mine-entrance">${icons[index] || '⛏️'}</div>
                        <div class="mine-storage">📦</div>
                    `;
                    container.appendChild(scene);
                }
            });
            
            // Небольшая задержка чтобы DOM обновился
            setTimeout(() => {
                updateAllMiners();
            }, 100);
        }
        
        function saveGame() {
            localStorage.setItem('ggMiningGame', JSON.stringify(game));
        }
        
        function getIncome() {
            let total = 0;
            game.mines.forEach(m => { 
                if (m.level > 0) total += m.baseIncome * m.level * m.miners;
            });
            return total;
        }
        
        function updateDisplay() {
            document.getElementById('coinsDisplay').textContent = Math.floor(game.coins);
            document.getElementById('crystalsDisplay').textContent = Math.floor(game.crystals);
            document.getElementById('totalMined').textContent = Math.floor(game.totalMined);
            document.getElementById('incomeRate').textContent = '+' + getIncome().toFixed(1) + '/с';
        }
        
        function floatText(text) {
            const el = document.createElement('div');
            el.className = 'floating-text';
            el.textContent = text;
            el.style.left = '50%';
            el.style.top = '50%';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1500);
        }
        
        function isUnlocked(mineIndex) {
            if (mineIndex === 0) return true;
            return game.mines[mineIndex - 1].level >= game.mines[mineIndex].unlockLevel;
        }
        
        function upgradeMine(index) {
            if (!isUnlocked(index)) return;
            const mine = game.mines[index];
            const cost = Math.floor(mine.upgradeCost * Math.pow(1.5, mine.level));
            if (game.coins < cost) return;
            
            game.coins -= cost;
            const wasZero = mine.level === 0;
            mine.level++;
            
            if (wasZero && index > 0) {
                game.crystals += 2;
                mine.miners = 1;
            }
            
            game.totalMined += 10;
            floatText('+1 ⬆️');
            saveGame();
            renderMineScenes();
            renderContent(document.querySelector('.tab.active').dataset.tab);
            updateDisplay();
        }
        
        function hireMiner(mineId) {
            const mine = game.mines.find(m => m.id === mineId);
            if (!mine || mine.level === 0) return;
            if (mine.miners >= mine.maxMiners) return;
            
            const cost = Math.floor(100 * Math.pow(1.5, mine.miners));
            if (game.coins < cost) return;
            
            game.coins -= cost;
            mine.miners++;
            floatText('👷 +1');
            saveGame();
            renderMineScenes();
            renderContent('miners');
            updateDisplay();
        }
        
        function renderContent(tab) {
            const panel = document.getElementById('contentPanel');
            panel.innerHTML = '';
            
            if (tab === 'mines') {
                game.mines.forEach((mine, i) => {
                    const unlocked = isUnlocked(i);
                    const cost = Math.floor(mine.upgradeCost * Math.pow(1.5, mine.level));
                    const card = document.createElement('div');
                    card.className = `card ${unlocked ? '' : 'locked'}`;
                    card.innerHTML = `
                        <div class="card-info">
                            <h3>${t(mine.type)}</h3>
                            <p>${t('level')}: ${mine.level} | ${t('minersCount')}: ${mine.miners}/${mine.maxMiners}</p>
                            ${!unlocked ? `<p>🔒 ${t('unlockAt')} ${mine.unlockLevel}</p>` : ''}
                        </div>
                        <button class="btn" ${!unlocked ? 'disabled' : ''}>
                            ${unlocked ? `⬆️ ${cost} 💰` : t('locked')}
                        </button>
                    `;
                    if (unlocked) {
                        card.querySelector('.btn').onclick = () => upgradeMine(i);
                    }
                    panel.appendChild(card);
                });
            } else if (tab === 'miners') {
                game.mines.forEach(mine => {
                    if (mine.level > 0) {
                        const hireCost = Math.floor(100 * Math.pow(1.5, mine.miners));
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `
                            <div class="card-info">
                                <h3>${t(mine.type)}</h3>
                                <p>${t('minersCount')}: ${mine.miners}/${mine.maxMiners} | ${t('income')}: ${(mine.baseIncome * mine.level * mine.miners).toFixed(1)}/с</p>
                            </div>
                            <button class="btn" ${mine.miners >= mine.maxMiners ? 'disabled' : ''}>
                                ${mine.miners >= mine.maxMiners ? t('max') : `${t('buyMiner')} 💰 ${hireCost}`}
                            </button>
                        `;
                        if (mine.miners < mine.maxMiners) {
                            card.querySelector('.btn').onclick = () => hireMiner(mine.id);
                        }
                        panel.appendChild(card);
                    }
                });
            }
        }
        
        function switchLang() {
            currentLang = currentLang === 'ru' ? 'en' : 'ru';
            document.getElementById('langToggle').textContent = currentLang === 'ru' ? '🌐 РУС' : '🌐 ENG';
            const activeTab = document.querySelector('.tab.active').dataset.tab;
            document.querySelectorAll('.tab').forEach(t => {
                if (t.dataset.tab === 'mines') t.innerHTML = '⛰️ ' + (currentLang === 'ru' ? 'Шахты' : 'Mines');
                if (t.dataset.tab === 'miners') t.innerHTML = '👷 ' + (currentLang === 'ru' ? 'Шахтёры' : 'Miners');
            });
            renderContent(activeTab);
        }
        
        // Инициализация
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                renderContent(this.dataset.tab);
            });
        });
        
        document.getElementById('langToggle').addEventListener('click', switchLang);
        
        // Игровой цикл
        setInterval(() => {
            const income = getIncome();
            if (income > 0) {
                game.coins += income * 0.05;
                game.totalMined += income * 0.05;
                updateDisplay();
            }
        }, 100);
        
        // Автосохранение
        setInterval(saveGame, 5000);
        
        // Старт
        updateDisplay();
        renderMineScenes();
        renderContent('mines');
    </script>
</body>
</html>
