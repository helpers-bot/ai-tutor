<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Градиенты -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0a2e;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f3ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b347ea;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="diamondGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f3ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#b347ea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b9d;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Фон -->
  <rect width="512" height="512" rx="100" fill="url(#bgGrad)"/>
  
  <!-- Внешнее кольцо -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#diamondGrad)" stroke-width="4" opacity="0.5">
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 256 256"
      to="360 256 256"
      dur="10s"
      repeatCount="indefinite"/>
  </circle>
  
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#diamondGrad)" stroke-width="2" opacity="0.3">
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="360 256 256"
      to="0 256 256"
      dur="8s"
      repeatCount="indefinite"/>
  </circle>

  <!-- Алмаз -->
  <g transform="translate(256, 200)" filter="url(#strongGlow)">
    <polygon points="0,-80 60,0 0,80 -60,0" fill="none" stroke="url(#diamondGrad)" stroke-width="4">
      <animate
        attributeName="opacity"
        values="0.7;1;0.7"
        dur="2s"
        repeatCount="indefinite"/>
    </polygon>
    <polygon points="0,-80 60,0 0,80 -60,0" fill="url(#diamondGrad)" opacity="0.3"/>
    
    <!-- Линии внутри алмаза -->
    <line x1="0" y1="-80" x2="0" y2="80" stroke="white" stroke-width="2" opacity="0.5"/>
    <line x1="-60" y1="0" x2="60" y2="0" stroke="white" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- Текст VDS -->
  <g filter="url(#strongGlow)">
    <text x="256" y="370" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="80" font-weight="900" fill="url(#textGrad)" letter-spacing="8">
      VDS
      <animate
        attributeName="opacity"
        values="0.8;1;0.8"
        dur="2s"
        repeatCount="indefinite"/>
    </text>
  </g>
  
  <!-- Точка после VDS -->
  <circle cx="340" cy="355" r="6" fill="#00f3ff" filter="url(#strongGlow)">
    <animate
      attributeName="r"
      values="4;8;4"
      dur="1.5s"
      repeatCount="indefinite"/>
    <animate
      attributeName="opacity"
      values="0.5;1;0.5"
      dur="1.5s"
      repeatCount="indefinite"/>
  </circle>

  <!-- Орбитальные частицы -->
  <circle cx="156" cy="200" r="6" fill="#00f3ff" filter="url(#glow)">
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 256 256"
      to="360 256 256"
      dur="3s"
      repeatCount="indefinite"/>
  </circle>
  
  <circle cx="356" cy="300" r="6" fill="#b347ea" filter="url(#glow)">
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 256 256"
      to="360 256 256"
      dur="4s"
      repeatCount="indefinite"/>
  </circle>
  
  <circle cx="200" cy="350" r="6" fill="#ff6b9d" filter="url(#glow)">
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 256 256"
      to="360 256 256"
      dur="3.5s"
      repeatCount="indefinite"/>
  </circle>

  <!-- Звездочки -->
  <g filter="url(#glow)">
    <circle cx="100" cy="150" r="3" fill="white">
      <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="200" r="3" fill="white">
      <animate attributeName="opacity" values="0;1;0" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="400" r="3" fill="white">
      <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="380" cy="380" r="3" fill="white">
      <animate attributeName="opacity" values="0;1;0" dur="2.2s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
